body:
  text: 卷第十八正骨兼金鏃科祕論骨節損折肘臂腰膝出臼蹉跌須用法整頓歸元先用麻藥與服使不知痛然後可用手凡腳手各有六出臼四折骨每手有三處出臼腳亦三處出臼手六出臼四折骨手掌根出臼其骨交互相鎖或出臼則是挫出鎖骨之外須鎖骨下歸窠或出外則須搦入內或出內則須搦入外方入窠臼若只用手拽斷難入窠十有八九成痼疾也凡手臂肘出臼此骨上段骨是臼下段骨杵四邊筋脈鎖定或出臼亦挫損筋所以出臼此骨須拽手直一人拽須用手把定此間骨搦教歸窠看骨出那邊用竹一片夾定一邊一邊不用夾須在屈直處夾才服藥後不可放定或肘又用拽屈拽直此處筋多吃藥後若不屈直則恐成疾日後曲直不得肩胛上出臼只是手骨出臼歸下身骨出臼歸上或出左或出右須用舂杵一枚小凳一個令患者立凳上用杵撐在下出臼之處或低用物墊起杵長則簟凳起令一個把住手尾拽去一人把住舂杵令一人助患人放身從上坐落骨已歸窠矣神效若不用小凳則兩小梯相對木棒穿從兩梯股中過用手把住木棒正稜在出臼腋下骨節蹉跌之處放身從上墜下骨節自然歸臼矣腳六出臼四折骨或腳板上交叉處出臼須用一人拽去自用手摸其骨節或骨突出在內用手正從此骨頭拽歸外或骨突向外須用力拽歸內則歸窠若只拽不用手整入窠內誤人成疾腳膝出臼與手臂肘出臼同或出內出外亦用一邊夾定此處筋脈最多服藥後時時用屈直不可放定又恐再出窠時時看顧不可疏慢腳大腿根出臼此處身上骨是臼腿骨是杵或出前或出後須用人把住患人身一人拽腳用手盡力搦歸窠或是挫開又可用軟綿繩從腳縛倒吊起用手整骨節從上墜下自然歸窠背脊骨折法凡挫脊骨不可用手整頓須用軟繩從腳吊起墜下身直其骨便自然歸窠未直則未歸窠須要墜下待其骨直歸窠然後用大桑皮一片放在背皮上杉樹皮兩三片安在桑皮上用軟物纏夾定莫令屈用藥治之腳手骨被壓碎者須用麻藥與服或用刀割開甚者用剪剪去骨鋒便不衝破肉或有粉碎者與去細骨免膿血之禍然後用大片桑白皮以二十五味藥和調糊藥糊在桑白皮上夾在骨肉上莫令差錯三日一洗莫令臭穢用藥治之又切不可輕便自恃有藥便割便剪便弄須要詳細審視當行則行尤宜仔細或頭上有傷或打破或刀傷骨碎用藥糊角縛不使傷風切須記之用藥治傷則用糊藥封角切不可使風入之浮腫其惡血自消散不攻瘡口正骨金瘡脈候正骨金瘡須看脈候如傷臟腑致命處一觀其脈虛促危矣傷處淺命脈虛促亦為後慮傷至重命脈和緩永無慮也脈有虛有實有去來有疏密或被傷臟脈不死者必關脈實重則無慮或傷至死處其關脈無別脈洪大則難醫如用兩件藥後脈不轉動急急住藥若脈漸漸隨藥轉此則可治無慮或出血甚者脈不要洪大只要平正重實其血不曾出者亦無惡血在內者其脈欲洪大不要疏密亦不要進退來去恐其變凶看傷脈每與內科脈不同或傷內或致命或難醫處被傷者命脈便已去矣此等切勿治之十不治證攧撲損傷或被傷入於肺者縱未即死二七難過左脅下傷透內者腸傷斷一半可醫全斷不可治小腹下傷內者證候繁多者脈不實重者老人左股壓碎者傷破陰子者血出盡者肩內耳後傷透於內者皆不必用藥用藥加減法傷有淺深隨其吉凶用藥如骨折者則用後二十五味接骨方治之再加自然銅白芷沒藥川芎各五錢立效若傷臟腑用清心藥加川芎當歸赤芍藥各三錢或肚腸傷破加白芨五錢同後清心藥服或被傷浮腫不退加皂角黃柏皮各半兩入紫金皮散內敷之或頭破傷風亦用紫金皮散加皂角黃柏皮敷之立退或筋斷接筋者用二十五味加續斷半兩或諸處傷痛不止者仍用二十五味加川芎五錢或惡血汙心不下用後清心藥加大黃枳殼各五錢或氣觸痛加木通丁香藿香各三錢同二十五味服之凡加減末者加末散者加散其餘只依本方不用加減孕婦攧撲傷損先用安胎藥後服二十五味接骨去草烏川烏余依本方腸肚傷治法肚上被傷肚皮俱破腸出在外只腸全斷難醫傷破而不斷者皆可治療腸及肚皮破者用花蕊石散敷線上輕用手從上縫之莫待糞出用清油捻活放入肚內肚皮裂開者用麻縷為線或捶桑白皮為線亦用花蕊石散敷線上須用從里重縫肚皮不可縫外重皮留外皮開用藥摻待生肉又用藥加減法凡損若不折骨不碎骨則不可用自然銅於藥內除去無疾則不用半夏老人有傷者骨脈冷每用加當歸川芎川烏木香丁香人參各五錢去白芍藥生地黃此亦是二十五味內加減老人即服此或傷臟腑者不問老少如有血並痰從口中出者用清心藥加丁皮川芎半夏入二十五味內同服退腫角血或皮冷加乾薑五錢入退腫藥內糊腫上腫及血自然退散或皮膚熱者加黃柏皮皂角各五錢入退腫藥內角腫處自然退用麻藥法攧撲損傷骨肉疼痛整頓不得先用麻藥服待其不識痛處方可下手或服後麻不倒可加蔓陀羅花及草烏各五錢用好酒調些少與服若其人如酒醉即不可加藥被傷有老有幼有無力有血出甚者此藥逐時相度入用不可過多亦有重者若見麻不倒者又旋添些更未倒又添酒調服少許已倒便住藥切不可過多用摻藥法瘡口血出不止則用方中止血藥敷之如洗開後瘡孔大甚且先用降真香龍骨沒藥摻之肉即生上瘡孔上須用油單貼待膿血汁出莫待蔽塞如夏月用藥以薄荷葉貼瘡孔一日一度湯洗又用藥摻如肉上滿瘡口如好肉一般即用收瘡口藥敷上卻莫貼待風稍瘡口立收若未生實肉切不可先收瘡口裡面恐為患也傷破肚皮用藥法如傷孔大肚腸與脂膏俱出放入內則用縫如孔小只有膏出先用清心藥與服用手掰去膏不用縫此膏出者已無用了不可復入肚中反成禍只須掰去不妨此是閒肉但放心去之肚肉被傷者專用退利大小腸不可待祕恐成重患打攧及樹木壓遍身痛者打攧樹木壓或自高處攧下者此等傷皆驚動四肢五臟必有惡血在內專怕噁心先用清心藥打血藥及通大小腸藥次第先服臨服加童子小便入藥內立效專用大小腸洗利恐作隘塞利害之甚清心藥加前方通利大小腸藥服之自然俱通無悶煩無惡血汙心以次用止痛藥服之即止去惡血法攧撲傷刀石傷諸般傷撲至重者皆先服清心藥次服清小便藥三服去血藥或被傷者血未結打從癢口中出或結在內用藥打入大腸時即泄出或被打被攧被木壓惡血未積者用藥打散四肢或歸臟腑者或歸上膈者打從口中吐出或歸中膈打入大腸泄出先用此急救次服止痛藥止痛藥即二十五味藥中加減用用藥湯使法凡藥皆憑湯使所使方先但用清心藥煎後用童便一盞同服或止痛重傷者則用薑湯燈心湯調二十五味藥服之薄荷湯亦可凡傷或刀傷及損內臟腑恐作煩悶崩血之患如折骨者用姜酒服接骨藥敷之如骨碎被重打重攧重木及石壓者皆用先服湯使法並末用酒服如輕攧撲損傷則用姜酒調下二十五味藥立效通治攧撲刀傷接骨方服敷臘月獵脂五兩黃蠟半斤以上先煎鉛丹羅自然銅四兩研密陀僧四兩研硃砂一兩研上用新鐺鼎先熔脂次下蠟於冷處下密陀僧鉛丹自然銅緩火再煎入水中不散更出鼎於冷處下諸藥用柳篦攪勻瀉入瓷器內不住手攪至凝丸如彈子大且用筍皮之類視之極冷方收凡傷碎骨者木石壓碎骨者先用此藥火化開糊骨上然後夾定用此藥服之須作小丸如梧桐子大每服十丸蔥酒調下或傷損深者捻成條入孔中淺者用油單為膏藥貼之甚者燈心裡木夾之如藥力散再覺痛更一服痛即止又痛甚者貼之即止又方二十五味服治攧撲損傷骨碎骨折筋斷刺痛不問輕重悉能治之大效香白芷醋炒加減紫金皮醋炒劉寄奴川當歸煨鹽水炒赤芍藥白芍藥米水浸炒黑牽牛生地黃鹽水浸炒川芎米水浸川牛膝茶水炒乳香可加減沒藥可加減破故紙醋炒木通去節自然銅骨不碎析不用鹽好時用木香茶水炒藿香木賊官桂可加減羌活獨活半夏各五錢水炒無痰不用骨碎補草烏醋炒孕婦不用川烏大煨孕婦則不用各一兩或加土當歸熟地黃鹽水炒杜牛膝茶水炒土芎米水浸尤妙金刃傷銼出臼者去自然銅骨碎骨折者用之然須於此方內且去自然銅臨欲好時卻入用之早服成他疾上先擇出自然銅官桂沒藥乳香不炒者其餘藥或炒或火焙或日曬乾皆可然後入不炒四味同研為末用蜜糊丸如彈子大用黃丹為衣或被攧撲傷損金刃箭鏃不問輕重每服一丸如被刃傷全斷內重者以薄荷湯或木瓜湯薑湯燈心湯吞下皆可或碎骨攧及折骨用自然銅其他不用如骨折碎刺痛不止加乳香沒藥白芷川芎各五錢入諸藥中生薑酒下或不作丸為末亦可功效如神又方服敷治攧撲接骨刀傷川當歸半兩洗淨別搗鉛粉半兩洛粉為上硼砂二錢上為末每服二錢濃煎蘇木汁調下若損在腰上先吃淡面半碗了服藥若在腰以下先服藥後吃淡面仍不住呷蘇木汁更以糯米為粥入藥末三錢拌和攤在紙上或絹上封裹損處如骨碎更須用竹木夾定以紙或衣包之清心藥方服降真香香白芷醋炒蘇木鹽水炒枳殼水浸去心藿香清油炒丁皮鹽水炒紫金皮木香茶水炒丁香米泔水炒木通去節山梔子大黃蓮子肉酒煮沉香人參當歸溫紙煨川芎煨羌活獨活花蕊石醋淬烏豆燈心少許赤芍藥各等分上為末或大小腸不通服此亦可用五膈寬中散同服立效或惡血汙心或煩悶暴死每服二錢薄荷湯或燈心湯調下或童子小便尤好為散水煎服亦可如痰血口中出加半夏自然銅散治打攧折骨損斷正骨科中經驗方也乳香沒藥蘇木降真香川烏去皮尖松明節自然銅火煅米醋淬七次各一兩地龍去土清油炒半兩真血竭三錢龍骨生用半兩土狗十枚油浸焙為末本草名螻蛄上為末每服五錢用無灰酒調下如病在上食後服病在下空心服服之自頂心尋病至下兩手再周遍一身下及兩足遇病處則颯颯有聲患人自覺藥力習習往來又方自然銅纍纍然相綴如亂絲者最佳一兩重上研細水飛過同當歸沒藥各半錢和勻每服三錢酒調頻服仍以手摩痛處導滯散治重物壓迮或從高墜下作熱吐血下血血出不能禁止或瘀血在內胸腹脹滿喘粗氣短兼能打去惡血當歸大黃各等分炒過上為末每服二錢不以時溫酒調下雞鳴散凡墜壓死者急安好處以手袖掩其口鼻上一食頃眼開先與熱小便若初覺氣絶不能言急掰開口以熱小便灌之打撲悶絶亦用先以此利去瘀血方見大方科失血類活血丹治患者血脈不和筋急行步不可服之寬筋乾地黃酒煮二兩當歸煨白芍藥續斷面水炒白朮煨川芎醋炒各一兩上為末麵糊丸梧子大每服三十丸溫酒下大嶽活血丹治男子婦人外傷內損狗傷蟲咬車馬撲墜手足折傷一切疼痛腹中瘀血刺脅築心左癱右瘓走注疼痛癰疽痔漏及婦人冷氣入腹血脈不通産後敗血灌注四肢及吹奶腫痛花桑枝如臂大者燒煙淬米醋中焙乾栗楔栗蒲中心扁薄者薄切曬乾各一斤細墨半斤一半用萆麻三兩研細塗墨上塗盡紙包黃泥固濟干炭火五七斤燒赤冷地上出火兩時一半用醋化硇砂塗墨上火炙令乾皂角刺一斤燒赤淬醋中炙乾大黑豆一斤濕布揩去垢黑皮焙乾稱亂髮二斤皂角水淨洗用清油二斤炒頻捻看脆即止這末乳香四兩通明滴乳者細研入米醋一碗熬熟上和為末杵三千下丸如彈子大如膏干更入醋糊丸痛甚一丸輕者半丸以無灰酒一盞乳香一豆大先磨乳香次磨藥盡煎三五沸臨臥溫服以痛處就床欲汗則被覆仍用藥塗傷處切忌開始動風物婦人服入當歸末一錢孕婦勿服當歸散救急療墜馬落車被打傷腕折臂呼叫不絶服此呼吸之間不復大痛三日筋骨相連當歸炒令香桂心甘草炙蜀椒去汗各三分芎藭六分炒附子炮去皮臍澤蘭炒各一兩右為末酒服二三錢日三服如小兒被奔車馬所損傷其膝皮肉決見骨節絶死少蘇啼不可聽聞服之便睡十數日便行走其神驗如此忌海藻菘菜生蔥豬肉冷水花蕊石散治一切金刃斫傷箭鏃及打撲傷損身體貓犬咬傷或至死者急於傷處摻藥其血化為黃水再摻藥便瘥更不痛疼如內損血入臟腑熱煎童子小便入酒少許調一大錢服之立效若牛抵腸出不損者急內入細絲桑白皮尖茸當線縫合肚皮縫上摻藥血止立活如無桑白皮用生麻線亦得並不得封裹瘡口恐生膿血如瘡干以津潤之然後摻藥方見大方科失血類內損大紫金皮散治打撲傷折內損肺肝嘔血不止或瘀血停積於內心腹脹悶紫金藤皮降真香續斷補骨脂無名異燒紅酒淬七次琥珀別研蒲黃牛膝酒浸一夕當歸洗淨桃仁去皮炒各一兩大黃紙里煨朴硝別研各一兩半上為末每服二錢濃煎蘇木當歸酒調並進三服利即安沒藥丸治打撲內損筋骨疼痛沒藥孔香芍藥川芎川椒去子及合口者當歸各半兩自然銅二兩半炭火燒上為末用黃蠟二兩溶開入藥末不住手攪勻丸如彈子大每服一丸用好酒煎開乘熱服之隨痛處臥霎時連進有效打撲傷損加味芎藭湯治打撲傷損敗血流入胃脘嘔黑血如豆汁芎藭當歸白芍藥百合水浸白荊芥穗各等分上銼散每服四錢水一盞酒半盞煎不以時服木香勻氣散治從高墜下或打撲傷損腰脅心腹作痛加紅曲末少許童子小便同酒調空心熱服如無紅曲紅酒亦可方見大方科諸疝類麝香散治從高墜下及打撲損傷麝香水蛭各一兩上用水蛭銼碎炒至煙出研為末入麝再研勻每服酒調一錢自當下蓄血未效再服其應如神又治折傷用水蛭熱酒調服一錢食頃知痛更進一服痛止更將折骨藥封直到平安方去平胃散治打撲傷損不問爪破與暗傷悉能治之用冷水調塗則愈方見大方科脾胃類雙烏散治諸傷百損如被打破傷損久後時時疼痛雖新被傷縱不破皮而內損者尤宜服此川烏草烏略炮各三錢當歸白芍藥蘇木大黃生乾地黃紅曲炒各半兩麝香少許上為末用酒煮一瓦瓶放冷服如覺痹麻無害但二烏頭生用有力恐太猛所以用溫火略炮救急方療墜馬落車傷腕折臂當歸炒桂心甘草炙蜀椒炒出汗各七錢半川芎一兩半附子炮澤蘭炒各一兩上為末每用酒服二錢立效忌海藻菘菜生蔥冷水等洗心散治傷損瘀血凝滯大痛大便亦痛方見大方科積熱類黑神散治傷損大吐血或因酒食飽抵頭掬損吐血至多並血妄行鼻口俱出但聲未失無不效者百草霜蚌粉各等分上為末每一二錢糯米飲調下側柏枝研汁尤效速鼻衄搐一字皮破灸瘡出血舌上出血並乾摻立止墜馬方細研銅末服之頓愈蘇合香丸治從高墜下兼挾驚悸血氣錯亂昏迷不省急服大效方見大方科中氣類接骨散治打撲傷損折骨半兩古文錢不拘多少以鐵線貫之用鐵匣盛以炭火煅通紅碗盛好酒米醋各半升鐵鉗開匣取錢於酒醋中淬盡澄去酒醋以溫水淘洗如此三次淘洗數多尤妙火毒不盡令人患啞即淨焙乾研細入乳香沒藥水蛭等分同為末每服半字或一字生薑自然汗先調藥次用溫酒浸平服若不傷折即時嘔出若損折則藥徑下如金絲纏弓上之力神效初服忌酒三日刀斧棒杖傷禁聲飲子治棒杖刀斧傷疼痛不可忍者防風去蘆南星湯洗左銼散每服三大錢水酒各半盞生薑捶碎同煎通口服甚者不過三服立效龍骨膏治金瘡真龍骨海螵蛸五倍子赤石脂黃丹煅過或不用只使血竭尤佳石亭脂一方不用只用麝上斟酌或等分用如傷大先以冷鹽水洗淨卻用黃桑生漿塗四圍待水者皮斂即干敷百發百中若小傷只以冷鹽水略洗便敷此直截妙甚奪命散治刀刃所傷及從高墜下木石壓損瘀血凝積心腹疼痛大小便不通紅蛭用石灰慢火炒令乾黃色半兩用大黃黑牽牛各三兩上為末每服二錢用熱酒調約人行四五里再用熱酒調牽牛末二錢催之須下惡血成塊以盡為愈單方治打撲傷金瘡悶絶上用蒲黃不以多少為末熱酒灌下取箭鏃天牛散天水牛一個獨角者尤妙以小瓶盛之用硇砂一錢細研水少許化開浸天水牛自然成水上以藥水滴箭鏃傷處當自出神仙刀箭藥妙不可言上以桑葉陰乾為末干貼如無旋尉乾貼之又方土狗數個搗取汁滴上三五度箭頭自出治箭鏃入骨不可拔巴豆半粒蜣螂大者一個去足翅上各去殼同微熬研勻塗傷處斯須痛定必微癢且忍之候不可忍便撼動拔之立出以黃連貫衆溫湯洗了用牛膽制風化石灰敷之針灸傷內托黃耆丸治針灸傷經絡膿流不止黃耆八兩當歸三兩洗肉桂木香乳香別研沉香各一兩上為末用緑豆粉四兩薑汁煮糊丸梧桐子大每服五十丸不拘時候熱水下消煩四聖散治傷重煩悶欲死者用此打血利大小便花蕊石散黑神散二方見前大聖散蒲黃散以上二方並見婦人科當歸煨牛膝川芎米水炒白芷醋炒蘇木大黃各半兩蓮子肉酒煮半兩上為末和丸童子小便調服或木通湯亦可惡血立下敷藥活血散治打撲傷損手足上用緑豆粉新鐵銚內內炒令真紫色新汲水調令成稠膏厚敷損處須教遍滿貼以紙花將杉木皮一片縛定其效如神治刀傷磕損血不止痛難禁用蔥白一大握炒熟搗爛乘熱縛定痛與血隨止蔥冷再易立效治傷損用生骨碎補研爛取汁以酒煎服滓敷湯處數日平復及被笞捶身無全膚用之大效治折骨傷筋痛不可忍生地黃一片切藏瓜姜糟一斤生薑四兩炒令勻熟以布裹罨傷處冷則易之奇效腫重加赤小豆半升地黃膏治打撲傷損臂臼脫出及一切癰腫未破令內消用生地黃研如膏木香為末以地黃攤紙上摻木香末一層又再攤地黃貼上明旦痛即止效單方治刀傷血出不止欲死用花蕊石散無效則用純好降真香一片用瓷瓦片刮下石碾碾細敷之大效又方以白滑石二兩黃丹五錢為末乾摻斂金瘡止疼痛上以劉寄奴為末摻之立效又方以門扉後塵敷之鉛粉散治手足折傷可服可敷半日後痛止手足堅牢立愈上以川當歸鉛粉各半兩硼砂二錢同研細蘇木煎汁調化一大錢損若在上先吃淡粥卻服損在下先服藥後食仍頻呷蘇木汁別作糯米飲拌和藥攤貼損處以絹帛里之骨碎用竹木同夾甚妙白灰散治惡瘡刀斧傷見血白石灰末不以多少韭菜汁調陰乾為末少許敷上擦少時血止便安如腸潰出桑白皮線縫合罨之帛系定效又方晚蠶砂生用為末摻勻綿裹之隨手瘡愈血止黃丹散治金瘡並一且惡瘡上等黃丹軟石膏不以多少火煅通紅上研細和勻如桃花色摻傷處甚妙又方胡孫頭草黃花子如蒺藜骨朵者村人謂之草血竭以其能止血也用其子爛研或爛嚼敷傷處血立止又方黃柏半斤半夏四兩上為末每用半兩生薑生地黃取自然汁調塗攧處如折斷用絹帛封縛次用杉木皮扎定干則頻上薑地黃汁潤又方治金刃或打傷及碎首血出不止降真香五倍子鏡面上削下銅青各等分為末敷傷處效又方治刀斧傷隔年四月苧麻揉令極軟覆在傷處縛定血止用野苧葉亦可又方水龍骨即船上多年油灰為末敷傷處用帛片扎定皮裂開以桑白皮綿縫合用蘇木五倍子末封之又方治傷至重但不得透膜者海味中鹼白鰾揀火片色白而有紅絲者成片鋪在傷處以帛子扎之血止如膏脂出不傷內膜者即剃去傷人頂心發以熱尉斗不令其知於新剃頂上一蕩膏脂即入以桑白皮綿縫合用血竭草木蠟葉磁石為末干敷瘡上即合又方五月五日採馬鞭草缺盆草血見愁即草血竭擂爛同風化灰為末塗之即愈治血聚皮不破方蘿蔔葉斫細罨傷處以帛縛之滅痕方治打撲有痕傷瘀血流注半夏為末調塗傷處一宿不見痕又方治瘀血流注紫黑或傷眼上血紫黑大黃為末用薑汁調塗一夜一次上藥一宿黑者紫二宿紫者即白矣洗方荊葉散治從高墜下及一切傷折筋骨瘀血結痛頑荊葉一兩半蔓荊子白芷細辛去苗防風去蘆桂心川芎丁皮羌活各一兩上為末每用一兩鹽半匙連根蔥白五莖漿水五升煎五七沸去滓通手淋洗痛處冷即再換宜避風破傷風玉真散治風自諸瘡口入為破傷風強項牙關緊欲死者防風去叉天南星湯泡各等分上為末每用三錢童子小便一大盞煎熱服香膠散治破傷風口噤強直魚膠燒七分留性麝香少許上研勻每服二錢酒調服或米飲下一方蘇木煎酒下急風散治久新諸瘡破傷中風項強背直腰反折口噤不語手足抽掣眼目上視喉中鋸聲及取箭頭麝香研一字丹砂一兩生黑豆一分同草烏為末草烏三兩半生用半燒存性米醋同淬上為末和勻破傷風以酒一盞調半錢服神效如出箭頭先用酒一盞調服半錢卻以藥貼瘡上破傷濕牡蠣散治破傷濕口噤強直牡蠣取末粉敷瘡口仍以末二錢煎甘草湯調下舒筋法舒筋法治破傷後筋攣縮不能伸他病筋縮亦可用大竹管長尺余鑽一竅系以繩掛於腰間每坐則舉足搓滾之勿計工程久當有效退腫蒼朮散治打撲損傷皮不破浮腫者及角血用此退之紫金皮蒼朮豬牙皂角鹽醋炒雞腳風葉骨碎補各等分上為末水調糊腫處紫金皮散治一切打撲損傷金刃箭鏃浮腫用此效紫金皮醋炒天南星半夏黃柏鹽炒草烏炮川芎茶水炒川當歸煨杜當歸烏藥川白芷鹽水炒破故紙劉寄奴川牛膝桑白皮各等分上為末生薑薄荷汁兼水調糊腫處或傷處皮熱甚加黃柏皮生地黃各五錢有瘡口者勿封其口四畔用此糊之麻藥草烏散治損傷骨節不歸窠者用此麻之然後用手整頓豬牙皂角木鱉子紫金皮白芷半夏烏藥川芎杜當歸川芎各五兩舶上茴香坐拿草酒煎熟草烏各一兩木香三錢傷重刺痛手近不得者更加坐拿草烏各五錢及蔓陀羅花五錢入藥上並無煅制為末諸骨碎骨折出臼者每服二錢好紅酒調下麻倒不識痛處或用刀割開或用剪去骨鋒者以手整頓骨節歸元端正用夾夾定然後醫治或箭鏃入骨不出亦可用此麻之或用鐵鉗拽出或用鑿鑿開取出後用鹽湯或鹽水與服立醒合瘡口松皮散治金刃箭鏃敷瘡口兼能生肉老龍皮二分末生石灰二停生者用瓦盛上用瓦蓋炭火四畔上下煉一夜至曉取研細上為末敷之止血收瘡口立效又方合瘡口黃丹白滑石研細敷之又方黃連木香檳榔為末敷之又方降真香牛膝石灰人骨醋炒真龍骨老松皮各一兩上用黃牛膽一枚將小竹管插膽中以石灰末從管中入膽內掛高處曬乾要用刀破開同諸藥為末敷瘡肚中不痛自愈太乙膏冶金瘡箭鏃不問輕重用此敷之並治癰疽癤毒白芷乳香火制沒藥蒼朮白膠香石膏醋炒黃丹各五錢上為末用真清油四兩桐油真者亦可以黃蠟一兩先煎油柳枝攪次入白芷等四味煎少頃卻入膠香石膏等同煎試欲成珠卻入蠟同煎片時用生布濾過瓦器盛藏用油單攤之損傷敷瘡口自然肉不痛速愈止血收瘡口方藏血用此瘡大者以燈心蘸入孔中白膠香主接筋老松皮白芷龍骨血竭各一兩為末敷之又方土朱二兩用瓦盛瓦上火煉一日人骨火煉者老松皮龍骨各等分上為末敷之妙又方雞內金焙為末敷之立止乳香膏老金瘡杖瘡神效乳香七錢沒藥七錢白芷當歸羌活獨活川牛膝川芎自然銅石膏劉寄奴黑牽牛黃柏皮破故紙白膠香生地黃熟地黃赤芍藥白芍藥黃丹紫金皮各五錢黃蠟一兩上為末用真清油四兩煎沸卻入藥同煎留膠香黃蠟黃丹末入用柳枝不住手攪試將欲成膏卻入三味更成膏生布濾淨用瓦器盛水傾在水中用篦攤開貼敷瘡口孔深者捻成膏條穿入孔中不問淺深放瘡上作熱加輕粉梅花腦子朴硝入膏內貼久留可再用瓦器盛須封裡斷筋小膠香散白膠香末敷之又方金沸草根擂汁塗筋封之可相續止痛乳香散治打撲傷損痛不可忍者白朮炒當歸炒粉草川白芷沒藥另研交趾桂明乳香另研上為末入別研藥令勻每服二錢酒調不以時服應痛丸治折傷後為血氣所侵手足疼痛生蒼朮半斤破故紙半斤半生半炒舶上茴香六兩炒骨碎補半斤去毛穿山甲去腹桑灰炒脹為度柴灰亦可生草烏半斤銼如麥大上用草烏半斤用生蔥一斤連皮生薑一斤擂爛將草烏一處淹兩宿焙乾連前藥同焙為末酒煮麵糊丸梧桐子大每服五十丸酒或米飲下忌熱物片時少麻無妨尋痛丸止痛清心行氣活血如神草烏去皮尖生用乳香火尉沒藥火尉五靈脂各三兩生麝香少許上為末酒糊丸如指頭大硃砂五錢研為衣每服一丸薄荷生薑研汁磨化痛止
