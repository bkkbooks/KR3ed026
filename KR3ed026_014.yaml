各等分上銼散每服三錢水一盞茴香一撮同煎熱服治妊娠失音不能言方奇病論曰人有重身九月而喑何也岐伯對曰胞之絡脈絶也何以言之胞絡者繫於腎少陰之脈貫腎絡舌本不能言治之奈何曰無治也當十月復産前軟胯方甘草生薑烏梅各等分上銼水一大盞煎服便令胯骨軟産宮受氣痛不攻作大聖茯苓散治妊娠氣悶或為喧呼心忪悸亂睡里多驚兩脅膨脹腹滿連臍急痛坐臥不安氣急逼迫胎驚者屢效白茯苓去皮川芎各一兩麥門冬去心一兩黃耆去蘆蜜炙一兩當歸去蘆酒浸一兩木香不見火條參甘草各半兩上銼散每服四錢水一盞半生薑五片煎溫服不拘時候常服至分娩亦無恙安養胎氣甚佳救生散安胎益氣易産令子緊小令母無病人參訶子煨去核麥蘖炒白朮炒神麯炒橘紅炒各等分上銼散每服三錢水一盞半煎空心服枳殼散瘦胎易産抑陽降氣兼治胎中一切惡疾枳殼小厚突弦者麩炒去穰二兩重粉草一兩上為末每服二錢沸湯調空心日三服至七月方可服忌登高廁大便祕澀加防風體弱加大當歸去尾木香各等分胎肥壅溢動止艱難臨産難生加乳香發灰效枳殼能逐水消脹滿逆氣若臨月多服則當産之時無脹滿逆氣産道順而易生誠有補於世也又治腸中諸疾下氣寬膈加炒去毛香附子一兩為末薑湯調下冷氣攻刺脅肋疼痛蔥白湯脾寒血氣成塊作痛熱酒調大小便不通白牽牛為末加入熱湯調服治兒在腹中哭方多年空屋下鼠穴中土一塊令産母噙之即止一方川黃連濃煎汁母呷之治鬼胎如抱一甕茱萸川烏去皮臍秦艽柴胡白殭蠶好者洗川巴戟生用去心巴豆去殼不去油芫花醋煮各一兩上為末煉蜜丸梧桐子大每服七粒蜜酒吞下惡物即時取下愈轉女為男法論曰陰施陽化所以有娠遇三陰所會多生女子但懷娠三月名曰始胎血脈不流象形而變是時男女未定故令於未滿三月間服藥方術轉令生男也其法以斧置妊婦床下系刃向下勿令人知恐不信者令待雞抱卵時依此置窠下一窠盡出雄雞此雖未試亦不可不知凡受胎二月遂物變化故古人立胎教能生子良善長壽忠孝仁義聰明無疾蓋須十月之內常見好境象無近邪僻真良教也月遊胎殺所直正月床二戶三門四灶五母身六灶七碓八廁九門十戶十一爐十二床日遊胎殺所直甲己日門乙庚碓磨礱丙辛井灶丁壬廚廨戊癸米倉子醜中堂寅卯辰酉灶巳午門未申籬下戌亥房保産收生法凡橫逆等證則當以手法為治收生之人擇老成良善臨期須心平氣和施以妙手亦宜直言叮嚀詳盡其意乃可不可用躁性之徒恣其粗愚因而傷命如橫産謂兒先露手或臂者治法當令産母安於仰臥收生之人徐徐先推兒下截令直上漸通手以中指摩其肩推上而正之漸引手攀其耳令頭正候兒身正門路順卻投催生藥安詳上草自然易産若逆産謂兒先露足者治法亦令産母仰臥分毫不得用力亦不得驚恐收生之人徐徐推其足就一邊直上候兒自順若良久不順又漸漸推兒頭就一邊令其順下待兒身轉順門路正當卻用催生之藥即産又如偏産謂兒頭偏拄一旁雖逼近産門初非露正頂止露額角者治法亦令産母仰臥收生之人輕輕推兒近上以手正其頭令兒頭頂端正向産門又有兒頭後骨偏拄穀道者當以綿衣炙焙令熱裹手急於穀道外旁徐徐推之漸漸近上然後上草至如礙産謂兒頭雖正産門而不能生下者或因兒轉臍帶樊挂其肩致不能生者治法令産母仰臥收生之人輕推兒近上徐徐通手引中指按兒兩肩理脫臍帶兒正即産又有坐産謂兒將欲生産母疲倦不能行立久坐椅蓐抵兒生路不能下生者治法當於高處懸吊手巾或絹帛一條令産母手攀輕輕屈足良久兒即順生更有盤腸産者臨分娩産腸先出兒即隨産俗用冷水啜産母面其腸自收此法虛弱之人切不可用恐驚怯成病或即脫絶舊法以萆麻子四十九粒研爛塗腦頂自然收上如收上即以水洗去頂上萆麻又有久而其腸為風吹乾不能收者以磨刀水少許火上溫過以潤其腸煎好磁石湯一杯令産母服下其腸自收矣補中湯養新血去瘀血補虛扶危治月未滿半産乾薑炮阿膠銼蛤粉炒芎藭五味子各一兩白朮黃耆去蘆蜜水炙當歸去蘆酒浸赤芍藥各一兩半人參木香不見火杜仲去皮銼炒甘草炙各半兩上銼散每服四錢水一盞半煎通口服不拘時候神妙佛手散治妊娠自四五月至七月因而築心氣疾欲絶用此探之若不損則痛止子母俱安若胎已損即便逐下當歸去蘆酒浸芎藭各一兩上銼散每服四錢酒一盞煎令欲干卻入水一盞再煎三二沸溫服如口噤者時時灌下如人行五七里再進一服不過三服便生也神應黑散最治難産因緣自有難易其如橫逆皆因坐草太早努力過多兒轉未逮或已破水其血必干若先露手為之橫或先露足為之逆養生方云倉皇之間兩命所繫不可不知此藥之功也人多不服以為極賤之藥大概産難或一日兩日未免水血先下如舟坐灘殊不知香白芷百草霜再固其血服之如魚得水決自轉生兼治月水不調崩中等疾香白芷百草霜各等分上為末每服二錢童子小便米醋各半呷許沸湯澆入六七分點服見功甚速再服即分娩矣或用蜀葵子四十九粒白滑石末三錢順流水煎湯調空心二服如人行五里即下龍蛻散催生祕傳蟬蛻一兩燒存性大蛇蛻火燒存性一條滑石半兩葵子一兩微炒上為末每服一錢順流水微溫暖調下不可使熱湯遇仙雄黃丹催生雄黃不夾石者硃砂各一錢半萆麻十四個去皮大蛇蛻一尺上為末將水飯和丸彈子大臨産時先用椒湯淋洗臍下次安藥於臍內用蠟紙數重敷藥上以闊帛系之須臾即生急取下藥一丸可用三遍加味芎歸湯治産五七日不下垂死者及矮石女子交骨不開者上用川芎當歸各一兩自死干龜殼一個酥炙生男女者婦人頭髮一握燒存性共為散每服三錢水一盞半煎服屢效約人行五里生胎死胎俱下無自死龜殼用鑽龜廢殼亦可勝金散治難産逐敗血即自生若橫逆則轉正子死腹中則胎軟膨寬即産祖宗祕傳千金不授用者敬之王不留行酸漿死胎倍用茺蔚子白蒺藜去刺五靈脂行血宜生用上各等分為散每服三錢取利方水一盞半入白花劉寄奴子一撮同煎溫服大效應急方催生隨其便而用之上用清油同蜜等分少許湯調頓服蜀葵子炒為末順流水溫暖調亦下死胎好京墨新汲水濃磨服之墨水裹兒出立效敗筆頭二個燒以藕節研自然汁溫酒調下效催生湯治妊娠欲産痛陳尚疏難産經三兩日不生胎死腹中或産母氣乏萎頓産道乾澀才覺痛密破水後便可服蒼朮二兩米泔浸洗切炒黃色小厚枳殼去穰切麵炒白桔梗薄陳皮去白楊芍藥川白芷大川芎各一兩大當歸去尾一兩交趾桂去粗皮不見火半夏湯洗粉草麻黃去節軍薑去皮厚朴去粗皮薑汁炒南木香不見火杏仁去皮尖別研白茯苓各五錢上為末每服二錢順流水溫暖調下若覺熱悶白蜜湯下或銼散入真米醋一合煎方內用楊芍藥肉桂能開通子宮其餘藥味皆助氣之盛關竅自通麻黃內通陽氣陽氣盛則血行即産矣外卻寒邪去積聚皆得其宜寒月用之甚為的當隆暑之時恐難輕服但以五苓散用葵子燈心煎湯調下卻暑清魂滑胎易産胞漿先破則胎干難産用白蜜清油或以熱酒令得所頓服胎氣既潤即分娩矣催生丹治産婦生理不順産育艱難並宜服之十二月兔腦髓去皮膜研如泥通明乳香一分研細母丁香末一錢麝香一字研細上拌停以兔腦髓丸如雞頭穰大陰乾用油紙密封貼每服一丸溫水下即産烏金散治難産熱病胎死腹中或因頓僕或從高墜下或房室驚搐或臨産驚動太早觸犯禁忌産時未到經血先下惡露已盡致胎乾子死身冷不能自出但視産婦面赤舌青是其候面青舌赤母死子活唇青吐沫子母俱斃又有雙懷或一死一活其候猶難知須臨期觀變熟地黃洗切焙乾酒炒真蒲黃大當歸交趾桂楊芍藥軍薑去皮粉草各一兩小黑豆四兩百草霜五錢上為末每用二錢米醋半合許沸湯六七分浸起溫服疑二之際且進佛手散酒水合煎三二服探之若未死子母俱安若胎已死立便逐下的知其胎死進此藥後更進香桂散須臾如手推下當用催生更加好滑石末半兩葵子五十粒捶損黃柞葉七八皮蔥白二寸順流水煎湯調下方內用滑石能利小便黃柞葉行氣逐血蔥白內通陽氣氣盛血行即産祖宗以來用此藥救療不知其幾香桂散下死胎麝香半錢別研官桂末三錢上和勻作一服溫酒調下須臾如手推下真珠研末酒調一匕服亦效未效再多服奪命丸專治小産下血至多而子死腹中其人增寒手指唇口爪甲青白面色黃黑若胎上搶心則絶悶欲死冷汗自出喘滿不食或食毒物誤服草藥傷動胎氣下血不止胎尚未損服之可安胎已死服之即下牡丹皮去骨白茯苓去黑皮桂枝辛辣者刮去粗皮桃仁湯浸去皮尖麩皮炒去麩不用赤芍藥各等分上為末煉蜜丸如彈子大每服一丸細嚼淡醋湯下速進兩丸至胎腐爛腹中危甚者亦出養正丹治難産子死腹中昏沉脈微每服一百二十粒濃煎乳香湯服兩手更把石燕子各一枚即當胎下人活或只用朴硝末每服二錢童便好酒調下效方見大方科痼冷類備急丸治妊婦熱而大便祕脈實死胎皆不知人溫水下七丸即活方見大方科救急類蛇蛻散治妊婦欲産時不肯伸舒行動多是曲腰眠臥忍痛兒在腹中不能得轉故腳先出謂之逆生須臾不救母子俱亡上用烏蛇蛻一條蟬蛻二七個血餘一握並燒為灰分二服溫酒調並進二服仰臥霎時或用小絹針於兒腳心刺三七刺用鹽少許擦刺處即時順生母子俱活七聖散臨産腰疼方可服之延胡索沒藥白礬白芷薑黃當歸桂心各等分上為末臨産陳痛時燒鏵刃鐵犁頭是也令通赤淬酒調下三錢服一二杯立産乳珠丹上用乳香研細以豬心血為丸梧桐子大硃砂為衣日乾每服一粒如催生冷酒化下良久未下再服一粒若大段難産以蓮葉心蒂七個水二盞煎至一盞放溫化下一粒良久未下可再服之效驗如神無有不下者如胞漿先下惡水來多胎幹不得臥時須先與四物湯及通真丸補養其血氣方見後次更濃煎蔥湯放冷令坐婆洗産戶須是款曲洗令氣上下通暢後更用酥調滑石末塗産戶里次服前催生藥則萬全矣如胎死不下者用黑豆三合好醋半升煮令豆爛取汁一盞放溫化下藥一粒須臾下矣萬一未下亦可再服如胎下胞衣不下者服此亦便下若胎橫逆不順即先服神應黑散再服此藥復以催之合藥時要五月五日午時極妙或七月七日三月三日及初上辰日亦可神驗散産婦坐草時取路旁舊草馬一隻用鼻絡小耳繩燒灰溫酒調服如得左足者男右足者女覆者兒死側者有驚自然理也似非切要之藥催生極驗如意散臨産腰疼方可服之人參為末乳香各一錢辰砂二錢上同研臨産時急用雞子清一個調藥末再用生薑自然汁調開冷服如橫生倒生即時端順子母平善一字神散治子死胎不下胞破不生此方纍效救人幾萬數鬼臼不以多少黃色者去毛碾為末及細如粉不用羅以手指捻之每服二錢用無灰酒一盞同煎至八分通口服立生如神療難産日久氣力乏不能生兼惡露出盡胞幹不産上用赤小豆二升以水九升煮熟取汁入炙了明阿膠一兩同煎少時一服五合未效再服不過三四服即産此古方用之極驗又方救産難經日不生上用雲母粉半兩溫酒調服入口當産不順者即産神效治橫逆産理不順手足先出或子死腹中上以伏龍肝細研每服一錢酒調服兒頭戴出妙更用搽産母臍中亦效或用菟絲子去車前子末酒調服一方取其父名書其足上即順生治死胎不下方其證指甲青舌青脹悶甚者口中極臭先以平胃散一貼作兩服每服酒水各一盞同煎至一盞卻投朴硝半兩研細再煎三五沸傾出候微溫服盡其胎即化血水而下方見大方科脾胃類治産難胞衣不出方兒死腹中欲絶半夏白蘞各一兩為末酒服一錢若産難只一服橫生二服倒生三服兒死四服或加代赭瞿麥各二兩為佳單方治難産日月未至而痛如欲産者上以知母二兩為末蜜丸雞頭大溫酒化一丸服如聖膏治難産胎衣不下及生産數日並死胎不下者效上用萆麻子一兩去殼雄黃二錢研細成膏塗母右腳心才下即速洗去不洗則腸出用此膏子塗頂上腸自入如聖之妙奪命丹治産訖血流入胎衣中為血所漲不得下治之稍緩脹滿腹中上衝心胸疼痛喘急服此以逐去衣中之血血散脹消胎衣自下附子半兩炮去皮臍牡丹皮一兩乾漆一分搗碎炒煙盡上為末釅醋一升大黃末一兩同熬成膏和藥丸如梧子大溫酒不拘時下五七丸牛膝湯治産兒已出胞衣不下臍腹堅脹急痛甚及子死腹中不得出者牛膝酒浸瞿麥各一兩滑石二兩赤小豆二合半當歸酒浸木通各一兩半葵子一兩二錢半上銼散每服三錢水二盞煎不拘時服花蕊石散治胞衣不下及惡露不行服之神效方見大方科失血類灸法治橫生逆産諸藥不效灸右腳小指尖頭三壯艾柱如小麥大下火立産方産戒忌不可便飲酒多以酒調藥服之酒散五臟四肢致成百病凡一切藥止用水煎為上一兩服後方可産後黑神散治産後惡露不盡或胎衣不下攻衝心腹胸膈痞滿或臍腹堅脹撮痛及神昏血暈眼花口噤産後瘀血諸疾又名烏金散熟地生也可用蒲黃當歸乾薑炮桂心芍藥甘草炙各一兩黑豆半升炒去皮上為末每服二錢酒半盞童便半盞同煎調下或去蒲黃用綿附量虛實用之黑龍丹治産後一切血疾産難胎衣不下危急惡疾垂死者但灌藥得下無不全活神驗不可言因驚敗血上衝心痛頭痛欲死大效當歸五靈脂川芎良薑熟地黃各一兩上細銼以沙合盛赤石脂泯縫紙筋鹽泥固濟炭火十斤煅令通赤去火候冷取開看成黑糟色取出細研卻入後藥百草霜五兩硫黃乳香各一錢半花蕊石琥珀各一錢上細研與前藥再研和勻米醋煮麵為丸如彈子大每服一丸炭火燒令通赤投於生薑自然汁與童子小便入酒漉出研細用其酒調下血竭散治産後敗血衝心胸滿上喘命在須臾宜服真血竭如無以紫礦代沒藥上等分輕手研細頻篩再研取盡為度每服二錢用童便合酒半盞煎一沸溫調下才産下一服上床良久再服其惡血自循下行更不衝上免生諸疾蕓薹散治産後血氣衝心不記人事蕓薹子生地黃各等分上同研入生薑七片酒水各半盞童便少許煎五分服奇效方治産後血上心已死上用真鬱金燒存性為末釅醋一合調灌之立活半夏茯苓湯治産前胸中宿有痰飲産後多致眩暈半夏湯洗白茯苓去皮陳皮去白白朮各一兩丁香縮砂各五錢粉草三錢上銼散每服四錢生薑三片烏梅一個煎食前溫服牡丹散治産後血暈悶絶狼狽若噤挑開灌之必效牡丹皮大黃蒸芒硝各一兩冬瓜子桃仁三七粒去皮尖上銼散每服五錢水三盞煎至一盞半芒硝再煎分二服欲産時先煎下以備緩急芎歸湯治産後去血多眩暈頃刻害人多服取效心悶氣絶紅花末酒調一匕服未效並服方見前又方松煙墨二錢火煅通紅窨滅火氣為末半匕溫酒調京墨亦可又方舊漆器燒微煙逼面熏之卻不可太甚恐虛怯人不禁又方韭菜切入藏瓶中以熱米醋澆紙密封瓶口勿泄氣以瓶嘴向産婦熏立醒又方用半夏末少許吹入鼻中加味五積散治産後敗血不散陰陽相勝作為寒熱入醋半合煎或外感寒邪頭痛體疼發熱不退除木香茴香加生薑棗子煎方見後産後傷寒多因血虛以下諸方選用至於竹葉石膏湯單小柴胡湯雖是傷寒退熱之劑更宜審訂似難輕用恐致夭枉玉露散治産後乳脈不行身體壯熱頭目昏痛大便澀滯悉能治之涼膈壓熱下乳人參白茯苓甘草各半兩苦梗炒川芎白芷各一兩當歸一分芍藥三分上銼散每服二錢水一盞煎溫服如煩熱甚大便祕者加大黃二錢半逍遙散治産後血虛發熱感冒熱潮身疼頭重心忪口乾方見前知母湯治産後乍寒乍熱通身溫壯心胸煩悶知母三兩芍藥黃芩各二兩桂心甘草各一兩上銼散以水五升煮取半分三服或不用桂用生地黃增損四物湯治因産勞傷血氣蓋血屬陰氣屬陽血氣一傷陰陽不和以致乍寒乍熱當歸人參芍藥川芎乾薑炮各一兩甘草四錢上銼散每服四錢水一盞生薑三片煎熱服不拘時候五苓散治産後煩渴潮熱枇杷葉去白毛蜜塗炙麥門冬二十粒去心煎湯服方見大方科傷暑類黃耆益損湯治産後血虛自汗痰嗽寒熱口淡微泄服燥劑不得者宜服方見大方科虛損類竹葉防風湯治産後傷風發熱面赤喘而頭痛淡竹葉半把防風人參桂枝苦梗甘草各半兩葛根一兩半上銼散每服三錢生薑三片紅棗一枚煎溫服使汗出頸項強用附子炮去皮臍銼如豆大炒一錢同煎嘔加半夏少許陽旦湯治産後傷風十數日不解頭微痛惡寒時時有熱心下堅乾嘔汗出桂枝芍藥各一兩半甘草炙黃芩各一兩上銼散每服三錢水一盞生薑三片棗子一枚煎不拘時候溫服自汗多加炮熟附子一枚渴者去桂加栝蔞一兩半下痢去芍藥加乾薑一兩半心下悸去芍藥加茯苓二兩虛勞裡熱者正藥主之煎時入少膠飴為佳若脈浮緊無汗發熱者勿與服柴胡地黃湯治産後惡露方下忽然斷絶晝日明瞭暮則譫語寒熱往來如見鬼狀此由熱入血室不即治之諸變不測北柴胡去蘆二兩半夏湯洗條參去蘆黃芩各一兩粉草五錢生乾地黃二兩上銼散每服四錢水一盞半生薑三片紅棗一枚煎服未效再服四物湯加北柴胡有痰加半夏神效白散子治産後痰血結滯發為潮熱心胸如火煩躁口乾諸藥不效大川烏去皮臍南星半夏白附子各一兩羌活去蘆黃芩各五錢上生用銼散每服三錢生薑五片水一盞半煎服效大調經散治産後血虛惡露未消氣為敗濁凝滯榮衛不調陰陽相乘增寒發熱或自汗或腫滿皆氣血未平所致大豆炒去皮一兩半茯神一兩真琥珀一錢上為末濃煎烏豆紫蘇湯下喘急煩滿小便不利者亦效枳朮湯治心下堅大如盤邊如旋盤水飲所作名曰氣分枳實麩炒去穰一兩半白朮三兩上銼散每服四錢水一盞半煎溫服腹中軟即當散也奪魂散治産後虛腫喘促利小便則愈生薑三兩取汁半夏湯洗去滑白麵上用薑汁搜面裹半夏為七餅子炙焦熟為末熟水調一錢小便利為效小調經散治産後因驚敗血上干於心乍見鬼神言語顛倒昏悶發狂煩躁臥起不安沒藥別研琥珀別研桂心赤芍藥當歸各一兩細辛去葉麝香半錢上為末每服半匕加上龍腦少許生薑自然汁溫酒少許調勻服服後三藥亦效大聖散加硃砂酸棗仁湯下效方見後蘇合香丸童便調服即醒方見大方科中氣類妙香散生乾地黃當歸湯調立效方見大方科心恙類又大聖散治産後血虛肉理不密故多汗因遇風邪搏之則變痙口噤不開背強而直如發癇狀搖頭馬鳴身反折須臾十發氣息即絶宜速斡開口此藥灌之稍緩即汗出如兩手拭不及不可治宜加大川烏細辛防風嫩黃耆妙方見後大豆紫湯治産後百病或中風痱痙背強口噤直視煩熱獨活一兩半大豆半升酒二升上以酒先浸獨活煎一二沸別炒大豆極焦煙出急投酒中密封候冷去豆每服一二合許得少汗則愈日數十服此湯能去風消血結如妊娠折傷胎死腹中服此瘥獨活寄生湯治産後血虛生風手足抽掣筋脈攣急時發搐搦半身不遂或因勞役太早風邪乘間而入服之立愈有痰間服加味壽星丸方見大方科腰痛及風科通治類濟危上丹治産後所下過多虛極生風唇青肉冷汗出目瞑命在須臾卻不可用正風藥亟投此乳香硫黃五靈脂太陰玄精石陳皮桑寄生阿膠卷柏生各等分上將前四味同研勻石器內微火炒勿令焦了再細研後入余藥為末用生地黃汁丸梧子大溫酒或當歸酒下二十丸食前服麻黃根散治産後虛汗不止當歸黃耆麻黃根牡蠣煅為粉人參粉草各等分小麥二合上銼散每服四錢水一盞煎溫服不拘時候立效方凡産後忽冒悶汗出不識人者暴虛故也破雞子三枚吞之便醒若未醒可與童子小便一升甚驗丈夫小便亦得切不得用病人者又若不識人或時復發者此為有風因産血氣暴虛風行脈中故也若産後去血多者又增此疾與雞子不醒者可急作竹瀝汁一服五合須臾不定再與五合頻與三五服瘥七珍散治産後虛弱敗血停積上閉心竅舌強不語人參石菖蒲生乾地黃川芎各一兩細辛一錢防風硃砂別研各半兩上為末每服一錢薄荷湯調不以時服孤鳳散治産後閉目不語白礬一錢熟水調服愈風散療産後中風口噤牙關緊急手足瘛瘲舉卿古拜即荊芥也上略焙為末每服二大錢酒調下有神聖之功或用荊芥加當歸前胡服甚則煎一盆濃湯坐者其中先熏後淋沃名荊芥湯角弓反張以豆淋酒下尤快交加散治産後中風生地黃五兩研取汁生薑五兩研取汁上交互以汁浸滓一夕次日各炒黃漬盡為度干為末酒調服平日腹痛酒下三錢産後尤不可缺女人榮衛不通經脈不調腹痛如撮氣多血少結聚為瘕及血風口噤項強頭痛壯熱運悶並皆治之用少酒尤速産後血衄血悶築心眼倒欲亡者如上湯引服噤甚灌之立效趁痛散治産後身體疼痛不能轉側手足不能舉搖當歸黃耆牛膝肉桂白朮各半兩甘草一分獨活二分上銼散每服五錢水五盞煎濾作二服或入薤白二個生薑三片此證産後百節開張血脈流走遇氣弱則經絡分肉之間血多留滯纍月不散則骨節不利筋脈急引故腰背不能轉側手足不能動搖身弱頭痛若以傷寒治之則汗出而筋脈動搖手足厥冷變生他疾服此可默除之如神湯加桃仁木瓜煎治産後余血不盡流入腰腳疼痛至甚即加味五積散方見後五香連翹湯除大黃入竹瀝少許煎治惡露方行忽然斷絶腰痛兩股如錐刀刺痛皮膚或堅赤腫處恐為癰瘍急服此散方見瘡腫科通治類抵聖湯治産後腹脹滿悶嘔吐不定赤芍藥半夏澤蘭葉人參陳皮各一分甘草一錢上銼散每服一劑用水一碗生薑焙乾半兩煎至半碗分三服熱服産後嘔逆不止方橘紅一兩半夏曲甘草各半兩藿香三兩上銼散每服二錢水一盞生薑三片煎不拘時溫服産後霍亂三方渴而飲水者五苓散不飲水者理中丸虛冷者加附子來復丹亦效方見大方科傷暑及泄瀉痼冷類芎附散治産後敗血作梗頭痛諸藥不效者大附子一枚釅醋一碗用火四面炙透蘸醋令盡去皮臍川芎一兩同為末每服二錢茶清調下虛人最效川芎茶調散治産後虛熱頭痛方見大方科頭痛類芎烏散治産後挾氣頭痛不可忍上以大川芎天台烏藥皮為末稱錘燒淬酒調下二母散治産後惡露上攻流入於肺經咳嗽宜服如傷風痰喘卻以尋常傷風藥治之知母貝母白茯苓人參各半兩桃仁杏仁並生去皮尖各一分上銼散每服三錢水一盞半煎不以時溫服如覺腹痛並服之立有神效旋覆花湯治産後血風感寒暑濕喘滿痰涎壅甚咳嗽坐臥不寧旋覆花赤芍藥前胡半夏曲荊芥穗五味子茯苓甘草炙麻黃杏仁各等分上銼散每服四錢薑五片棗一枚煎食前溫服小參蘇飲治産後血入於肺面黑發喘欲死名孤陽絶陰人參一兩別為末蘇木二兩上用水二碗煮取一大碗去滓調參末隨時加減服神效大料煮芎藭湯治産後榮血暴絶氣急喘促方見前即佛手散四物湯治産後血乾痞悶心煩去地黃加人參烏梅方見後牡蠣散治産後惡露淋瀝不絶心悶短氣四肢乏弱不思飲食頭目昏重五心煩熱面黃體瘦牡蠣川芎熟地黃白茯苓龍骨各一兩續斷當歸炒艾葉酒炒人參五味子地榆各半兩甘草一分上銼散每服二錢生薑三片棗一枚煎食前溫服延胡索散治産後臍下痛名兒枕痛不可忍此神藥也延胡索桂心各半兩當歸一兩上為末每服二錢熱酒調下或用童便溫暖調尤快又方五靈脂慢火炒為末溫酒服二錢紫金丸治産後惡露不快腰痛小便如刺時作寒熱頭痛不思飲食及久有瘀血月水不調黃瘦悉治之五靈脂酒淘去石焙乾稱炒為末真蒲黃末上以好米醋調五靈脂末慢火熬成膏子次以蒲黃末搜和丸如櫻桃大每服一丸水與童便各半盞煎令化溫服少頃再一服惡露即下久有瘀血成塊月信不利者並用酒磨下及治心腹痛欲死百藥不效羊肉湯療虛及産婦腹中痛虛眩不能支持兩脅當臍急痛氣上衝前後相引痛治之如神精羊肉四兩當歸川芎各半兩生薑一兩上銼散以水十盞煎三盞掠去沫去滓分四服空心熱服一日來日再作兩日滓合為一日煎當一劑服經效方療産後血氣脅肋脹滿當歸八錢芍藥苦梗檳榔枳殼各四錢桂心青木香柴胡各三錢上銼散水二升煎取八合空心分溫二服人參當歸散治産後陰虛生內熱煩悶不安人參當歸去尾麥門冬去心乾地黃桂心各一兩芍藥二兩上銼散每服四錢水二盞先將粳米一合淡竹葉十片煎至一盞去米葉入藥並棗三枚煎食前服地黃用生乾者虛甚則用熟者蒲黃散治産後虛煩必效蒲黃不以多少紙上炒每一錢東流水調不拘時服熟地黃湯治産後虛渴不止少氣腳弱眼昏頭眩飲食無味熟乾地黃一兩人參三兩麥門冬去心三兩栝蔞根四兩甘草半兩上銼散每服四錢水二盞糯米一撮生薑三片棗三枚煎食前服當歸芍藥散血渴方見前草果飲子治産後瘧疾寒熱相半者或多熱者半夏湯洗赤茯苓草果炮去皮甘草川芎陳皮白芷各二錢青皮去白良薑紫蘇各一錢乾葛四錢上銼散每服三錢生薑三片棗二枚水一盞半煎當發日早連進三服無不安者生熟飲子治産後瘧疾多寒者肉豆蔻草果仁厚朴生去皮半夏陳皮甘草大棗去核生薑各等分上銼散和勻一半生一半以濕紙裹煨令香熟去紙與生者和勻每服五錢水二盞煎食前一服食後一服石子湯治産後虛羸喘乏乍寒乍熱如瘧四肢疼痛面色痿黃名蓐勞豬腎一雙去脂膜四破香豉或無用知母蔥白粳米當歸芍藥各二兩上銼散分作兩劑用水三升煮取十小碗分三服或用人參無芍藥人參鱉甲散治産後蓐勞皆由在産內未滿百日體中虛損血氣尚弱失於將理或勞動作傷致成蓐勞其狀虛羸乍起乍臥飲食不消時有咳嗽頭目昏痛發歇無常夜有盜汗寒熱如瘧背膊拘急沉重在床服此大效人參桂心桑寄生當歸去尾白茯苓白芍藥桃仁去皮尖熟地黃洗蒸麥門冬去心甘草各半兩續斷一分牛膝三分鱉甲炙黃耆各一兩上為末每服先以豬腎一對去脂膜用水二大盞生薑半分棗三枚煎至一盞去豬腎薑棗入藥末二錢蔥三寸烏梅一個荊芥五穗煎空心晚食前溫服神妙人參散治産後虛羸脾胃乏弱四肢無力全不思飲食心腹脹滿黃耆人參草果仁厚朴附子各一兩白朮當歸白茯苓木香川芎桂心甘草陳皮去白良薑訶黎勒皮各半兩上銼散每服四錢生薑三片棗一枚煎不以時溫服黃耆散治産後風虛勞損羸瘦不思飲食四肢疼痛黃耆白朮木香羚羊角屑人參當歸去尾桂心白芍藥川芎白茯苓各半兩甘草一分上銼散每服三錢生薑三片紅棗二枚煎不以時溫服小調經散産後性理郁發喘急桑白皮杏仁煎湯調下見前丁香散治産後心煩咳逆不止丁香白豆蔻仁各半兩伏龍肝一兩上為末煎桃仁吳茱萸湯調下一錢如人行五里再服石蓮散治咳逆嘔吐心怔目暈不思飲食石蓮肉炒兩半白茯苓一兩丁香半兩上為末每服三錢米飲調不以時服固經丸治産後血崩不止或因餐極酸鹹物過度艾葉赤石脂煅補骨脂木賊各半兩附子一個炮上為末陳米飲丸梧子大食前溫酒下二十丸米飲亦可蓋此證非輕病況産後有此是謂重傷恐不止鹹酸不節而致多因驚憂恚怒臟氣不平或産後服斷血藥太早致惡血不消鬱滿作堅亦成崩中此藥自難責效不若大料煮芎藭湯加芍藥候定續次隨證諸藥治之為得小腹滿痛肝經已壞難治局方大順散除杏仁用醋煮附子依等分入效加味五積散治産後因食動傷腹痛至甚水穀不化洞泄腸鳴除麻黃加高良薑熟綿附生薑烏梅紅棗煎方見後四君子湯治産後腹微疼泄瀉不止烏梅陳米煎湯調服方見小方科通治類的奇散治産後泄瀉惡露不行此余血滲入大腸為瀉分過則愈雖洞泄不禁下青黑色物亦驗大荊芥四五穗於盞內燃火燒成灰不得犯油火入麝香少許研沸湯一二呷調下此藥雖微能愈大病勿忽黃連阿膠丸治産後熱證下痢全赤煩渴發熱小腑不利每服三十丸陳米烏梅湯下方見大方科咳嗽類理中湯治産後虛證下痢純白腹痛裡急外重手足冷加木香煨肉豆蔻每服三錢陳米鹽烏梅煎空心服方見大方科泄瀉類真人養臟湯産後虛弱冷熱不調下痢赤白或有膿血裡急後重臍腹㽱痛日夜無度宜服方見大方科泄瀉類阿膠枳殼丸治産臥水血俱下腸胃虛竭津液不足大便祕澀阿膠蚌粉炒枳殼各等分上為末煉蜜丸梧桐子大別研滑石為衣溫水下二十丸半日未通再服又一方蜜兌法見大方科祕澀類又方用蔥涎調好茶為丸復以茶吞下必通或用蔥白十數莖濃煎點茶連蔥嚼服神效不動真氣又方四物湯去熟地黃用生地黃加青皮去穰煎服效蘇麻粥治産後有三種疾鬱冒則多汗汗則大便祕難於用藥惟此方效方見大方科祕澀類木通散治産後小便不通木通大麻仁葵子滑石檳榔枳實甘草各半兩上銼散每服三錢水一盞半煎溫服不拘時候灸法治産後小便不通腹脹如鼓悶亂不醒緣未産之前內積冷氣遂致産時尿胞運功不順用鹽於産婦臍中填可與臍平卻用蔥白剝去粗皮十餘根作一束切作一指厚安鹽上用大艾柱滿蔥餅子大小以火灸之覺熱氣直入腹內即時便通神驗不可具述茅根湯治産後諸淋無問冷熱膏石氣結悉主之白茅根四兩瞿麥穗白茯苓各二兩葵子人參各一兩蒲黃桃膠滑石甘草各半兩紫貝五個燒石首魚頭中石十個燒上銼散每服四大錢生薑三片燈心二十莖煎溫服或為末木通煎湯調下二錢如氣壅木通橘皮煎湯調下桑螵蛸散治産後小便數及遺尿桑螵蛸十五個炒鹿茸酥炙黃耆各一兩半牡蠣煅人參去蘆厚朴去粗皮薑汁炒赤石脂各一兩上為末空心粥飲調下二錢一方無厚朴石脂有甘草生薑不禁加龍骨蒲黃散治産後大小便不利下血車前子黃芩蒲黃生地黃牡蠣芍藥各一分上為末空心米飲服方寸匕忌面蒜當歸散治陰下脫當歸黃芩各一兩芍藥半兩一分牡蠣煅一兩二錢半蝟皮燒存性二錢半上為末每服二錢溫酒或米飲調下忌登高舉重硫黃散治産後勞陰脫硫黃烏賊魚骨各一兩五味子一分上為末摻患處尉法蛇床子炒乘熱布裹尉患處下治産後陰痛桃仁膏治産後陰腫妨悶桃仁去皮尖研膏枯礬末五倍子各等分末上以末藥桃仁膏拌勻敷之硫黃湯治産勞玉門開而不閉硫黃四兩吳茱萸菟絲子各一兩半蛇床子上銼散每服四大錢水一碗煎數沸去滓洗玉門日再洗樗枝散治産後子腸下出不能收者年深者皆治之樗枝取皮焙乾一兩上用水五升連根蔥五莖漢椒一撮煎至三升去滓傾在盆內乘熱熏候通手淋洗如冷傾入五升瓶內再煎一沸依前用一服可作五度用洗了睡少時忌鹽藏鮓醬濕面發風毒物及用心力房勞等事又方枳殼去穰二兩煎候溫浸良久即入又方老鴉酸草一握煎湯用草坐不開孔才熏可收一半稍溫下手洗並收入而安當歸養血丸治産後惡血不散發渴疼痛及惡露不快臍腹堅脹兼室女經候不勻赤白帶下心腹腰腳疼痛當歸赤芍藥牡丹皮延胡索炒各二兩桂心一兩上為末煉蜜丸梧桐子大溫酒米飲任下三五丸食前服痛甚細嚼咽下四神散治産後留血不消積聚作塊急切疼痛猶如遁尸及心腹絞痛下利當歸芍藥川芎乾薑炮各等分上為末每服二錢溫酒調下當歸黃耆湯治産後腰腳疼痛不可轉側自汗壯熱身體強氣短黃耆芍藥各二兩當歸三兩上銼散每服四大錢水一盞半生薑五片煎食前溫服四順理中丸治新産血氣俱傷五臟暴虛肢體羸乏少氣多汗才産直至百晬每日常服壯氣補虛調養臟氣蠲除余疾消穀嗜食兼治産後臟虛嘔吐不止甘草炙二兩人參白朮乾薑炮各一兩上為末煉蜜丸梧桐子大每服三十丸空心溫米飲下當歸建中湯治産後勞傷虛羸不足腹中㽱痛吸吸少氣小腹拘急痛連腰背時自汗出不思飲食産訖直至滿月每日三服令人丁壯強健當歸四兩桂心三兩白芍藥六兩甘草炙二錢上銼散每服四大錢生薑三片棗子二枚水一盞半煎去滓入飴糖一塊再煎消服崩傷內衄加阿膠地黃濟陰丹治産後百病百日內常服除宿血生新血令人有孕生子充實亦治男子亡血諸疾木香炮茯苓京墨燒桃仁去皮尖炒各一兩秦艽甘草炙人參桔梗炒石斛酒浸蠶布燒藁各二兩當歸桂心乾薑炮細辛牡丹皮川芎各半兩川椒炒山藥各三分澤蘭熟地黃香附子各四兩炒蒼朮八兩大豆卷炒半升糯米炒一升上為末煉蜜丸每兩作六丸嚼細食前溫酒醋湯任下人參養血丸治女人稟受怯弱血氣虛損常服補衝任調血脈宣壅破積退邪熱除寒痹緩中下堅脹安神潤顏色通氣散悶兼治婦人懷身腹中絞痛口乾不食崩傷眩暈及産出月羸瘦不復常者人參赤芍藥川芎菖蒲炒各一兩當歸二兩熟地黃五兩烏梅肉三兩上為末蜜搜杵數千下丸如梧子大每服五十丸至一百丸溫酒或米湯下食前服單方治産婦腹脹痛不可忍煮鼠黏根為飲一服愈捷徑方治用毒藥攻胎藥毒衝心外證牙關緊急口不能言兩手強直握拳頭低自汗身微熱外證與中風相似但其脈浮而軟十死一生醫多不識若作中風治之必死無疑用白扁豆二兩生為末新汲水調下即效內灸散治婦人産前産後一切血疾血崩虛憊腹脅㽱痛氣逆嘔吐冷血冷氣凝積塊硬刺痛泄下青白或下五色腹中虛鳴氣滿堅脹瀝血腰疼口吐青水頻産血衰顏色青黃勞傷劣弱月經不調下血墮胎血迷血運血瘕時發疼痛頭目眩暈惡血上心悶絶昏迷惡露不幹體虛多汗手足逆冷並宜服之藿香葉丁香皮熟乾地黃洗焙肉桂去粗皮各一兩半甘草炙赤山藥當歸去蘆洗白朮白芷各八兩藁本去蘆銼乾薑炮川芎黃耆去苗各二兩木香一兩陳皮去白四兩白芍藥十兩茴香一兩半上銼散每服三錢水一大盞入生薑五片艾一團同煎至七分空心食前熱服為末溫酒調下亦得如産後下血過多加蒲黃煎服惡露不快加當歸紅花煎服水瀉加肉豆蔻末煎服嘔吐加霍香生薑煎上熱下冷加荊芥煎但是腹中虛冷血氣不和並宜服産後每日一服則百病不生丈夫虛冷氣刺心腹疼痛尤宜服之下乳汁奇效方麥門冬不拘多少去心焙為末酒磨真犀角約一錢同麥門冬末二錢溫酒調不過二服便下不以時候漏蘆散治乳婦氣脈壅塞乳汁不行及經絡凝滯乳內脹痛留蓄邪毒或作癰腫服此自然內消乳汁通行漏蘆二兩半蛇蛻炙十條栝蔞十個急火燒存性上為末每服二錢溫酒調不以時服仍吃熱羹湯助之成煉鍾乳粉治乳婦氣少血衰脈澀不行乳汁絶少上一味研細每服炒二錢濃煎漏蘆湯調下母豬蹄湯治如前母豬蹄一隻治如食法通草四兩上以水一斗浸煮得四五升取汁飲不下更作服了用梳頭木梳於乳上梳下效青桑膏治乳硬作痛嫩桑葉右採研細米飲調攤紙花貼病處此證四十以下可治五十以上不可治治之則死不治則自得終其天年
