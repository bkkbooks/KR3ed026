body:
  text: 卷第十四産科兼婦人雜病科濟陰論夫濟世之道莫先於醫論醫之難濟陰猶急何則婦人之病比之男子十倍難療或云七症八瘕九痛十二帶下共三十六病雖有名數莫詳症狀推原其理無非血病多因經脈失於將理産蓐不善調護內作七情外感六淫陰陽勞逸飲食生冷遂致榮衛不輸新陳干忤隨經致濁淋露凝滯為症為瘕流溢穢惡痛害傷痼以致所患不一而止犯時微若秋毫感病重於山嶽是也故女子十四而天癸至天謂天真之氣降癸謂壬癸水名故云天癸而衝任脈主之衝任者血之海也月水者經絡之餘也蓋婦人以血為本心生血肝行血榮衛四體如環無端灌注百脈余者為月候以時而行若水溢自流不自知覺故線纖疴不作而氣體充盛而有子矣其有來多不斷或過期不來或未期而先來參差不一而病生當其來時則一二日之前腰腹滿痛或頭痛作熱百節攣急甚於重患過此則發為虛熱自汗加以五心內熱遂為虛勞血少水涸燥氣乘肺則為咳嗽宿寒留滯血與氣搏則為腹痛敗血結塊時發寒熱則為癥瘕或風寒濕滯經血化為水流溢四肢謂之血分脾不能制血與水並浮脹肌肉謂之虛腫或衝任氣虛內欲過度風邪冷熱之氣入於胞門穢液與血兼下冷則多白熱則多赤冷熱不調赤白相半或為赤白帶下若衝任勞損經海動傷脾虛胃弱不能約制其血倏然暴下故謂崩中漏下所下五色各應五臟五臟俱虛五色並下以致眩暈煩悶嘔惡怔忡迷亂多忘發狂妄語小便不禁是皆血之為病也復有生於嬌貴之家愛憎在念而氣逆於中故氣有一息不行血有一息不運則胸腹脹痛眩暈嘔穢倦之不自勝持飲食不為肌膚致成重患治療之際調氣為上調經次之斯可為定法受孕之後切宜避忌胎殺所遊如經云刀犯者形必傷泥犯者竅必塞打擊者色青黯擊縛者相拘攣甚至母殞驗若返掌斷不可忽半産一證非如正産正産如果中栗熟其殼自開兩無所損若半産則比之採斫新栗碎其膚殼損其皮膜然後取得其實半産正類此以其胎臟傷損胞系斷去而後胎墮下皆因月未滿足誤服藥餌忽寒邪熱毒所傷忽舉重打傷跌撲或犯禁忌或衝任脈虛漏下所致生死形候亦如正産察認大抵半産須加十倍調治或外證喘促痰壅恍惚昏迷不語惡露斷絶煩渴或變痙候無復生全其有惡露通昏迷乍醒不喘促猶可治也復有市井之家村落之婦恣情妄作偷生不正或多日女厭於養育往往以草藥毒之驚憂敗血不下衝心悶亂喘痰虛汗交作死者罔記聞者可不為戒治之者須以解毒行血藥亟救則十全二三矣逮夫正産有娠六七月切忌恣情交合入月亦忌飲酒叫怒洗頭臨産必難産婦古以陳面健兒為喻可謂危矣臨産之初先脫尋常所穿衣以籠灶頭及灶口則易産不可喧鬨宜謹選一熟善坐婆及得力家人扶持無使揮霍致令産婦憂恐惟當餐軟飯糜粥之類若腹中痛且令扶行或痛或止名曰弄痛不可便行試水手探聽産母坐臥切須熟忍或服催生符藥卻不可曲腰眠睡如連腰引痛眼中如見火色此是兒轉蓋腎繫於腰胞系於腎貼於脊更盡脈轉甚弦如急珠者即其驗矣又須令人扶策徐徐而行若行步艱難即憑物立須臾扶策再行直至腰腹相引陳痛頻頻又服催生藥勉強扶行痛陳轉甚難於行立認是産時將至然後坐草切勿太早恐子在腹中難於轉側及胞漿先破子道乾澀皆至難産務要産婦惜力若心中熱悶以蜜一匙新汲水調下若熱悶未解以生雞子一個打破吞服直待兒迫産門頭面端正然後令人抱腰其抱腰之人不須傾斜則兒順其理自然易産又有臥産者須待臥定背平著席體不傴曲則兒不失其道必無難産之理時當盛暑宜居深幽淨室日色遠處開啓窗戶多貯清水以防血暈血悶血溢妄行血虛發熱之證如冬末春初天色凝寒宜密閉産室窒塞罅隙內外生火常令暖氣如春仍下襲衣服不可去綿方免胎寒血結毋致難産矣及至産訖先令飲童子小便一盞無使就睡且令閉目而坐頃之方可扶置於床宜仰臥立膝勿令伸足睡熟亦宜頻喚醒産室無俾風著其肌致生他疾況産下切未可以得男為喜恐為紅汗之證得女為憂恐致敗血衝心之患惟當頻啜艾醋等湯藥常淬醋煙以防紫悶逡巡進少白粥毋令過飽其有破水之後經日而不産者又當隨證細辨身重體熱作寒面黑舌青反舌上冷母死子活面赤舌青母活子死唇口俱青吐沫子母俱斃侖皇之間救治不可不審且當預與病家言之若胎衣不下者停待稍久非惟産母疲倦又且流入胞中為血所脹上衝心胸喘急疼痛必至危篤宜急斷臍帶以少物系墜系墜之時尤宜用心拴系然後截斷不爾則胞上掩心而死須使其子血脈不潮入胞中則胞衣自當萎縮而下縱淹延數日亦不害人豫治療多見之惟欲産母心懷安泰終自下矣未可輕信坐婆妄用手法因此而殂正産後中風口眼喎斜角弓反張六脈緊大自汗過多虛極生風唇青肉冷剛柔二痙項背僵硬手足攣急咬齒嚼舌血虛眩暈頻發悶絶氣冷口鼻黑起出血不止虛熱變生名胃絶肺敗喉中氣急喘促不息煩渴殊甚惡露斷絶名孤陽絶陰五七日內強力下床或憂怒太過一月之內或傷於房事或亂行針艾以致眼澀口噤肌肉瞤搐腰脊僵直語言不出類皆難治猶宜敬謹外此傷寒及諸雜病與男子等當以理血藥為助臨治之際宜以意消息而加減之護胎驗胎法婦人經脈不行已經三月欲驗有胎川芎一兩半生用不見火上為末空心濃煎艾湯調下方寸匕覺腹內微動則有胎參蘇飲治外感風寒渾身壯熱眼暈頭旋或洗項背或當風取涼致令頭目昏痛增寒甚至心胸煩悶妊娠不可輕易投劑止宜用此以散表邪及治痰飲嘈煩忪悸嘔逆不食腹滿此藥至和而且平嘔加白朮腹脹枳實虛煩竹葉煩躁大渴麥門冬知母水停心下微吐逆茯苓頭痛川芎腹疼加白芍藥方見大方科傷寒類香蘇散治妊婦增寒壯熱頭痛身疼加川芎川白芷生薑蔥白煎得微汗解方見大方科傷寒類石膏湯治妊婦傷暑頭疼惡寒身熱躁悶四肢疼痛背項拘急唇乾燥柴胡四兩甘草二兩炙石膏八兩上銼散每服三錢水一盞生薑五片煎不拘時候溫服若氣虛體冷加人參二兩加減安胎飲凡婦人晝眠不起倦於梳飾干噁心擇食怕聞飯氣但喜鹹酸止經候明矣氣血弱者宜服此兼進脾藥安胎溫養令母臟氣平和陰陽全備免有損墮之患盛者受胎母無疾耳溫胎保養之劑恐非所宜此方兼治胎動不安腹痛漏下或胎奔上刺心短氣大效漏胎下血不可用僭燥熱藥條參去蘆嫩黃耆去蘆楊芍藥大川芎熟地黃酒洗切炒川續斷去蘆側柏葉炒阿膠麩炒粉草當歸去尾各等分上銼散每服四錢水一盞半生薑三片金銀器各一件漏下不止加熟艾一握又如胎動口噤唇青下利不止亦用熟艾一兩酒三盞煮至二盞去滓灌之即安桑寄生散治妊娠或因房室驚觸勞力過度傷動胞胎或食毒物致令子宮虛滑經血淋瀝若不急治敗血湊心子母難保日漸胎干危亡不久桑寄生當歸去蘆酒浸川續斷酒浸川芎香附子炒去毛茯神去木阿膠銼蚌粉炒成珠子白朮各一兩人參甘草炙各半兩陳艾葉一兩烏梅去核半兩上銼散每服四錢水一盞半生薑五片煎不以時溫服治漏胎下血胎上衝手足逆冷欲死上用生艾汁二盞阿膠白蜜各二兩煎一盞半稍熱服之無生艾濃煎熟艾一方加竹茹一大塊同煎治胎動出血産門痛黃連為末酒調一錢日三服急救方治漏胎下血不止胞干子母即死生地黃汁一升好酒五盞煎五沸分三服或為末酒服黃芩湯治胎孕不安黃芩白朮縮砂當歸各等分上銼散每服三錢水一盞半煎溫服小安胎飲治妊娠從高墜下或為重物所壓觸動胎氣腹痛下血服此後覺胎動極熱胎已安矣縮砂不拘多少上於尉斗內炒令熱透卻去皮用仁研為末每服二錢熱酒調服不飲煎艾鹽湯或米飲不拘時候調服加味二陳湯治受胎一月或兩月嘔吐擇食緣中脘宿有痰飲經水止後氣滯所作名曰惡阻陳皮白茯苓各一兩半半夏一兩白朮七錢半粉草三錢上銼散每服四錢生薑三片烏梅一個煎食前服未效加生薑汁小紫蘇飲紫蘇厚朴白茯苓各五錢半夏甘草各三錢上銼散每服三錢水一盞生薑五片棗二枚煎溫服客熱煩渴口生瘡者加知母前胡腹冷下利加桂心炒胃中虛熱大小便祕加黃芩頭疼加細辛川芎木香丸治妊娠飲食過度木香不見火三稜炮人參白茯苓去皮等分上為末麵糊丸緑豆大每服三十丸熟水下不拘時候白朮散治妊娠氣不和飲食不美白朮炒紫蘇各一兩白芷微炒人參各三兩訶子皮青皮去白川芎各二分甘草炙一分上銼散每服三錢水一盞生薑三片煎不拘時候紅丸子治惡阻奇效每服三十丸空心薑湯服方見大方科痎瘧類保生丸治妊娠將理失宜或勞役胎動不安腰腹痛重胞阻漏胎惡露時下或子臟挾疾久不成胎或受妊不能固養痿燥不長過年不産日月雖滿轉動無力或致損墮麻仁去殼一兩當歸半兩微炒乾薑炮肉桂去皮秦椒去目閉口者炒出汗石斛去根石膏研如粉黃芩糯米知母甘草炙大黃豆卷各一分上為末煉蜜丸彈子大每一丸溫酒棗湯化下空心嚼下亦可方內用北黃芩麻仁性寒之藥人疑不服殊不知娠中有風風中有熱風熱既靜其胎必固黃芩能去子熱麻仁能去子風亦可服後參苓白朮散參苓白朮散方見大方科脾胃類杜仲丸治妊娠二三月胎動不安或曾受此苦每遇有懷至期損墮可預服此以養胎氣不爾胎墮其危甚於至産杜仲去皮銼薑汁炒斷絲川續斷酒浸洗焙各二兩上為末棗肉煮爛杵和為丸梧子大每服七十丸空心米飲送下日三服歸涼節命散治妊娠恣情飲酒或食生果魚羊雞面毒物致令百節痠疼大小腑祕澀面赤口苦心煩腹脹川芎苧根楊芍藥麥門冬去心當歸去蘆白朮各一兩糯米半合甘草炙半兩上銼散每服三錢水一盞煎溫服不拘時候內補丸安胎扶虛助陰滋血熟地黃二兩洗酒拌炒大當歸一兩去尾切片微炒上為末煉蜜丸梧子大每服三十五丸溫酒下與枳殼散兼服若單服枳殼散恐有胎寒腹痛之疾二藥皆不群隊為妙仍用平胃散蘇鹽湯調助脾進食竹茹湯治妊娠嘔吐頭痛寒熱往來五心煩悶四肢不和人參陳皮去白白朮麥門冬去心各五錢甘草二錢半厚朴去粗皮切薑炒茯苓竹茹各五錢上銼散每服三錢水一盞半生薑三片煎不以時溫服竹葉湯治妊娠苦煩悶者以四月受少陰君火氣以養精六月受少陰相火氣以養氣若母心驚膽寒多好煩悶名子悶防風去叉黃芩麥門冬去心各三兩白茯苓四兩上銼散每服四大錢水一盞半竹葉十數皮煎溫服一方去黃芩加人參半兩知母丸治産難及日月未足而痛如欲産者知母上為末煉蜜丸如雞頭子每服一丸溫酒嚼下日三服榆白皮散滑胎易産治妊娠漏胎去血及臨産驚動太早産時未至穢露先下致使胞胎乾燥臨産艱難並宜服之榆白皮葵根瞿麥各一兩大麻仁去殼木通半兩川牛膝三分去苗酒浸切焙上銼散每服三錢水一盞半煎溫服知母飲治妊娠心脾壅熱口乾渴苦煩悶赤茯苓黃芩黃耆各三兩知母麥門冬去心甘草各二兩上銼散每服三錢水一盞半桑白皮七寸煎成入竹瀝一合服不拘時候胎臟受熱最宜服之一方去黃耆知母加地骨皮犀角屑嫩葛各三分保氣散安胎寬氣進食瘦胎易産設或居處失宜偶然頓僕胎痛漏胎下血兼服芎歸湯枳殼散大腹皮紫蘇枳殼去穰桔梗去蘆粉草縮砂香附子各等分上銼散每服三錢水一盞半煎食前服冬葵子散治妊娠小便不利身重惡寒起則眩暈及水