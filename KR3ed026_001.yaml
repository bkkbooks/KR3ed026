body:
  text: 卷第一大方脈雜醫科集脈説人之有生血氣順則周流一身脈息和而諸疾不作氣血逆則運動滯澀脈息亂而百病生然脈之精微心中了了指下難明故西晉王叔和猶為切慮凡診之際須澄神靜慮以呼吸息數定病人之脈候兩手各三部分為寸關尺左三部正髒心肝腎小腸膽與膀胱為腑右三部正臟肺脾命大腸胃與三焦為腑每部浮按消息之次中按消息之又沉按消息之浮以診其腑見六腑之盛衰沉以診其臟見五臟死生盈虛中則診其胃氣蓋胃為水穀之海人以食為命有胃氣則生無胃氣則死每三部三三如九乃為九候復有七表八里九道脈風寒暑濕中傷之脈七情虛損寒熱之脈當析而論之七表屬陽浮芤滑實弦緊洪浮如指按蔥葉芤則中空有兩頭滑似流珠實則健而有力弦如琴絃緊如弓弦洪則舉指極大八里屬陰微沉緩澀遲伏濡弱微於指下如細絲沉若爛綿尋之至骨緩則來往不急不慢澀如刀刮竹狀遲者尋之隱隱伏潛於骨重指乃得濡湊指邊似怯弱而去來無力九道之脈長短虛促結代牢動細長促屬陽短虛結代牢動細為陰長脈三關通度促脈尋之極數短脈按之不及虛脈尋之不足舉之有餘結脈指下聚而卻還代脈動中一止停久乃還有疾見之難治若氣逆得之則無憂牢脈固結不移之狀三部若見皆死候也動脈再再尋之不離其處細脈細細如絲來往極微凡此二十四脈分別錙銖總而括之浮沉遲數也至於傷寒寒泣血其脈緊傷寒復見風則浮而緩兩感之脈沉大者太陽少陰沉長者陽明太陰沉弦者少陽厥陰陽病見沉澀弱弦微者死陰病見浮大數動滑者生陽毒之脈極浮洪陰毒之脈附骨取之方有按之即無陰陽二厥脈皆沉所以使人疑之陰厥脈沉遲而弱陽厥脈沉伏而滑發熱下利脈沉弦者下重也脈大者為未止脈微弱者自愈雖發熱不死中寒之脈亦緊但肝中加弦心中加洪脾中加沉肺中加遲澀腎中加沉滑傷風則風散氣其脈浮復見寒則浮而緊中風之脈亦浮五臟所中脈與中寒類也大抵遲浮則吉實大弦數則難治傷暑氣血消散脈虛弱無力中則陽弱陰虛微遲似芤傷濕之脈濡而弱若沉而細微中之明矣七情喜怒憂思悲恐驚喜則脈散怒則脈促悲則脈結恐思則脈俱沉憂則脈澀驚則脈顫皆生於氣也虛損者脈來或浮大而無力或沉細而微弱實熱者見於指下弦數殊甚或細數異常總而説之春弦夏鉤秋毛冬石濡弱而長曰弦來疾去遲曰鉤輕虛以浮曰毛沉澀而弱曰石此四時之常脈也其有太過不及有覆有溢有關有格太過者氣有餘寸脈本浮又加實大是為陽太過也尺脈本沉又加實大是為陰太過也不及者氣不足浮之損小者是陽不及也沉之損小者是陰不及也覆溢二脈者溢自關前進上於魚際為外關內格陰乘之脈也覆脈自關後退下入於尺澤為內關外格此陽乘之脈也見如此者乃諸臟相乘四時相剋雖未病病即死不可治也又曰三關通度過於洪大則或風或痰設若沉細則為之不療六部相貫按之不及極浮微者殂再再尋之至骨不絶者天年有永矣至於衆病生死之脈若諸氣脹滿浮大可療虛小難保下痢宜微小不宜洪大恍惚顛狂者實大為順沉細為逆消渴數大者生虛小難愈水氣浮大則宜沉細則愈而復作霍亂浮洪可救微遲不語氣少難瘥鼻衄吐血利於沉細不利於浮大心腹痛宜見沉細不宜見浮大頭痛浮滑易除短澀不愈上氣浮腫浮滑可安微細難療中惡緊細易治浮大難痊金瘡出血虛細則宜實大則傾中毒洪大則存細微則亡十怪脈者釜沸魚翔彈石解索屋漏蝦遊雀啄偃刀轉豆麻促釜沸如湯湧沸息數俱無乃三陽數極無陰之候旦見夕死夕見旦死魚翔脈浮膚泛泛三陰數極又曰亡陽當以死斷彈石脈來辟辟湊指急促而堅乃腎經真臟脈現遇戊己日則不治解索脈散散無序腎與命門之氣皆亡戊己日篤辰巳日不治屋漏之脈如水下滴濺地貌胃氣營衛俱絶七八日間危矣蝦遊狀如蝦遊水面杳然不見須臾又來隱隱然不動依前又去醒者七日死沉困者三日不治雀啄之脈指下來三去一如雀啄食之狀脾元穀氣已絶於內醒者十二日死困者六七日亡偃刀之脈尋之如手循刀刃無進無退其數無準由心元血枯衛氣獨居無所歸宿見之四日難療轉豆形如豆周旋展轉並無息數臟腑空虛正氣飄散象曰行尸其死可立待也麻促之脈應指如麻子之紛亂細微至甚蓋衛枯榮血獨澀輕者三日重者一日殂矣又論四十五動止脈以二十四氣七十二候應死期之準的孟春立春日十五動一止明年東風解凍蟄蟲始振魚陟負冰時二十動一止二年雨水獺祭魚候雁北時三十動一止三年草木萌動驚蟄桃始華時四十動一止四年倉庚鳴鷹化為鳩時且如仲春驚蟄桃始華日脈二十動一止明年春分玄鳥至雷乃發聲時三十動一止三年春分始電桐始華時四十動一止四年季春清明田鼠化為鴽虹始見穀雨萍始生鳴鳩拂其羽戴勝降於桑時以下仿此孟夏立夏螻蟈鳴蚯蚓出王瓜生小滿苦菜秀靡草死麥秋至仲夏芒種螳螂生鵙始鳴反舌無聲夏至鹿角解半夏生蜩始鳴季夏小暑溫風至蟋蟀居壁鷹始摯大暑腐草化螢土潤溽暑大雨時行孟秋立秋涼風至白露降寒蟬鳴處暑鷹乃祭鳥天地始肅禾乃登仲秋白露鴻雁來玄鳥歸群鳥養羞秋分雷乃收聲蟄蟲壞戶水始涸季秋寒露鴻雁來賓雀入大水化為蛤菊有黃華霜降豺乃祭獸草木黃落蟄蟲咸俯孟冬立冬水始冰地始凍雉入大水化為蜃小雪虹藏不見天氣上升地氣下降閉塞成冬仲冬大雪鶡旦不鳴荔挺出虎始交冬至蚯蚓結麋角解水泉動季冬小寒雁北鄉鵲始巢雉雊大寒雞乳徵鳥厲疾水澤腹堅若時疫之脈則無定據隨時審思乃得未可輕議欲知祟害心脈虛散肝脈洪盛或浮沉長短大小無定或錯雜不倫尤宜加意凡此諸脈固鄙見莫之敢遺然其或逆或順猶在詳審而消息之毋固執而有變通則可得之矣集病説傳曰名不正則言不順病之名狀其類至多原其所由似是而非者尤多若體認之明辨其所因之的則何患其多也夫傷寒六經之病足太陽膀胱經頭項強腰脊痛無汗足陽明胃經身熱目疼鼻乾足少陽膽經胸肋痛耳聾足太陰脾經自利不渴腹痛足少陰腎經口燥舌乾背惡寒足厥陰肝經煩滿寒熱甚則囊縮傳變不一或愈或死愈者多出旬日之外死則在六七日之間獨寒獨熱亦難治世號為大病陽毒之為病乃陽氣獨盛陰氣暴絶陰毒之為病本因腎氣虛寒或因冷物傷脾胃內既伏陰外又感寒所致陽厥初病身熱頭痛至二三日四五日方發厥半日卻身熱蓋熱深方能發厥陰厥初得病便四肢厥冷乃陰勝於陽也厥者陰陽不相順接厥少熱多者其病當愈厥多熱少者其病為進或加以上氣腳縮則為六腑氣先絶於外也至於下利清穀不可攻表汗出必脹滿下利有微熱而渴自愈中之者皆因下虛氣弱凌犯霜露及冒風雪中行所致傷風之病在表在經絡中循經流注以日傳變中之者非正順長養萬物之風乃八方偏邪之風肥偉人多得之蓋風性緊暴善行數變其中人也卒其眩人也暈激人涎浮昏人神亂所以推為百病長傷暑乃三伏時月炎熱大行草萎河涸血消氣沮之人偶或傷之病在頃刻中之則名中暍輕則為傷重則為中傷濕乃坐臥卑濕或為雨露所襲或汗出衣里漸漬染之其有中者乃脾元久虛或為泄疾土不制水因茲而得復有四氣伏於人身隱微而不知覺作為百端之病綿延歲月不已必須深思求其所以為病之因然人之平居神靜則寧情動則亂故喜則氣緩怒則氣上悲則氣下憂則氣沉思則氣結恐則氣怯驚則氣亂故有所謂七情之病也若真氣既微胃氣不實復啖生冷冰雪之屬致腸胃虛寒或大病未復便合陰陽或疲極筋力飢飽失節或刻意苦思盡神度量叫呼走氣而虛損病所由生也精血既衰臟腑多燥三焦煩壅復餌丹石酒醢炙爆致腸胃蘊毒而實熱病所由生也以諸病總而論之中氣有類中風中風而以中氣治之亦無所傷中氣而以中風藥投之莫不旋踵告斃先代醫師許學士張子和以親故痛念醫之不明所以懲其弊而見於著述也若痎瘧之病未有不由隔季所感風寒暑濕及飲食勞役疸癘之氣為之赤白痢疾古人所謂滯下者是也究疾之原無非外感五邪之氣內傷生硬冷熱之食不能克化致令積滯而成亦有久虛傳變而成下之不禁甚者手足不仁則五臟氣將絶於內也失血之病十種走失莫重於此皆因四氣所傷或調養失宜所致時疫流行則當審其春合暖而寒夏合熱而冷秋當涼而熱冬當寒而暖是皆六氣愆和而生斯疾大則流毒天下小則蔓延一鄉一家必辨其各季所因不可以尋常微病目之故重則禍至滅門輕則病至危篤外此觀形候聽聲而知病之可治不可治經中所謂視精明者蓋五臟精明聚於目目精全則目明神定則視審審視不了精明敗矣又云目赤色者病在心白在肺黑在腎黃在脾青在肝黃色不可明病在胸中所謂五色者乃氣之華也赤欲如帛裹朱不欲如赭白欲如白璧之澤不欲如堊青欲如蒼玉之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如漆重澤不欲如炭五臟精敗壽不久矣五聲者臟之音中之守也中盛則氣盛中衰則氣衰聲如從室中言者氣澀也言微終日乃復言是氣之奪也譫妄不避善惡神明之亂也鄭聲言意不相續陰陽失守也得守則生失守者死六腑強弱以候形之盛衰頭者精明之府頭傾視深精神奪矣背者胸之府背曲肩隨胸將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能筋將憊矣骨者髓之府行則振掉骨將憊矣倉廩不藏者腸胃不固也水泉不止者膀胱不藏也得強者生失強者死必兼而明之又如五臟已奪神明不守聲嘶身冷循衣譫語撮空面赤如衃血白如枯骨黑如煙煤面青目白面黑目白面黃目青面赤目白耳鼻有黑色起入口耳目顴頰赤者黑色出於額上髮際直鼻脊兩顴上黑色出天中下至鼻上顴上面忽如馬肝色望之如青近之如黑目直視惡風面黑唇青面青唇黑面黑兩脅下滿不能自反轉頭目久痛卒視無所見陰結陽絶目精光脫恍惚陰陽竭絶目眶陷口如魚口不能復閉氣出不返唇反齒齦乾枯天柱骨倒指拳攣縮汗出不流舌卷黑髮直發如干麻善怒發與眉衝起爪甲青大腑自遺不覺身熱喘息臍下硬如鐵唇裂鼻黑舌根焦四肢逆冷汗出如油不流尸臭不可近目睛直視不回一日病人健人黑色或白色起入目及口鼻二日陰陽俱絶失音不能言三日半口張唇青人中滿三日目無精光面一若土色不飲食四日面赤目青六日面黑目白爪甲下黑八日齒忽變黑十三日肝病皮黑庚辛日心病目黑壬癸日脾病唇青甲乙日肺病頰赤目腫丙丁日腎病面腫唇黃戊己日以上俱不可治也面目黃色起其病方愈面黃目青面黃目赤面黃目白面黃目黑面黑目青面目俱黃面黑目白均可治也大抵言病動以百計雖積萬言莫能盡述但當留心殷勤學之博通乃得不可以粗解一二為是果某疾而正某名庶不誤投湯劑則何患病之不瘳矣集證説古之醫者有云外病自經絡入內病自五臟郁發然當求所以證驗庶無差失如傷寒有陰陽表裡陽證多語陰證無聲陽證則晝劇陰證則夜爭陽證似陰糞黑而脈滑陰證似陽面赤而脈微矣身重背疼煩悶狂言奔走咽痛身斑斑若綿文或下痢赤黃多因妄服燥藥熱味陽毒是也背強腹中絞痛身如被杖燥渴嘔泄冷汗鄭聲多因脾胃虛寒重感於寒陰毒明矣陰陽二厥若陽厥則指爪時溫或畏熱或飲水或揚手擲足躁煩不得眠大便祕小便赤外證多昏憒陰厥則指爪常冷足多攣臥惡寒自引衣蓋覆不飲水或下利或清便如常小便數外證惺惺而靜表證多惡寒不渴發熱而身體痛里證多渴只惡熱而喘滿口燥咽乾手心腋下濈濈汗出大便硬涎赤譫語復有傷寒初證發熱惡寒無汗其色悽慘復見風則多寒手足微厥發熱下利手足溫暖者生手足厥逆灸不溫證之極矣中寒則口噤四肢強直失音不語或卒然暈倒吐逆涎沫手足攣搐狀如暗風或復燥熱傷風有汗惡風面色光而不慘復見寒手足微溫發熱多煩其或中者半身不遂手足癱瘓涎潮昏塞口眼喎斜肌膚麻痹歸於六腑者物為偏緩猶可苟延歲月歸於五臟者眼閉口開手散聲如鼾睡遺尿惡證迭出朝不及夕傷暑身熱惡寒頭痛或煩而渴眩暈背寒面垢或嘔或泄其中入心使人噎悶昏不知人入肝則眩暈頑痹入脾則昏睡不覺入肺則喘滿痿躄入腎則消渴利小便至於傷濕身重關節重疼發熱惡寒大便泄而小便澀腰腳冷而腿膝浮或自利不渴若氣不平中之亦使人半身不遂口眼喎斜涎潮昏塞又如七情喜傷心者不可疾行不可久立怒傷肝者上氣不可忍熱來蕩心短氣欲絶不得息憂傷肺者心系急上焦閉營衛不通夜臥不安思傷脾者氣留不行積聚中脘不得飲食腹脹滿四肢怠惰悲傷心胞者善忘不識人置物在處還取不得筋攣四肢浮腫恐傷腎者上焦氣閉不行下焦回還不散猶豫不決嘔逆噁心驚傷膽者神無所歸慮無所定説物不意而道凡此七者證雖不同本乎一氣臟氣不行鬱而不舒結成痰涎隨氣積聚堅大如塊在心腹間或塞咽喉如粉絮梅核樣咯不出咽不下每發欲絶逆害飲食若諸虛損證則眩暈眼花鼻多清涕漩濁遺精冷滑洞泄水穀不化灑淅自汗嘔吐清痰皆陽虛陰盛也諸實熱則五臟積熱口若咽乾苦唇裂生瘡腸胃乾澀煩躁喜冷涎唾稠實眵淚眼赤或遍體癰瘍至於總説則痎瘧證惟多先寒後熱名寒瘧先熱後寒名溫瘧但熱不寒名暑瘧寒熱身重煩疼脹滿名濕瘧寒多不熱名牝瘧若一日一發則易愈二日一發猶可三日一發則難痊且斯疾俗在忌醫之列然得其所因何忌其難時疫證雜發熱腰痛強急腳縮不伸胻中欲折目中生花或澀澀增寒復熱名曰溫疫身體顫掉不能自禁或內熱口乾舌破咽塞聲嘶名曰燥疫頭重頸直皮肉強痹或蘊而結核起於咽喉頸項之側布熱毒於皮膚分肉之中名曰寒疫乍寒乍熱損肺傷氣暴嗽嘔逆或體熱發斑喘咳引氣名曰濕疫四時之感其證百端皆常因其時而詳辨則得之喘急為患吐痰續續則生自汗譫語目直視則亡失血諸證有暴吐鼻衄泄出或一二升至鬥余者因感四氣流傳經絡陰陽相勝或怒氣傷肝風入腸胃故血得寒則凝泣得熱則淖溢各隨臟腑經絡湧溢凝停胸胃因即滿悶或吐或衄或泄下復有咳嗽中見紅絲者為難愈無故忽然瀉下黑血名心絶癆瘵之證得之者多諱而未肯求醫殊不知其根有蟲齧其心肺可不深憂中蠱毒之候令人心腹絞痛如物齧狀吐下血如爛肉若欲驗其證狀先令病人唾於水中若沉即其實矣消渴與漩濁為鄰慎莫作疽瘡等證鮮有安之日矣至於下痢身涼能食小便通易安體熱多汗渴甚小便不利或手足厥冷灸不溫兼微喘不食者死二便祕澀之證暫祕小漩還有點滴利者易愈若祕日久膨上心胸切痛氣促身冷面色黑前後俱無名曰氣實轉盼而殂脹滿得之未久或脹或消腹皮稍軟不泄不喘隨治隨瘥若臍心突起利後復脹急久病羸之喘息不得安名曰脾腎俱敗無有愈期腫滿善證男從上腫下女從下腫上所患未久利漩退腫定喘則愈矣若證不善則手足盤骨腫臍與掌心俱凸咳嗽失聲青筋紋橫肚上及爪甲青卒腫頭面蒼黑嘔吐頭重豈復能救霍亂一證猶為卒暴之最蓋人之起居無常攝調不善揮霍之至便至變亂悶絶不救甚為可畏臨深履薄縱蹈虎尾不足以諭其危其如厲風名大風惡疾故其色敗皸裂瘍潰眉面白皮如蛇蛻久則鼻梁塌壞又名風癩十無一生若癥瘕之為病症者堅也堅則難破瘕者假也假物成形能動者是至於蛟龍蛇鱉肉發蝨米之證初非定名偶因食物相感而致斯患夢寐不詳多生恐怖為祟惑證矣籲內外之證其發萬端皆須細辨且頃刻之變無定一有所作其可忽諸集治説嘗謂用藥如用刑一有所誤人命系焉故書曰言之非艱行之維艱如張仲景傷寒一百一十三方猶缺其一三百九十七法僂指未即周知蓋謂此也夫處方大法則有七方十劑七方者奇方偶方大方小方緩方急方復方十劑者宣通補瀉輕重澀滑燥濕然積學而用之則可矣傷寒之病太陽屬膀胱非發汗則不愈必用麻黃之類蓋其性能通陽氣卻外寒也陽明屬胃非通泄不能愈須用大黃芒硝以利之少陽屬膽無出入道柴胡半夏能利能汗佐以黃芩則解矣太陰屬脾性惡寒濕非乾薑白朮不能燥少陰屬腎性畏寒燥非附子不能溫厥陰屬肝藏血養筋非溫中之藥不能潤此外有汗下吐三法毫釐不可差誤經云桂枝下咽陽盛則斃承氣入胃陰盛以亡故在表宜汗在裡宜下在胸宜吐半表半裡宜和解表裡俱見隨證滲泄無表裡證則宜下之下利清穀身體痛急當救里身體疼痛清便自調急當救表身熱不渴為表有熱渴而煩悶為里有熱傷寒見風大青龍湯為治之最陽毒內外結熱輕者白虎湯重則承氣湯之屬陽厥亦用舌卷焦黑鼻中如煙煤非水漬法不可陰毒疾勢困重面黑四肢厥冷則理中湯四逆湯投之未效則灼艾法惟良復以蔥尉法佐之陰厥同此法治之發熱下利白頭翁湯黃連阿膠丸最為的切中寒則急舁置暖室燃以薪火向之令通身暖透或置於熱炕上令有力人扶策仍以手附火或人懷令熱亟摩病人手足胸腹間續用薑附湯並服若猶未省則依上法灸傷風主治之法汗出惡風者當解其肌里證雖具惡風未罷亦須先解其外也傷風見寒大青龍湯均為調理中風昏悶先須通關散探鼻令噴嚏次以蘇合香丸行其氣仍須分辨冷熱為治不可混濫五臟正中者迅雷不及掩耳手足偏中者但徐服順氣疏風豁痰等藥不宜用大風藥急治則不得盡其天年其有牙關緊閉亦用通關散搐鼻噴嚏即開矣傷暑者暑氣耗血消氣生痰速用解暑之劑仍輟熱湯得汗即蘇若中之者急扶在陰涼處不可與冷當以布巾衣物蘸熱湯尉臍中及氣海以湯淋布上令透徹臍腹暖即漸醒矣如倉卒無湯處則掬道上熱土置臍上以多為佳冷即易之古法道途無湯即掬熱土於臍中仍撥開作窩令人溺其中以代湯淋續與解暑毒藥並急嚼生薑一大塊冷水送下如已迷悶則嚼大蒜一二瓣冷水送下如不能嚼即用水研灌之立蘇但遇無湯處則嚼生蔥二寸許津咽下可抵飲水二升傷濕中濕只宜利小便忌不得以火攻並轉利之若濕家下之額上汗出微喘小便不利者死下利不止者亦死治濕不利小便非其治也七情之患惟當利氣豁痰寬中進食仍須怡養以溫平之藥調之如宿血滯氣停凝結為癥瘕腹中坯塊堅硬作楚當以破氣藥伐之或以類相從如敗梳治蝨瘕銅屑治龍瘕曲糵治米瘕石灰治發瘕等類所謂醫者意也氣急膨痛至甚或有熱痞結聚須宣泄之虛損為之宜大作湯劑峻補者烏附天雄薑桂之屬不可無潤補者鹿茸當歸蓯蓉之類安可缺清補則天門冬麥門冬人參地黃之類宜用也至於諸熱為治有泛熱有實熱泛熱者荊芥薄荷梔子黃芩等投之正其所宜實熱者非大黃芒硝則不能效若夫總説為治之備要如南北風土之殊人物厚薄之異北方土厚水深水性沉下人體多實而少虛且所餐無非肉曲寒則衣重裘坐暖炕若有所治則宜多以清涼之劑如南方用大黃巴豆之屬其分兩皆當倍而用之或用水漬法或尋甜水一二甌飲之即蘇間有所稟稍弱不自保惜勞役致虛則亦但當潤補之無有不愈南方屬火火性輕炎人體多虛而少實況所食不過蔬食而已必須投以溫和之藥以調之其有習尚北方之風置酒終日非至醉不已燒爆肥鮮恣其厭飫偶有所患亦須以平昔所稟施以涼劑然虛者亦不可妄施痎瘧熱多者投以半冷半熱解散分陰陽減寒熱之劑度其所作之日先一時進以抵截之藥去其痰水則收效矣寒多者投以半生半熟壯脾進食之劑次以抵截之藥則痰癖去而疾愈矣猶須令其戒慎飲食謹起居則無復攻之患若久瘧而復作虛浮不食者未之有瘳時疫之治須以時斟酌不可偏執治之者須辨其所因而投之以藥不可以日滿自差遂至枉亡良可太息至於病愈必須湯食競進折其毒勢不可令病氣攻人則屏息矣或有云斯疾之召或溝渠不泄穢惡不修熏蒸而成者或地多死氣郁發而成者或官史枉抑怨讀言而成之者可於州治六合處穿地深至三尺闊亦如之取淨沙三斛實之以醇酒三升沃其上俾使君祝之斯亦消除疫癘之良術故並記之喘急虛者升降鎮墜熱者清心涼肺未有不愈下痢感於四氣者先須隨其所感解散分利陰陽次須辨其冷熱手足和暖則為陽中和之劑可用手足厥冷則為陰溫燥之藥可行無不切效大法虛者補之實者瀉之滑者澀之閉者通之有積者推之熱則涼之冷則溫之冷熱不調者平之失血明其所因辨其冷熱如血下鮮紅則治以清和純下瘀色則當溫養二便祕則須潤滑以行之脹滿則須正氣以虛實平治之腫滿實者利水虛者壯脾元兼用消浮等劑自有奇效仍須戒咸斷欲庶不再復霍亂須明辨虛實所因亟治無遲遲者則殞命至於乾霍亂則猶為難治也三消治法滋腎為主抑心火兼之然須多服湯圓俾水升火降而引飲無度莫之見矣真心痛者手足青至節不在治療之數真頭痛者上穿風府陷入泥丸非藥能愈金瘡主治備見後科用藥之工誠可嘉嘆中蠱毒之法以敗鼓皮燒灰為末飲服一匕則病人自呼蠱家姓名可語令呼喚將去則愈矣瘵疾一染人當其未深入之時則宜先取其蟲不爾則損於心肺蓋心主血肺主氣人身舍氣血之本其能生乎取蟲而後相忘世慮和以潤養藥食庶幾可瘳傷晚則不及也魘寐産乳自縊壓溺諸暴絶須平時熟記後所載治法併産蓐一科臨用庶不倉惶應驗在頃刻間不然則世無良醫枉死者半是也厲風初發則宜宣泄風毒去而病漸愈久之惟當幽隱林泉依法亟治庶乎可愈不惟愈疾亦或可因此而至仙道矣或為祟害若移精變氣祝由不可則宜外尋禁避厭禳法以除之外此病有六不治驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也陰陽並臟氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也生候尚存形色不改病未深入腠理針藥及時能將息調理委以良醫病無不愈至於五味亦可對治五臟之病肝酸心苦脾甘肺辛腎咸用之中病則止過則酸走筋咸走血辛走氣苦走骨甘走肉則無益矣又如所宜而治者肺燥咳嗽嚼芝麻啖油餅瘧疾脾冷糟鯉魚糟藏瓜久冷痢野雞餛飩等類是也瓜果亦可隨冷熱施之愈疾必矣若夫炮製之法又當以相需相合相反相惡相需者以桂得蔥而軟相合者磁石引針相反者大戟芫花等反甘草之類也相惡者如牛黃忌龍骨是也且方中各有避忌此亦舉其略或以甘草擊起芫花之性而用者猶在斟量更須甄別藥味新陳選擇州土所生採取時月分君臣佐使俾分兩無差炙爆炮爁精虔不苟斯為治之善也其有自恃己長不肯訪問以意臆度攻寒以寒療熱以熱妄施一匕邀為己功偶或中之實非的見不過僥幸於萬一其或不中則十手所指十目所視所謂一甌之藥誤入於咽五臟俱裂生可再復可不戒之況醫者人之司命有病急召慎勿以遠近暑寒而拒之若至病家尤須敬謹勿為他務以敗正事給藥亦量其多寡表汗宜四吐下宜一加二極矣補藥愈多愈效余則隨證為之輕重明批湯引病若未愈囑其再來庶病可瘳而治有方矣僕少而學之長而行之所謂治病之道盡在是矣古云凡曰治病推其所因生死預定方為醫人敬之傷寒撮要發汗法凡發汗欲令手足俱周濈濈然一時許為佳不欲如水淋漓服湯中病即已不必盡劑然發汗須如常覆腰以上厚衣覆腰以下蓋腰以上淋漓而腰以下至足心微潤病終不解凡發汗病證仍在者三日內可二三汗之令腰腳間周遍為度轉下法凡轉下須體認得合下之證明白在陽明胃經則不拘日數過時失下則氣血不通四肢便厥不識返疑是陰厥復進熱藥禍如反掌若少陰腎經太陰脾經下證悉具湯已更衣者止不須盡劑陽明病得利瘥慎不中服補藥熱氣得補覆成更復下之是重困也宜消息安養之取吐法凡取吐服吐藥後不大吐則當以手指掐之便吐矣不吐稍增藥以吐為度若吐少病不除明日再服吐藥可至再三但虛人宜少吐藥力過時不吐者啜熱湯一升以助藥力不必盡劑吐訖便可食無復餘毒若服藥過多者飲水解之水漬法以疊布數重新水漬之稍捩去水搭於胸上須臾蒸熱又漬令冷如前用之仍數易新水日數十易熱甚者置病人於水中熱勢才退則已亦良法也蔥尉法以蔥一束以索纏如餅餡大去根葉惟存白三寸許先以火熁一面令通熱勿至灼人乃以熱處著病人臍下上以尉斗盛火尉之令蔥餅熱氣透入腹中更作三四餅遇一餅壞不可尉則易一餅候病人醒手足溫有汗乃止蒸法以薪火燒地良久掃除去火可以水灑之取蠶沙柏葉桃葉粳麩皆可用相和鋪燒地上可側手厚上鋪草席令病人當上臥溫覆之夏月熱只布單覆之汗移時立至俟周身至腳心自汗漐漐乃用溫粉撲止汗移上床最得力者蠶沙桃葉柏葉也無蠶沙亦得單桃單柏葉亦得蒴藋葉亦可用麩粳乃助添令隨多少不用亦得此極急則可如治病得愈明年斯時慎莫再作再作或不治矣凡煎煮藥之法須用銀石器微火熟煮不可太猛表汗下之藥每服煎至八分對病藥煎至七分滋補煎至六分不可極干亦不可猛火驟乾恐傷藥力去滓服後留滓再煎陽證麻黃湯治足太陽膀胱經發熱頭痛身疼惡風無汗而喘陽明合病喘而胸滿太陽病八九日不解以此發汗必衄乃解及治不得汗發衄陽明脈浮無汗而喘宜服脈但浮無餘證者與服若不溺腹滿加噦者不治麻黃三兩去節桂枝二兩甘草一兩杏仁七十個去皮尖上銼散服五錢水盞半煎八分去滓食前服覆取微汗夏至欲加知母半兩石膏一兩黃芩一分或汗出後無大熱而喘者去桂加石膏一兩春冬只依正方升麻葛根湯治傷寒時疫頭痛增寒壯熱肢體痛發熱惡寒鼻乾不得睡小兒大人瘡疹己發未發皆可服兼治寒暄不時人多疾疫乍暖脫衣及暴熱之次忽變陰寒身體疼痛頭重如石及解傷酒膈熱口瘡咽疼升麻一兩白芍藥一兩甘草一兩葛根二兩上銼散每服四錢水一盞半不拘時潮熱頭痛生薑三片蔥白二根煎咳嗽涎盛生薑三片桑白皮七寸煎上膈熱薄荷黃芩各少許煎斑瘡未出加紫草楂根各半錢蔥白二根煎挾熱酒後傷風感寒痰盛氣促金沸草散方見後合和生薑三片薄荷七葉桑白皮七寸烏梅一個煎小兒量度多少老人加人參倍白芍藥各五錢大段寒即熱服熱即溫服近人以藥性寒涼不肯輕服然治證相對服之何妨金沸草散治風壅痰盛頭目昏痛頸項強急往來寒熱肢體煩疼胸膈滿悶痰涎不利咳嗽喘滿涕唾稠黏時行寒疫壯熱惡風有寒則汗出風盛則解利金沸草去梗三兩荊芥穗四兩麻黃去根節三兩甘草一兩半夏湯洗七次一兩赤芍藥一兩前胡三兩上銼散每服三錢水一盞半入生薑三片桑白皮七寸烏梅一個煎頭疼柚葉半皮牙疼熱煎灌漱諸風及大腑風祕左脅刺痛每料加枳殼一兩去穰風熱結在臟腑煩躁氣壅腹痛大便祕以蔥白研爛微火炒過布巾盛尉臍後加大黃朴硝薄荷各五錢服速效諸風發散並用妊婦傷寒頭痛旋疼壯熱心躁加白朮人參黃芩生石膏各一兩熱嗽加甜葶藶馬兜鈴薄荷生桑白皮各半兩烏梅四錢仍就吞半夏丸方見後咳嗽類咽喉焦燥加朴硝五錢食後服小柴胡湯治傷寒四五日寒熱胸脅滿痛默默不欲食心煩或嘔渴或腹痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳或過經未解潮熱未除半表半裡非汗非下之證瘥後勞復昏熱婦人傷風經水適斷此為熱入血室故使如瘧狀産後傷寒頭疼發熱小兒寒熱亦治之柴胡二兩去蘆半夏湯洗七次六錢黃芩人參去蘆粉草各三分上銼散每五錢水一盞半薑五片棗一枚煎至六分食前服腹痛去黃芩每料加芍藥三分心下悸小便不利去黃芩加茯苓一兩不渴外寒裡熱去人參加桂三分溫服覆取微汗愈咳嗽加五味子潤者三錢胸中煩加栝蔞五錢渴加人參栝蔞各五錢脅下痞硬去棗加煅牡蠣粉枳實各五錢過經不解日晡發熱己而微利加芒硝五錢引飲有汗加茯苓桂枝各五錢身熱臟腑微溏加厚朴五錢煩熱每服加白茅根二根白竹青一塊如大指頭大麥門冬半錢熱腹疼加白竹葉七皮赤芍藥枳殼各一錢鼻衄加生地黃二錢白茅花一握痰盛或喘加桑白皮七寸烏梅一個煎服裡熱外寒加桂半錢大柴胡湯治傷寒十餘日邪氣結在裡寒熱往來大便祕澀腹滿脹痛語言譫妄心中痞硬飲食不下或心下急鬱郁微煩或口生白苔或不大便五六日繞臍刺痛時發煩躁及汗後如瘧日晚發熱或發熱汗出或六七日目中不了了睛不和無表裡證身微熱者裡實也兼臟腑實脈有力者可服之輕則柴胡重則承氣枳實去穰炙半兩柴胡去毛蘆半斤大黃二兩赤芍藥三兩半夏湯洗七次二兩半黃芩三兩去心上五味勻散入半夏拌勻每服三大錢水一盞半入生薑三片紅棗一枚或加苦竹葉十皮煎至一中盞去滓溫服食後臨睡服大熱用苦竹瀝一合此藥治傷寒內熱裡實若身體疼痛表證未解可服之春合溫而清涼夏發燥疫此方妙小承氣湯治傷寒日深恐有燥屎腹中轉失氣仍可攻之不轉失氣者必初硬後溏未可攻之攻之則腹滿不能食飲水而噦其後熱大便必硬若腹大滿不通或陽明多汗津液外出腸胃燥熱大便必硬而譫語脈滑吐下微煩小便數大便結或下利譫語自得病二三日脈弱無太陽證柴胡證煩躁心下結至四五日雖能食少少與承氣湯和之令小安大黃四兩厚朴去粗皮炙二兩枳實炙去穰五錢上銼散每服五錢水二盞煎至八分去滓溫服以利為度未利再服大承氣湯治表裡俱熱病勢更甚者陽明脈遲汗出不惡寒反惡熱身重短氣狂語如見鬼狀劇者發則不識人循衣摸床惕而不安微喘直視陽明裡熱或吐下後不解大便五六日不利日晡潮熱心胸煩熱而懊憹復如瘧狀脈沉實或小便不利或腹滿實痛而渴脈實數而沉腸胃燥甚留飲不散胸腹高起痛不可忍但嘔冷液大渴反不能飲強飲不能上喘急悶者大黃四兩酒洗芒硝三合二兩也厚朴半斤炙去粗皮枳實一兩炙上銼散每服五錢水二盞先煮厚朴枳實至一盞余下大黃煮取八分去滓入硝再煎一沸溫服以利為度未利再服調胃承氣湯治諸發汗和解不惡寒但發熱蒸蒸然者或日深心下溫溫欲吐胸中痛大便溏腹滿鬱郁微煩先此時吐下者或日深裡熱譫語法當下之以銀粉巴豆燥熱大毒丸藥下之致真陰損虛邪熱轉甚因而協熱下利不止及表裡熱下之太早乘虛而入不成結胸但為熱利不止心下滿硬或痛煩渴咽乾脈滑數而實諸腹滿實痛者煩渴譫妄小便赤大便硬脈滑實緊大黃芒硝甘草各等分上銼散每服五錢水二盞煎至六分去滓下消再煎一沸溫頓服之三拗湯治感冒風寒鼻寒語音不出頭痛拘倦方見咳嗽類敗毒散治傷寒時氣頭痛項強發熱惡寒肢體煩疼咳嗽鼻塞聲重風痰頭痛嘔噦寒熱人參去蘆赤茯苓去蘆甘草前胡去苗川芎羌活去蘆北柴胡去苗枳殼去穰麵炒桔梗去蘆以上各等分上銼散每服四錢水一盞半生薑三片薄荷葉五皮同煎熱服不拘時候傷濕腰疼加白朮木瓜各等分腳痛加天麻一兩腳氣壅盛多熱赤腫加大黃炒蒼朮各等分不過一二服立愈瘟疫傷寒頭痛目昏發熱增寒腰腳痛甚多風多痰多氣或處卑濕腳弱亦效傷寒鼻衄加白茅根生地黃各一兩瘡痍癮疹加蟬蛻十個去足翼防風五錢癰疽初發赤腫寒熱用升麻葛根湯方見前合和加生地黃紅內消麥門冬去心各一兩去苗煎熱服立散尋常風寒濕氣流入經絡腰腳疼痛或痹弱五積散方見後對合加木瓜川牛膝去苗檳榔切碎各一兩煎立效冬合寒而溫暖春發溫疫大效陰證治中湯治太陰傷寒手足溫自利不渴腹滿時痛咽乾其脈尺寸俱沉細人參乾薑炮白朮甘草炙陳皮青皮各等分上銼散每服四錢水一盞半煎七分去滓食前服五積散調中順氣除風冷化痰飲治脾胃宿冷腹脅脹滿胸膈停痰嘔逆噁心或外感風寒內傷生冷心腹痞悶頭目昏暈肩背拘急肢體怠惰寒熱往來飲食不進及婦人血氣不調心腹撮痛經候不調或閉不通及口中冷背心惡寒並宜服之除麻黃又名異功散白芷一兩半陳皮去皮三兩厚朴去粗皮切薑汁炒乾三兩桔梗去蘆六兩枳殼去穰三兩川芎甘草炙白茯苓去皮各一兩半蒼朮十二兩米泔浸去皮切炒赤當歸去蘆尾一兩半麻黃去根節三兩楊芍藥一兩半乾薑爁二兩半夏湯洗七次一兩半肉桂去粗皮一兩半上除白芷肉桂二味為散另入外一十三味同為銼散慢火炒令色轉攤冷次入肉桂白芷令勻每服三錢水一盞半入生薑三片煎至一中盞去滓稍熱服如冷氣奔衝心脅臍腹脹滿刺痛反胃嘔吐泄利清穀及痃癖癥瘕膀胱小腸氣痛即入煨生薑三片鹽少許同煎如傷寒時疫頭痛體疼惡風發熱項背強痛入蔥白三寸豉七粒同煎若但覺惡寒或身不甚熱肢體拘急手足厥冷即入炒茱萸七粒鹽少許同煎如寒熱不調咳嗽喘滿入棗二枚煎風寒濕氣交互頸項強直或半身偏疼或復麻痹及卒中風重者多加麝香末寒濕腰痛每服加桃仁七枚去皮尖滿身疼加白膠香太陰經傷寒手足逆冷或積聚腹痛及虛汗不止脈細疾面青嘔吐加熟附子數片炒茴香一捻冷氣煨薑三片鹽少許煎婦人經候不調或腹中血塊加酸米醋一合難産亦加米醋一合腳氣冷者每服加茱萸十粒木瓜三片大便祕加大黃二錢腳氣下疰掀然赤腫增寒壯熱亦加大黃一錢利之久虛脾泄傷食腹痛冷瀉不止每用略炒過加陳米一撮烏梅一個煎名和氣散特效心腹膨脹不食亦效乳癰初作加川牛膝生地黃各二根産後或尋常血氣痛並加木香玄胡索半錢醋炒陳艾葉七皮烏藥半錢婦人體虛腳疼加生川烏去皮臍切四片麝香少許夏合熱寒氣折之秋髮寒疫大效人參養胃湯治外感風寒內傷生冷增寒壯熱頭目昏疼肢體拘急不問風寒二證均可治療須令濈濈微汗自然解散若先有汗則溫服不須更汗兼治飲食傷脾或外感風寒濕氣發為痎瘧及山嵐瘴疫常服尤佳厚朴去粗皮切蘆汁拌炒乾蒼朮米泔浸切炒黃色半夏湯洗七次各一兩白茯苓去皮半兩甘草二錢半人參去蘆草果煨去皮藿香去土各半兩橘紅去白七錢半上銼散每服三錢水一盞半生薑三片紅棗二枚煎空心熱服虛寒加炮附子數片體虛寒瘧加肉桂炮附子各一錢重兼紅丸子每服三十五粒方見後痎瘧類藿香正氣散治傷寒頭疼增寒作熱上喘咳嗽五勞七傷五般風痰五般膈氣心腹冷痛反胃嘔惡氣瀉霍亂臟腑虛鳴山嵐瘴瘧遍身虛腫婦人産前産後血氣刺痛小兒疳傷並宜服之大腹皮洗一兩藿香洗去土三兩厚朴去粗皮切薑汁拌炒白朮去蘆各二兩陳皮去白三兩白芷一兩苦梗去蘆二兩白茯苓去皮一兩甘草炙二兩半夏湯洗七次紫蘇去土各二兩上銼散每服三錢水一盞半生薑三片紅棗一枚同煎熱服如欲出汗加蔥白二根以衣被蓋再煎服冷嗽喘滿每服加人參一錢鹽梅一個杏仁七粒去皮尖北五味子十粒就吞青州白丸子三十五粒效氣促氣壅加人參一錢沉香半錢心腹痛加木香半錢玄胡索七粒切碎嘔惡甚加生薑五片木瓜二片痰嘔加烏梅一個寒濕腰痛腹心膨滿加生薑三片木瓜二片蒼朮切炒枳殼煨去穰切各半錢檳榔半個切片一方治憂怒鬱氣流走遍體刺痛緊滿加木香一錢縮砂五粒名增減順氣木香散四逆湯治陰證傷寒自利不渴嘔噦不止吐利俱作小便或澀或利脈微欲絶汗出過多腹痛脹滿手足厥冷或咳或悸內寒外熱下利清穀四肢沉重汗出熱不去者一切虛寒厥冷傷寒病在表誤下藥下利不止雖覺頭疼體痛發熱惡寒四肢拘急表證悉具未可攻表先服此藥助陽救里少陰病背惡寒口燥咽乾此主之甘草一兩炙乾薑二兩附子大者一枚生用去皮臍上銼散每服四錢水一盞半煎六分去滓溫服服此藥利止而無血者加人參半兩面赤加連根蔥白九莖臨煎熟旋入腹痛去蔥白加芍藥二兩嘔者加生薑二兩咽痛去芍藥加苦梗一兩利止脈不出者去苦梗加人參二兩霍亂吐泄後亦宜服此大汗出熱不去內拘急四肢疼下利厥逆惡寒大下利厥冷者主之四逆散治少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者此主之甘草炙柴胡枳殼去白穰炒黃芍藥各一兩上為末米飲調下二錢日三服咳者加五味子乾薑各半兩下利悸者加桂半兩小便不利者加茯苓半兩腹中痛者加附子半枚炮裂泄利下重先濃煎薤白湯內藥末三錢匕再煮一二沸溫服順元散此藥能溫內外感寒脈遲細沉伏手足冷毛髮戰栗傷寒里證大啜數杯手足溫汗出乃愈治氣亦效通血脈和一切氣無出此藥冒風濕手足緩弱不能動轉到頭須數人扶策三服後次日能步履脫然方見後風科虛證類三建湯方見痼冷類脈微身體冷重自汗嘔吐加丁香胡椒各半兩瓜蒂散治手足厥冷脈乍緊邪結在胸中心中滿而煩飢不能食病在胸中當須吐之方見後茯苓甘草湯治厥而心下悸宜先治水卻治厥不爾水漬入胃必作利茯苓桂枝各二兩生薑三兩甘草一兩各細切上四味以水四升煮取二升去滓溫分三服麻黃升麻湯治傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止為難治此方主之麻黃二兩半升麻一兩一分當歸一兩一分知母黃芩葳蕤各十八銖石膏白朮乾薑芍藥天門冬去心桂枝茯苓甘草各六銖細銼上十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如三斗炊米頃令盡汗出愈灸法治陰證傷寒於臍下一寸半氣海穴二七壯小作艾炷於臍心以鹽填實灸七壯立效二寸丹田三寸關元皆可灸和解香蘇散一方加沉香名沉香飲子治四時傷寒傷風傷濕傷食大人小兒皆可服香附子五兩炒去毛紫蘇去根二兩半陳皮二兩甘草二兩蒼朮二兩切片米泔浸炒黃上銼散每服四錢水盞半生薑三片蔥白二根煎不拘時候得汗為妙頭痛加川芎白芷北細辛荊芥穗每服各半錢咳嗽聲重痰多涕稠加半夏苦梗烏梅各半錢桑白皮七寸心疼加石菖蒲半夏各半錢泄瀉木瓜藿香各半錢傷濕自汗時行暴瀉生薑三片車前子一撮或用香附子陳皮各一兩以石器滴酒炒黃色為散煎熱服感寒濕日久腰腳疼行步難酒煎服或濕氣久留痹疼身體與手足倦怠腹脹滿或有氣上衝有類虛損實非虛損此主之食積腹痛泄瀉蔥白二根烏梅一個併吞服盧氏感應丸緑豆大三七粒方諸積類腳氣每服檳榔木瓜大腹皮枳殼木香各少許鹽酒水煎空心服感風宿食不化潮寒腹痛作瀉惡風四肢拘急生薑三片烏梅一個蔥白二根就服盧氏感應丸瘧疾桃柳枝七寸薤白二個頭痛作惡加鹽少許男女冷氣加茱萸一撮食鹽少許婦人血氣加莪朮茴香烏藥當歸所加量病人虛實增減除香附子紫蘇加厚朴桔梗藁本各四兩名和解散乃和平之劑隨病用之香葛湯治四時感冒不正之氣頭痛身疼項強寒熱嘔惡痰嗽腹痛泄瀉不問陰陽兩感或風寒濕瘴服之大效紫蘇去根白芍藥香附子炒去毛川升麻白乾葛薄陳皮各一兩白芷大川芎各半兩蒼朮米泔浸切炒黃色一兩大甘草半兩上銼散每服四大錢水一盞半生薑三片煎熱服不拘時候如發熱無汗遍體疼痛加蔥白二根豆豉七粒煎熱服得汗即解嘔去蒼朮加白朮數片藿香數葉中脘脹滿大便祕加枳實檳榔各半錢有痰加半夏半錢咳嗽加五味子七粒鼻塞加桑白皮三寸腹痛加枳殼半片去穰切泄瀉加木瓜二片老人産婦嬰兒皆可服如傷寒不分表裡以此藥導引經絡不致變動其功非淺如熱多口渴心煩臟腑堅或加前胡無汗可加麻黃汗太過加麻黃根時行寒濕泄瀉頭疼發熱自汗大效參蘇飲治一切發熱頭疼體痛服之皆效不必拘其所因小兒室女尤得其宜用藥致和而且平故也痰飲停積中脘閉塞眩暈嘈煩忪悸愪愯嘔逆不食有如氣隔痰氣停滯關節不利手足嚲曳筋脈攣急類乎中風食已即吐發熱頭痛百節煩疼狀似傷寒但連日頻進此藥以病退為期不可預止蓋本方乃集二陳湯半夏茯苓湯枳實半夏湯也人參去蘆白茯苓去皮紫蘇葉半夏湯洗七次乾薑去皮前胡去蘆各七錢半枳殼去穰麵炒陳皮去白桔梗去蘆粉草炙各半兩上銼散每服四錢水一盞半生薑三斤紅棗二枚同煎熱服不拘時候發熱頭疼每服加川芎半錢蔥白二根咳嗽加五味子七粒桑白皮七寸煩躁麥門冬二十粒去心痰嘔口燥咽乾烏梅一個男子婦人虛勞發熱加麥門冬二十粒去心氣盛或氣虛人痰氣上壅咽喉不利哮呷有聲氣息短急上盛下虛加木瓜半錢北五味子五粒干桑白皮七寸尋常感冒風寒鼻塞流清涕頭目昏重加川芎白芷各一錢蔥白二莖疝氣初發必先增寒壯熱甚者嘔逆噁心每用此藥加木香半錢寒熱必退腹痛加楊芍藥一錢沖和散治寒溫不節將理失宜乍暖脫衣甚熱飲冷坐臥當風居處暴露風雨行路沖冒霜冷凌晨早起呼吸冷氣久晴暴暖忽變陰寒久雨積寒致生陰濕如此之候皆為邪厲侵傷肌膚入於腠理使人身體沉重肢節痠疼項背拘急頭目不清鼻塞聲重伸欠淚出氣壅上盛咽渴不利胸膈凝滯飲食不入凡此之證若不便行解利伏留經絡傳變不已蒼朮六兩荊芥穗二兩甘草一兩一錢半上銼散每服三錢水一盞半煎至八分去滓熱服不拘時候並滓再煎才覺傷寒及覺勞倦亦須服之不問虛實老幼悉皆治之小柴胡湯為用最多而諸家屢稱述之蓋以柴胡半夏能利能汗凡半表半裡之間以之和解皆可用也抑不知小柴胡非特為表裡和解設其於解血熱消惡血誠有功焉蓋傷寒發熱一二日間解散不去其熱必至於傷血不問男女皆然此藥內有黃芩柴胡最行血熱所以屢獲奇功但藥性差寒用之貴能加減今推明活法凡表發熱里又有燥渴糞硬熱證者是為內外俱熱小柴胡加大黃里無熱證但發熱在表者小柴胡加桂枝主解表可以溫血所謂陰盛惡寒甘辛發散者此也大黃主攻裡可以蕩滌血熱所謂陽盛內熱酸苦湧泄者此也是又別其解表以溫攻裡以寒之義若遇少陽本證及無表裡證或表裡不分之證但依本方用之並不須加減此為正訣虛者少與尤在酌量治療傷寒輒用當歸其意蓋為調血即不思一滯中脘二佐痰飲三泥胃氣而血熱又非當歸之所能除惑之甚矣否則熱入血室張氏特以小柴胡主之何哉雖然均是和解耳局方以和解散平穩之劑為和解張氏以小柴胡差寒之劑為和解意安在哉蓋局方和解散為尋常感冒和平解散設也若夫熱在半表半裡既不可汗又不可下非小柴胡一劑孰能內和而外解之乎淋家衄血家法不可汗亦可以此和解然而學者僅以小柴胡收效不遵格法輕用大柴胡立意一差禍不旋踵籲可畏哉又今人但聞小柴胡之藥多見棄而不服殊不知陰證似陽浮熱於外用之則誤人多矣的是陽證或半表半裡用之無不伐病所愧者醫不審陰陽致使病家之惑聞者但當責之於醫不當輕議於藥方見前神朮散治四時瘟疫頭痛項強發熱增寒身體疼痛傷寒鼻塞聲重咳嗽頭昏並皆治之藁本去土羌活去蘆甘草炙香白芷細辛去葉及土川芎各一兩蒼朮五兩米泔浸一宿切炒上銼散每服三錢水一盞生薑三片蔥白三寸煎七分溫服不拘時候傷風鼻塞為末蔥白茶清調下二香散治四時感冒冷濕寒暑嘔惡泄利腹痛瘴氣飲冷當風頭疼身熱傷食不化紫蘇陳皮蒼朮各一兩香薷去根二兩香附子二兩半炒去毛厚朴去粗皮薑汁拌炒甘草扁豆各一兩上銼散每服四錢水一盞半生薑三片木瓜二片蔥白二根煎熱服外感腫滿先以此多加車前子木瓜煎效相類痰證金沸草散治增寒發熱惡風自汗寸口脈浮胸膈痞滿氣上衝咽不得息頭不疼項不強方見前大半夏湯治膈間有寒痰半夏湯洗如法薄切焙乾白茯苓生薑各一兩上銼散水二盞半煎至一盞去滓臨睡溫呷如有熱痰加炙甘草一分脾胃不和去甘草入陳橘皮一分瓜蒂散治胸有寒痰當吐之諸亡血虛家不可與服瓜蒂熬黃赤小豆各半兩上為末取一錢匕豉一合湯七合煎去滓取汁和末頓服藥下咽便臥欲吐且忍良久不吐取三錢匕湯二合和服之立便吐倉卒無藥糟瓜頓吃亦吐稀涎散治涎結胸膈作為寒熱飲食減少豬牙皂角圓白半夏各一兩上銼散每服三錢水一盞半煎至七分去滓溫服入咽便吐去涎即愈食積治中湯治頭疼脈數發熱惡寒滿身不痛左手脈平和名食積方見前虛人五積人參養胃湯均可服方見前重者香蘇散取五錢水一盞半煎去滓併吞服感應丸二七粒未效再服感應丸方見祕澀類虛煩竹葉石膏湯治惡寒身不痛頭不疼脈不緊但煩熱名虛煩凡有熱不宜大攻之熱去則寒起止宜服此方見後橘皮湯治動氣在下不可發汗發之反無汗心中大煩骨節疼痛目暈惡寒食則反惡谷不得入宜服此橘皮一兩半甘草炙半兩人參一分竹茹半兩上銼散每服五錢水一盞半薑三片棗一枚煎食前服溫膽湯治虛煩方見雜病虛損類腳氣加減小續命湯治身熱肢節痛頭疼大便祕或嘔逆但卒起腳弱為異耳名腳氣方見風科虛證類余諸方見腳氣類通治五積散性溫敗毒散性涼凡人遇些感冒對半雜和煎服名交加散亦多驗小小感冒因風雨寒冷所襲猝然得之正氣未耗邪氣未深用此先以助其正氣使益壯則邪氣自當屏散若倉卒藥未能辨只以蔥白連須數莖豆豉一捻生薑數片水煎熱啜連進三兩盞亦能發散若邪氣已入經絡及時行疫癘則須依經按法表裡汗下不可差殊戒之二方見前雙解散治風寒暑濕飢飽勞疫內外諸邪所傷無問自汗汗後雜病但覺不快便可通解得愈小兒生瘡疹使其出快亦能氣通宣而愈益元散方見中暑類三兩半防風通聖散方見風科熱證類三兩半上一處和勻名雙解散每服三錢水一盞半生薑三片蔥白五寸豉二十粒煎至一盞溫服北方此藥大效麻黃桂枝湯治厥陰傷寒煩滿發熱惡寒往來如瘧或囊縮其脈尺寸俱微緩者主之若脈沉短其囊必縮急以承氣湯下之可保五死一生承氣湯乃利陽明藥耳若病到厥陰其勢已甚蓋陽明養宗筋為熱毒所攻乃以承氣湯瀉其能養故利陽以救陰此猶假虞以伐虢圍魏救趙之意也太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便自可一日三二度發脈微緩者為欲愈也脈微惡寒者此陰陽俱解也以其不能得少汗出身必癢宜服桂枝四錢一字芍藥麻黃去節杏仁十二個去皮尖甘草炙各半兩上銼散每服五錢水一盞半入生薑三片紅棗二枚煎八分去滓食前服白虎湯治傷寒大汗出後表證已解心胸大煩渴欲飲水及吐或下後七八日邪毒不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者宜服之又治夏月中暑毒汗出惡寒身熱而渴及治口中不仁背上惡寒效三陽合病腹滿身重面垢譫語遺溺並不可汗下但少與服之效石膏一斤知母六兩甘草二兩上銼散每服三大錢水一盞半加入粳米五十餘粒同煎至一盞去滓溫服小兒量力少少與之或加入人參少許同煎亦得食後服此藥立夏後立秋前可服春時及立秋後並亡血虛家並不可服不惡寒反惡熱大便不祕者亦服大青龍湯治太陽中風傷寒脈緊發熱惡寒身疼不汗出而煩渴或脈浮緩身不疼但重乍有輕時或傷寒見風脈傷風見寒脈榮衛俱傷煩躁則用若脈微弱汗出惡風者不可服之服之則厥筋惕肉瞤此為逆也桂枝一兩去皮甘草一兩炙石膏如半個雞子大碎杏仁二十枚去皮尖麻黃三兩去節湯泡去黃汁焙乾稱上銼散每服五錢水一盞半生薑四片棗子一枚煎至八分去滓溫服取汗為度若汗周身潤止後服未周身潤可停待相次服盡不欲汗汗多恐亡陽故也若汗多不止用溫粉撲之方見後小青龍湯治傷寒表未解心下有水氣乾嘔發熱而咳或利或噎或小便不利小腹滿而喘者麻黃去節細辛去苗乾薑炮甘草炙桂枝芍藥各三兩半夏湯去滑五味子各二兩半上銼散每服五錢水二盞煎食前溫服虛噎去麻黃加熟附子一錢小便不利小腹滿加茯苓一錢喘加杏仁七枚去皮尖溫粉凡發汗不欲多多則亡陽宜用此粉撲之即愈神效白朮藁本川芎白芷上為末一兩入米粉三兩均和撲之真武湯治傷寒數日以後發熱腹疼頭目昏沉四肢疼痛大便自利小便或利或澀或嘔或咳並宜服之已經汗不解仍發熱者心下悸頭眩暈肉瞤動振振欲躄地者此由渴後飲水停留中脘所致白茯苓白芍藥白朮各一兩熟附子一枚炮上銼散每服四錢水一盞半生薑五片煎六分食前溫服小便利者去茯苓大便利去芍藥加乾薑二兩咳者加五味子三分細辛乾薑各一兩嘔者去附子每服加生薑五片又云水飲內蓄上乘於肺為喘為咳因水而咳病在陽明則用小青龍湯主之病在少陰此藥主之桂枝二越婢湯太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜服之屬太陽桂枝芍藥甘草石膏六錢搗碎麻黃半兩湯洗去黃汁焙乾稱上銼散每服五錢水一盞半生薑四片棗子一枚煎八分溫服小建中湯治陽脈澀陰脈弦腹中急痛服此不瘥者小柴胡湯主之方見前芍藥三兩甘草一兩炙桂枝去粗皮一兩半上銼散每服五錢水一盞半生薑三片棗子一枚煎八分去滓下膠飴一兩許再煎化溫服兼治熱多寒少尺脈遲榮氣不足血少故也加黃耆一兩半尺脈尚遲再作一劑寒傷榮甚至於弱倦昏沉加人參黃耆各一兩半效梔子升麻散治晚發傷寒三月至夏為晚發梔子十枚掰碎蒸升麻一兩半生地黃半斤切碎柴胡石膏各二兩半上銼散每服五錢水一盞半煎八分頻服病不解更作頭面赤去石膏入乾葛二兩無地黃以豉代之解肌湯治傷寒溫病天行頭痛壯熱葛根一兩黃芩芍藥各半兩甘草炙一分上銼散每服五錢水一盞半棗子一枚煎八分日三服三四日不解脈浮者宜重服發汗脈沉實者宜下之漢防己湯治風溫脈浮身重汗出甘草炙黃耆蜜炙各二兩漢防己四兩白朮三兩上銼散每服五錢水一盞半生薑四片棗子一枚煎一中盞飲訖乃坐被中汗出如蟲行或被臥取其汗白虎加蒼朮湯治濕溫多汗知母六兩甘草二兩炙石膏一斤蒼朮三兩粳米三兩上銼散每服五錢水一盞半煎至八分取六分清汁溫服葛根湯治傷風頭項強急身體反張屬太陽經先因傷風又感寒濕名痙病外證發熱惡寒與傷寒相似但其脈沉遲弦細項背反張強硬如發癇之狀無汗惡寒名剛痙有汗不惡寒名柔痙此藥主之方見後有汗桂枝湯加葛根方見傷風類小續命湯剛柔二痙有汗去麻黃加葛根方見風科虛證類大承氣湯治剛痙仰目胸滿口噤其人臥不著席腳攣急咬齒與服得利則減極熱作痙者難治方見前敗毒散治剛痙加防風天麻黃芩全蠍各五錢生薑三片薄荷七葉煎方見前仍用加味壽星丸薑汁竹瀝湯服纍用有效方見風科通治類附術散治傷寒手足逆冷筋脈拘急汗出不止項強直搖頭口噤時發時止不食下瀉者難治附子炮白朮各一兩川芎三錢獨活半兩桂心二錢上銼散每服三錢水一中盞棗子二個煎至五分溫服不拘時候附子防風散治傷寒柔痙閉目合面手足厥冷筋脈拘急出汗不止白朮一兩五味子一兩白茯苓川芎乾薑炮製銼甘草炙微赤銼附子炮製去皮臍防風各三分去蘆桂心半兩柴胡一兩半去苗上銼散每服三錢水一盞生薑四片煎至六分去滓溫服不拘時候八物白朮散治傷寒柔痙三日不瘥手足厥冷筋脈拘急汗不出恐陰氣內傷白朮白茯苓麻黃去節湯泡沸焙五味子羌活各半兩良薑一分附子炮去皮臍桂心各三分上銼散每服四錢水一盞薑四片煎至五分不拘時溫服竹葉石膏湯治傷寒時氣表裡俱虛遍身發熱心胸煩悶得汗已解內無津液虛羸少氣胸中煩滿氣逆欲吐諸虛煩熱與傷寒相似但不惡寒身不疼頭不痛脈不緊數不可汗下宜服石膏一兩六錢研碎半夏二錢半湯泡七次人參二錢去蘆麥門冬五錢半去心甘草炙二錢上銼散入石膏末停勻每服四錢水兩盞入青竹葉生薑各五斤煎至盞半入粳米一百餘粒再煎米熟湯成去米溫服不拘時候附子細辛湯治少陰傷寒口中和而背惡寒反熱倦怠自汗而渴其脈尺寸俱沉而緊者麻黃去節細辛附子各半兩炮去皮臍上銼散每服四錢水一盞半煎至七分去滓食前服手足厥者去麻黃細辛加乾薑半兩甘草一分或口燥舌乾而渴宜急下之附子湯治少陰病得之一二日口中和背惡寒者即當灸之少陰病身體痛手足寒骨節痛脈沉者並宜服之茯苓芍藥各一兩半人參一兩白朮二兩附子一枚炮去皮上銼散每服四錢水盞半煎至七分去滓溫服日進三服四逆湯治傷寒表裡俱病名兩感一日太陽與少陰俱病頭痛口乾煩滿而渴二日陽明與太陰俱病腹滿身熱不食譫語三日少陽與厥陰俱病耳聾囊縮而厥兩病俱作治有先後先宜救里臟氣內正急宜攻表救內固宜急而表亦不可緩也救里宜四逆湯身體疼痛清便自調急當救表宜桂枝湯兩感傷寒古無治法惟證治論並活人書解仲景治有先後之説皆云治有先後者宜先救里內才溫則可醫矣然後救表亦不可緩也以上所論並先救里然後救表如下利不止身體疼痛則先救里如不下利身體疼痛則先救表此亦謂之治有先後也兩感病亦有可活之理而不可必也方見前人參養胃湯方見前每用四錢生薑三片棗子二枚煎吞服來復丹方見痼冷類五十粒調和陰陽其病頓瘳世無不可治之病醫不善醫信乎葛根湯治太陽病項背強几几然無汗惡寒並治三陽合病自利葛根一兩麻黃去節三分桂心甘草炙芍藥各半兩上銼散每服五錢水一盞半生薑五片棗一枚煎七分去滓食前溫服三陽合病不下利但嘔者加半夏六錢脾約丸治太陽陽明脾約是也大便堅小便利者其脾為約大黃二兩酒浸厚朴去粗皮枳殼去穰白芍藥各半兩麻子仁三分另研杏仁一兩半別研上為末煉蜜和杵一千下丸如梧桐子大每服二十丸溫水下不拘時候未效加五丸十丸至五十丸止利後服糜粥將理附子散治陰毒傷寒為病手足冷腰背強頭疼腹痛或煩渴精神恍惚額與手背時出冷汗聲鄭重爪甲唇面色青黑多因脾腎虛寒伏陰重感於寒所致或因服冷藥過多心腹脹滿昏不知人附子炮去皮臍三分桂心當歸去尾白朮各半兩去蘆半夏湯泡去滑乾薑各一分炮上銼散每服三錢水二盞生薑三片煎至六分不以時熱服衣覆取汗返陰丹治陰毒傷寒心神煩躁頭痛四肢逆冷面青腹脹脈沉伏者硫黃通明五兩別研硝石別研太陰玄精各二兩別研乾薑炮桂心各半兩附子炮半兩上用鐵銚先鋪玄精次下硝末各一半中間鋪硫黃末又將二石余末蓋上以小盞合著熟炭火三斤燒令所得勿令煙出急取瓦盆合著地上四面灰蓋勿令煙出候冷取出研細入後藥為末同研勻米糊丸梧桐子大每服二三十丸煎艾湯下頓服汗出為度未退乃大著艾炷灸臍下丹田氣海更不退則以蔥啖尉之其法亦治氣虛陽脫體冷無脈氣息欲絶不省人事及傷寒陰厥百藥不效其法見前四逆湯治陰毒要藥方見前當歸四逆湯治手足厥寒脈細欲絶者亦陰毒要藥當歸去尾桂枝芍藥細辛各三兩大棗二十五枚甘草炙通草各二兩上銼散以水八升煮三升去滓溫服一升日三服內有久寒者加吳茱萸生薑主之升麻湯治陽毒傷寒一二日便成陽毒或服藥吐下後變成陽毒腰背痛煩悶不安面赤狂言或走或見鬼或下利面赤斑斑如錦紋咽喉痛下膿血脈浮大數五日可治七日不可治大抵宜早發汗升麻二兩犀角屑射干黃芩人參甘草炙各一分上銼散每服五錢水一盞煎至七分熱服並進三四服溫覆汗出為度甚者大承氣湯除厚朴加木通甘草大腹皮桃仁各一兩以利為效方見前梔子仁湯治陽毒傷寒壯熱百節疼痛梔子赤芍藥大青知母各一兩升麻黃芩石膏杏仁柴胡甘草各半兩上銼散每服四錢水一盞薑三片豉二十粒煎至七分不拘時候服大陷胸湯治傷寒表未解醫反下之膈內拒痛兩手不可近短氣煩躁心中懊憹心下硬大便不通舌燥而渴熱實脈沉而緊又治身無大熱有水結在胸脅間者大黃半兩芒硝四兩甘遂半兩上銼散用水三盞先煎大黃至一大盞入芒硝煮熔下甘遂末煮一沸分二服得利止小陷胸湯治結胸病正在心按之則痛脈浮滑者黃連一分半夏湯洗去滑六錢栝蔞實四分之一上銼散水二盞先煎栝蔞至一盞半入前藥煎至六分去滓分二服利黃涎沫即安一方加枳實去穰黃芩各一分苦梗六錢纍用有效大陷胸丸治熱實結胸病發於陽而反下之熱入因作結胸以下之太早故也其病項強如柔痙狀下之則和大黃二兩葶藶炒杏仁去皮尖炒芒硝各三分上前二味為末將杏仁芒硝合研為脂和藥取如彈子大一枚別研甘遂末一錢白蜜一大匕水二盞煎至七分頓服一宿乃下如不下更服取下為效甘遂性猛宜斟酌虛實入之治結胸灸法巴豆十四粒黃連七寸連皮用上為末用津唾和成膏填入臍心以艾炷其上腹中有聲其病去矣不拘壯數病去為度才灸了便以溫湯浸手帕拭之恐生瘡枳實理中丸治寒實結胸及傷寒諸吐利後胸痞欲絶膈高起急痛手不得近枳實去穰麵炒茯苓人參白朮乾薑炮甘草各等分炙上為末蜜和一兩作四丸熱湯化下渴加栝萎根下利加牡蠣粉各等分為末服亦可桔梗枳殼湯治傷寒氣痞胸滿欲死枳殼去穰麩炒桔梗去蘆甘草各等分上銼散每服五錢水一盞半煎七分食前服痰多加半夏生薑有熱加黃芩三黃湯治傷寒陰證下之太早致心下痞按之軟其脈關上浮者主之若未解未可攻宜先隨風寒二證投桂枝麻黃湯表解已即服此大黃蒸黃連黃芩去心上銼散每服五錢沸湯二盞熱漬之一時久去滓分二服暖服或汗出惡寒加附子別煎汁入一合同服半夏瀉心湯治心下痞滿而不痛者半夏一兩一錢湯洗七次黃芩去心人參去蘆甘草炙乾薑炮各兩半黃連半兩上銼散每服四錢水一盞半薑五片棗一枚煎七分溫服或傷寒中風醫反下之下利日數十行穀不化腹中鳴心下痞硬乾嘔心煩者加甘草半兩人參一兩名甘草瀉心湯或汗出解後胃中不和心下痞硬干噎食臭脅下水鳴下利者加生薑一兩減乾薑一兩余如正方名生薑瀉心湯一方治痰熱心胸煩痞半夏丸酒蒸黃連丸合和每服三十五丸米飲下特效方見痎瘧及下痢類近效方治陽證結胸死無可藥者曲鱔活者十一條即蚯蚓也擂爛用蜜半盞水半碗灌服無蜜用沙糖丁香柿蒂散治咳逆諸方並見後第四卷百合知母湯治病人欲食復不能食常默默欲臥復不能臥欲行復不能行有寒如無寒有熱如無熱飲食或美或不美如強健人而臥不能行口苦小便赤藥入口即吐利此因虛勞大病之後不平復變成此疾名百合候此主之發汗後者服百合七枚擘知母三兩切上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎去一升去滓別以泉水二升煎知母每取一升去滓後合和煎取一升五合分溫再服滑石代赭湯治百合病下之後者百合七枚掰滑石三兩碎綿裹代赭如彈子大一枚碎綿裹上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫服不拘時候雞子湯治百合病吐之後者百合七枚擘雞子黃十枚上先以水洗百合漬一宿當白沫出其水更以泉水二升煎取一升去滓內雞子黃攪勻五分溫服百合洗方治百合病一月不解變成渴者百合水一斗漬一宿以洗身已食煮餅勿以鹽豉玄參升麻湯治傷寒失下不當下而下之熱毒在胃發斑如錦紋甚則煩躁譫語兼治喉閉腫痛玄參升麻甘草各半兩上銼散每服五錢水一盞半煎七分去滓溫服溫毒亦能發斑也知母麻黃湯治壞傷寒以傷寒差後經久精神不守言語錯謬或潮熱頰赤寒熱如瘧皆由汗下不止毒在心包絡間所致也知母一兩半麻黃去節甘草炙芍藥黃芩去心桂心各半兩上銼散每服五錢水一盞半煎七分溫服日三四服若心煩欲飲水稍稍與之黑奴丸治傷寒調理失序醫所不治及時行疫病七日不汗脈洪數面赤目瞪身熱煩躁狂言欲走大渴或口噤精魄已散但心下暖斡閉口灌藥下咽即活亦治陽毒發斑麻黃去節大黃各二兩芒硝釜底煤別研梁塵別研小麥奴灶突墨各一兩別研上為末煉蜜為丸彈子大新汲水研下一丸渴者與冷水盡飲之須臾當寒寒竟汗出便瘥若日移五尺不汗依前法服一丸瘥須病人大渴乃可與之不渴者勿服無憂散治傷寒調理失序毒氣內結胸腹脹滿坐臥不安日久不瘥狂言妄語大小便不通或復吐逆臘月黃牛膽以天南星為末入膽內縛令緊當風避日懸之候乾取用上為末以人參半兩煎湯七分盞調末二錢乘熱服遲頃更以熱人參湯投之或睡便溺下黃黑惡物是效桃仁湯治狐惑默默欲眠目不瞑惡飲食面目乍赤乍白乍黑齒無色舌上白聲哽咽干此因大病後腸胃虛空三蟲求食食人五臟食其喉則為惑其聲哽食下部則為狐其咽乾當看上唇有瘡蟲食其臟下唇有瘡蟲食其肛桃仁去皮尖槐子碎艾各一兩上銼散每服五錢水一大盞薑三片棗二枚煎七分食前服之白頭翁湯治熱利下重及欲飲水者白頭翁二兩黃連黃柏秦皮各三兩上銼散水七升煎取二升去滓溫服一升不愈更飲一升即效黃連阿膠丸治同上方見泄瀉類黃連解毒湯治時疾三日已汗解或因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不得臥黃連三分黃柏半兩梔子四枚掰黃芩一兩上銼散每服五錢水一盞半煎取一湯盞去滓服未知再服進粥以此漸瘥外臺云凡大熱盛煩嘔呻吟譫語不得眠者傳此方諸人用之亦效此直解毒熱除酷熱不必飲酒劇者黃連犀角湯治傷寒及諸病後內有瘡出下部黃連半兩烏梅七個犀角無則以升麻代木香各一兩上銼散每服五錢水一盞半煎七分食前服雄黃兌散治下部𧈟瘡雄黃研青葙子苦參黃連各二分桃仁去皮尖研一分上為末以生艾搗汁和如棗核大綿裹納下部扁竹汁更佳無艾只用綿裹散子納下部亦得四逆湯治傷寒寒厥或表熱裡寒下利清穀食入則吐或大汗大吐大下之後四肢冰冷五內拘急舉體疼痛不渴脈沉者方見前白虎湯治熱厥腹滿身重難以轉側面垢譫語遺溺手足厥冷自汗脈沉滑里有熱也方見前大承氣湯亦治熱厥當觀病淺深量多寡飲之方見前黃連阿膠湯治少陰病得之二三日以上心中煩不得臥者黃連一兩阿膠三分雞子黃半個黃芩一分芍藥半個上銼散每服四錢水二盞煎取一盞去滓內膠消盡內雞子黃攪令和溫服日二服文蛤散病在陽應以汗解之反以冷水噀之熱被寒水入里卻不得去彌更益煩肉上粟起意欲飲水反不渴者宜服若不瘥者與五苓散寒實結胸無熱證者與三物白散文蛤一兩上為散沸湯和服方寸匕湯用五合三物白散治寒實結胸無熱證者屬太陽貝母三分桔梗三分去蘆巴豆去心皮熬黑研如脂一分上為散內巴豆研和以白飲和服強人半錢匕羸人可減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆若以水噀之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法十棗湯太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也宜服方見痰飲類抵當湯太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦小腹硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也或太陽病身黃脈沉結小腹硬小便利者為無血也小便自利其人如狂者血證諦也或傷寒有熱小腹滿應小便不利今反利者為有血也當下之不可余藥並宜服屬太陽陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑者宜此藥下之或病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解今熱則消穀喜飢至六七日不大便者有瘀血宜服屬陽明大黃一兩去皮酒洗虻蟲十枚去翅足熬桃仁七枚去皮尖捶碎水蛭十枚熬去子杵碎水蛭入腹再生化為害尤甚須銼斷用石灰炒再熬上為散作二服水二盞煎七分去滓溫服吳茱萸湯食谷欲嘔屬陽明也此主之得湯反劇者屬上焦也屬陽明少陰病吐利手足逆冷煩躁欲死者或乾嘔吐涎沫頭痛者此並主之屬少陰人參一兩去蘆吳茱萸一兩六錢半湯洗三遍上為散每服四錢生薑四片棗子一枚水二盞半煎八分去滓分二服苦酒湯苦酒米醋是也治少陰病咽中傷生瘡不能語言聲不出者半夏洗碎如棗核十四枚雞子一枚去黃內苦酒著雞子殼中上內半夏著苦酒中以雞子殼置刀環中安火上令二三沸去渣少少含咽之不瘥再服牡蠣湯治發汗多頭眩汗出筋惕肉瞤白朮牡蠣粉炒黃防風獨莖者去蘆頭各等分上為末每服二錢以酒調下米飲亦可日二三服汗止便服小建中湯方見前陰旦湯治傷寒肢節疼痛內寒外熱虛煩芍藥二兩甘草二兩炙乾薑三兩炮黃芩三兩桂四兩上銼散每服五錢棗二枚水一盞半煎八分去滓溫服日三夜二覆令小汗大白朮散治陰毒傷寒心間煩躁四肢逆冷白朮附子炮裂去皮臍川烏頭制同上桔梗去蘆頭細辛各一兩乾薑半兩炮裂銼上為末每服二錢水一中盞煎至六分不拘時稍熱服回陽丹治陰毒傷寒面青手足逆冷心腹氣脹脈候沉細蓽澄茄木香乾蠍附子炮裂去皮臍硫黃細研入吳茱萸湯浸七遍焙乾微炒各半兩乾薑一分上為末酒煮麵糊丸如梧子大每服三十丸不計時候生薑湯下頻服三服復以熱酒一盞投之厚衣蓋取汗正陽散治陰毒傷寒面青口張出氣心下硬身不熱只額上有汗煩渴不止舌黑多睡四肢俱冷甘草一分炙微赤銼麝香一錢細研入附子一兩炮裂去皮臍乾薑一分炮裂銼皂莢一挺去皮塗酥炙令黃色去子上為末每服二錢水一中盞煎至五分不拘時熱服肉桂散治傷寒服冷藥過度心腹脹滿四肢逆冷昏沉不識人變為陰毒肉桂去粗皮高良薑銼厚朴去皮薑汁炙令香熟白朮木香各三分人參去蘆頭赤芍藥陳橘皮附子炮裂去皮臍前胡去蘆頭當歸各一兩吳茱萸半兩炒黃上銼散每服四錢水一中盞棗三枚煎六分去滓不拘時稍熱頻服陽毒升麻湯治傷寒一二日便成陽毒或服藥吐下之後變成陽毒腰背痛煩悶不安面赤狂言或走或見鬼或下利脈浮大數面赤斑斑如錦紋咽喉痛下膿血五日可治七日不可治升麻二兩犀角屑射干黃芩人參甘草各一分上銼散每服四錢水一盞半煎至一盞去滓飲半盞食頃再服溫覆手足出汗出汗則解不解再服大黃散治陽毒傷寒未解熱結在內恍惚如狂甘草炙微赤木通銼大腹皮各一兩銼桂心三兩川芒硝二兩大黃兩半銼碎桃仁二十一枚湯浸去皮尖雙仁麩炒令微黃上銼散每服四錢水一中盞煎至六分不拘時候溫服通利為度五柔丸老人虛人腳氣亡津液虛祕大便結調補三焦大黃四兩前胡一兩半夏洗七次蓯蓉浸酒芍藥茯苓去皮細辛當歸葶藶炒各半兩上為末煉蜜為丸如梧桐子大溫水下二十丸以通為度葛根橘皮湯療冬溫未即病至春被積寒所折不得發至夏得熱其寒解冬溫始發肌中斑爛癮疹如錦紋而咳心悶但嘔吐清水服此湯即靜葛根橘皮杏仁去皮尖研炒知母黃芩麻黃去節湯泡甘草炙各半兩上銼散每服五錢水一大盞煎至一中盞去滓溫服知母桂心湯治傷寒後不瘥朝夕有熱如瘧麻黃一兩去節甘草一兩炙知母二兩或作一兩芍藥黃芩各一兩桂心二兩或作一兩上為末每服四錢水一盞半生薑四片煎一盞去滓取八分清汁溫熱服日三覆令微汗若心煩不眠其人欲飲水當稍稍與之令胃中和則愈增損四物湯治少陰下利手足冷無熱候者甘草二兩炙人參龍骨各二兩黃連乾薑各一兩附子一枚炮去皮臍上銼散每服三錢水一盞煎七分日三服不瘥復作下利腹痛加當歸二兩嘔者加橘皮一兩化斑湯治斑毒人參石膏各半兩葳蕤知母甘草各一分上銼散每服五錢匕水一盞半入糯米一合煎八分取米熟為度去滓溫服黃連橘皮湯治溫毒發斑黃連四兩去毛陳橘皮杏仁去皮尖枳實炙麻黃去節湯泡葛根各二兩厚朴薑汁炙甘草各一兩炙上銼散每服五錢水一小盞半煎至一盞去滓服下利當先止陽旦湯治中風傷寒脈浮發熱往來汗出惡風項強鼻鳴乾嘔桂心芍藥各三兩甘草黃芩各二兩上銼散每服五錢水一盞半棗子一枚生薑三片煎至一盞取八分清汁溫服自汗者去桂心加附子一枚炮渴者去桂心加栝萎三兩利者去芍藥桂加乾薑三兩心下悸者去芍藥加茯苓四兩虛勞裡急者正陽旦湯主之煎時入膠飴為佳若脈浮緊無汗發熱者不可與竹皮湯療交接勞復卵腫腹中絞痛欲絶刮竹青皮一升上用水三升煮取一升半絞去滓分服立愈乾薑湯療婦人得溫病雖瘥未復未滿一百日不可與交合為陰易之病病必拘急手足拳皆死丈夫病以傷婦人名為陽易速當療之可瘥滿一百日不可療也宜服此藥乾薑一分炮上銼散水二盞煎六分溫服汗出得解止手足伸遂愈青竹茹湯婦人病未平復因有所動致熱氣上衝胸手足拘急搐搦如中風狀栝萎根無黃根者二兩青竹茹刮半斤淡竹者上水二升煮取一升二合去滓溫溫作二三服吃立效當歸白朮湯婦人未平復因有所動小腹急痛腰胯疼四肢不任舉身無熱發者白朮桂枝去皮甘草炙人參黃耆蜜炙芍藥各一分生薑半兩當歸一兩附子一枚破分八片去皮上銼散水三升煎取一升半去滓通口服一半食頃再服一半溫覆微汗便瘥知母麻黃湯傷寒瘥後或十數日或半月二十日終不惺惺常昏沉似失精神言語錯謬又無寒熱醫或作鬼祟或風疾多般治不瘥或朝夕潮熱頰赤或有寒熱似瘧都是發汗不盡餘毒在心胞絡間所致知母一兩半麻黃去節甘草炙芍藥黃芩各半兩桂枝去皮半兩盛暑中可加桂枝作一分上銼散每服五錢水一盞半煎八分去滓溫服半日可相次二三服溫覆令微汗若心煩不眠欲飲水當稍稍與之令胃中和即愈未汗再服應手方治傷寒舌出寸余連日不收以梅花腦子為末摻舌上應手而收當用五錢病方愈白朮散治傷寒氣脈不和增寒壯熱鼻塞腦悶涕唾稠黏痰咳壅滯或冒涉風濕增寒發熱骨節煩痛或中暑嘔吐眩暈及大病後將理失宜食復勞復病證如初悉主之又五勞七傷氣虛頭眩精神恍惚睡臥不寧肢體倦怠潮熱盜汗脾胃虛損面色萎黃飲食不美口吐酸水臟腑滑泄腹內虛鳴反胃吐逆心腹絞痛久瘧久痢及膈氣噎塞上氣喘促坐臥不安或飲食所傷胸膈痞悶腹脅䐜脹婦人産前産後血氣不和霍亂吐瀉氣厥不省人事並宜服之常服闢四時不正之氣及山嵐瘴疫白芷甘草炒青皮去白白茯苓去皮桔梗去蘆山藥香附子以上各三兩去毛乾薑半兩白朮去蘆一兩上銼散每服二錢水一盞薑三片棗一枚木瓜一片紫蘇葉二三皮煎七分食前服若吐瀉入白梅煎喘加桑白皮杏仁傷寒勞復入薄荷膈氣木通三寸麝香少許中暑嘔逆入香薷産前産後血氣不和入荊芥霍亂入藿香氣厥入鹽煎服又方白朮散治傷寒雜病一切吐瀉煩渴霍亂虛損氣弱保養衰老及治酒積嘔噦白朮茯苓去皮人參各半兩甘草兩半炙木香一分藿香半兩葛根一兩上為末白湯調服二錢煩渴加滑石二兩甚者加薑汁續續飲之蜜煎導法陽明病自汗出若發汗小便自利者此為津液內竭屎雖硬不可攻之當自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導上蜜四兩銅器中微火煎之稍凝如飴狀攪之勿令焦著欲可丸捻作鋌如指許長二寸當熱時急作令頭鋭內穀道中以手急抱欲大便時乃去之豬膽汁方上以大豬膽一枚瀉汁和法醋少許以灌穀道中如一食頃當大便蜜漬柏皮治口瘡舌潰爛上以大柏去粗皮蜜漬一宿合之吞汁勿絶瘥或用蜜炙焦黃色研為末每服半錢摻灸法初得病或先頭痛身寒熱或澀澀欲守火或腰背強直面目如飲酒狀此傷寒初得一二日但烈火灸心下三處第一處去心下一寸名巨闕第二處去心下二寸名上管第三處去心下三寸名胃管各灸五壯然或人形大小不同恐寸數有異可繩度隨其長短寸數最佳取繩從心頭骨名鳩尾頭度取臍孔中屈繩取半當繩頭名胃管又中屈半繩更分為二份從胃管向上度一份即是上管又上度取一份即是巨闕大人可灸五十壯小兒可三壯亦隨其年灸之大小以意斟量也若病者三四日以上以先灸胸上二十壯以繩度鼻正上盡髮際中屈繩斷去半便從髮際入發中灸繩頭名曰天聰又灸兩顳顬穴在耳前動處又灸兩風池穴在項後髮際陷中又灸肝俞穴在第九椎下兩旁相去各一寸半百壯余處各二十壯又灸太衝穴在足大指本節後二寸或一寸半陷中三十壯神驗
