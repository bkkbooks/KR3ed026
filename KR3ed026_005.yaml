body:
  text: 卷第五大方脈雜醫科脾胃虛證丁沉透膈湯治氣滿不快飲食不入胸膈痞悶或時膨脹腹中刺痛等證丁香五錢沉香五錢木香五錢並不見火人參去蘆半兩青皮去白神麯各一兩茯苓去皮甘草炙陳皮去白厚朴薑汁製草果仁藿香葉去土半夏泡七次縮砂仁去殼各二兩白豆蔻去殼白朮去蘆炒麥蘖炒香附子炒去毛各一兩上銼散每服三錢水一盞半入生薑三片紅棗一枚同煎去滓熱服又方治氣滿不食以四味香蘇散同煎大人尤宜服未效更服丁香煮散加蓽茇良薑各一兩方見嘔吐類穀神嘉禾散治中滿下虛五噎五膈脾胃不和胸膈痞悶脅肋脹滿心腹刺痛可進飲食或多痰逆口苦吞酸胸滿短氣肢體怠惰面色萎黃如中焦虛痞不任攻擊臟氣虛寒不受峻補或因病氣衰食不復常稟受怯弱不能多食尤宜服之常服育神食氣和補脾胃進美飲食枇杷葉去毛薑汁炙令香熟一兩石斛細銼酒拌和微炒三兩沉香鎊三分薏苡微炒一兩木香三分縮砂去殼一兩杜仲去粗皮用薑汁與酒合和塗炙令香熟焦三分藿香葉去土三分隨風子如無陳小緊訶子實者亦得三分谷蘖微炒半兩丁香半兩半夏一分用湯先洗七遍生薑一分切作片子與半夏同搗爛做餅子炙黃白朮去蘆炒二兩青皮去白二兩大腹子微炒三分檳榔炒半兩陳皮去白三分桑白皮炒半兩白豆蔻微炒去皮半兩人參去蘆一兩五味子微炒半兩白茯苓去皮一兩神麯微炒一分甘草微炒一兩半上銼散每服三錢水一盞入生薑三片肥棗二枚同煎至七分溫服不拘時候及療四時傷寒能調理陰陽使無變動剋日得安如療五噎入乾柿一枚同煎十服見效如膈氣吐逆羸困入薤白三寸棗五枚同煎婦人亦可服四君子湯治脾胃不調不思飲食人參去蘆甘草炙白茯苓去皮白朮去蘆各等分上銼散每服三錢水一盞煎至七分不拘時服一方加橘紅名異功散又方加陳皮半夏名六君子湯嘔吐加藿香縮砂泄瀉加木香肉豆蔻附子建中湯治脾氣虛寒腹脅脹滿身體沉重面色萎黃嘔吐不食水穀不化大腑自利肉豆蔻麵裹煨白豆蔻仁附子炮去皮臍厚朴去皮薑汁拌炒白朮去蘆乾薑炮紅豆神麯炒各一兩丁香胡椒木香不見火甘草炙各半兩上銼散每服四錢水一盞半生薑五片紅棗一枚煎至七分去滓溫服參苓白朮散理心脾氣弱神昏體倦飲食不進多困少力中滿痞噎心忪上喘嘔吐瀉利人參白茯苓去皮白朮去蘆山藥甘草各一兩縮砂仁桔梗去蘆薏苡仁蓮肉扁豆薑汁浸去皮七錢半上為末每服二錢棗湯下小兒量歲數與之此藥中和不熱久服養氣育神醒脾悅色順正辟邪千金養脾丸治脾胃虛弱停寒留飲膈氣噎塞反胃吐食心胸痞滿脅肋虛脹胸腹刺痛牽引背膂食少易傷言微氣短口苦舌澀噁心嘔噦喜唾咽酸久病泄利腸胃虛滑病後氣不復常飲食無味形容憔悴酒後痰多人參白朮白茯苓去皮甘草山藥炒木香丁香白扁豆炒縮砂仁薏苡仁益智仁藿香葉紅豆肉豆蔻乾薑炮高良薑三稜炮莪朮炮神麯炒麥蘖炒陳皮枳殼炒茴香炒苦梗炒各一兩上為末煉蜜丸如彈子大每服一丸細嚼白湯下溫酒亦得空心食前常服溫養脾元進美飲食治中湯治脾胃不和嘔逆霍亂中滿虛痞或致泄瀉方見傷寒陰證類平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色萎黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎八痞膈氣反胃並宜服之蒼朮去粗皮米泔浸二日一斤二兩厚朴去粗皮薑汁拌炒陳皮去白各一兩二錢甘草炒三分上為末每服二錢以生薑三片紅棗二枚煎湯調服或鹽湯調空心食前熱服常服調氣暖胃化宿食消痰飲闢風寒冷濕四時非節之氣為散煎亦可加入人參尤妙胃丹硃砂稟太陰之精不經火煅以丁附等脾藥陰煉成丹平補不僭善治真陽衰虛心火怯弱不養脾土沖和失布中州虛寒飲食不進胸膈痞塞或不食而脹滿或已食而不消痰逆噁心翻胃吐食臟氣虛寒米穀不化心腹絞痛泄利不止應是一切脾胃諸疾不問男子婦人皆可服硃砂大塊不夾石者十二兩半羅參去蘆縮砂去殼肉豆蔻麵裹煨蓽澄茄白豆蔻去殼紅豆高良薑銼碎附子炮去皮臍白朮去蘆厚朴去皮薑汁拌炒丁香不見火藿香葉去土五味子去梗乾薑炮去土胡椒益智仁麥門冬去心草果仁橘紅去白以上各一兩上將人參等二十味各如法修制銼如豆大以銀鍋一口用白砂蜜二十兩將藥一半同蜜拌勻入銀鍋內以夾生絹袋盛貯硃砂懸胎入銀鍋內以桑柴火重湯煮三日三夜取沙淘淨焙乾入乳鉢用玉捶研直候十分細米粽為丸如緑豆大陰乾每服十粒加至十五粒空心食用前用人參湯送下棗湯也得如或嘔吐用淡薑湯送下忌食豬羊血補真丸大抵不進飲食以脾胃之藥治之多不效者亦有謂為人之有生不善攝養房勞過度真陽衰弱坎火不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或已食而不消大腑溏泄此皆真火衰虛不能蒸蘊脾土而然古云補腎不如補脾豫謂補脾不若補腎腎氣若壯丹田火經上蒸脾土脾土溫和中焦自治膈開能食矣葫蘆巴炒附子炮去皮臍陽起石煅川烏炮去皮菟絲子淘淨酒蒸沉香不見火別研肉豆蔻麵裹煨肉蓯蓉酒浸焙五味子去枝梗各半兩鹿茸去毛酒蒸焙川巴戟去心鍾乳粉各一兩上為末用羊腰子二對治如食法蔥椒酒煮爛入少酒糊杵和為丸如梧子大每服七十丸空心食前米飲鹽湯任下進食散理脾元虛冷不思飲食久病脾虛全不食者及胃虛有風不食只三服便效甘草炙一兩肉桂去粗皮良薑炒陳皮去白青皮去穰各一分訶子五個煨去核草豆蔻三個去皮川烏一個炮上銼散每服二錢水一中盞生薑二片煎七分空心服熱證瀉黃散治脾胃壅實口內生瘡煩悶多渴頰痛心煩唇口乾燥壅滯不食藿香葉去土七錢石膏煅縮砂去殼山梔子去殼甘草炙各半兩防風去蘆四兩上銼碎同蜜酒炒香焙為細末每服三錢水一大盞煎至七分溫服不拘時候枳殼丸治脾實心腹壅滯四肢疼悶兩脅脹滿大小便不利方見祕結類橘皮竹茹湯治胃熱多渴嘔噦不食赤茯苓去皮陳皮去白枇杷葉拭去毛麥門冬去心青竹茹半夏湯泡七次各一兩人參去蘆甘草炙各半兩上銼散每服四錢水一盞半姜五片煎至八分去滓溫服不拘時候翻胃安脾散治胃氣先逆飲食過傷或憂思蓄怒宿食痼癖積聚冷痰動擾脾胃不能消磨穀食致成斯疾女人得之多由血氣虛損男子得之多因下元冷憊有食罷即吐有朝食暮吐暮食朝吐所吐酸臭可畏或吐黃水凡有斯疾乃有脾敗惟當速療遲則發煩渴大便祕水飲纖悉不得入口不旋踵斃矣高良薑一兩以百年壁上土三合敲碎用水二碗煮乾薄切成片南木香草果麵裹煨去殼胡椒白茯苓白朮丁香懷干陳橘皮湯洗去穰人參去蘆各半兩甘草炙一兩半上為末每服二大錢食前米飲入鹽點服鹽酒亦得薤白粥治翻胃無問久遠冷熱人參一兩細切以水一大升煎取三合雞子三個去黃薤白二莖熟稀粟米粥上以雞子白及薤白粟等三味熟調攪然後暖人參湯相和更調攪頓服之不限早晚服無忌當時便定准前服萬不失一如思食即與粟米粥飲漸漸加粳米和之熟水草果飲法烏梅肉四兩草果乾薑炮各三兩赤茯苓二兩甘草炙半兩上銼散每服用半兩水一碗半煎至一碗去滓瓷器盛如熟水隨意服之桂苓散治翻胃發渴半夏四錢桂心甘草各三錢赤茯苓四兩澤瀉四兩上銼散每服四錢生薑煎服三稜煎丸治宿食積聚翻吐酸穢方見諸氣類正胃散治翻胃嘔逆藥食俱不下結腸三五日至七八日來大便不通如此者必死之疾白水牛喉一條去兩頭節並筋膜脂肉節節取下如阿膠片黑牛不可用須就宰牛人買下修事了臨病時旋炙修合上用喉節以好米醋一大盞浸頻翻令勻微火炙乾再蘸再炙醋盡為度存性不得見太陽火為末每服一錢食用前用陳米飲調下輕者一服見效粉靈砂治脾疼翻胃靈砂一兩蚌粉同炒略變色二兩丁香胡椒各四十九粒上為末生薑自然汁煮半夏糊丸如梧子大每服三十丸翻胃煨生薑湯吞下虛人脾痛炒鹽湯下青金丹治一切吐逆水銀八錢生硫黃一兩上二件入無油銚內用慢火化開以柳木篦子撥炒或有煙焰以醋灑之結成砂子再研為細末用米粽尖杵和為丸如緑豆大每服三十丸用薑橘皮煎湯送下不拘時服大掌中金治翻胃服水藥不得者大綿附一個生薑自然汁一碗煮乾為度母丁香一個為末以少許安掌中舐吃立效丁附散治翻胃大附子一個切去蓋刳中使揀丁香四十九粒以蓋覆之線縛著置銀器中浸以生薑自然汁及蓋而止慢火煮乾為度上為末用一錢匕摻舌上漱津下若煩渴徐徐食糜粥忌油膩生冷大倉丸治脾胃虛弱不進飲食翻胃不食亦宜服之陳倉米一升用黃土炒米熟去土不用白豆蔻二兩沉香一兩縮砂仁二兩上為末用生薑自然汁法丸如梧子大每服一百丸食後用淡薑湯送下小半夏丸治翻胃及不欲飲食半夏湯洗十次胡椒上等分為末薑汁丸如梧子大每服三五十丸薑湯下六丁丸治翻胃如神五靈脂醋炙生辰砂一錢母丁香一兩不見火上為末入黃狗膽糯米粽子尖為丸如雞頭大每用薑湯化下牛香飲治哽噎翻胃吐食神效先以羯牛用繩掛開牛口以淨布抹令口舌淨卻拖牛舌出來候有涎出以碗盛之每服用八分盞為一服研好麝香末一捻打勻卻以銀盞蕩令溫先以絹帛束縛中脘胃口令極緊候氣喘乘熱解開隨氣喘一二口便服藥時先對病人說煮白粥惱煩之並煎丁香汁和粥服藥罷隨與粥吃鹽滾丸治翻胃膈氣丁香木香肉豆蔻縮砂青皮陳皮胡椒蓽茇沉香各半兩上為末以大蒜瓣子不拘多少每瓣作二瓣入去殼巴豆一粒用餅藥調麵裹蒜片慢火煨熟去巴豆及面只將蒜研成膏將前項藥末一半搜和為丸如梧子大每服三十丸於鹽內滾過蘿蔔湯調前藥末二錢吞下神效溫胃散治翻胃真附子一個去皮臍分作四塊生薑一兩研水一碗慢火同煮至水盡取附子切焙上為末每服一錢空腹鹽湯下治翻胃嘔吐大便祕結虛冷者用靈砂或養正丹溫而利之又蘇合香丸用四分感應丸用六分夾研作細丸薑汁泡沸湯下此亦溫利若大便熱結用蜜煮凝捻作指鋌納後部導之或用豶豬膽一枚取汁入法醋少許以筆蘸滴灌於後部或燒皂角於桶內熏殼道或用連根蔥白一握漢椒五十粒搗細作餅焙熱和輕粉掩臍續以蔥椒煎湯熏蕩身下又方治翻胃真蚌粉上每服二錢薑汁米飲調下治吐逆不止真黃丹四兩研細用米醋半升入銚內煎令乾更以火煅通紅令研細為末粟米飯為丸如梧子大醋酵湯吞七丸不以時一時住灸法兩乳下各一寸以瘥為度又灸臍上一寸二十壯又灸內踝下三指稍斜向前三壯中脘一穴在臍上四寸足三里二穴在膝下三寸各灸七壯或九壯其效尤著導引方除腹肚冷風宿疾積胃口冷食欲進退吐逆不下正坐兩手向後捉腕反拓席盡勢使腹弦弦上下七左右換手亦然干食方惟食乾飯餅餌盡去羹飲水漿藥亦用丸自不反動調理旬日奇效有人三世死於胃反至孫收效此方咳嗽風證神朮散治四時瘟疫頭痛項強發熱增寒身體疼痛及傷寒鼻塞聲重咳嗽頭昏並皆治之蒼朮五兩米泔浸一宿切焙香白芷細辛去葉土羌活去蘆川芎甘草炙各一兩上銼散每服三錢水一盞生薑三片蔥白三寸煎七分溫服不拘時候如覺傷風鼻塞為末蔥茶調下三拗湯治感冒風邪鼻塞聲重語音不出或傷風傷冷頭目痛眩四肢拘