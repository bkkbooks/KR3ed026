腹內痛身體怯寒泄瀉青黑兼治傷寒挾寒而利臍下冷名鶩溏證效人參白朮乾薑炒甘草炒各一兩加茯苓厚朴薑製各二兩上銼散每服三錢水一盞煎空心服加味治中湯治腸胃虛弱腹內痛身體怯寒泄瀉乾薑炮白朮炒青皮去白陳皮去白縮砂仁各一兩人參甘草炙各半兩上銼散每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時或兼進感應丸暑證香薷散治傷暑煩喝引飲所下如水方見傷暑類胃苓湯治傷暑煩渴引飲所下如水五苓散方見傷暑類平胃散方見脾胃類上二錢合和紫蘇烏梅煎湯下未效加木香縮砂白朮丁香煎服來復丹亦可方見痼冷類或感寒濕水泄平胃散理中湯蘇梅米湯調下通苓散分利水穀解煩熱止泄瀉豬苓去皮白朮去蘆澤瀉去毛赤茯苓去皮車前子木通茵陳瞿麥上銼散每服四錢水一盞半燈心麥門冬煎服六和湯治暑瀉小便赤澀方見傷暑類水浸丹治感暑口乾煩渴頻瀉方見霍亂類濕證藿香正氣散治腰腳冷痹小便自利肢體重著所下黃黑方見傷寒陰證類胃苓湯治傷濕瀉每服二錢蘇葉三皮食鹽少許調熱服白朮附子湯治腸胃虛受濕腸鳴泄瀉自汗白朮二兩附子炮茯苓去皮各一兩上銼散每服四錢水一盞半生薑七片棗子一枚煎至七分去滓溫服不拘時候曲芎丸治臟腑受風濕泄瀉不止芎藭神麯白朮附子各等分上為末糊丸如梧子大每服五十丸米飲下七情加味藿香正氣散治飲食中憂怒傷脾腹內膨滿泄瀉頻並或作晨泄加丁香縮砂良薑南木香各半錢生薑三片紅棗二枚煎效木香散治臟寒冷極及久冷傷敗口瘡下泄米穀不化飲食無味肌肉瘦瘁心多嗔恚婦人産後虛冷下泄及一切水瀉冷痢木香破故紙各一兩良薑砂仁厚朴薑製各三分赤芍藥陳皮肉桂白朮各半兩胡椒茱萸各一分肉豆蔻四個檳榔一個上為末每服三大錢用不經水豬肝四兩批薄重重摻藥漿水一碗入醋茶腳少許入甑蓋覆煮熟入鹽蔥白三個生薑彈子大同煮欲盡空心作一服冷食之初微溏不妨此是逐下冷氣少時自住經年冷痢滑泄只是一服渴則飲粥湯忌冷油膩如不能食冷則漿水暖食之若只用漿水煮豬肝為丸如梧子大每服五十丸用粥飲下亦效若暴瀉只一服熱證黃連香薷散治熱瀉溏利大便熱煩躁小便赤喜飲冷香薷散每一兩加宣連五錢銼碎合和燈心二十莖車前草二根同煎方見傷暑類五苓散治法湯引同上方見傷暑類黃連阿膠丸每服五十丸米飲下空腹服方見咳嗽類升麻葛根湯小柴胡湯治傷寒身熱目疼煩渴泄瀉二藥和合用生薑陳米烏梅煎服立效方並見傷寒陽證類柏皮湯治協熱泄瀉亦治血痢柏皮三兩黃芩二兩黃連一兩上銼散每服四錢水一大盞煎至七分入阿膠末半錢再煎少頃溫服調胃承氣湯治大實熱下利譫言此有燥屎也夫泄瀉反用大黃者乃因所利而利之此治熱瀉也非大實勿妄輕用之方見傷寒陽證類冷證去麻黃五積散炒過名和氣飲治脾胃宿冷腹內切痛或外感風寒內傷生冷泄瀉黃白色不止或肝經受寒面色青慘厥而泄利生薑三片鹽梅一個紅棗二枚同煎大效方見傷寒陰證類豆附丸治丈夫婦人腸胃虛弱內受風冷水穀不化泄瀉注下腹痛腸鳴手足逆冷服諸藥不效者此藥主之肉豆蔻炮四兩木香二兩不見火白茯苓四兩乾薑炮四兩附子炮去皮臍肉桂去粗皮二兩丁香一兩不見火上為末薑汁糊為丸如梧子大每服五十丸薑湯吞下粥飲亦可空心食前服姜附湯治下泄如水或青或白臍腹痛手足冷脈細欲絶漸漸短氣由陽氣暴絶為陰所迫則注下不止陽復則生不復則死又不止灸氣海百壯傷寒虛證鶩溏亦效方見中寒類大已寒丸治沉寒痼冷臟腑虛憊心腹㽲痛脅肋脹滿泄瀉腸鳴自利自汗久痢休息蓽茇肉桂各四兩乾薑炮高良薑各六兩上為末煮麵糊丸如梧子大每服三十丸空心米飲下加味四柱散治臟腑虛怯本氣衰弱脾胃不快不進飲食時加泄利晝夜不息人參去蘆白茯苓去皮附子炮去皮臍各一兩木香濕紙包煨過訶子濕紙包炮取皮用各半兩上銼散每服二錢姜二片棗一枚煎至六分服加味三建湯治洞泄不止大川烏綿附天雄三味並炮鹽水浸去皮臍木香肉豆蔻煨裂訶子去核各一兩上銼散每服三錢生薑十片紅棗二枚鹽梅一個陳米一撮同煎空腹熱服未效仍服來復丹來復丹治同上方見痼冷類茱萸斷下丸治臟寒腹痛泄瀉不止艾葉炒赤石脂川薑各半兩吳茱萸炒二兩半縮砂仁肉豆蔻附子炮去皮臍各一分上為末麵糊丸如梧子大每服五十丸食前米飲下豬臟丸治臟寒泄瀉不進飲食氣體倦怠吳茱萸淨去枝梗不以多少用水浸透上用豶豬臟頭一截去脂膜淨洗將茱萸入臟內兩頭扎定慢火煮令極爛用甑蒸熟尤好將二味於臼內杵千下令極細丸如梧子大每服五十丸米飲下豬肚丸治臟寒泄瀉先用製成厚朴附子二味生薑棗子煎服空心仍服此豬肚丸川烏炮附子炮各二兩乾薑炮白朮厚朴各一兩半良薑炒肉豆蔻煨蓽茇禹餘糧火煅醋淬縮砂仁丁香桂心各一兩上為末用豶豬肚一雙淨洗以川椒一兩去目茴香一兩大面二兩入豬肚內用線縫定酒醋煮爛取出川椒茴香大麴焙乾為末均和前藥以豬肚杵和得所為丸如梧子大每服五十丸空心米飲送下椒艾丸治臟腑虛寒泄痢不止烏梅去核二兩半醋浸布裹蒸揉成無滓艾一兩半川椒炒去目乾薑赤石脂黑附炮製各一兩上除烏梅外同為末將蒸過烏梅肉研勻更入熟棗肉蜜少許和丸如梧子大每服二十丸米飲下茱萸湯治脾泄多老人腎虛謂之水土同化吳茱萸取淨不以多少上用白水煮去滓入鹽少許通口服蓋茱萸能暖膀胱水道既清大腸自固余藥雖熱不能分解清濁也大理中丸治大便虛滑不禁每一丸用平胃散一貼煎化服便止加鹽梅同煎尤妙人參白朮乾薑甘草各等分上為末煉蜜丸如指頭大六君子湯治臟腑虛怯心腹脹滿嘔噦不食腸鳴泄瀉人參甘草白茯苓白朮肉豆蔻濕紙裹煨熟銼碎以厚紙盛壓去油訶子煨去核各等分上銼散每服三錢生薑三片紅棗二枚煎服或為末熱鹽湯調服亦可養正丹治久冷泄瀉及休息痢疾每服三十丸空心米飲吞下多服收功方見痼冷類冷熱不調參連丸治腸胃虛弱冷熱不調泄痢腸鳴日夜無度艾葉用糯米糊拌勻焙取細末稱二兩半乾薑炮取末二兩用艾末米醋升半慢火熬成膏宣連一兩半銼如麻豆大用吳茱萸兩半同黃連炒色紫揀去茱萸不用訶子煨去核一兩木香一兩半別用黃連一兩半為粗末將木香薄切水一升慢火煮盡水去黃連不用焙乾人參去蘆白朮烏梅去核焙乾稱百草霜別研白茯苓去皮酸石榴皮炒當歸洗焙地榆以上各一兩半赤石脂一兩三分龍骨一兩三分火煨阿膠二兩蚌粉炒罌粟殼二兩蜜炙上為末將前項艾膏和為丸如梧子大每服五十丸陳米飲下戊己丸治脾胃不足濕熱泄瀉不止米穀不化腸鳴腹痛黃連白芍藥吳茱萸泡七次焙乾上等分為末用糊丸如梧子大每服三四十丸空心食前濃米飲下腎泄安腎丸治腎泄腹痛無定處似痢非痢骨痛面黧腰腳時冷用七氣湯送下安腎丸方見虛損類七氣湯見心痛類震靈丹治同前每服三十丸炒破故紙棗子煎湯調鍾乳粉少許空心送下小兒腎泄白膿褐汁面黯齒脫偎人怯寒震靈丹末入些鍾乳粉以棗煎炒破故紙取熱汁調下效方見痼冷類金鎖正元丹治腎虛泄瀉小便頻數盜汗遺精一切虛冷之證並皆治之方見痼冷類脾瀉炙肝散治久患不愈白朮白芷白芍藥桔梗上等分為末炙鹽肝蘸服和氣散即除麻黃五積散治久虛脾泄大效方見傷寒陰證類朴附丸治脾元虛弱久患脾泄冷瀉不止及反胃噁心臟腑滑泄厚朴去粗皮薑汁製一兩綿附子炮去皮臍一兩神麯炒五錢乾薑炮三兩上為末酒煮麵糊丸如梧子大每服三十丸空心食前米飲或鹽湯下脾胃泄木香散治脾胃俱虛泄瀉肉豆蔻麵裹紙煨破故紙炒白朮白茯苓各半兩木香甘草炙各五錢上銼散每服三錢生薑三片紅棗二枚煎食前溫服二神丸治脾胃虛弱泄瀉不止全不進食肉豆蔻二兩破故紙四兩炒熟上為末用肥棗四十九個生薑四兩切片同煮棗爛去姜取棗剝去皮核用肉研為膏入藥和杵丸如梧子大每服三十丸鹽湯下立效弱甚加茯苓二兩木香一兩積證香蘇散治食傷脾胃噫生熟氣及所泄穢氣殊甚或腹緊塊痛水煎吞盧氏感應丸每服三七粒立效久患豆積泄瀉不止經驗方見傷寒和解及諸積類縮砂香附湯治傷食成積下瀉與平胃散合和每服二錢紫蘇葉食鹽煎湯調常服有效方見諸氣及脾胃類酒泄虛者香茸丸治飲酒多遂成酒泄骨立不能食但再飲一二盞泄作幾年矣嫩鹿茸草火燎去毛酥炙黃肉豆蔻火煨生麝香另研上為末白陳米飯為丸如梧子大每服五十丸空腹米飲下熱者酒蒸黃連丸方見下痢類平胃散專治酒泄飲後獨甚加丁香縮砂麥芽神麯各五錢為末空腹米飲調二錢立愈晨泄又名瀼泄香姜散生薑四兩切如豆大黃連二兩銼上一處淹一宿慢火炒姜紫色去姜不用將黃連末每服二錢用臘茶清調一劑而愈又用米飲酒調治白痢尤妙若欲速效一料只作二服五味子散治五更天明溏泄一次名腎虛泄感陰氣而然五味子揀去梗二兩吳茱萸半兩上同炒香熟研為末每服二錢用陳米調下食前空心服或加破故紙炒香肉豆蔻煨裂為末蒜膏為丸如梧子大每服三十丸米飲下大效滑泄大斷下丸治下痢滑數肌肉消瘦飲食不入脈細皮寒氣少不能言有時發虛熱由脾胃虛耗耗則氣奪由穀氣不入胃胃無主以養故形氣消索五臟之液不收謂之五虛此為難治略能食者生附子炮肉豆蔻牡蠣煅稱各一兩細辛乾薑炮良薑白龍骨赤石脂酸石榴皮醋炙乾為度焙乾各一兩半白礬枯訶子去核各一兩上為末糊丸如梧子大每服三十丸粟米湯下豆蔻飲治滑泄神效陳米一兩肉豆蔻麵裹煨五味子赤石脂研各半兩上為末每服二錢粟米湯飲調下日進三服乳豆丸治滑泄不止諸藥無效肉豆蔻生為末上以通明乳香用酒浸透研成膏和前藥末為丸如梧子大每服五十丸空腹飯飲下蓽茇丸治滑泄妙甚蓽茇川薑炮丁香不見火附子炮去皮臍吳茱萸炒良薑胡椒以上各一兩山茱萸草豆蔻去皮各半兩上為末棗肉丸梧子大每服五十丸食前陳米飲下日三服固腸丸治臟腑滑泄晝夜無度吳茱萸揀淨黃連去須罌粟殼去穰蒂三味各等分上為末醋糊丸如梧子大每服三十丸空腹米飲下暴瀉硫黃散治所下如破水生硫黃白滑石上為末溫水調下立止車前散治暴瀉不止小便不通車前子上為末每服二錢米飲調根葉亦可立效針頭丸治夏月水瀉不止大巴豆一粒去殼上以針刺定燈上燒存性不可過研細用蠟如小豆大蘸些油燈上炙令熔圓巴豆灰作一丸倒流水吞服食前一服效神麯丸治暴瀉不止神麯二兩炒茱萸半兩湯泡七次上為末用醋糊丸如梧子大每服四十丸食前米飲下肚蒜丸治水泄豶豬肚一枚淨洗去脂膜入大蒜在內以肚子滿為度自晨至晚以肚蒜糜爛為度杵成膏子入平胃散同杵為丸梧子大每服三十丸鹽湯或米飲空腹服粟殼丸治暴瀉肉豆蔻炮粟殼去赤腸蒂萼淨炙上為末醋糊丸如梧子大空腹米湯下三十丸單方鍾乳粉一味棗肉為丸治久瀉極甚棗湯下小兒亦可服灸法泄利不止灸臍中名神闕穴五壯或七壯艾柱如小箸頭大及關元穴三十壯其穴在臍下三寸通治真人養臟湯治大人小兒腸胃虛弱冷熱不調臟腑受寒下痢泄瀉或便膿血有如魚腦裡急後重臍腹㽲痛日夜無度胸膈痞悶脅肋脹滿全不思食及治脫肛墜下酒毒便血諸藥不效者並皆治之罌粟殼去蒂蓋三兩六錢人參去蘆當歸去尾各六錢肉桂去粗皮八錢訶子去核一兩木香一兩四錢不見火肉豆蔻麵裹煨半兩白朮六錢白芍藥一兩六錢甘草八錢上銼散每服二大錢水一盞半煎至八分去滓食前溫服老人孕婦小兒暴瀉急宜服之立愈忌酒面生冷魚腥油膩如臟腑滑泄夜起久不瘥者可加炮附子三片煎服此的有神效或有積用縮砂煎湯下感應丸二七粒俟其積消然後服此香連丸治丈夫婦人腸胃虛弱冷熱不調泄瀉煩渴米穀不化腹脹腸鳴胸膈痞悶脅肋脹滿或下痢膿血裡急後重夜起頻並不思飲食或小便不利肢體怠惰漸即瘦弱並宜服之黃連去蘆須二十兩且吳茱萸一十兩同炒令赤去茱萸不用木香四兩八錢不見火上為末醋糊丸如梧子大每服二十丸飯飲吞下空腹食前日進三服人參散治瀉後煩渴方見嘔吐類
