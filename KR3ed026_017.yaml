body:
  text: 卷第十七口齒兼咽喉科總論口為身之門舌為心之官主嘗五味以布五臟焉心之別脈繫於舌根脾之絡脈繫於舌旁肝脈絡於舌本三經為四氣所中則舌卷不能言七情所郁則舌腫不能語至如心熱則舌破生瘡肝壅則出血如湧脾閉則白苔如雪此舌之為病也口則又稍不然蓋熱則口苦寒則口咸虛則口淡脾冷則口甜宿食則酸煩躁則澀乃口之津液通乎五臟臟氣偏勝則味應乎口或勞鬱則口臭凝滯則生瘡生瘡者夜不可失睡晝不可就寢違此必甚唇乃全屬於脾唇有病則多宜隨證以治脾也齒乃骨之餘腎主營養呼吸之門戶也故腎衰則齒豁精盛則齒堅又手陽明大腸脈入於牙齒灌於大腸壅則齒亦浮腫虛則宣露挾風則上攻面目疳𧈟則齲丘禹切蛀蟲也為脫為痔皆當隨證治之喉者候也咽者咽也咽接三脘以通胃故以之咽物喉通五臟以系肺故以之候氣氣喉谷喉皎然明白人諸臟熱則腫寒則縮皆使喉閉風燥亦然五臟久咳則聲嘶聲嘶者喉破也非咽門病若咽腫則不能吞干則不能咽多因飲啖辛熱或復嘔吐咯傷咽系乾枯之所致也自與喉病不同又有懸壅暴腫閉塞喉嚨亦如喉閉狀但懸壅在上齶及關下俗謂之鶯翁又謂之蛾聚俗語聲訛須以後一十八種證辨之口病洗心散四順清涼飲治心脾有熱口瘡甘露飲治血熱口瘡以上方並見大方科積熱類雞蘇丸治胸中鬱熱口臭煩渴方見大方科失血類黃連阿膠丸治口破生瘡米飲下方見大方科咳嗽類祕傳降氣湯治虛熱上壅口瘡生薑蘇葉煎食前蠶黑錫丹每服二十粒方見大方科諸氣及痼冷類龍石散治上膈壅毒口舌生瘡咽嗌腫痛少許摻患處咽津寒水石煅三兩辰砂二錢半別研生腦子半字上為末日夜數次用小兒瘡疹攻口先以五福化毒丹掃卻用此摻立效方見小方科疹瘡類緑雲膏治口瘡臭氣瘀爛久而不瘥黃柏半兩螺青二錢上為末臨臥置一字在舌下不妨咽津遲明瘥一法以銅緑易螺青升麻散治上膈壅毒口舌生瘡咽喉腫痛升麻赤芍藥人參洗桔梗去蘆乾葛各一兩甘草生用半兩上銼散每服四錢水一盞半生薑五片煎溫服不拘時候一方加薄荷黃芩碧雪治一切壅熱咽喉閉腫不能咽物口舌生瘡舌根強言語不正腮項腫痛蒲黃青黛硼砂焰硝甘草各等分上為末每用手指捻摻於喉中津咽或呷少冷水送下頻頻用之換金散治毒熱口瘡或下虛邪熱上用乾薑黃連為末摻瘡上初若不堪應手而愈赴筵散治口瘡黃柏蜜塗炙紫色滑石研各半兩五倍子小嫩者一兩上為末和勻每服半錢許乾摻瘡上良久可飯食奇效敷方治滿口瘡爛方見小方科口瘡類杏粉膏治口瘡以涼藥敷之不愈者杏仁十粒去皮尖輕粉一字上研杏仁調勻臨臥敷瘡上少頃吐之勿咽青黛散治口瘡臭氣瘀爛久不瘥者上用黃柏半兩青黛一錢為末臨臥安舌下芎芷膏治口氣熱臭香白芷川芎各等分上為末煉蜜丸如雞頭大食後臨臥噙化一丸益智散治心氣不足口臭上用益智去殼加甘草為末時復乾咽下或沸湯點立效鵬砂丸治口臭口乾口舌瘡寒水石燒紅十兩硼砂二兩腦子麝香各二錢馬牙硝枯四分甘草浸汁熬膏二兩上為末甘草膏搜為丸麻子大用噙咽又方香附子炒去毛為末早晚以少許揩牙上遠志散治口瘡立效五倍子遠志去心各半兩上為末摻少許於舌上吐出而瘡已效又方朴硝寒水石各一錢為末硃砂少許和勻敷瘡上又方生薑自然汁漱口數次涎出而效獨勝散治口瘡縮砂殼火煅存性為末摻口內瘡上即安立效散治口吻邊生瘡浸淫不愈檳榔火煅為末入輕粉用飯甑上滴淚調敷瘡上立效茱萸散治口瘡及咽痛地龍去土炙吳茱萸去浮者各等分上為末米醋入生曲調塗足心神效貼足方上以茱萸為末水調敷足心效最宜治小兒口瘡不肯服藥者一貼而愈濯足法治下虛上壅口舌生瘡上以白礬為末用湯化以濯足唇病菊花丸治脾肺氣虛憂思過度營衛不和唇裂瀋緊或口吻生瘡容色枯悴男子失精女子血衰悉宜服之甘菊花肉蓯蓉酒浸洗切枸杞子巴戟去心各等分上為末煉蜜丸梧桐子大每服三五十丸米湯下瀉黃飲子治風熱蘊於脾經唇燥瀋裂無色白芷升麻枳殼去瓤麩炒黃芩防風去蘆半夏湯泡七次石斛去根各半兩甘草二分半上銼散每服四錢水一盞半生薑五片煎不以時服薏苡仁湯治風腫在脾唇口瞤動或生結核或為浮腫薏苡仁防己赤小豆炒甘草炙各三分上銼散煎同上橄欖散治唇緊燥裂生瘡上以橄欖不拘多少燒灰為末以豬脂和塗患處白灰散治口緊唇小不能開合飲食不得不急治則死此亦奇病以此方治之得效名曰緊唇又名瀋唇用白布作燈炷如指大安斧刃上燃炷令刃上汗出拭取敷唇上日一二度故青布亦佳或青布灰以酒服亦可和豬脂塗敷又以蛇皮揩拭為灰敷之又以蠐螬燒灰末豬脂調又燒亂髮蜂房六畜毛燒灰用脂調敷莧實條亦名馬齒莧煮汁洗緊唇灸法治緊唇不能開合灸虎口男左女右又灸承漿三壯穴在頤前唇下足陽明之會舌病升麻柴胡湯治心脾虛熱上攻舌生瘡舌本強頰兩邊腫痛柴胡升麻芍藥梔子仁木通各一兩黃芩大青杏仁去皮尖各三分石膏煅二兩上銼散每服四錢薑五片煎食後服寒重者八正散方見大方科積熱類金沸草散治風寒傷於心脾令人憎寒發熱齒浮舌腫方見大方科傷寒陽證類正舌散治中風舌本強難轉語言不正神妙蠍梢去毒一分茯神木銼屼炒一兩龍腦薄荷焙乾二兩上為末每服一二錢溫酒調食後服五福化毒丹治唇舌腫破生瘡煩渴方見小方科疹瘡類礬石散治風濕寒舌強不能語枯礬桂心各二分上為末每用一錢安舌下或用正舌散治之治木舌腫滿口中氣不得吐上用臘茶陳白梅巴豆七粒去殼同搗如膏薄荷水調稀羽刷口中得下咽片時泄瀉三二行以粥補之舌已平矣又方以薄荷水洗之又方上以釜底黑煤研勻內外塗舌良久平又方真蒲黃海螵蛸為末內外皆塗之又方治大人小兒重舌腫起舌下上用朴硝研水敷咽喉外其內用成塊者含涎出乃平一方地鱉蟲和薄荷研汁帛包蘸舌下腫起重舌極證用指去爪先於舌下筋上擦至根漸深深擦入如此三次又用指蘸水取項後燕窠小坑中筋自上趕下至小窟深深捺入亦三次小兒若飲乳勝前則病去矣黑散子治血熱舌忽然腫破上以釜底煤醋調敷舌上下脫去更敷能先決出血竟敷之尤佳一法用鹽等分調薄荷蜜治舌上生白苔乾澀語話不真白蜜薄荷自然汁各等分上以生薑片先蘸水揩洗竟用硃砂雄黃硼砂腦麝為末敷之良未效更加玄明粉文蛤散治熱壅舌上出血如泉五倍子洗白膠香牡蠣粉各等分上為末每用少許擦患處或燒鐵箅熱烙孔上必勝散治舌衄真蒲黃略炒螺兒青各等分上為末每用少許擦患處少待溫鹽水漱之酣飲喉舌生瘡方治連月飲酒咽喉爛舌生瘡上以水中螺螄肉用蔥豉薑椒煮汁飲三盞瘥治重舌新蒲黃為細末數敷之吐去又敷凡五七次愈亦治舌腫滿口不能聲敷之立安又方五靈脂米醋一碗同煎逐旋漱口立安舌無故出血名舌衄炒槐花為末摻之而愈治舌腫脹好硼砂為末用薄批生薑煎藥揩腫處漸退治舌強腫起如豬胞以針刺舌下兩邊大脈血出即消切勻刺著中央脈令人血不止則以火燒銅箸烙之不止則殺人或以釜下墨醋調敷舌上下脫去再敷須臾而消此患人多不識失治則死烙腫法凡舌腫舌下必有噤蟲狀如螻蛄臥蠶有頭有尾頭小白可燒鐵烙烙頭上即消治失音槐花新瓦上炒香熟三更後床上仰臥隨意而食亦治咯血齒病安腎丸八味丸治虛壅牙齒疼痛浮腫方並見大方科虛損類嘉禾散治齒疼朽齒者既去而齒之左右上下非痛非腫不能嚼食食後生薑煎一服次以地骨皮煎湯漱之空心以羊腰一對切片不令斷以蔥絲椒子青鹽蒺藜末固之再用嘉禾散二錢和勻擦腰子內荷葉包煨熟食之而愈方見大方科脾胃類玉池散治風蚛牙痛腫癢動搖牙齦潰爛宣露出血口氣等疾悉能治之地骨皮香白芷川升麻防風細辛川芎槐花當歸藁本甘草各等分上末每用一字許揩牙或痛甚即取二錢用水一盞半黑豆半合薑三片煎溫漱候冷吐之效服亦無妨或用金沸草散熏漱亦佳蟾酥丸治牙痛不可忍者蟾酥一字生附子角黃豆大為末巴豆一枚去殼研麝香少許上為末研勻蒸餅為丸如黍豆大以新綿裹一丸噙之有涎即吐去蠍附散治同上蠍梢一枚不去毒附子臍蜈蚣頭去嘴毒川烏頭尖各二個上為末先用竹枚刺痛牙齦次以紙捻紝藥一粟米許在痛處甚者不過兩三次效細辛散治風蚛牙疼牙齦宣爛牙齒動搖腮頷腫痛草烏白芷各二兩細辛荊芥各一兩紅椒牙皂鶴蝨蓽茇縮砂仁各半兩上為末每用少許擦痛處有涎吐出不得咽少時以溫水漱口頻頻擦用立效二陳湯加細辛枳殼用生薑棗子烏梅煎治毒痰齒痛仍以片子薑黃蓽茇等分井水煎候溫以舌浸其中涎自流出方見大方科痎瘧類靈脂醋治惡血齒痛上用川五靈脂米醋煎汁含咽甘露飲治毒血齒痛加入升麻煎方見大方科積熱類荊槐散治牙宣出血或痛上用槐花荊芥穗等分為末擦牙仍前點服鬱金散治齒出血鬱金白芷細辛各等分上為末擦牙仍以竹葉竹皮濃煎入鹽少許含咽或炒鹽敷治牙宣鮮紅者甘露飲瘀紅者雙和湯仍以鹽泥炒為末揩牙上方見大方科積熱及虛損類搐鼻方治牙疼雄黃沒藥各一錢乳香半錢上為末若左邊疼用少藥搐入左鼻又吹入左耳如右疼搐右鼻吹入右耳塞耳方蒲黃末乳香末白芷末各半錢雄黃末一錢上和勻以紙蘸藥一字緊塞耳內隨左右仍用荊芥咬在痛牙上揩牙方鶴蝨細辛白芷甘松各等分上為末每用少許揩牙上如有蛀孔用藥入按孔中效治牙齒痛上以蕪荑仁安蛀齒上有縫就窒之立效治風蚛牙痛馬夜眼上以刀兒薄起一片子報在所患牙縫中或咬在痛處瀝出風涎即止不可咽乳香膏治蚛牙痛光明白礬枯過滴乳香各等分上為末熔蠟量多少和成膏旋丸看蚛牙孔子大小填之其痛立止神效又方入胭脂少許合令深桃紅色只作散遇牙疼痛用一字以揩擦良久溫鹽湯漱口治牙痛白殭蠶直者不以多少用生薑片切同炒候赤黃色為度去薑不用為末每用取不蚛皂角剝去黑皮以手指蘸湯於皂角黃上擦取汁調殭蠶末揩痛處即止逡巡散治風牙疼痛不拘新久一服立效高良薑一塊約二寸全蠍一枚瓦上焙乾上為末以手指點藥如齒藥用須擦令熱徹須臾吐出少涎以鹽湯漱口大妙亦治腮頰腫痛牢牙散治一切齒痛不問久新風疼痛立效全蠍七枚去毒細辛洗淨三錢草烏二個去皮乳香二錢別研上為末每用少許擦患處須臾以溫鹽水灌漱莽草散治風壅熱氣上攻齒齦浮腫或連頰車疼痛或宣露血出莽草川升麻柳枝槐角子鶴蝨地骨皮藁本去蘆槐白皮上銼散每服一兩水一碗入鹽少許煎熱含冷吐之防風散治牙疼防風鶴蝨各等分上銼散濃煎噙漱立效老鶴蝨草研爛塞痛處亦可消風散治齒熱痛齦腫有汁先敷以消風散又以朴硝敷其上又法用川升麻煎湯漱咽解毒方見風科熱證類香椒散治冷證齒痛香附子紅川椒故紙炒各二錢蓽茇一錢上為末和炒鹽二錢擦敷川芎散治面腫牙疼不可忍川芎白芷細辛各等分上為末擦兩三次鹽湯漱立止祕方揩牙散治牙疼遇吃冷熱獨甚良薑細辛大椒草烏尖上為末以指蘸少許揩牙上噙少時開口流出涎妙牙痛有四證熱者怕冷水用牙硝薑黃雄黃荊芥冷者怕熱湯用乾薑蓽茇細辛不怕冷熱乃風牙用豬牙皂角殭蠶蜂房草烏有竅者蛀牙用雄黃石灰沙糖用藥了並用溫水灌漱之為佳取蟲方治牙有蟲而痛韭菜頭連根洗淨爛擂同人家檞枝上泥和勻搽痛處腮上用紙貼之一時頃取下細細蟲在泥上可以絶根揩漱方治無故牙動牙宣出血香附子去皮毛銼碎用薑汁浸一宿曝乾為末漱口揩齒齒堅無動無血矣已驗方治牙疼露蜂房栝蔞皮上等分燒灰去火毒擦牙或以烏桕根韭菜根荊柴根蔥根四味煎湯溫蕩甘松香散治一切牙疼甘松香莽草川烏去皮炮各二錢北細辛去葉二分硫黃半錢香附子炒去毛二錢上為末以手指蘸少許揩牙上立效後用鹽湯灌漱妙祕方治經歲牙疼楓香脂為末入每焚香爐內灰再篩過常日洗面時用揩牙上永無斯疾更臨睡以溫水淨漱為佳小薊散治牙齒宣露出血百草霜小薊香附子炒去毛真蒲黃各五錢上為末揩牙齒上立愈芫花散治牙疼陳芫花一握甘草節五錢細銼各煎先用芫花湯噙唾去次用甘草水噙少時效治蛀牙疼莽草為末擦三五次蟲即無治風蛀牙痛霜殺老絲瓜燒存性為末擦痛處立止治血風蛀牙雄黃乳香各一錢研如粉麻黃半錢白芷一字上為末研勻痛時先以荊芥穗咬在痛處口涼去之次用皮紙捻津濕之點藥少許隨痛邊塞耳內又方露蜂房炒川椒一錢為末每二錢煎入少鹽乘熱漱之又方風蛀痛牙用針刺杏仁清油燈上煙燻乘熱認定病牙以杏仁搭之又復熏搭七次絶不痛但其病牙遂時落去斷根治蟲蛀牙痛紅川椒三錢明乳香一錢上同研細熔蠟丸如麻子大每用一丸塞孔中敷藥退腫天花粉白芷赤小豆鬱金荊芥薄荷各等分上件曬乾為末蜜水調塗痛處常用齒藥牢牙去風冷蚛蝺宣露不問老少用之甚效槐枝柳枝各長四寸一握切碎皂角不蛀者七莖鹽四兩降真香白膠香各兩半上同入瓷瓶內黃泥固濟粳火燒一夜候冷取出研細用如常法牙齒日長方牙齒逐日長漸漸脹開口難為飲食蓋髓溢所致只服白朮愈及煮水灌漱齒間肉壅方多因食鹹熱物而得生地黃汁一碗豬牙皂角數鋌火上炙熱蘸冷汁盡為度或為末敷壅肉上隨即消縮或朴硝末敷上即消灸法以線量手中指至掌後橫紋折為四分去三分將一分於橫紋後臂中灸三壯隨左右又以兩手交叉以中指頭盡處是穴灸七壯永不疼手背上又灸肩髃七壯隨左右又法灸耳垂下牙盡骨上三壯未效加壯數又法治口齒蝕生瘡者承漿一穴在頤前唇下宛宛中可灸又方治唇吻強齒齦痛兌端一穴在唇上端針入二分可灸三壯導引方治牙齒痛東向坐不息四通上下琢齒三十六下輔車開不可合飲令大醉睡中搐鼻嚏則自正又南星末生薑汁調敷帛縛合一宿愈去風也又法一人以手指牽其頤以漸推之則復入矣當疾出其指恐齧傷灸法治失音頰車蹉灸背第五椎一日二七壯又灸足內踝上三寸宛宛中或二寸五分名三陰交穴喉病祕傳咽喉科一十八種喉風證一單蛾風其形圓如小箸頭大生於咽喉關上或左或右若關下難治二雙蛾風有兩枚在喉關兩邊亦圓如小箸頭大關下難治三蟬舌風自舌下再生重舌者是四牙耆風牙齦上聚成癤毒者五木舌風其舌漸漸長大相似煮熟豬舌不能轉動者六舌黃風自舌上腫痛黃色者是七咬牙噤口風近牙窮頭作臖口噤不開者八魚口風如魚吸水者不治九聚毒塞喉風喉關聚毒涎唾稠實發寒熱仍分上下三關破毒下關難治十玄耆蟲毒風上眶食而不能咽水外做形如雞卵者十一搶食風一名飛絲毒口中或食腥惡發泡者十二獵頰風腮臉結腫者是從牙窮頭碎引毒若成須要半月調理十三纏喉風風自耳邊過頤下赤色者是也亦有寒熱如甚者傷人命十四松子風口內滿喉赤如豬肝逆張吞則關閉塞飲食不能者是用藥後口內散點松子樣腫則喉關鄉如雷則不治十五崩砂甘口風自舌上牙齦上下腫赤口內作臖如湯熱牙齦漸爛甚者亦能脫齒十六連珠風自舌上作毒或初成一個碎而又作一個以致三五七九個者是十七蜂子毒或在腮臉癢爛或在喉關舌下作臖如黃荊蜂者是十八走疰瘰癧風頸項結核五七個皮膚赤腫作寒熱者針灸法第一穴風府穴腦後入髮際一寸治咽喉諸證及毒氣歸心等項惡證並皆治之無有不效針入四分穴高主暈恐傷人不可不知須令人扶護乃針第二穴少商穴在手大指表近虎口一邊指甲與根齊離爪如韭葉許針入二分病甚則入五分咽喉諸證皆治第三穴合谷穴穴法口授治牙關不開則陽靈穴應針各刺一刺出血入二分關竅即開又有一證潮熱者有作寒者於合谷穴用針左轉發寒右轉發熱第四穴是上星穴在頂前入髮際一寸治頰腫及纏喉風等證又氣急者實熱針足三里虛熱灸足三里以手約膝取中指梢盡處是穴根腳咽喉常發者耳垂珠下半寸近腮骨灸七壯二七尤妙及灸足三里穴在膝下三寸骼骨外赤眼挑耳後紅筋針鑽竹穴即安穴在兩眉頭陷中實熱一用敗毒散加黃芩半夏連翹倍用桔梗用生薑薄荷煎痰盛者加石膏同煎即效凡服此藥早晨服則午時攻作午後則子時攻作天明退用針則無此攻作若服此藥後自利即換作虛熱醫後藥不可用服敗毒散後失聲即服加減祕傳降氣湯方見大方傷寒陽證及諸氣類二用生料消風散加玄參全蠍薄荷白水煎服三用前二藥不退用生料洗心散更加一二味去風藥為妙方見風科熱證及大方科積熱類四用前三藥不退用防風通聖散立效方見風科熱證類虛熱一用雙解散乃升麻葛根湯消風散加玄參黃芩薄荷煎二用祕傳降氣湯加生薑黃芩以上方見大方科傷寒陽證及風科熱證諸氣類三如痰盛用桑白皮湯磨沉香吞癢正丹仍用枳梗半夏湯冷朮附湯等藥調理方見大方科痼冷及痎瘧中濕類又一證上祕下瀉用祕傳降氣湯吞碧雪衣附子理中丸如無用桑白皮湯亦可方見諸氣類及見前並痼冷類虛實灌漱藥用消毒飲水煎時時灌漱方見小方科瘡毒類咽喉生瘡冷閉聲不出者祕傳降氣湯去陳皮加黃芩煎仍於喉下咽管口灸三壯即愈方見大方科諸氣類勝金散治咽喉腫痛氣急諸項等證於內麝香旋入有孕者不可用麝不問冷熱虛實並皆通用若痰盛者如煎藥內所用不應於中略加膽礬少許立效或吐無妨鬱金三兩大硃砂南雄黃其色勝如硃砂者妙各五錢麝香干胭脂緑豆粉各二錢半白礬半生半枯光粉各五錢上為末研薄荷汁同研少許調服防風散虛者少用實者多用防風去蘆一兩羌活黃藥子白藥子蜜炙殭蠶炒硼砂大黃紙裹煨令香熟荊芥細辛川芎紅內消鬱金山豆根甘草以上各五錢牙硝三錢薄荷葉上為末研薄荷汁同蜜少許調藥玄明粉用朴硝十斤防風一斤煎水泡溶卻用布荷花葉紙澄濾七遍卻於霜下露天露一夜卻取內牙硝再用防風水淋漕淨用瓦鉢熬煎成鹽卻再入鼎內用鹽泥固濟炭火燒一時通紅為度出火去毒研為末每一斤用甘草三兩每服一茶匙溫熟水調如熱煩渴口乾燥作煩者可略加硼砂腦子入口噙化干喉風立效追風散黃丹朴硝豬牙皂角燒灰縮砂殼灰各五錢上為末每服少許以鵝毛蘸入口中舌上下及腫處用水灌漱如喉間毒已破瘡口痛者用豬腦髓蒸熟淡薑醋吃立效如病將可有身體痛於所服藥內加川秦艽同煎效死候毒氣歸心胸前腫滿氣煩促下部洞泄不止重舌木舌川烏尖巴豆為末米醋調刷患處即效木舌須先服勝金散開關竅方見舌病類帝鍾風即喉間帝鍾長腫有長數寸者虛實用前藥外以食鹽煅過鴉毛蘸下即消不須挂破破則傷人煮針法烏豆一兩去尖巴豆一兩硫黃半兩麻黃五錢木鱉子十個烏梅上用藥同入瓷石器內水煎一日洗擇之再用止痛藥沒藥乳香當歸花蕊石各半兩又如前水煮一日取出用皂角水洗再於犬肉內煮一日仍用瓦屑打磨淨端直菘子油塗常近人氣為妙合瘡口白礬黃丹麝香為末以銅箸點瘡口上又方滑石黃丹為末點瘡口效仍用黃丹一兩二錢甘草二錢為散煎服尤妙破毒妙方白礬巴豆去殼紅內消草烏尖豬牙皂角薄荷各二錢上為末好酸醋調鵝毛刷入口內勿吞仍以鹽湯灌漱雄黃散治纏喉風喉閉先兩日胸膈氣緊取氣短促忽然咽喉腫痛手足厥氣閉不通頃刻不治巴豆七粒三生四熟生者去殼生研熟者去殼燈上燒存性干桑黃茹二片雄黃一塊皂角子大透明者細研鬱金一枚蟬肚者研為末上再研勻每服半字茶清少許下如口噤咽塞用小竹管納藥吹入喉中須臾吐利即效又方川升麻四兩銼碎水四碗煎至一碗灌下又方皂角三根捶碎挼水一盞灌下或吐或不吐即安取喉中涎草烏尖殭蠶紫貝根啾唧蟲紅椒白礬山豆根皂角各等分上為末用霜梅拌藥為丸如指頭大含化一丸取下涎然後用鹽湯灌漱吐出不可吞開關潤喉蓬來雪梅花腦子生麝香各一字硼砂三錢朴硝五錢以上另研薄荷葉百藥煎全蠍去毒防風去叉粉草各五錢以上並碾明乳香沒藥各三錢蒻葉或蘆葉盛火尉另研上為末每服少許以小匙挑乾摻咽間及瘡上如在關下摻舌上並旋咽下仍用薄荷桔梗甘草煎水噙漱或用生薄荷研自然汁調成膏入口噙化亦妙開喉關薄荷山豆根各五錢麝香腦子各半錢硃砂三錢甘草青鹽川烏各五錢上為末每用半錢臘月內菘菜汁夏月黃麥挼水或葛水調如涕唾稠黏用芭蕉水調下或蜜丸指頭大含化去涎方並碎法草烏尖鴨嘴青膽礬為末先用釅醋煮皂角調鵝翎刷敷赤腫處開口流去涎即將綿球一指頭大以布線系定蘸前藥末吞咽至腫毒處即抽出凡如此一二次其毒即破開口流出去盡涎血卻以前合瘡口藥點上停久溫鹽水灌漱後進食亦可又開喉關南星半夏川烏草烏甘草各五錢上為末用米醋煎成膏敷毒上宣利方巴豆三七粒去殼雄黃鬱金豬牙皂角大黃各五錢上為末飯丸如緑豆大每服七丸五更三點以冷茶清吞下如未利再下四五丸通後補助紫蘇藿香甘草上銼散每服四錢水煎空心服干喉風朴硝川烏當歸牛膝各五錢麝香腦子各半錢硼砂三錢荊芥薄荷甘草葛粉各五錢全蠍七個去毒上為末用清米泔調春用菘菜汁調夏黃麥汁調如不能吞用豆腐切如棋子塊蘸藥入口含化或新艾汁調下立效搶食風桔梗川烏草烏防風甘草大青根各五錢全蠍七個去毒紫河車五錢上為末每服用酒一盞連根蔥一莖紅椒七粒燈心七莖同煎三四沸食後熱服如不安再用酒一盞入茱萸五粒同煎少時熱服之未效用蕉湯調下如落心肺間刺痛用宣藥利下如久不治則變為飛絲勞毒能傷人命潤關住痛生薄荷研蜜調成膏送入喉咽下立效如涎多未退再用如更不開可通頂又用蔥頭兩個捶碎安牙竅頭處立開妙治誤吞銅錢金石竹木刺雞鵝魚諸骨哽川山豆根山蜈蚣山慈菰威靈仙鐵腳者滑石馬牙硝金星風尾草各一兩急性子二兩苧麻根五錢緑豆粉五錢甘草節三錢酒浸三宿磚五兩廁中制一年上為末白芨五兩與糯米糊一處和劑成鋌子如梧桐子大每用一鋌冷水磨化即下骨哽若金石銅鐵則以生薑汁磨化下
