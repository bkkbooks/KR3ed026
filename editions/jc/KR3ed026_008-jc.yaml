拘攣手足麻痹頭痛昏眩腰背強痛口苦舌乾咽嗌不利胸膈痞塞咳嗽喘滿腸胃燥澀大小便秘難中風暴喑不語風熱瘡疥並酒熱毒小兒熱甚驚風並宜服之方見風科熱證類灸法治胃中熱病灸三里三十壯穴在膝下三寸心恙熱證硃砂丸鎮心神化痰涎退潮熱利咽膈止煩渴鐵粉天竺黃各一兩金銀箔各二十片人參二錢腦子半錢生麝香一錢輕粉二錢真犀角二錢海金沙一兩硃砂五錢上為末水丸硃砂為衣共丸作六百丸每服一丸至五丸痰盛潮熱薄荷沙糖生葛自然汁井水下狂言譫語涎壅膈上地龍三兩薄荷及沙糖水研心神不寧金銀箔薄荷湯化下洗心散治心神煩躁涎壅咽乾口苦多渴方見積熱類瀉心湯治心受積熱譫言發狂逾牆上屋大黃黃芩黃連各五錢上銼散每服四錢水一盞半煎服甘遂散治癲癇及婦女心風血邪上以甘遂一錢為末用豬心取三管血三條和甘遂多少和之將心批作兩片入在內再合線縛定外用皮紙裹濕慢火煨熱不可焦過取藥細研入辰砂末一錢和勻分作四丸每服一丸將所煨豬心煎湯化下再服別用豬心亦可過半日大便下惡物後調和胃氣凡此病乍作乍醒者蘇不食迷癡者死辰砂妙香散治男子婦人心氣不足志意不定驚悸恐怖悲憂慘慼虛煩少睡喜怒不常夜多盜汗飲食無味頭目昏眩麝香一錢別研山藥薑汁炙一兩人參半兩木香煨一兩半茯苓不焙茯神去皮不焙黃耆各一兩桔梗半兩甘草炙半兩遠志去心薑汁炒一兩辰砂三錢別研上為末每服二錢溫酒調不以時候虛證引神歸舍丹治心氣亦治心風大天南星剖去皮取心稱一兩生用附子一枚重七錢以上者炮去皮臍硃砂一兩水飛上為末用豬心血丸梧子大如不稠黏入麵糊少許煎忘憂草根湯下茯神丸治心虛或癲或疼附子大者一枚作罌入塊粒硃砂半兩依舊用元物塞之以茯神和麵作劑通里煨上為末豶豬心血為丸人參湯下驚氣丸治驚憂積氣心受風邪發則牙關緊急涎潮昏塞醒則精神若癡附子炮去皮臍南木香白殭蠶炒花蛇酒浸炙去皮骨橘皮麻黃去節各半兩乾蠍去毒一分紫蘇子炒一兩天南星洗浸薄切片薑汁浸一夕半兩硃砂一分留少許為衣上為末入研腦子麝香少許同研勻煉蜜丸如龍眼大用少硃砂為衣每服一丸金銀薄荷湯化下溫酒亦可鎮心丸治心氣不足老人虛人及用心過度者心脈虛弱而心恙並宜服之上用大附子一個去皮臍切作片子疏絹袋盛用地黃自然汁一大升銀石器中慢火熬候地黃汁將盡取出附子曬乾為末再入餘地黃汁研成劑丸如綠豆大每服三十丸米飲下若病二三十年者只兩個附子可效二三年者一個附子效矣通治鐵粉散治顛狂譫語亂說神祟不避親疏登高履險或歌或笑裸體不飲食數日昏不知人及風證狂怒或如醉如癡顆塊大硃砂一兩另研紅明琥珀一兩另研大南星二兩圓白半夏二兩白礬煅五錢真鐵粉白附子各二兩大川烏生去皮臍一兩半羌活二兩全蠍五十個真金箔三十片殭蠶一兩去絲嘴上為末每服四錢生薑四兩淨洗取自然汁溫暖調服如不任辣味加溫水少許服之立效十四友丸補諸虛不足益血收斂心氣治怔忡不寧精神昏倦睡臥不安柏子仁別研遠志去心酒浸蒸炒酸棗仁炒香紫石英明亮者熟乾地黃洗川當歸洗白茯苓去皮茯神去皮人參去蘆黃耆蜜炙阿膠蚌粉炒肉桂去粗皮各一兩龍齒二兩辰砂半兩另研上為末煉蜜丸如梧子大每服三四十丸棗湯食後臨臥服舊有患心疾怔忡健忘夢寐恍惚多不得睡異狀無不有心藥無不服未能收效蓋此疾本憂愁思慮耗心血而得之今欲安心當用當歸地黃等滋養心血若更服發散藥如菖蒲之類心氣愈散必收斂之始見功效緣用心過而成此疾也服之大覺有神效寧志丸好硃砂一兩將熟絹一小片包裹以線扎定豶豬心一枚竹刀子切破不得犯鐵用紙拭去血入硃砂包子於豬心內卻用麻線縛合豬心又以甜筍殼再裹了麻皮扎定無灰酒二升入砂罐子或銀器內煮酒盡為度去線並筍殼取硃砂別研將豬心竹刀細切砂盆內研令爛卻入後藥末並硃砂棗肉為丸留少硃砂為衣藥末須隔日碾下棗肉於煮豬心日絕早煮熟剝去皮核取肉四兩用患心風服此一料其病頓減人參白茯苓當歸洗去土及蘆石菖蒲乳香別研酸棗仁用五兩湯浸去皮可剝半兩用仁炒令赤香熟為度各半兩重上為末和丸如梧子大以留下硃砂為衣每服五十丸人參湯下抱膽丸治男子婦人一切癲癇風狂或因驚恐怖畏所致者及婦人產後血虛驚氣入心並室女經脈通行驚邪蘊結頓服此累曾經效水銀二兩硃砂一兩研製黑鉛一兩半乳香一兩細研上將黑鉛入銚子內下水銀結成砂子次下硃砂滴乳乘熱用柳木槌研勻丸如雞頭大每服一丸空心井花水吞下病者得睡切莫驚動覺來即安再一丸可除根一醉散治心恙無灰酒二碗真麻油四兩上和勻用楊柳枝二十條逐條攪一二百下換遍柳條直候油酒相入如膏煎至七分碗狂者強灌之令熟睡或吐或不吐覺來即醒又方蕊珠丸大豬心一枚取血大硃砂二兩為末青靛花一匙上先將青靛花同豬心血一處同研次以硃砂末共丸如梧子大每服二十丸茶酒下不拘時甚至不過三服郁礬丸治顛狂可畏數年不愈多因驚憂得之痰涎留於心竅蟬肚鬱金七兩真蜀川來者明礬三兩上為末薄糊為丸如梧子大每服五十丸湯水任服初服覺心胸間有物脫去神氣灑然再服稍蘇多服此藥大能去痰安平必矣朱雀丸治心神不定恍惚不樂火不下降時復振跳常服消陰養火全心氣茯神二兩去皮沉香半兩上為末煉蜜丸如小豆大每服三十丸食後人參湯下陳艾湯治盜汗只自心頭出者名曰心汗茯苓二兩半上為末每服二錢濃煎艾湯調下歸神丹治一切驚憂思慮恍惚作事多忘心氣不足癲癇狂亂及大病後心虛神不守舍久服養神思益眼力顆塊大硃砂二兩入豬心內燈心纏縛用無灰酒蒸二炊久取出另研金箔二十片另研真銀箔一十片另研深紅琥珀一兩別研酸棗仁去殼二兩大遠志取淨皮薑汁拌炒一兩白茯神去木二兩羅參二兩大當歸去尾二兩龍齒一兩上為末酒煮稀糊丸如梧子大每服二九丸到三九丸去心麥門冬湯下癲癇至甚者乳香人參湯下夜寢不寐或多亂夢炒酸棗仁湯下平補鎮心丹治丈夫婦人心氣不足志意不定神情恍惚夜多異夢忪悸煩郁及腎氣傷敗血少氣多四肢倦怠足麻痠疼睡臥不穩夢寐遺精時有白濁漸至羸弱酸棗仁去皮隔紙微炒二錢半車前子去沙土碾破白茯苓去皮五味子去枝梗各一兩二錢半熟地黃洗酒蒸天門冬去心遠志去心甘草水煮山藥洗淨薑汁製各一兩半茯神去皮麥門冬去心肉桂不見火各一兩二錢半人參五錢龍齒一兩半硃砂細研半兩為衣上為末煉蜜丸如梧子大每服三十丸空心飯飲下溫酒亦可加至五十丸常服益精髓養氣血悅顏色獨效苦丁香散治忽患心疾癲狂不止得之驚憂之極痰氣上犯心包當伐其源上以苦丁香即瓜蒂半兩為末每服一錢重井花水調滿一盞投之得大吐之後熟睡勿令人驚起凡吐能令人目翻吐時令閉雙目或不醒人事則令人以手密掩之信乎深痼之疾必投瞑眩之藥吐不止以生麝香少許溫湯調即解灸法狂癇不識人癲病眩亂灸百會九壯狂邪鬼語灸天窗九壯其穴在頸大筋前曲頰下扶突後動應手陷中是狂言恍惚灸天樞百壯其穴去肓俞一寸半直臍傍二寸狂癇哭泣灸手逆注三十壯穴在左右手腕後六寸癲狂風癇吐吞灸胃脘百壯不針狂邪發無常被髮大喚欲殺人不避水火及狂言妄語灸間使三十壯穴在腕後五寸臂上兩骨間狂走喜怒悲泣灸臣覺穴隨年壯穴在背上夾內側反手所不及者骨芒穴上捻之痛者是也鬼魅灸入發一寸百壯狐魅合手大指縛指灸合間三七壯當狐鳴即差卒狂言鬼語以帶急合縛兩手大指便灸左右脅下對屈肋頭兩處各七壯須臾鬼自道姓名乞去徐徐問之乃解其手卒中邪魅恍惚振噤灸鼻下人中及兩手足大指爪甲本令艾丸半在爪上半在肉上各七壯不止十四壯艾炷如雀糞大卒狂鬼語針其足大拇指爪甲下入少許即止怔忡益榮湯治思慮過制耗傷心血心帝無輔怔忡恍惚善悲憂少顏色夜多不寐小便或濁當歸去蘆酒浸黃耆去蘆小草酸棗仁炒去殼柏子仁炒麥門冬去心茯神去木白芍藥紫石英研各一兩木香不見火人參甘草各半兩上銼散每服四錢生薑五片棗一枚煎不以時服龍齒丹治心血虛寒怔忡不已痰多恍惚龍齒附子炮去皮臍切片薑汁浸一宿遠志去心甘草水煮酸棗仁炒去殼別研當歸去蘆酒浸官桂不見火琥珀別研南星銼薑汁浸一宿各一兩木香不見火沉香別研紫石英煅醋淬七次熟地黃酒蒸焙各半兩上為末煉蜜丸如梧子大硃砂為衣每服五十丸不拘時候棗湯吞下茯苓飲子治痰飲蓄於心胃怔忡不已赤茯苓去皮半夏湯泡七次茯神去木麥門冬去心橘皮去白各一兩沉香不見火甘草炙檳榔各半兩上銼散每服三錢姜五片不拘時候溫服排風湯治風虛冷濕閉塞諸經怔忡方見風科通治類加酸棗仁一撮煎加味壽星圖治驚憂思慮氣結成痰留蓄心胞怔忡驚惕痰逆噁心睡臥不安方見風科通治類棗肉靈砂專治虛人夜不得睡夢中驚魘自汗忪悸靈砂二分研人參半分酸棗仁肉一分上為末棗肉丸臨臥時棗湯吞下五七粒薑朮湯治虛證停飲怔忡白姜生白朮茯苓半夏曲各半兩辣桂甘草炙各一分上銼散每服三錢水一盞生薑三片紅棗一枚煎溫服不拘時候五苓散治水氣心下怔忡方見傷暑類驚悸十味溫膽湯治心膽虛怯觸事易驚夢寐不祥異象感惑遂致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗四肢浮腫飲食無味心虛煩悶坐臥不安半夏湯洗七次枳實去穰切麩炒陳皮去白各三兩白茯苓去皮兩半酸棗仁微炒大遠志去心甘草水煮薑汁炒一兩北五味子熟地黃切酒炒條參各一兩粉草五錢上銼散每服四錢水盞半姜五片棗一枚煎不以時服遠志丸治因事有所大驚夢寐不祥登高陟險神魂不安驚悸恐怯遠志去心薑汁淹石菖蒲各二錢茯神去皮木茯苓人參龍齒各一兩上為末煉蜜丸如梧子大辰砂為衣每服七十丸食後臨臥熟水下十四友丸治驚悸不寧驚氣丸治挾風驚懾同上方並見心恙類加味四七湯治心氣鬱滯豁痰散驚半夏制二兩半茯苓厚朴薑汁炒各兩半茯神紫蘇葉各一兩遠志薑汁蘸濕取肉焙乾甘草炙各半兩上銼散每服四錢姜七片石菖蒲半寸棗二枚煎服疰忤還魂湯治精神不全心志多恐遂為邪鬼所擊或復附著奄忽氣絕無復覺知或譫言罵詈如醉如狂人有起心先知其肇其狀萬端不可概舉及卒心腹脹滿吐利不行如干霍亂狀世所謂沖惡是也或已死口噤不開去齒下湯或湯入口不下者分病人發左右捉踏肩引之藥下復增取盡二升須臾立蘇杏仁去皮尖一百五粒甘草桂去粗皮各一兩麻黃去節洗一兩半上銼散每服四大錢水一盞半煎不以時服桃奴丸治心氣虛有熱恍惚不常言語錯亂屍疰客忤魘夢不祥小兒驚癇並宜服之桃奴七枚別研為末辰砂半兩別研桃仁十四枚去皮麩炒別研生玳瑁鎊末一兩麝香一分別研牛黃別研損一分龍腦別研一分雄黃用桃葉煮水研飛取二分黑犀石上以水磨澄去水取細末半兩安息香一兩以無灰酒斟酌多少研飛去沙土銀器中入桃仁琥珀熬成膏真琥珀別研三分上為末和入前膏丸如雞頭大陰乾密封開淨室安置煎人參湯研下一丸食後臨臥服蘇合香丸治卒中惡忤疰方見中氣類灸法治飛屍遁屍寒屍喪屍屍疰其狀腹痛脹急不得氣息上衝心胸旁攻兩脅或累塊踴起或攣引腰背灸乳後三寸男左女右可二七壯不止者多其壯數取愈止又灸兩大拇指頭七壯一切疰新久先仰臥灸兩乳邊斜下三寸第三肋間隨年壯可至三百壯又治諸氣神良一名疰市五毒疰不能食灸心下三寸胃脘穴十壯水疰口中湧水乃肺來乘腎食後味水灸肺俞九壯
