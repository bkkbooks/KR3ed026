body:
  text: 卷第八大方脈雜醫科諸淋冷證生附湯治冷淋小便秘澀數起不通竅中疼痛增寒凜凜多因飲水過度或為寒泣心虛志耗皆有此證附子去皮臍滑石各半兩瞿麥木通半夏各三分上銼散每服二大錢水二盞生薑七片燈心二十莖蜜半匙煎去滓空心服八味丸治同上方見腳氣類熱證八正散治熱淋血淋加燈心車前草煎不拘時候服方見積熱類地膚子湯治下焦有熱及諸淋閉不通地膚子一兩半知母黃芩豬苓去皮瞿麥枳實去穰切炒升麻通草葵子海藻洗去腥各一兩上銼散每服四錢水一盞半煎空心服大便俱閉者加大黃女人房勞小便難大腹滿痛脈沉細者用豬腎半隻水二盞煎一盞半去腎入藥煎七分服石葦散治熱淋多因腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞倦則發或尿如豆汁或便出沙石疼痛兼治大病後餘熱為淋木通石葦去毛各一兩甘草當歸王不留行滑石白朮瞿麥赤芍藥葵子各一兩半上為末每服二錢煎小麥湯調食前日三服清心蓮子飲治上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀或欲成淋並宜服之方見消渴類火府丹治心經熱小便澀及治五淋生乾地黃二兩木通一兩黃芩一兩上為末煉蜜杵丸梧桐子大每服三十粒木通煎湯下膏淋鹿角霜丸治膏淋多因憂思失志意舍不寧濁氣干清小便淋閉或復黃赤白黯如脂膏狀疲極筋力或傷寒濕多有此證鹿角霜白茯苓秋石各等分上為末糊丸梧桐子大每服五十丸米湯下海金砂散治膏淋海金砂滑石末各一兩甘草末一分上研勻每服一匕用麥門冬湯下燈心湯亦可氣淋沉香散治氣淋多因五內鬱結氣不舒行陰滯於陽而致壅滯小腹脹滿便尿不通大便分泄小便方利沉香石葦去毛滑石王不留行當歸各半兩葵子白芍藥各三分甘草橘皮各一分上為末每服二錢煎大麥湯調下血淋發灰散治血淋若單小便出血如尿此為莖衄此主之上以亂髮不以多少燒為灰入麝香少許每服用米醋泡湯調下治淋以葵子末等分用米飲調下最治婦人胞轉不尿柿灰散治血淋上用乾柿燒灰存性為末米飲調服犀角地黃湯治血淋或血瘀乃風冷傷腎宜煎木通湯下菟絲子丸三十丸不可專以血得熱則淖溢為說方見失血虛損類乳石散治血淋及五淋等上揀乳香中夾石者研細以米飲或麥門冬湯調下每服以飢飽適中時服空心亦可小薊飲子治下焦結熱尿血成淋生地黃洗四兩小薊根滑石通草蒲黃炒淡竹葉藕節當歸山梔子仁甘草各半兩上銼散每服四錢水煎空心服導赤飲治心虛蘊熱小便赤澀或成淋痛生乾地黃木通甘草各等分上銼散每服三錢竹葉十皮煎不拘時服白薇散治血淋熱淋白薇芍藥各等分上為末每服二錢酒調下立效或加檳榔通秘散治血淋痛不可忍陳皮香附子赤茯苓各等分上銼散每服三錢水煎空心服沙石淋石燕丸治小便滲痛不可忍出沙石而後方通石燕燒紅水淬二次研細滑石石葦去毛瞿麥穗上等分為末糊丸梧桐子大每服五十丸瞿麥穗燈心湯下日三服又方乳石散治同上方見前瞑眩膏治諸淋疼痛不可忍及沙石淋上以大蘿蔔切作一指厚四五片用好蜜醃少時安錢鏟上慢火炙乾又蘸又炙取盡一二兩蜜翻覆炙令香熟不可焦候冷細嚼以鹽湯送下苦杖散治沙石淋諸淋每溺時器中剝剝有聲痛楚不堪上以杜牛膝淨洗碎之凡一合用水五盞煎耗其四而留其一去滓以麝香乳香少許研調服之單酒濃煎亦效通治透膈散治諸淋滑石一兩細研上勞淋勞倦虛損則發用葵花末煎湯調二錢服血淋熱淋井花水調氣淋木通湯調石淋將藥下入銚子內隔紙炒至紙焦再研細用溫水調小便不通小麥湯下諸淋並冷水調亦可空心地髓湯治五淋方見前苦杖散同豬芩湯治五淋豬苓去皮赤茯苓阿膠炙過澤瀉白滑石各一兩上銼散每服五錢水盞半煎溫服五淋散治腎氣不足膀胱有熱水道不通淋瀝不出或如豆汁或如砂石或冷淋如膏或熱淋便血並皆治之赤茯苓一兩赤芍藥山梔子仁各三兩半當歸甘草各一兩上銼散每服三錢水一盞半煎空心服通草湯治同上通草葵子茅根桃膠瞿麥當歸蒲黃滑石各一兩甘草半兩王不留行一兩上銼散每服三錢生薑五片煎不拘時服單方治淋疾數年不愈者上以四君子湯去甘草每服三錢水一盞煎服淡竹葉湯淡竹葉甘草燈心棗子烏豆車前子上不拘多少以水濃煎湯代熟水服甚妙葵子湯治小便微痛漸難欲出不出痛不可忍赤茯苓一兩葵子石葦去毛澤瀉各半兩白朮二錢半上銼散每服三錢水一盞半煎七分溫服虛損養榮湯治積勞虛損四肢沉滯骨肉痠疼呼吸少氣行動喘乏小便拘急腰背強痛心虛驚悸咽乾唇燥飲食無味陰陽衰弱悲憂慘慼多臥少起久者積年急者百日漸至瘦削五臟氣竭難可振復又治肺與大腸俱虛咳嗽下利喘促少氣嘔吐痰涎黃耆當歸桂心甘草橘皮白朮人參各一兩白芍藥三兩熟地黃五味子茯苓各三分遠志去心姜炒半兩上銼散每服三錢生薑三片紅棗二枚煎空腹服遺精夢泄加龍骨一兩咳嗽加阿膠甚妙參香散治心氣不寧諸虛百損肢體沉重情思不樂夜多異夢盜汗失精恐怖煩悸喜怒無時口乾咽燥渴欲飲水飲食減少肌肉瘦悴漸成勞瘵常服補精血調心氣進飲食安神守中功效不可盡述人參黃耆白茯苓白朮山藥蓮肉去心各一兩烏藥縮砂仁橘紅乾薑炮各半兩甘草炙三分丁香南木香檀香各一分沉香二錢上銼散每服三錢姜三片棗一枚煎食前服一法有炮熟附子半兩或為末一匕蘇鹽湯調亦可黃耆益損湯治男子婦人童羅室女諸虛不足榮衛俱弱五勞七傷骨蒸潮熱腰背俱急百節痠疼夜多盜汗心常驚惕咽燥唇焦嗜臥少力肌膚瘦瘁咳嗽多痰咯唾血絲寒熱往來頰赤神昏全不用食服熱藥則煩躁沖滿上焦進涼藥則膈滿而腹痛宜服此藥極有神效兼治大病後榮衛不調婦人產後血氣未復人參去蘆石斛去根甘草黃耆去蘆木香白朮當歸正桂茯苓芍藥半夏川芎熟地黃去土酒炒山藥五味子牡丹皮去骨麥門冬去心各等分上銼散每服三錢水一盞半生薑五片棗子二枚小麥五十粒烏梅一個煎空心食前服正元散治下元氣虛臍腹脹滿心脅刺痛泄利嘔吐自汗陽氣漸微手足厥冷及傷寒陰證霍亂轉筋久下冷利少氣羸困一切虛寒並宜服之常服助陽消陰正元氣溫脾胃進飲食人參白茯苓白朮各二兩黃耆兩半甘草烏藥山藥薑汁侵炒附子炮去皮臍川芎乾葛各一兩桂心烏頭炮去皮尖各半兩紅豆炒乾薑炮橘皮各三錢上銼散每服三錢水一盞半生薑三片棗二枚鹽少許煎食前冷服自汗加浮麥萬安丸補下經起陰發陽能令陽氣入腦安魂定魄開三焦破積聚消五穀益精氣安臟腑除心中虛熱強筋骨輕身明目去冷除風無所不治補益極多常服最妙七十老兒服之當有非常力蓯蓉四兩酒浸干薯蕷五味子各二兩半杜仲三兩半牛膝酒浸菟絲子酒浸赤石脂煅白茯苓去皮澤瀉山茱萸去核巴戟去心熟乾地黃以上各二兩附子炮去皮臍牡丹皮去骨官桂去粗皮各一兩上為末別用蓯蓉末半斤酒熬膏和丸梧桐子大每服五七十丸空心溫酒下不在將息別無所忌只忌釅醋及陳臭之物七日後四體光澤口唇赤手足熱面有光潤消食體輕舌厚聲響是其驗也十日長肌肉其藥通中入腦鼻辛酸不可怪也又加減法若要肥加燉煌石膏二兩如失狂多忘加遠志一兩體少津潤加柏子仁一兩如進房事加白馬莖若無用鹿茸代之二兩去毛酥炙陰下濕癢加蛇床子一兩燉煌如火色也增益歸茸丸滋養肝腎益心血利足膝實肌膚悅顏色興男子衛生之良藥也此方專理肝心腎之血澤瀉則引諸藥入腎熟乾地黃酒浸九蒸鹿茸去毛酥塗炙五味子各四兩山藥酒浸山茱萸去核大附子炮去皮臍川牛膝酒浸一宿各二兩白茯苓牡丹皮去骨澤瀉酒浸一宿各一兩半大當歸四兩去蘆官桂二兩去粗皮上為末用真鹿角膠半斤銼細入銀石器中煮酒丸梧桐子大每服五十丸空心溫酒鹽湯下增損樂令湯治諸虛不足小腹急痛脅肋䐜脹臍下虛滿胸中煩悸面色痿黃唇乾口燥手足逆冷體常自汗腰背強急骨肉痠疼咳嗽喘乏不飲食或因勞傷過度或病後不復黃耆去蘆人參去蘆橘皮去白當歸去尾桂心細辛前胡去蘆甘草茯苓麥門冬去心芍藥各二兩附子炮去皮臍熟地黃酒炒各一兩半夏湯洗二兩半遠志三分去心炒上銼散每服三錢水一盞半生薑五片棗子二枚煎食前服腹滿食少去棗下焦虛冷不甚渴小便數者倍人參當歸附子煩渴引飲加栝蔞根遺泄白濁加龍骨白蘞小腹急引心痛者加乾薑黃耆丸治丈夫腎臟風虛上攻頭面虛浮耳內蟬聲頭目昏眩項背拘急下注腰腳腳膝生瘡行步艱難腳下隱疼不能踏地筋脈拘攣不得屈伸四肢少力百節痠疼腰腿冷重小便滑數及癱緩風痹遍身頑麻又療婦人血風肢體癢痛腳膝緩弱起坐艱難並宜服之黃耆去蘆杜蒺藜炒去刺茴香炒川楝子去核川烏炮去皮臍赤小豆地龍去土炒各一兩烏藥二兩防風去蘆一兩上為末酒煮麵糊丸梧桐子大每服十五丸溫灑鹽湯吞下婦人醋湯下空心服茴香丸治丈夫元臟久虛冷氣攻衝臍腹㽲痛腰背拘急面色痿黃飲食減少及膀胱小腸氣痛並腎臟風毒頭面虛浮目暗耳鳴腳膝少力腫痛生瘡婦人血臟虛冷食減少力肢體疼痛並宜服之久服補虛損除風冷壯筋骨明耳目威靈仙洗去土川楝子炒川烏去皮臍各三兩杜烏藥五兩川椒去目及閉口者炒出汗二兩地龍去土七兩赤小豆八兩陳皮草薢各三兩茴香炒八兩防風去苗三兩上為末煮麵糊丸如梧子大空心晚食前溫酒下二十丸鹽湯亦可糊用酒煮小腸氣痛炒茴香生薑酒下腳轉筋木瓜湯下婦人血臟虛冷溫醋湯下臍腹絞痛滑泄冷痢濃艾湯下還少丹補心腎虛損脾胃怯弱神志俱耗腰腳沉重精神昏亂氣血凝滯飲食無味肌體瘦倦小便白濁耳聾目暗等疾山藥川牛膝酒浸各一兩半白茯苓去皮楮實子舶上茴香巴戟去心酒浸杜仲去粗皮薑酒塗炙肉蓯蓉酒浸一宿焙五味子石菖蒲微炒枸杞子各一兩遠志一兩甘草水煮去心薑汁拌炒熟地黃酒洗蒸半兩山茱萸去核一兩上為末煉蜜入棗子蒸熟去皮核同為丸梧桐子大硃砂末五錢為衣每服三十丸空心溫酒鹽湯下日進三服心氣不寧加麥門冬少精神加五味子陽弱加續斷久服百病不侵天真丸治男子婦人先曾損血及脫血肌瘦絕不入食得步不得手足痿弱軟遂血氣枯槁形神不足如滑腸不食守死無法可治者如咽喉窄下食不得只能五七粒漸漸服之粒數多便可養起久服令人面色紅潤無血者使生血並津液干大便燥者服之自潤實中有虛虛中有實皆可治之羊肉七斤精者去筋膜脂皮批開入藥肉蓯蓉十兩濕山藥去皮十兩當歸去蘆洗十二兩天門冬泡去心切焙十兩上四味安在羊肉內裹定用麻縷扎縛取上色糯酒四瓶煮令盡再入水二升又煮直候肉如泥再入黃耆末五兩人參末三兩白朮末二兩熟糯米飯焙乾為末一十兩前後藥末同劑為丸梧桐子大一日約服三百粒初服百粒加至前數服之覺有精神美飲食手足添力血脈便行輕健如久喑不言者服之半月語言有聲血下喘咳步行不得服之效恐難丸即入蒸餅五七枚焙乾為末同搜和之酒送下空心食前鹽湯亦可地仙丹治男子五勞七傷腎氣虛憊行步難苦女人血海虛冷月經不調臟寒少子又治痔瘻腸風下血諸風諸氣並皆治之有人得風氣疾攣結疼痹服之頓除川牛膝酒浸四兩肉蓯蓉酒浸