body:
  text: 卷第二十孫真人養生書節文養性序夫養性者欲所習以成性性自為善不習無不利也性既自善內外百病自然不生禍亂災害亦無由作此養性之大經也善養性者則治未病之病是其義也故養性者不但餌藥餐霞其在兼於百行百行周備雖絕藥餌足以遐年德行不充雖服玉液金丹未能延壽故老子曰善攝生者陸行不遇虎兕此則道德之佑也豈假服餌而祈遐年哉聖人所以製藥餌者以救過行之人也故愚者拘病歷年而不修一行纏痾沒齒終無悔心嵇康曰養性有五難名利不去為一難喜怒不除為二難聲色不去為三難滋味不絕為四難神慮精散為五難五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不回其操不夭其年也五者無於胸中則信順日躋道德日全不祈善而有福不求壽而自延此養生之大旨也黃帝問於岐伯曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作皆衰者時代異耶將人失之耶岐伯曰上古之人其知道者法於陰陽和於術數飲食有常節起居有常度不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人則不然以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教下也皆為之虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來是以人之壽夭在於撙節若消息得所則長生不死恣其情欲則命同朝露也人年四十而陰氣自半也起居衰矣年五十體重耳目不聰明也年六十而陰痿氣力大衰九竅不利下虛上實涕泣俱出故曰知之則強不知則老仲長統曰王侯之宮美女兼千卿士之家侍妾數百晝則以醇酒淋其骨髓夜則房室輸其血氣耳聽淫聲目樂邪色燕內不出遊處不返王公得之於上豪家馳之於下及至生產不時子育太早或童儒而擅氣或疾病而構精精氣簿惡血脈不充既出胞臟養護無法又蒸之以綿纊爍之以五味胎傷孩病而脆未及堅剛復縱情欲重重相生病病相孕國無良醫醫無審術奸佐其間過謬常有會不一疾莫能自免今少百歲之人者豈非所習不純正也抱朴子曰或問所謂傷之者豈色欲之門乎答曰亦何獨斯哉然長生之要其在房中上士知之可以延年除病其次不以自伐若年當少壯而知還陰丹以補髓採七益於長俗一作谷者不服藥物不失一二百歲也但不得仙耳不得其術古人方之於凌抔以盛湯羽苞之蓄火又且才所不逮而強思之傷也力所不勝而強舉之傷也深憂重恚傷也悲哀憔悴傷也喜樂過度傷也久談言笑傷也寢息失時傷也挽弓引弩傷也沈醉嘔吐傷也飽食即臥傷也跳走喘乏傷也歡呼哭泣傷也陰陽不交傷也積傷至盡盡則早亡盡則非道也是以養性之士唾不至遠行不疾步耳不極聽目不極視坐不久處立不到疲臥不至懻先寒而衣先熱而解不欲極飢而食食不可過飽不欲極渴而飲飲不欲過多飽食過多則結積聚渴飲過多則成痰癖不欲甚勞不欲甚佚不欲流汗不欲多唾不欲奔走車馬不欲極目遠望不欲多啖生冷不欲飲酒當風不欲數數沐浴不欲廣志遠願不得規造異巧冬不欲極溫夏不欲窮涼不欲露臥星月不欲眠中用扇大寒大熱大風大霧皆不欲冒之五味不欲偏多故酸多則傷脾苦多則傷肺辛多則傷肝咸多則傷心甘多則傷腎此五味克五臟五行自然之理也凡言傷者亦不即覺也謂久則損壽耳是以善攝生者臥起有四時之早晚興居有至和之常制調利筋骨有偃仰之方祛疾閉邪有吐納之術流行榮衛有補瀉之法節宣勞佚有與奪之要忍怒以全陰抑喜以養陽然後先服草木以救虧缺後服金丹以定無窮養性之理盡於此矣皇甫隆令曰常聞道人蒯京已年一百七十八而甚丁壯言人當朝朝服食玉泉琢齒使人丁壯有顏色去三蟲而堅齒玉泉者口中唾也朝旦未起早漱津令滿口乃吞之琢齒二七遍如此者名曰練精嵇康曰穰歲多病饑年少疾信哉不虛是以關中土地俗好儉嗇廚膳餚饈不過菹醬而已其人少病而壽江南嶺表其處饒足海陸鮭餚無所不備土俗多疾而人早夭北方仕子遊宦至彼遇其豐贍以為福佑所臻是以尊卑長幼恣口食啖夜長醉飽四體熱悶赤露眠臥宿食不消未逾期月大小皆病或患腳氣脹滿霍亂或寒熱瘧痢惡核疔腫或癰疽痔漏或偏風猥退不知醫療以至於死凡如此者比肩皆是惟云不習水土都不知病之所由靜言思之可為太息也學者先須識此以自誡慎抱朴子曰一人之身一國之象也胸腹之位猶宮室也四肢之別猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也知治身則能治國也夫受其民所以安其國惜其氣所以全其身民散則國亡氣竭則身死死者不可生也亡者不可全也是以至人消未起之患治未病之疾醫之於無事之前不追於既逝之後夫人難養而易危也氣難清而易濁也故能審威德所以保社稷割嗜欲所以固血氣然後真一存焉三一守焉百病卻焉年壽延焉道林養性真人曰雖常服餌而不知養性之術亦難以長生也養性之道常欲小勞但莫大疲及強所不能堪耳且流水不腐戶樞不蠹以其運動故也養性之道莫久行久立久坐久臥久視久聽蓋以久視傷血久臥傷氣久立傷骨久坐傷肉久行傷筋也勿汲汲於所欲勿悁悁於懷忿恨皆折壽命若能不犯則得長生也故善攝生者常少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少者養性之都契也多思則神殆多念則志散多欲則志昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則意溢多喜則忘錯昏亂多怒則百脈不定多好則專迷不理多惡則憔悴無歡此十二多不除則榮衛失度血氣妄行喪生之本也惟無多無少者幾於道矣是知勿外緣者真人初學道之法也若能如此者可居瘟疫之中無憂疑矣既屏外緣會須守五神肝心脾肺腎從四正言行坐立言最不得浮思妄念想欲事惡邪大起故孔子曰思無邪也了了分明勿輟也仍於每旦初起面向午展兩手於膝上心眼觀氣上入頂下達湧泉旦旦如此名曰迎氣常以鼻引氣口吐氣小微吐之不得開口復欲得氣少出入氣多每欲食送氣入腹每欲食氣為主人也凡心有所愛不用深愛心有所憎不用深憎並皆損性傷神亦不用深贊亦不用深毀常須運心於物平等如覺偏頗尋改正之居貧勿謂常貧居富莫謂常富居貧富之中常須守道勿以貧富易志改性識達道理似不能言有大功德勿自矜伐美樂勿離手善言勿離口亂想勿經心常以深心至誠恭敬於物慎勿詐善以悅於人終身為善人所嫌勿得起恨事君盡禮人以為諂當以道自平其心道之所在其德不孤勿言行善不得善報以自怨仇居處勿令心有不足若有不足則自抑之勿令得起人知止足天遺其祿所至之處勿得多求則心自疲而志自苦若夫人之所以多病當由不能養性平康之日謂言常然縱情恣欲心所欲得則便為之不拘禁忌欺罔幽明無所不作自言適性不知過後一一皆為病本及兩手摸空白汗流出口唱皇天無所逮及皆以平生粗心不能自察一到於此但能少時內省身心則自知見行之中皆畏諸痾將知四百四病身手自造本非由天及一朝病發和緩不救方更誹謗醫藥無效神仙無靈故有智之人愛惜性命者常自思念深生愧恥誡敕身心常修善事也至於居處不得綺靡華麗令人貪婪無代乃患害之源但令雅素淨潔無風雨暑濕為佳衣服器械勿用珍玉金寶增長過失使人煩惱根深廚膳勿用脯肉常令儉約為佳然後行作鵝王步語作含鐘聲眠作獅子臥右胠脅著地坐腳也每日自詠歌云美食須熟嚼生食不粗吞問我居止處大宅總林村胎息守五臟氣至骨成仙又歌曰日食三個毒不嚼而自消綿繡為五臟身著糞掃袍修心既平又須慎言語凡言語讀誦常想聲在氣海中臍下是也每日初入後勿言語讀誦寧待平旦也旦起欲專言善事不欲先計較錢財又食上不得語語而食者常患胸背痛亦不用厭臥多言笑寢不得語言者言五臟如鐘磬不懸則不可發聲行不得語若欲語須住腳乃語行語則令人失氣冬至日止可語不可言自言曰言答人曰語言有人來問不可不答自不可廢言也仍勿觸冷開口大語為佳言語既慎仍節飲食是以善養性者先飢而食先渴而飲食欲數而少不欲頓而多則難消也常欲令如飽中飢飢中飽耳凡飽則傷肺飢則傷氣咸則傷筋酸則傷骨故後學淡食但當熟嚼使米脂入腹勿使酒脂入腸人之當食須去煩惱暴數為煩侵觸為惱如食五味必不得暴嗔多令人神驚夜夢邪怪每食不用重肉喜生百病常須少食肉多食飯及少菹菜並勿食生菜生米小豆陳臭物勿飲濁酒食麵使塞氣孔勿食生肉傷胃一切肉惟須煮爛停冷食之食畢當漱口數過令人牙齒不敗口香熱食訖令冷酢漿漱口者令人口氣常臭作䘌齒病又諸熱食鹹物後不得食冷酢漿水喜失聲成屍咽風熱食汗出勿當風發痙疼痛令人目澀多睡每食訖以手摩面及腹令津液過流食畢當行步躊躇計使中數里來行畢使人以粉摩腹上數百遍則食易消大益人令人能飲食無百病然後所修為真快也飽食即臥乃生百病不消或積聚飽食仰臥成氣痞作頭昏寒熱來者寒未解食熱食成刺風人不得夜食又云夜勿過醉飽食勿精思為勞苦事有損余虛損人常須忌在巳時食訖則不須飲酒終身無干嘔勿食父母本命所屬肉令人命不長勿食自己本命肉令人魂魄飛揚勿食一切腦大損人茅屋漏水墮諸脯肉上食之成瘕約暴肉作脯不肯幹者害人祭神肉無故自動食之害人飲食上蜂行住食之必有毒害人腹內有宿病勿食鯪鯉魚肉害人濕食及酒漿臨上看視不見人物影者勿食之成卒注若已食腹脹者急以藥下之每十日一食葵葵滑所以通五臟壅氣又是菜之主不用合心食之又飲酒不欲使多多則速吐之為佳勿令至醉即終身百病皆除久飲酒者腑臟積毒致令蒸筋傷神損壽醉不可以當風臥不可令人扇涼皆即得病也醉不可露臥濕地當風取涼凡人醉不可強食或發癰疽或發喑或生瘡醉飽不可以走車馬及跳躑醉不可接房醉飽交接小者面憔咳嗽大者傷絕臟脈損命凡人飢欲坐小便若飽則立小便慎之無病又忍尿不便膝冷成痹忍大便不出成氣痔小便勿努令兩足及膝冷大便不用呼氣及強努令人腰瘠自澀宜任之佳凡遇山水塢中出泉者不可久居常食作癭病又深陰地冷水不可飲必作痎瘧飲食以調時慎脫著凡人旦起著衣反者便著之吉衣光者三振之曰殃去吉濕衣汗衣皆不可久著令人發瘡及風瘙大汗能易衣佳不易者急洗之不爾令人小便不利凡大汗勿遍脫衣喜得偏風半身不遂春天不可薄衣令人傷寒霍亂食不消頭痛脫著既時須調處凡人臥春夏向東秋冬向西頭勿北臥及牆北亦勿安床凡欲眠勿歌詠不祥睡起下床先須左足臥勿當舍脊下臥訖勿留燈令魂魄六神不安多愁怨人頭邊勿安火爐日久引火氣頭重目赤及鼻乾夜臥當耳勿有孔吹入即耳聾夏不欲露面致令人面皮厚喜成癬或作面風冬夜勿覆頭得長壽凡人眠勿以腳上懸高處久成腎水及損尻足冷人每見十步直牆勿煩牆面風利吹人發癲及體重人汗勿跂床懸腳久成血痹兩足背腰疼又不但晝眠令人失氣臥勿大語損人氣力暮臥常習閉口口開即失氣且邪惡從口入久而成消渴及失血色屈膝側臥益人氣力勝正偃仰按孔子不屍臥故曰睡不厭踧覺不厭舒凡人屍睡則有鬼痛魔邪凡眠先臥心後臥眼人臥一夜常作五度反覆逐更轉凡人夜魘勿燃燈喚之定死無疑暗喚之吉亦不得近前急喚夜夢惡不須說旦以水面東持刀噀之咒曰惡夢著草木好夢成珠玉即無咎矣又夢之善惡並勿說為吉衣食寢處皆能順時者吉始盡養生之道故善攝生者無犯日月之忌無失歲時之和須知一日之忌暮無飲食一月之忌晦無大醉一歲之忌暮無遠行終身之忌暮無燃燭行房暮常護氣也凡氣冬至起於湧泉十一月至膝十二月至股正月至腰名三陽成二月至膊三月至項四月至頂純陽用事之月也每冬至日於北壁下厚堆草而臥云受元氣每八月一日以後即微火暖足勿令下冷無生意常欲使氣在下不欲泄於上春凍未泮衣欲下厚上薄養陽收陰繼世長生養陰收陽禍則滅門故云冬時天氣閉血氣伏藏人不可作勞出汗發泄陽氣有損於人也又云冬日凍腦春秋腦足俱凍此聖人之常法也春欲晏臥早起夏及秋欲侵夜乃臥早起冬欲早臥而晏起皆益人雖云早起莫在雞鳴前晏起莫在日出後凡冬月忽有大熱之時夏日忽有大涼之時皆勿受之人有患天行時氣者皆由犯此也即須調氣息使寒熱平和即免患也每當臘月勿歌舞犯者必凶常於正月寅日燒白髮吉凡寅日剪手甲午日剪足甲又燒白髮吉居處法凡人居止之室心須周密勿令有細隙致有風氣得入小覺有風勿強忍久坐必須急急避之久居不覺使人中風古來忽得偏風四肢不隨或如角弓反張或失音不語者皆由忽此耳身既中風諸病總集邪氣得便遭此致卒者十中有九是以大須周密無得輕之慎焉慎焉所居之室必基井及水瀆令安龍神凡在家及外行卒逢大飄風暴雨震電昏暗大霧此能會諸龍鬼神行動經過所致宜入室閉戶燒香靜坐安心以敬避之待過後乃出不爾損人或當時雖未苦於後不佳矣又陰霧中不可遠行凡家中有經像行來先拜之然後拜尊長每行至則安坐焉凡居家不必數沭浴若沐浴必須密室不得大熱亦不得大冷皆生百病冬浴不必汗出霢霂沐浴後不得觸風冷新沐發訖勿當風勿濕縈髻勿濕頭臥使人頭風眩悶發禿面黑齒痛耳聾頭生白屑飢忌浴飽忌沐沐訖須進少許食飲乃出夜沐發不食即臥令人心虛饒汗多夢又夫妻不用同室沐浴常以晦日浴朔日沐吉凡炊湯經宿用洗體成癬洗面無光洗腳即疼痛作甑畦瘡熱泔洗頭冷水濯之作頭風飲水沐頭亦作頭風時行病新汗解勿冷水洗浴損心包不能復凡居家常戒約內外長幼不快即須早道勿使隱忍以為無苦過時不知便為重病遂成不救小有不好即按摩挼擦令百節通利泄其邪氣凡人無問有事無事常須日別蹋脊背四肢一度頭項苦令熱蹋即風氣時行不能著人此大要妙不可具論凡人居家及遠行隨身常有熱艾一升備急丸闢鬼丸藥生肌藥甘濕藥疔腫藥水銀大黃芒硝甘草乾薑桂心蜀椒不能更蓄余藥此等常不可缺及一兩卷備急藥方並帶闢毒蛇蜂蠍等藥隨身凡人自覺十日以上康健即須灸三數穴以泄風氣每用必須調氣補瀉按摩導引為佳勿以康健便為常然須常安不忘危預防諸病也灸法常須避人神凡畜手力細累春秋皆須與轉瀉藥一度則不中天行時氣也按摩法天竺國按摩此是婆羅門法兩手相捉細捩如洗手法兩手淺相叉翻覆向胸兩手相捉共按膍左右同以手如挽五石力弓左右同兩手相重按膍徐徐捩身左右同作拳向前築左右同作拳卻頓此是開胸左右同如拓石法左右同以手反捶背上左右同兩手據地縮身曲脊身上三舉兩手氣抱頭宛轉膍上此是抽脅大坐斜身偏𣣱如排山左右同大坐伸兩腳即以一腳向前虛制左右同兩手拒地回顧此是虎視法左右同立地反拗身三舉兩手急相叉以腳踏手中左右同起立以腳前後虛踏左右同大坐伸兩腳用相手勾所伸腳著膝中以手按之左右同上十八勢但是老人每日能依此三遍者一月後百病除行及奔馬補益延年能食明眼輕健不復疲乏老子按摩法兩手擦膍左右捩身一七遍兩手捻膍左右紐肩二七遍兩手抱頭左右紐腰二七遍左右挑頭一七遍兩手托頭三舉之一手抱頭一手托膝三折左右同一手托頭一手托膝從下向上三遍左右同兩手攀頭下向三頓足兩手相捉頭上過左右三遍兩手相叉托心前推卻挽三遍兩手相叉著心三遍曲腕築肋挽肘左右三遍左右挽前後拔各三遍舒手挽項左右三遍反手著膝手挽肘覆手著膝上左右亦三遍手摸肩從上至下使遍左右同兩手空拳築三遍兩手相叉反覆攪各七遍外振手三遍內振三遍覆手振亦三遍摩紐指三遍兩手反反搖三遍兩手反叉上下紐肘無數單用十呼兩手上聳三遍兩手下頓三遍兩手相叉頭上過左右申肋十遍兩手拳反背上掘脊上下亦三遍掘揩之也兩手反捉上下直脊三遍覆掌搦腕內外振三遍覆掌前聳三遍覆掌兩手相叉交橫三遍覆手橫直即聳三遍若有手患冷從上打至下得熱便休舒左腳右手承之左手擦腳聳上至下直腳三遍右手擦腳亦爾前後捩足三遍左捩足右捩足各三遍前後卻捩足三遍直腳三遍紐膍三遍內外振腳三遍若有腳患冷者打熱便休紐臂以意多少頓腳三遍卻直腳三遍虎據左右紐肩三遍推天托地左右三遍左右排山負山拔木各三遍舒手直前頓申手三遍舒兩手兩膝亦各三遍舒腳直反頓申手三遍捩內脊外脊各三遍調氣法彭祖曰道不在煩但能不思衣食不思聲色不思勝負不思曲直不思得失不思榮辱心無煩形勿極而兼之以導引行氣不已亦可得長年千歲不死凡人不可無思當以漸遣除之彭祖曰和神導氣之道當得密室閉戶安床暖席枕高二寸半正身偃臥瞑目閉氣於胸膈中以鴻毛著鼻上而不動經三百息耳無所聞目無所見心無所思如此寒暑不能侵蜂蠆不能毒壽三百六十歲此鄰於真人也旦夕者是陰陽轉換之時凡旦五更補暖氣至頻頻眼閉是上生氣至名曰陽息而陰消暮日入後冷氣至凜凜然時乃至床坐睡倒是下生氣至名曰陽消而陰息旦五更初暖流至暮日入後冷氣至常出入天地日月山川河海人畜草木一切萬物體中代謝往來無一時休息一進一退如晝夜之更迭如海水之潮夕是天地消息之道也面向午展兩手於腳膝上徐徐按擦肢節口吐濁氣鼻引清氣凡吐者出故氣亦名死氣吞者取新氣亦名生氣故老子經云玄牝之門天地之根綿綿若存用之不勤言口鼻天地之門可以出納陰陽死生之氣也良久徐徐乃以手左托右托上托下托前托後托瞋目張口叩齒摩眼押頭拔耳挽發放腰咳嗽發揚振動也雙作只作反手為之然後掣足抑振數八十九十而止仰下徐徐定心作禪觀之法閉目存思想見空中太和元氣如紫雲成蓋五色分明下入毛際漸漸入頂如雨初晴云入山透皮入肉至骨至腦漸漸下入腹中四肢五臟皆受其潤如水滲入地若徹則覺腹中有聲汨汨然意轉思存不得外緣斯須即覺元氣達於氣海須臾則自達於湧泉則覺身體振動兩腳蜷曲亦令床坐有聲拉拉然則名一通二通乃至日別得三通五通則身體悅懌面色光輝鬢毛潤澤耳目精明令人食美氣力強健百病皆去五年十歲長存不亡得滿千萬通去仙不遠矣人身虛無但有遊氣氣息得理即百病不生若消息失宜即諸痾競起善攝養者須知調氣方焉調氣方療萬病大患百日生眉須自余者不足言也凡調氣之法夜半後日中前氣生得調日中後夜半前氣死不得調調氣之時則仰臥床鋪厚軟枕高下共身平舒手展腳兩手握大拇指節去身四五寸兩腳相去四五寸數數叩齒飲玉漿引氣從鼻入腹足則停止有力更取久住氣悶從口細細吐出盡遠鼻細細引入出氣一準前法閉口以心中數數令耳不聞恐有誤亂兼以手下籌能至千則去仙不遠矣若天陰霧惡風猛寒勿取氣也但閉之若患寒熱及患癰疽不問日中疾患未發前一食間即調如其不得好瘥明日依式更調之若患心冷病氣即呼出若熱病即吹出若肺病則噓出若肝病則呵出若脾病則唏出若腎病則呬出夜半後八十一雞鳴七十二平旦六十一日出五十四辰時四十五巳時三十六欲作此法先左右導引三百六十遍病有四種一冷痹二氣疾三邪風四熱毒若有患者安心調氣此法無有不瘥也凡百病不離五臟五臟各有八十一種疾冷熱風氣計成四百四病事須識其相類善以知之心臟病者體冷熱相法心色赤患者夢中見人著赤衣持赤刀杖火來怖人療法用呼吹二氣呼療冷吹治熱肺臟病者胸背滿脹四肢煩悶相法肺色白患者喜夢見美女美男詐親附人共相抱持或作父母兄弟妻子療法用噓氣出肝臟病者憂愁不樂悲思喜頭眼疼痛相法肝色青夢見人著青衣捉青刀杖或獅子虎狼來恐怖人療法用呵氣出脾臟病者體上游風習習遍身痛煩悶相法脾色黃通土色夢或作小兒擊歷人邪猶人或如旋風團欒轉治法用唏氣出腎臟病者體冷陰衰面目惡痿相法腎色黑夢見黑衣及獸物捉刀杖相怖用呬氣出冷病者用大呼三十遍細呼十遍呼法鼻中引氣入口中吐氣出當令聲相逐呼字而吐之熱病者用大吹五十遍細吹十遍吹如吹物之吹當使字氣聲似字肺病者用大噓三十遍細噓十遍肝病者用大呵三十遍細呵十遍脾病者用大唏三十遍細唏十遍腎病者用大呬五十遍細呬三十遍此十二種調氣法若有病依此法恭敬用心無有不瘥皆須左右導引三百六十遍然後乃為之服食法論曰凡人春服小續命湯五劑及諸補散各一劑夏大熱則服腎瀝湯三劑秋服黃耆等丸一兩劑冬服藥酒兩三劑立春日則止此法終身常爾則百病不生矣俗人見淺但知鉤吻之殺人不信黃精之益壽但識五穀之療飢不知百藥之濟命但解施泄以生育不知固秘以頤養故有服餌方焉郗愔曰夫欲服食當尋性理所宜審冷暖之適不可見彼得力我便服之初御藥皆先草木次石是為將藥之大較也所謂精粗相代階粗以至精者也夫人從少至長體習五穀卒不可一朝頓遺之凡服藥物為益遲微即無充飢之驗然積年不已方能骨髓填實五穀居然而自斷今人多望朝夕之效求目下之應腑臟未充便欲絕粒穀氣如除藥未有用又將御女形神與俗無別以此致弊胡不怪哉服餌大體皆有次第不知其術者非止交有所損卒亦不得其力故服餌大法必先去三蟲三蟲既去次服草藥好得藥力次服木藥好得力訖次服石藥依此次第乃得遂其藥性庶可安穩可心延齡矣去三尸蟲丸方生地黃汁三斗東向灶葦火煎三沸內清漆二升以荊匕攪之日移一尺內黃丹三兩腹移一尺內瓜子汁三升復移一尺內大黃末三兩微火勿令焦候可丸如梧桐子大先食服一丸日三濁血下鼻中三十日諸蟲皆下五十日百病愈面色有光澤又方漆二升蕪菁子三升末大黃六兩末酒二升半上以微火合煎令可丸如梧桐子大先食服三丸十日濁血下出鼻中三十日蟲皆爛下五十日身光澤一年行及奔馬消息四體安穩乃可服草藥服天門冬方天門冬曝乾搗下篩食後服方寸匕日三可至十服小兒服尤良與松脂煉密丸服之益善惟多彌佳又方搗取汁微火煎取五斗下白蜜一斗胡麻炒末二升合煎攪勿息手可丸即止火下大豆黃末和為餅徑三寸厚半寸一服一枚日三百日以上得益此方最上妙包眾方一法釀酒服始傷多無苦多即吐去病也天門冬酒釀法取天門冬淨洗去心皮令人利搗壓取汁二升漬面二升曲發以糯米二升准家釀法造酒春夏宜極冷下飯秋冬溫如人肌此酒初熟味酸仍作臭泔腥氣但服之久停則香美余酒皆不及封四七日佳凡八月九月即少少合至十月多擬到來年五月三十日以來相續服之春三月亦得合入四月不得合服酒時若再得天門冬去心皮曝乾為細末以上件酒服方寸匕日三加至三匕久服長生補中益氣愈百病也治虛勞等傷年老衰損羸瘦偏枯不隨風濕不仁冷痹心腹積聚惡瘡癰疽腫癩疾重周身膿壞鼻柱敗爛服之皮脫蟲出顏色肥白髮黑齒落再生入水不濡二百日後恬泰疾損拘急者緩羸劣者強三百日身輕三年走及奔馬至十年心腹痼疾皆去服地黃法生地黃五十斤熟搗之絞取汁澄去滓微火上煎減過半內白蜜五升棗脂一升攪令相得可丸乃止每服如雞子一枚日三令人肥白又方地黃十斤細切以醇酒二斗漬三宿出曝乾反覆內漬取酒盡止與甘草巴戟天厚朴乾漆覆盆子各一斤搗下篩食後酒服方寸匕日三加至二匕使人老者還少強力無病延年作熟地黃法采地黃去其須葉及細根搗絞取汁以漬肥者著甑中蒸之熟時出曝燥更浸汁中又蒸汁盡止便乾之亦可直切蒸之半日數以酒灑之使周匝至夕出曝乾可搗為末煉密丸服之種地黃法先擇好地黃赤色虛軟者深耕之臘月逆耕凍地彌好擇肥大好地黃根切長四五分至三寸許一斛可種一畝二三月種之作畦畔相去一尺生後隨鋤壅數芸之黃精膏方黃精用一石去鬚毛洗令淨潔打碎蒸令好熟壓得汁復煎去上游水得一斗內乾薑三兩桂心末一兩微火煎看色鬱郁然欲黃使去火待冷盛不津器中酒五合和服二合常未食前日二服舊皮脫顏色變光花色有異鬢髮更改欲長服者不須和酒內生大豆黃絕穀食之不飢渴長生不老服烏麻法取黑皮真檀色者烏麻隨多少水拌令潤勿過濕蒸令氣遍即出曝乾如此九蒸九搗去上皮未食前和水若酒服二方寸匕日三漸漸不飢絕谷久服百病不生常服延年不老餌柏實方柏子仁二升搗令細醇酒四升漬攪如泥下白蜜二升棗膏三升搗令可丸入乾地黃末白朮末各一升攪和丸如梧桐子大每服三十丸日二服二十日萬病皆愈餌松子方七月七日採松子過時即落不可得治服方寸匕日三四一云一服三合百日身輕二百日行五百里絕谷服昇仙渴飲水亦可和脂服之若丸如梧桐子大服十丸服松脂方百鍊松脂下篩以蜜和內筒中勿令中風日服如博棋子大博棋長二寸方一寸日三漸漸月別服一斤不飢延年亦可醇酒和白蜜如餳日服一二兩至半斤凡取松脂老松皮自有聚脂者最第一其根下有傷折處不見日月者得之名曰陰脂彌良惟衡山東行五百里有大松皆三四十圍乃多脂又法五月刻大松陽面使向下二十四株一株可得半斤亦取其老節根處有脂得用仙經云常以三月入衡山之陰取不見日月松脂煉而餌之即不召而自來服之百日耐寒暑二百日五臟補益服之五年即見西王母仙經又云諸石所生三百六十五山其可食者滿谷陰懷中松脂耳其谷正從衡山嶺直東四百八十里當橫健正在橫嶺東北行過其南入谷五十里窮穴有石城白鶴其東方有大石四十餘丈狀如白松松下二丈有小穴東入山有丹砂可食其南方陰中有大松大三十圍有三十餘株不見日月皆可取服之採松脂法以日入時破其陰以取其膏破其陽以取其脂脂膏等分食之可以通神靈鑿其陰陽為孔令方五寸深五寸還以皮掩其孔無令風入風入則不可服以春夏時取之取訖封塞勿泄以泥塗之東北行丹砂穴有陰泉水可飲此弘農車君以元封元年入此山食松脂十六年復下居長安東市在上谷牛頭谷時往來至秦嶺上年常如三十者煉松脂法松脂七斤以桑灰一石煮脂三沸接置冷水中凝復煮之凡十遍脂白矣可服今谷在衡州東南攸縣界此松脂與天下松脂不同餌茯苓方茯苓十斤去皮酒漬密封下十五日出之取服如博棋日三亦可屑服方寸匕凡餌茯苓皆陽煮四五沸或以水漬六七日茯苓酥方茯苓五升灰汁煮十遍漿水煮十遍清水煮十遍松脂五斤煮如茯苓法每次煮四十遍生天門冬五斤去心皮曝乾作末蠟牛酥各三斤煉三十遍白蜜三斤煎令沫盡上各搗節以銅器重湯上先內酥次蠟次蜜消訖內藥急攪勿住手務令大均內瓷器中密封勿令泄氣先一日不食欲不食先須吃好美食極飽然後絕食即服二兩二十日後服四兩又二十六日後八兩以丸之以咽中下為度第二度以四兩為初二十日後八兩又二十日二兩第三度服以八兩為初二十日二兩二十日四兩合一百八十日藥成自後服三丸將補不服亦得恆以酥蜜消息之美酒服一升為佳合藥須取四時旺相日特忌刑殺厭及四激休廢等日大凶此彭祖法茯苓膏方茯苓淨去皮松脂二十四斤松子仁柏子仁各十二斤上皆依法煉之松柏仁不煉搗篩白蜜二斗四升內銅器中湯上微火煎一日一夕次第下藥攪令相得微火煎七日七夜上丸如小棗每服七丸日三欲絕谷頓服取飽即得輕身明目不老服枸杞根方主養性遐齡枸杞根切一石水一石二斗煮取六斗澄清煎取三升以小麥一斗乾淨擇內汁中漬一宿曝二往返令汁盡曝乾搗末酒服方寸匕日二一年之中以二月八月各合一劑終身不老枸杞酒方枸杞根一百二十斤切以東流水四石煮一日一夜取清汁一石漬曲一如家醞法熟取清貯不津器中內乾地黃末二斤半桂心乾薑澤瀉蜀椒末各一斤商陸末二升以絹袋貯內酒底緊塞口埋入地三尺堅覆上三七日沐浴整衣冠再拜平曉向甲寅地日出處開之其酒赤如金色旦空腹服半升十日萬病皆愈三十日瘢痕滅惡疾人以水一升和酒半升分五服愈餌雲母水方療萬病上白雲母二十斤薄掰以露水八斗作湯分半洮洗雲母如此再過又取二斗作湯內芒硝十斤以雲母木器中漬之二十日出絹袋盛懸屋上勿使見風日令燥以水漬鹿皮為囊揉挺之從旦至日中乃以細絹下篩滓復揉挺令得好粉五斗余者棄之取粉一斗內崖蜜二斤攪令如粥內生竹筒中薄削之漆固口埋北垣南崖下入地六尺覆土春夏四十日秋冬三十日出之當如澤為成若洞洞不消者更埋三十日出之先取水一合內藥一合攪和盡服之日三水寒溫儘自在服十日小便當變黃此先療勞氣風疹也二十日腹中寒癖消三十日齲齒除更新生四十日不畏風寒五十日諸病皆愈顏色日少長生神仙吾自驗之所以述錄煉鍾乳粉法鍾乳一斤不問厚薄但取勻淨十分好者即任用非此者不堪用先泥鐵鐺可受四五斗者為灶貯水令滿去口三寸內乳著金銀瓷㼜內任有用之乃下鐺中令水沒㼜上一寸余即得常令如此勿使出水也微火燒日夜不絕水欲竭即添成暖水每一周時輒易水洗鐺並洮乳七日七夜出之淨洮干內瓷缽中玉椎縛格少著水浸之一日一夜急著水攪令大濁燈取濁汁其乳粗者自然著底作末者即自濁水出即經宿澄取其粗著底者准前法研之凡五日五夜皆細遂粉作粉好用澄煉取曝乾即更於銀缽中研之一日候入肉水洗不落者佳鍾乳散鍾乳粉成煉者三兩上黨人參石斛乾薑各三分上四味搗下篩三味與乳合和相得均分作九貼平旦空腹溫淳酒服一貼日午後服一貼黃昏後服一貼三日後准此服之凡服此藥法皆三日一劑三日內止食一升半飯一升肉肉及飯惟爛不得服蔥豉問曰何故三日少食勿得飽也答曰三夜乳在腹中熏補臟腑若此飽食反推藥出腹所以不得飽食也何故不得生食由食生故即損傷藥力藥力既損脂肪亦傷所以不得食生食也何故不得食蔥豉蔥豉殺藥故不得食也三日服藥既盡三日內須作羹食補之任意所便仍不用蔥豉及硬食也三日補訖還須准二服藥如前盡此一斤乳訖其氣力當自知耳不能具述一得此法其後服十斤二十斤任意方便可知也西嶽真人靈飛散方雲母粉一斤茯苓八兩鍾乳粉柏子仁人參續斷桂心各七兩菊花十五兩乾地黃十二兩上九味為末生天門冬十九斤取汁溲藥內銅器中蒸一石二斗黍米下米熟曝乾為末先食飲服方寸匕日一三日力倍五日血脈充盛七日身輕十日面色悅澤十五日行及奔馬三十日夜視有光七十日白髮盡落故齒皆去更取二十一匕白蜜和搗二百杵丸如梧桐子大作八十一枚曝乾丸皆映徹如水晶珠欲令發齒時生者吞七枚日三服即出發未白齒未落者但服散五百年乃白如前法服已白者餌藥至七百年乃落入山日吞七丸絕谷不飢余得此方以來將逾三紀頃者但美而悅之疑而未敢措手積年詢訪屢有好名人曾餌得力遂服之一如方說但能業之不已功不徒棄耳黃帝雜忌法旦起勿開目洗面令人目澀失明饒淚清旦常言善事勿惡言聞惡事即向所來方唾之吉又勿嗔怒勿叱吒咄呼勿嗟嘆勿唱奈何名曰請禍勿立膝坐而交臂膝上勿令發覆面皆不祥勿舉足向火勿對灶罵詈凡行立坐勿背日吉勿面北坐久思不祥起凡欲行來常存魁罡在頭上所向皆吉若欲征戰存斗柄在前以指敵吉勿面北冠帶凶勿向西北唾犯魁罡神凶勿咳唾唾不欲遠成肺病令人手足重及背痛咳嗽亦勿向西北大小便勿殺龜蛇勿怒目視日月喜令人失明行及乘馬不用回顧則神去人不用鬼行踖粟凡遇神廟慎勿輒入入必恭敬不得舉目怒意顧瞻當如對嚴君焉乃享其福耳不爾速獲其禍亦不得返首顧神廟忽興龍蛇勿興心驚怪亦勿注意瞻視忽有鬼怪變異之物即強抑之勿怪咒曰見怪不怪其怪自壞又路行及從中見殊妙美女慎勿熟視而愛之此當魑魅之物使人深愛無問深山曠野稠人廣眾之中皆亦如之凡山水有沙蝨處勿在中浴害人欲渡者隨驢馬後急渡不傷人有水弩處射人影即死欲渡水者以物打水其弩即散急渡不傷人諸山有孔云人採寶者惟三月九月余月山閉氣交死也凡人空腹有用見屍臭氣入鼻舌上白起口常臭欲見屍者皆須飲酒見之有闢毒遠行觸熱塗中逢河勿洗面生烏點房中補益法論曰人年四十以下多有放恣四十以上即頓覺氣力一時衰退衰退既至眾病蜂起久而不治遂至不救凡人氣力自有盛而過人者亦不可抑忍久而不泄致生癰疽若年過六十強有數旬不得交合意中平平者自可閉固也昔正觀初有一野老年七十餘詣余云數日來陽氣益盛思與家嫗晝寢春事皆成未知垂老有此為善惡耶余答之曰是大不祥子獨不聞膏火乎夫膏火之將竭也必先暗而後明明止則滅今足下年邁桑榆久當閉精息欲茲忽春情猛發豈非反常耶竊為足下憂之子其勉歟後四旬發病而死此其不慎之效也如斯之輩非一且疏一人以最將來耳所以善攝生者凡覺陽事輒盛必謹而抑之不可縱心竭意以自賊也若一度製得則一度火滅一度增油若不能制縱情施瀉即是膏火將滅更去其油可不深自防所患人少年時不知道知道亦不能信行之至老乃知道便以晚矣病難養也晚而自保猶得延年益壽若年少壯而能行道者神仙速矣或曰年未六十當閉精守一為可爾否曰不然男子不可無女女不可無男無女則意動意動則神勞神勞則損壽若念真正無可思者則大佳長生也然而萬無一有強抑鬱閉之難持易失使人漏精尿濁以致鬼交之病損一而當百也交會者當避丙丁日及弦望晦朔大風大雨大霧大寒大暑大雷電大霹靂天地晦冥日月薄蝕虹霓地動則損人神不吉損男有倍令女得病有子必癲癡頑愚喑瘂聾瞶攣跛盲眇多病短壽不孝不仁又避日月星辰火光之下神廟佛寺之中井欄圊廁之側塚墓屍柩之旁皆所不可夫交合如法則有積德大智善人降托胎中仍令性行調順所作和合家道日隆祥瑞競集若不如法則有薄福愚癡惡人來托胎中仍令父母性行凶險所作不成家道日否殃咎屢至雖生成長家國滅亡夫禍福之應有如影響此乃必然之理可不再思之若欲求子者但待婦人月經絕後一日三日五日擇其王相日如春甲乙夏丙丁秋庚辛冬壬癸以生氣時夜半後乃施瀉有子皆男必壽而腎明高爵也以月經絕後二日四日六日施瀉有子必女過六日後勿得施瀉既不得子也不成人人有所怒血氣未定因以交合令人發癰疽又不可忍小便交合使人淋莖中痛面失血色及遠行疲乏來入房為五勞虛損少子婦人月事未絕而與交合令人成病得白駁也
