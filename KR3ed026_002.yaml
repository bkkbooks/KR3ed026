人先濃煎艾湯試之如吐即是上用五月蠶蛻紙碎剪安碗中以碟蓋之以百沸湯泡艾碗許仍以別紙封裹縫良久乘熱飲之就臥以厚被蓋之汗出愈又近時多看頭額上及胸前兩邊有小紅點在於皮膚者卻用紙捻成條或大燈草微蘸香油於香油燈上點燒於紅點上焌暴者是又名水傷寒卻用樟木煎湯服或蔥豉湯汗出愈如腹痛不止又用針於兩手十指近甲稍針出血即愈鹽湯吐法治心腹絞痛冷汗出脹悶欲絶俗謂攪腸沙今考之此證乃名乾霍亂此亦由山嵐瘴氣或因飢飽失時陰陽暴亂而致急用鹽湯吐法此法救人不一上用鹽半盞許以熱湯數碗泡鹽令患人盡服連致數碗不得住手方可卻以雞羽掃咽喉間即時吐所吃鹽湯盡出其證即愈又法治沙證但用苧麻蘸水於頸項兩肘臂兩膝腕等處戛掠見得血凝皮膚中紅點如粟粒狀然後蓋覆衣被吃少粥湯或蔥豉湯或清油生蔥茶得汗即愈此皆使皮膚腠理開發鬆利誠不藥之良法也又法兩足墜痛亦名水沙可於兩腳曲腕內兩筋兩骨間刺出血愈名委中穴時疫十神湯治時令不正瘟疫妄行感冒發熱或欲出疹此藥不問陰陽兩感風寒並宜服之川芎甘草炙麻黃去根乾葛升麻去蘆赤芍藥白芷陳皮香附子炒去毛紫蘇各四兩上銼散每服三錢水盞半薑五片煎七分去滓熱服不以時候如發熱頭痛加連須蔥白中滿氣實加枳殼煎不換金正氣散治四時傷寒瘴疫時氣頭痛壯熱腰背拘急五勞七傷山嵐瘴氣寒熱往來五膈氣噎咳嗽痰涎行步喘乏或霍亂吐瀉臟腑虛寒下痢赤白並宜服之厚朴去皮薑汁炒藿香甘草半夏蒼朮米泔浸陳皮各等分上銼散每服三錢水一盞半生薑三片棗二枚煎八分去滓食前稍熱服忌生冷油煎毒物不伏水土宜服之常服進飲食調脾胃一方加白茯苓桂枝黃芩湯治風疫脈浮數而不弱頭項疼腰脊痛發熱惡風遞相傳染桂枝赤芍藥黃芩去枯心各半兩甘草炙一兩上銼散每服五錢水一盞半生薑三片棗二枚煎空心服敗毒散治冬合寒反暖春發溫疫方見傷寒陽證類大柴胡湯治春合暖反涼夏發燥疫方同見上五苓散治秋合涼反淫雨冬發濕疫方見傷暑類五積散治夏合熱反寒秋髮寒疫方見傷寒陰證類柴胡石膏散治時行溫疫壯熱惡風頭痛體疼鼻塞咽喉乾燥心胸滿寒熱往來痰實咳嗽涕唾稠黏赤芍藥五兩桑白皮三兩七錢半石膏煅柴胡去蘆乾葛各五兩升麻二兩五錢黃芩去枯心三兩七錢荊芥穗去土三兩五錢上銼散每服三錢水二盞半生薑三片淡豉十餘粒煎七分去滓熱服小兒作三服蘇合香丸凡入瘟疫家先令開啓門戶以大鍋盛水二斗於堂中心用二十丸煎其香能散疫氣凡病者各飲一瓦後醫者卻入診視不致相染又方入疫家不相染雄黃研細水調以筆濃蘸塗鼻竅中與病人同床亦不相染初洗面後及臨臥時點之凡瘟疫家自生惡氣聞之即上泥丸散入百脈轉相傳染若倉卒無藥以香油抹鼻端及以紙捻探鼻嚏之為佳傷寒遺事戰汗四證厥陰逆至第七日脈得微緩微浮為有脾胃脈也故知脾氣全不再受克邪無所容否極泰來營衛將復水升火降則寒熱作而大汗解矣黑奴丸證服藥一丸但與冷水盡足飲之須臾當寒寒竟汗出便瘥小柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆得湯必蒸蒸而振發汗出而解調胃承氣湯證云太陽病未解脈陰陽俱停先必振栗汗出而解急下兩證少陰主腎系舌本傷寒熱氣入於臟流於少陰之經腎汁干咽路焦故口燥咽乾而渴宜急下之非若陽明證宜下而可緩也雖然陽明宜緩而有一證發熱汗多者亦急下之蓋陽明屬胃汗多則胃汁干亦須急下也少陰證口燥咽乾謂之腎汁干宜急下之陽明證發熱汗多謂之胃汁干亦急下之傷寒傷風誤下成痞傷寒傷風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之屬太陽三陰可汗陰病不當發汗發汗即動經然太陰脈浮少陰病發熱亦須微微出汗但不可正汗耳太陰脈浮者宜桂枝湯少陰發熱脈沉宜麻黃細辛附子湯少陰二三日常見少陰證無陽證者宜麻黃甘草附子湯微發汗皆陰證表藥也瘥後昏沉傷寒瘥後十數日或半月二十日終不惺惺常昏沉似失精神言語錯謬又無寒熱醫或作鬼祟或作風疾多般治之不瘥或朝夕潮熱頰赤或有寒熱似瘧皆緣發汗不盡餘毒在心胞絡間所致也知母麻黃湯主之飲酒復劇傷寒時疾三日已汗解因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不得臥黃連解毒湯主之循衣摸床傷寒若吐若下後不解不大便五六日以上至十餘日日晡即發熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視若微者但發熱譫語大承氣湯主之者一服利則止後服脈弦則生脈澀者死傷寒別名清便自調自可謂大小便如常也大便祕而堅則曰硬小便不利小便少下利清穀皆謂水穀不分得大便曰更衣大便堅小便利曰脾約下利曰飧泄腸僻謂痔也寒而利曰鴨溏熱而利曰腸垢轉失氣謂氣轉而鄉時時失下即後分泄氣蓋腸中有積大汗傷氣大下傷血或火邪逼迫驚狂或尺寸脈緊而反有汗或發汗後汗不止曰漏風或陰病本無汗而反有汗或其脈浮遲微弱不能作汗皆曰亡陽吐汗下溫針以後其病不解曰壞病曰何逆瘥後更發熱曰遺熱脈相剋賊曰負兩手無脈曰雙伏一手無脈曰單伏左關脈曰人迎右關脈曰氣口足趺上動脈曰衝陽足後跟上陷中動脈曰太溪婦人乳頭直下近腹處曰期門臍下一寸半曰氣海二寸曰丹田三寸曰關元玄府即汗空也臍間動氣曰奔豚筋惕肉動曰瞤中暑曰中暍妄發濕溫汗曰重暍渴欲飲水水入即吐曰水逆心下停水怔忪身無大熱頭額微汗曰水結胸乾嘔曰啘咳逆曰噦目中不了了謂不明瞭也睛不和謂不和平如常也三月至夏方發病曰晚發傷寒戒忌傷寒新瘥後但少吃糜粥常令稍飢不得飽食反此則復不得早起不得梳頭洗面不得多言不得勞心費力反此則復瘥後百日內氣體未得平復犯房室者死忌食羊雞狗肉肥魚油膩諸骨汁及咸藏鮓脯油餅面病再發臨治警省傷寒證候傾刻傳變傷寒治法繩尺謹嚴非可以輕心視之也其間種類不一條例浩繁是固難矣至於陰極發躁熱極發厥陰證如陽陽證如陰腳氣似乎傷寒中暑似乎熱病與夫蓄血一證上熱下冷乍哄乍寒至四肢發厥昏迷悶絶凡此等類尤當審思而明辨之若疑似未別體認未明姑且詢探切不可妄投決病之劑方匕雖微死生系也謹之哉傷寒篤證搖頭直視形如煙燻心絶唇吻反青四肢多汗肝絶反目直視狂言遺尿腎絶汗出發潤喘而不休肺絶環口黧黑柔汗發黃脾絶汗出如油喘促無已水漿不下形體不仁命絶大發濕家汁則成痙熱而痙不治發濕溫汗身青面變耳聾不語曰重暍不治發風溫汗必譫語並不治發風濕中濕汗並逆發動氣汗不治發少陰汗九竅出血曰下厥上竭不治發少陽汗則譫語發汗只在頭面不至遍身鼻衄不止者逆發汗不至足者逆諸逆發汗劇者言亂目眩並不治當汗無汗服麻黃數劑七日汗不出者不治汗出如珠不流不治汗出如油口噤肉戰呻吟喘促不治汗後嘔吐水藥不入口者逆熱病脈躁盛而不得汗不治汗後不為汗衰復大熱脈躁疾狂言不食曰陰陽交不治忽冒昧無脈服藥後汗解則生若無汗脈不至者不治少陰厥逆無脈服藥通脈其脈漸續則生暴出則不治下利厥逆無脈灸之脈不回身不溫微喘不治少陰四逆下利惡寒而拳發躁無脈不治下利日十餘行其脈反實者逆少陽陽明合病下利脈長大而弦曰負不治陽病見陰脈不治發斑屬陽見陰脈不治代脈不治吐血衄血脈反浮大而牢不治陰易陽易脈離經外腎腫腹中絞痛手足拳變不治咳逆上氣脈散者不治譫語脈反沉微四肢厥冷不治脈陰陽俱虛熱不止者不治七八日以上發大熱難治舌本爛熱不止者逆下利發熱或汗不止厥不止並不治下利發熱厥逆躁不得眠不治譫語直視或喘滿或下利並不治譫語屬陽見陰證者逆傷寒脈乍疏乍數不治發斑先赤後黯面色黧晦不治發斑大便自利不治發黃而變黑不治口乾舌黑不治口張目陷不治張口出氣乾嘔骨骸熱痛者逆咳逆不止者不治心下疰悶上氣喘粗者逆霍亂喘脹煩躁不治誤下濕家額汗喘促或小便不利大便自利不治頭汗內外關格小便不利此為陽脫不治腹滿咳逆不得小便不治腹大滿而下泄不治若脈洪緊而滑尤可慮臟結如結胸舌白苔陰筋引臍腹痛時時下利不治結胸證具加煩躁不治臟厥七八日發厥膚冷煩躁下利無時暫安不治少陰吐利厥逆煩躁不治厥而下利反能食者曰除中不治四肢厥逆臍下絞痛石硬眼定者逆厥陰唇青舌卷黑而耳聾囊縮不治頭連腦痛甚手足俱寒不治陰毒陽毒過六七日不治兩感難治狐惑咽乾聲啞唇瘡不治赤斑五救其一黑斑十救其一尋衣摸空者逆
