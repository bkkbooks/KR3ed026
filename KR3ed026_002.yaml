body:
  text: 卷第二大方脈雜醫科傷風桂枝湯治足太陽膀胱經傷風脈陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒灑灑惡風翕翕然發熱鼻鳴乾嘔又太陽證宜汗其人失血及下利則頻與服使體潤漐漐連日當自解桂枝去皮芍藥各三兩甘草一兩上銼散每服二錢水一盞半生薑三片棗一枚掰破共煎至七分去滓溫服不拘時惟冬春初可行自春至夏至以前可加黃芩半兩夏至以後加知母半兩石膏二兩或升麻半兩若病人素虛寒者不用加減無汗者不宜服之杏子湯治足陽明胃經傷風惡食口苦咽乾腹滿微喘發熱惡風自汗嗜臥身重小便難潮熱而噦其脈浮弦長而數悉主之杏仁去皮尖半夏湯去滑五味子各三錢半芍藥桂心細辛乾薑炮大黃蒸甘草炙各三錢茯苓四錢上銼散每服四錢水一盞半煎至七分去滓食前服柴胡加桂湯治足少陽膽經傷風四五日身熱惡風頸項強脅下滿手足溫口苦而渴自汗其脈陽浮陰弦或發汗多亡陽譫語可以此和其營衛通其津液自愈柴胡一兩三錢半夏湯去滑四錢一字甘草炙三錢一字芍藥黃芩人參辣桂各半兩上銼散每服五錢水一盞半薑五片棗一枚煎至七分去滓空心溫服桂枝芍藥湯治足太陰脾經傷風自汗咽乾腹滿自利不渴四肢倦怠手足自溫其脈弦大而緩者桂心半兩白芍藥三兩上銼散每服五錢匕水一盞半薑五片棗一枚煎七分去滓溫服腹痛甚者加大黃一兩桂附湯治足少陰腎經傷風胸滿心煩咽喉痛自汗腰痛連胻骨痠痛嘔吐涎沫頭痛其脈沉弦者附子生去皮臍桂心乾薑芍藥甘草炙茯苓桃仁去皮尖麵炒各一兩上銼散每服四錢水二盞煎七分去滓食前服或咽喉痛加桔梗半兩八物湯治足厥陰肝經傷風惡風而倦自汗小腹急痛寒熱如瘧骨節煩疼其脈尺寸俱微而遲者桂心當歸川芎前胡防風各三分芍藥一兩半甘草炙茯苓各半兩上銼散每服四錢水一盞半薑五片棗三枚煎至八分去滓空心服傷暑五苓散治傷暑煩渴引飲無度兼治傷寒溫熱表裡未解煩渴引水水入即吐或小便不利及汗出表解煩渴不止又治霍亂吐利黃疸溫疫澤瀉二兩半桂心一兩豬苓去皮赤茯苓去皮白朮去蘆各一兩半上為末每服二錢沸湯調下不拘時候服訖多飲熱湯汗出即愈溫熱病加甘草一兩炙瘀熱在裡身發黃疸濃煎茵陳湯食前服疸病發渴及中暑引飲白水調服小兒加白朮末少許發虛熱每料綿黃耆人參麥門冬去心各一兩分陰陽退寒熱山茵陳車前草每服各二根止瀉加紫蘇陳米各少許薑汁半匕久痢加肉豆蔻五錢每服鹽梅一個赤痢烏梅一枚粟殼二枚去蒂赤膜醋炒白痢粟殼二枚制同上粟米一撮腹痛南木香半錢渴烏梅一個枇杷葉二皮去白毛糯米一撮伏暑鼻衄白茅花一握小便血以生料者每服加梔子三個車前子一撮煩熱心神恍惚硃砂一字燈心二十莖麥門冬二十粒去心淡竹葉十皮車前草二根傷暑吐血白茅花一握熱瀉車前子一撮麥門冬二十粒去心暑濕瀉紫蘇五葉木瓜三片車前子一撮傷暑頭痛濃煎蔥白湯大便水瀉小便不利加真車前子末少許又方治燥渴去桂心加人參謂之春澤湯濕瀉身痛加蒼朮少許秋多淫雨人患濕疫在冬時服之效縮脾飲治伏暑熱煩渴燥悶乾嘔霍亂草果去皮縮砂去殼烏梅去核各一兩乾葛白扁豆生薑切片日乾各五錢重上銼散每服五錢水一碗煎至八分浸冷服或欲溫欲熱亦可斟酌傷暑發熱頭目痛用以吞消暑丸方見後中暑類卻暑散治冒暑伏熱頭目眩暈嘔吐泄利煩渴背寒面垢赤茯苓去皮甘草生各四兩寒食麵生薑各一斤細切搜面令勻上為末每服二錢新汲水調下或湯點服不拘時候香薷丸治大人小兒傷暑伏熱燥渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦咽乾肢體困倦不思飲食或發霍亂吐利轉筋並宜服之香薷去梗紫蘇去梗乾木瓜各一兩丁香甘草炙檀香白茯苓去皮藿香各半兩上為末蜜丸彈子大每一丸至二丸熟水嚼下或新汲水化下亦得小兒半丸桂苓甘露散治傷寒中暑冒風飲食中外一切所傷傳受濕熱內甚頭痛口乾吐瀉煩渴喜飲冷小便澀大便急痛濕熱霍亂吐下腹滿痛悶及小兒吐瀉驚風茯苓一兩去皮甘草二兩炙白朮半兩澤瀉一兩桂半兩去皮石膏二兩寒水石二兩滑石四兩豬苓半兩上為末每服三錢溫湯調下新水亦得生薑湯尤良小兒每服一錢六和湯治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴不食婦人胎前産後並宜服之人參縮砂甘草炙杏仁去皮尖半夏湯泡七次各三兩白扁豆薑汁略炒赤茯苓去皮藿香葉拂去塵木瓜各二兩香薷去梗厚朴薑汁製各四兩上銼散每服四錢水一盞半生薑三片棗子一枚煎至八分去滓不拘時候服冷香飲子老人虛人伏暑煩躁引飲無度噁心疲倦服涼藥不得者草果仁三兩附子炮去皮臍橘紅各一兩甘草炙半兩上銼散每服一兩水二碗生薑十片煎半碗去滓沉冷旋旋服不拘時潑火散傷暑煩躁發渴口乾及治血痢婦人熱崩青皮去白赤芍藥黃連去須地榆各等分上為細末每服一錢冷水調下如蓄熱而氣血妄行加甘草等分枇杷葉散治中暑伏熱煩渴引飲嘔噦噁心頭目昏眩或陰陽不和致成霍亂吐利轉筋煩躁枇杷葉去毛炙半兩香薷三兩白茅根甘草炙麥門冬去心乾木瓜各一兩陳皮去白焙半兩丁香厚朴去皮薑汁炙各半兩上銼散每服五錢水一盞半生薑三片煎服煩躁沉冷服如脾虛感暑嘔吐不食以此藥煎去滓吞消暑丸六十粒立效體本虛嘔吐昏倦手足冷除茅根麥門冬加附子炮用香薷散治臟腑冷熱不調飲食不節或食腥膾生冷過度起居不節或露臥濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷不能消化米穀致令真邪相干腸胃虛弱飲食變亂於腸胃之間致吐利心腹疼痛霍亂氣逆有心痛而先吐者有腹痛而先利者有吐利俱發者有發熱頭痛體疼而復吐利虛煩者或但吐利心腹刺痛者或轉筋拘急疼痛或但嘔而無物出或四肢逆冷而脈欲絶或煩悶昏塞而欲死者此藥悉能主之香薷去梗四兩厚朴去粗皮切碎薑汁炒令黃白扁豆各二兩上銼散每服五錢水一盞酒一分同煎七分去滓水中沉冷連吃二服立效不拘時候治中暑復傷風搐搦不省人事者宜先服蘇合香丸候其蘇省卻以此藥加黃連羌活各一錢暑濕腫滿香蘇散合和加生薑三片木瓜二片車前草二根伏暑頭疼小便澀濁加山茵陳車前草各二根霍亂吐利加木瓜二片藿香少許生薑三片傷暑腹痛加陳大蓼三寸陳壁土一指頭大木瓜二片臟腑有熱便血加黃連厚朴枳殼烏梅各一錢小便血加瞿麥穗一錢車前子一撮燈心二十莖感暑濕手足繾痛痹冷合和香蘇散每服四錢薑三片木瓜二片陳大蓼三寸煎服留滓再加蔥葉橘葉竹葉陳大蓼各一握水一斗煮七分先熏後洗立效腳氣作痛行步艱辛每料加入木瓜羌活炒蒼朮枳殼去穰陳皮半夏甘草各一兩成十味每服加生薑三片蔥白二根脾胃不和嘔逆噁心冒暑心腹脹滿去羌活加藿香烏梅各一錢壯熱大渴肚皮熱或五心熱加燈心二十莖麥門冬去心白茅根各一錢淡竹葉十皮晚禾根淨洗一握四時感冒嘔泄亦合和香蘇散每服四錢加生薑五片木瓜二片諸熱毒小便赤濁每服四錢加車前子黃連去發各一錢則清利以上皆溫服暑月煩躁潮熱甚加茵陳車前草各二莖苦竹葉七皮山梔子三枚掰破心胸煩躁只依本方宜清水煎冷服暑月潮瀉亦加烏梅車前子一錢陳米一撮暑月虛人腹痛嘔泄加丁香白朮炮附子木瓜各半錢生薑五片亦名六和湯解暑和脾胃加人參陳皮白朮白茯苓黃耆木瓜甘草每料各一兩亦名十味香薷散傷暑單有頭痛正方加山茵陳多服取效以上並熱服常服消暑健脾或為末煉蜜為膏酒服亦妙陳大蓼須用家園種者江邊赤蓼則不用小黃龍丸治伏暑發熱作渴嘔吐噁心及年深暑毒不瘥黃連一斤去須酒二升半上將黃連以酒煮乾為度焙為末用麵糊丸如梧子大每服三十丸熟水吞下又治傷酒過度臟毒下血或泄瀉米飲下食前日二服酒及熱物過度吐血茅花湯下來復丹治上盛下虛裡寒外熱伏暑泄瀉如水及治中暑方見後痼冷類小柴胡湯治傷暑外熱內渴於內更加生薑三片烏梅一個麥門冬三十粒去心煎服不拘時候方見前傷寒陽證類竹葉石膏湯治伏暑內外熱熾煩躁大渴方見前傷寒通治類二陳湯治傷暑復感冷及內傷生冷嘔吐方見痰飲類濯熱散治傷暑迷悶及泄瀉霍亂作渴立效亦能解諸毒白礬五倍子烏梅去核甘草各一兩上為末入飛羅面四兩拌勻每服二錢新汲水調下雖平日不敢飲冷者服之不妨真有奇效為丸如彈子大陰乾冷水調下亦可通苓散治傷暑潮熱煩渴小便不利方見後泄瀉類每服三錢水一盞半燈心二十莖麥門冬二十粒去心淡竹葉十皮車前穗五莖煎不拘時候服渴甚晚禾根少許白茅根五莖枇杷葉二皮去白毛蜜塗微炙煎服傷濕香蘇散加蒼朮川芎白芷木瓜對合各用四錢生薑三片煎服日近遠年傷濕倦弱如虛損多服取效方見前傷寒和解類黃耆建中湯治傷濕鼻塞身痛黃耆微炙辣桂各二兩甘草炙二兩白芍藥六兩上銼散每服三錢薑四片棗一枚煎食前服不換金正氣散治傷濕益脾順氣加茯苓一兩生薑每服三片方見後時疫類朮附湯治傷濕大小便自利方見後中濕類茵陳湯治濕氣瘀熱發黃小便祕澀渴引水漿茵陳一兩半大黃半兩小紅梔子十枚上銼散每服三錢水煎服腎著湯治身重腰冷痹如坐水中形如水狀反不渴小便自利飲食如故病屬下焦從身勞汗出衣里冷濕久而得之腰以下冷痛腰重如帶五千錢甘草炙白朮各二兩去蘆乾薑炮茯苓各四兩去皮上銼散每服四大錢水一盞半煎七分去滓食前服滲濕湯治坐臥濕地或為雨露所襲身重腳弱關節重疼發熱惡寒或小便祕澀大便飧泄或汗出衣里濕漬得之腿膝或腫小便利反不渴蒼朮米泔浸白朮去蘆甘草炙各二兩乾薑炮茯苓各四兩陳皮丁香各半兩上銼散每服四錢用水一盞半生薑三片紅棗二枚煎至七分去滓溫服或腹膨腰腳重滯青木香丸熟水下兼服方見諸疝類瓜蒂搐鼻法治傷濕鼻塞頭疼瓜蒂不以多少㕮咀為細末口含水搐一字許入鼻中流出黃水即效中寒附子理中湯治五臟中寒口噤四肢強直失音不語大附子炮去皮臍人參乾薑炮甘草炙白朮各等分上為㕮散每服四大錢水一盞半煎七分去渣不以時服口噤則斡開灌之薑附湯治中寒卒然暈倒或吐逆涎沫狀如暗風手腳攣搐口噤四肢厥冷或腹燥熱乾薑炮附子炮去皮臍各一兩上㕮散每服四錢水盞半煎七分去渣食前服入肝加木瓜入肺加桑白皮入脾加白朮入心加茯苓隨證加之挾風加防風兼濕多加白朮筋脈牽急加木瓜肢節疼痛加桂心人參白朮各等分仍須暖室添衣被火等圍護中暑又名中暍大黃龍丸治中暑眩暈昏不知人身熱惡寒頭疼狀如傷寒或往來寒熱煩躁渴甚嘔吐泄瀉常服去暑毒分陰陽硫黃硝石各一兩雄黃通明者滑石白礬各半兩寒食麵四兩上為末滴水為丸如梧桐子大每服五丸至七丸漸加至二十丸新汲水下昏塞不知人事以水化開灌之中暑忌得冷此藥卻以冷水下之乃熱因寒用疑者釋之益元散治中暑身熱嘔吐熱瀉赤痢癃閉澀痛利小便益精氣通九竅六腑消蓄水止渴除煩熱心躁百藥酒食等毒解疫癘及兩感傷寒及婦人下乳催生兼吹乳乳癰孕婦莫服白滑石六