皮川楝肉芫花醋浸炒各半兩辣桂牽牛生取仁各三錢川巴豆肉不去油一錢上為末麵糊丸麻子大每三丸空心午前各一服薑湯下五苓散治陰核氣結腫大釣痛多因啼怒不止傷動陰氣結聚不散得之或胎婦啼泣過傷令兒生下小腸氣閉加以風冷血水相聚水氣上乘於肺故先喘而後疝痛外腎木硬臍下痛楚不可忍惟利二便則安以木通蔥白茴香食鹽煎湯調下得小便利為效方見大方科傷暑類當歸散治疝氣大腑秘小腹陰囊牽引撮聚痛甚辣桂牽牛炒取仁各半兩當歸北大黃桃仁浸去皮焙各二錢半全蠍一錢半上銼散每一錢入蜜煎溫服以利大便利後以青皮陳皮茯苓木香縮砂甘草為散生薑煎和胃唇青不治鉤藤膏治盤腸內釣腹中極痛乾啼明乳香沒藥同上別研木香薑黃各四錢半木鱉子十二個去皮研爛上以木鱉子搜和四味末為丸櫻桃大煎鉤藤湯化下一歲可服半丸次魏香散魏香散用蓬莪朮半兩真阿魏一錢先以溫水化開阿魏浸莪朮一日夜焙乾為末每服一字或半錢煎蘇葉米飲空心調下吐衄蒲黃散治吐血咯血生蒲黃油發灰等分上研細每服一錢溫生地黃汁調下米飲亦可生地黃汁方治吐血衄血生地黃汁取一合發灰半錢調分作兩服食後少頃灌下鼻衄方生蘿蔔汁仰頭滴下鼻仍飲其汁腫滿五苓散藿香散治伏暑感濕腫滿用生薑皮木瓜車前草山茵陳煎方見大方科傷暑類分氣飲治腫脹作喘氣短而急北梗赤茯苓陳皮桑白皮炒大腹皮枳殼半夏曲真蘇子炒紫蘇甘草各二錢草果仁一錢上銼散每服一錢半水一盞生薑二片棗子一枚煎服若臍心凸起掌心平缺盆平背心平不治大喘氣粗不食乃腎水盈溢上行傍浸於肺亦不治五皮散神助散相兼服方見大方科腫滿類奇方治熱毒遊腫破草鞋人亂髮燒灰醋調敷熱毒處三黃散貼腫毒上用大黃黃柏黃連各等分為末豶豬膽汁調塗頭心及腳心又方硝石白麵等分研勻井水調睡時塗腳心效單方治腳氣腫痛及蟲腫上商陸不以多少切碎酒煮熟候酒溫連商陸飲吃腹肚蟲腫同米煮粥吃大人亦可服盜汗白朮散安神丸小驚丸牡蠣麻黃根煎湯下方並見前又方治心腋汗大人小兒皆有之大人乃心血溢盛面常發赤者是也小兒因驚得之有人常有盜汗不止氣弱體羸久醫不可乃心血溢盛為汗非虛也宜用藥收斂心血川當歸人參各半兩上銼散用豬心一個可切三片藥亦分三服每服水一碗豬心一片煎服黃耆建中湯治盜汗入米糖煎服效牡蠣散治血虛自汗或病後暴虛津液不固自汗夜臥愈甚久不止則枯瘦短氣煩倦方見大方科自汗類奇方治腳汗白礬乾葛為散煎水洗效又方治睡中汗出酸棗仁人參茯苓為細末米飲下半錢項軟天柱丸治風氣頸垂軟頭不得正或去前或去後蛇含石大一塊煅七次用醋淬七次川鬱金末少許上碾細又入缽內研極細和前藥末入少麝香和勻用雪白大米飯丸龍眼大每服一丸荊芥湯化下或又入生薑汁一二滴或用金銀薄荷湯早晨不拘時下風熱項軟合用涼肝丸方見前五加皮散治頸軟上用五加皮為末酒調塗敷頸骨上健骨散治久患疳疾體虛不食及諸病後天柱骨倒醫者不識謂之五軟白殭蠶為末三歲兒半錢薄荷酒調下後用生筋散貼生筋散治如前木鱉子六個去殼蓖麻子六十個去殼上研細先抱起顱摩頸上令熱津唾調貼之效又方用附子生用去皮臍天南星切各等分生薑自然汁調貼項軟處語遲菖蒲丸治受胎其母卒有驚怖邪氣乘心舌本不通四五歲長猶不能言人參石菖蒲麥門冬去心遠志取肉薑汁漬川芎當歸各二錢滴乳香硃砂各一錢別研上為末煉蜜丸麻子大每服十丸粳米米飲下聤耳明礬散治腎經有熱上衝於耳遂使津液壅滯為稠膿為清汁耳內痛亦有沐浴水入耳中濕氣停滯為膿但不疼二證久不瘥變成聾耳明礬煅龍骨研各三錢黃丹煅二錢石脂一錢麝少許上為末先以綿杖取去水次以鵝毛管吹藥入耳本方加海螵蛸末亦好月蝕耳瘡方胡粉和東方壁土為末敷又方蛤蟆燒灰存性搗為末和豬膏敷重舌敷藥治重舌仍心脾俱有熱也心候於舌所主者血脾之脈絡出於舌下若心脾有熱則血氣俱盛附舌根而重生一物形如舌而短小是也有著頰裡及上齶者曰重齶有著齒斷者曰重斷皆當刺去其血也用真蒲黃敷之或發灰敷之或馬牙硝敷之或竹瀝浸黃柏點之焰硝亦好余並見大方科木舌紫雪治木舌舌乃心之候脾之脈絡於舌臟腑壅滯心脾積熱熱氣上衝故令舌腫漸漸脹大塞滿口中是為木舌若不急療必至害人每用一字研細竹瀝調下方見和劑局方又方黃蜀葵花研細黃丹半之同研點七次又方川朴硝二分紫雪一分白鹽半分同研每半錢竹瀝井水調敷滯頤冷證溫脾丸治滯頤涎流出而漬於頤間也涎者脾之液脾胃虛冷故涎液自流不能收約法當溫脾半夏木香丁香各半兩川白姜生白朮青皮陳皮各一錢半上為末糕糊丸麻子大一歲十丸二歲二十丸米湯灌下熱證通心飲方見前口角瘡爛方發灰為細末豬脂和敷燕窠泥亦好咽喉射干湯治風熱腫痛射干川升麻各一兩馬牙硝馬勃各半兩上為末每服一錢水一盞煎食後溫服喉痹腫痛方蛇蛻燒存性為末上每服用半錢乳汁調下或用蜂房燒存性為末每用半錢乳汁調服夜啼導赤散治心燥啼面赤小便亦赤口中熱腹上亦熱或有汗仰身而啼至曉方息加黃芩煎未效通心飲加麥門冬車前子燈心薄荷煎或用燈心燒灰塗乳上與兒飲亦效方並見前六神散治腹痛啼哭面青口中冷氣四肢亦冷曲腰而啼或大便泄瀉青白糞及不吮乳人參山藥炒白朮各半兩甘草三錢白茯苓白扁豆炒各一兩上為末每服一錢姜二片棗一枚煎一方用當歸白芍藥人參各二錢半甘草桔梗陳皮各一錢為散每服二錢水煎時時與服蒜丸治冷證腹痛夜啼面青手冷大蒜一枚慢火煨香熟取出細切爛研日中或火上焙半乾研乳香半錢別研上研勻丸如芥子大每服七粒乳空時服安神丸治外客忤犯夜啼金銀湯化開服方見前黃土散治小兒卒客忤灶中黃土蚯蚓屎各等分上研勻和水塗兒頭上及五心良觸犯禁忌夜啼方服蘇合香丸以醋炭熏及用方術驅之口到乳上便啼身額必微熱急看口內或瘡或重舌依前口瘡重舌類治之其啼自止囟陷單方治因臟腑有熱渴飲水漿致成泄利久則血氣虛弱不能上交腦髓故囟陷如坑不得滿平宜用黃狗頭骨炙黃為末雞子清調之敷囟填集說囟填者囟門腫起也脾主肌肉乳食不常飢飽無度或寒或熱乘於脾家致使臟腑不調其氣上衝為之填脹囟突而高如物堆垛毛髮短黃自汗是爾若寒氣上衝則牢硬熱氣上衝則柔軟寒者溫之熱者涼之劑量輕重兼以調氣小兒肝盛風熱交攻亦然未易退瘥解顱地黃丸治年大小兒頭縫開解不合腎主髓腦為髓海腎氣有虧腦髓不足所以腦顱開而不能合凡腦髓欠少如木無根不過千日終成廢人大熟地黃洗焙四錢山茱萸乾山藥各二錢澤瀉一錢牡丹皮白茯苓各一錢半上為末爛蜜丸梧桐子大每服一二丸溫水空心送下仍用大南星微炮為末米醋調敷於緋帛上烘熱貼之三辛散治頭骨應合不合頭骨開解名曰解顱細辛桂心各半兩乾薑七錢半上為末以乳汁和敷顱上干復敷之兒面赤即愈又方蛇蛻炒焦為末用豬頰車中髓調敷頂上日三四度有人作頭巾裹遮護之久而自合亦良法也又方驢頭骨不以多少燒灰研細以清油調敷頭縫中手拳不展薏苡丸治所受肝氣虛弱致兩脈攣縮兩手伸展無力當歸焙乾秦艽薏苡仁酸棗仁防風羌活各一兩上為末煉蜜丸雞頭大每一粒到二粒麝香荊芥湯化下腳拳不展海桐皮散治稟受腎氣不足血氣未榮腳指拳縮無力不能伸展海桐皮牡丹皮當歸熟地黃牛膝各一兩山茱萸補骨脂各半兩上為末每服一錢蔥白二寸煎食前服行遲地黃丸治氣血不充骨髓不滿軟弱不能行或肝腎俱虛肝主筋筋弱不能束所致一方加川牛膝五加皮酒炙鹿茸妙方見前又方虎骨丸虎脛骨酒炙赤生乾地黃酸棗仁酒浸去皮炒香白茯苓辣桂防風當歸川芎牛膝等分上為末煉蜜丸麻子大每五丸酒吞下或木瓜湯五加皮散治三歲不能行者真五加皮一分牛膝酸木瓜干各半分上為末每服一錢半粥飲調次入好酒二點再調食前服日二劑鶴節地黃丸治稟受不足血氣不充故肌肉瘦薄骨節呈露如鶴之膝乃腎虛得之腎虛則精髓內耗膚革不榮易為邪氣所襲日就枯瘁其殆鶴腳之節乎本方加鹿茸酥炙川牛膝各二錢修合服餌並同三歲以下與十丸三歲以上與十五丸方見前龜胸百合丹胸高脹滿其狀如龜此肺經受熱所致也乳母酒麴無度或夏月熱煩熱乳與兒得之或乳母多食五辛而亦成此疾川大黃三分焙天門冬去心焙杏仁去此炒百合木通桑白皮炒甜葶藶紙上炒爛石膏各半兩上為末煉蜜丸綠豆大每服五丸食後臨臥熟水化下龜背松蕊丹治嬰兒生下不能護背客風吹脊入於骨髓致之或坐太早亦致傴僂背高如龜多成痼疾松花枳殼防風獨活各一兩麻黃川大黃前胡桂心各半兩上為末蜜丸黍米大每服十粒粥飲下量兒加減灸法肺俞穴第三椎骨下兩傍各一寸半膈俞穴第七椎骨下兩傍各一寸半以小兒手中指中節為一寸艾炷如小麥大但三五壯而止發不生蓯蓉丸治稟受血氣不足不能榮於發當歸去尾生乾地黃肉蓯蓉酒洗炙楊芍藥各一兩胡粉五錢上為末煉蜜丸如黍米大每服十粒煎黑豆湯下兼磨化塗抹頭上齒不生芎黃散治齒不生齒者由骨之所終髓之所養稟氣不足則髓不能充於骨故齒久不生川芎乾地黃當歸山藥白芍藥各一兩沉香半兩粉草三錢上為末溫鹽湯調服半錢用少許揩齒腳亦佳單方雄鼠糞二七粒兩頭尖是每日用一粒揩齒根上至二十一日當生瘡毒平血飲合和敗毒散治諸般瘡毒生薑薄荷生乾地黃麥門冬去心煎服方見瘡腫科諸瘡類及大方科傷暑類犀角消毒飲治同前方見前五福化毒丹小牛黃丸小丸服治同上方見瘡腫科諸瘡類角無辜瘡毒上用黃連大柏為末芭蕉汁調敷角留口搽瘡加輕粉有汁加黃丹煅麝香各少許和勻乾摻諸般惡瘡上藜蘆取皮焙乾為末別研入不夾石雄黃輕粉水粉蚌粉上和勻先用鯽魚一個入真清油內煎候熟去魚以油攤冷調藥敷瘡三日後以蔥湯遍身洗浴所穿衣服並脫去洗淨乳母仍忌油膩肥汁紅酒煎炙及熱物等立效癬瘡用真米醋調敷立效鯽魚方治小兒白禿瘡鯽魚一尾重三四兩者去腸肚以亂髮填滿濕紙裹燒存性上為末生清油調敷先以齏水洗拭後用藥如聖黑膏治頭瘡久不瘥及白禿豆豉半升龍膽草蕪荑各一分上一處用濕紙裹鹽泥固濟火煅存性碾為末以生清油半斤熬取四兩下藥急攪勻得所瓷合收敷神效凡人耳輪瘡極癢臨睡時敷一遍治白禿剃頭後敷愈瘭瘡方治卒得瘭瘡上用赤爛牛糞燒灰研細敷魚臍瘡方瘡頭黑深破之黃水出四畔浮漿上用蛇蛻皮燒存性細研雞子清調敷蠼螋瘡方燕窠土研細豬脂調敷癬方水銀一分胡粉二分水研入雞冠血敷濕癬瘡方上用蛇床子為末先以韭菜根煎湯洗次用臘月豬脂調藥敷之炙甲散治眉叢中生瘡名曰煉銀癬上用穿山甲前膊鱗炙焦為末清油輕粉調敷漏瘡方煉成松脂末併發灰生黃丹填敷白蘞散治凍耳成瘡或癢或痛黃柏白蘞各半兩上為末先以湯洗瘡後用生清油調塗三物散治鬢旁生軟癤名髮鬢有數年不愈者此極妙豬頸上毛貓頸上毛各一撮燒灰鼠屎一粒上為末清油調敷或輕粉尤妙生附散治凍爛腳成瘡生附子半個去皮臍上為末面水調貼之即愈陰瘡方治陰股間汁出先癢後痛愈後復發及陰囊生瘡以火炙瘡抓去痂令乾以蜜敷卻搜面作燒餅炙熟以餳糖塗在餅上乘熱熨之冷則再炙再熨數度為妙胎毒瘡方治一歲二歲內滿頭延及遍身生瘡皆因在胎中父母恣情交合所致名曰胎蛆經久不瘥先用化毒丹消毒飲服卻用父小便以鵝翎刷洗瘡上青黛為細末乾摻效即效方治頭上生瘡及疳瘡豬筒骨中髓調輕粉早敷晚愈又用樹上干桃燒灰清水調敷效暑毒軟癤皆可疣目瘡方治遍身如魚目無膿又名徵虜瘡川長麻銼散煎百一沸入蜜一二匙以瓷器盛鵝翎蘸拭瘡上諸惡瘡生頭面南星貝母等分用湯泡七次研為細末入土朱少許干則清油調搽濕則乾摻口瘡瀉心湯治血盛將養過溫心有客熱熏發於上焦遂成瘡上用黃連一兩去須或加腦子麝香硼砂為末每服一字溫水臨臥服連翹飲治心肺有熱瘡發斑駁如丹身體有熱或熱煮大粟與食亦佳方見疹瘡類洗心散治心熱煩渴作成口瘡每用一字乾摻兒口中咽吃亦無妨乳母同服尤妙方見大方科積熱類敷藥治滿口瘡爛黃丹一兩好蜜一兩瓦盞盛甑上蒸一炊久取出以鵝翎刷瘡上效貼藥吳茱萸末醋調貼兩腳心移夜即愈藥性雖熱能引熱就下至良又方天南星密陀僧為末治口瘡不能吮乳酷調貼兩手心效即洗去背熱加薄荷水試口內又方生硫黃為末新汲水調貼手心腳心效即洗去軟癤豬頭散治軟癤愈而再作用野蜂房一二個燒灰存性以巴豆三七粒去殼煎清油三二沸去巴豆以油調藥敷立效白礬枯為末清油調敷亦效此藥有驗人以豬頭為謝遂名之又方大枳殼一枚去穰令空地上磨令口平以稠麵糊搽四唇沾在癤上自破膿溜出盡更無瘢痕又方治軟癤屢安再作者上用桑螵蛸燒炙存性以清油調敷又方雞抱卵殼燒灰存性為末入輕粉少許清油調敷此物難得只以雞子抱蛻殼如上法用亦可斂瘡口方白芨赤石脂各一錢研當歸三錢去蘆龍骨少許研上為細末乾摻脫肛釣腸丸治大腸虛寒或因服涼藥過度或久痢後臟寒所致丸如粟米大大者細嚼胡桃酒送下小者木香湯下方見大方科諸痔類栝蔞丸治初病脫肛鼻梁青脈唇白齒根焦黃久病兩頰光眉赤唇焦多啼哭黃栝蔞一個白礬半兩上將白礬入栝蔞內固濟火煅為末米糊丸每服三十丸米湯送下痢頻脫肛黑色生殼方上用巴豆殼燒灰芭蕉自然汁煮入朴硝少許洗軟用真清油點三滴放三角白礬煅過研爛真龍骨少許同研摻肛頭用芭蕉葉托上勿令便去出入令大兒抱定龍骨散治大腸虛肛門出龍骨訶子肉炒各二錢半沒石子大者二枚罌粟殼去頰醋炙赤石脂各二錢上為末每服一錢米飲調下洗方香附子荊芥皂角煎水洗又方以蔥湯洗令軟用芭蕉葉托上又方五倍子朴硝大腹皮煎水洗以赤石脂末摻在芭蕉葉上托入貼方蓖麻子四十九粒研爛水調作餅子貼囟頂上收上立有效水聖散子治脫肛不收上用浮萍草不以多少杵為細末干貼患處紫蕺膏治臟熱肛門脫出上用紫蕺一大握又以魚腥草擂爛如泥先用朴硝水洗摻肛門用芭蕉托入卻用藥於臀下貼坐自然致入又方用新磚一片燒紅以醋燒之氣上即用腳布疊數重壓定使熱氣上透不可過熱令病者以臀坐於布上如覺布溫逐旋減之以常得溫熱為度灸法頂上旋毛中三壯即入又灸尾翠骨三壯又灸臍中隨年壯遺尿雞腸散治腎與膀胱俱虛冷氣乘之不能約制故遺尿不禁或睡里自出辣桂龍骨各二錢半雞腸燒牡蠣灰白茯苓真桑螵蛸炒各半兩上銼散每服一錢水一盞姜二片棗一枚煎服又方雞膍胵一具雞腸燒豬胞炙焦上為末每服一錢酒調下男用雌雞女用雄雞者尿白茯苓散治乳哺失節有傷於脾致使清濁色白也久而成疳亦心膈伏熱兼而得之京三稜蓬莪朮煨縮砂仁赤茯苓各半兩青皮陳皮滑石甘草炙各二錢半上為末每服一錢麥門冬燈心煎湯調下又方大甘草頭煎湯服淋閉葵子散治諸淋兼小便不通葵子車前子木通瞿麥桑白皮炒赤茯苓山梔子仁甘草炙各等分上銼散每服一錢井水一小盞蔥白一寸煎食前服導赤散治血淋仍以米飲調油發灰少許空心灌下方見前尿血方生蒲黃生地黃赤茯苓甘草炙各等分上銼散每服一錢水一小盞煎調油發灰少許食前服順經散治十餘歲因驚之候心氣下行小便淋瀝日夕三四十次漸覺黃瘦宜服韭子炒琥珀別研益智去殼炒金毛狗脊去毛白茯苓去皮石燕子火煨醋淬研細各半兩石韋去毛一錢上為末每服一錢韭湯調日二服大便秘沒藥散治風與滯血留蓄上焦胸膈高起大便不通沒藥大黃枳殼北梗各二錢木香甘草各一錢上銼散每服一錢姜二片水一盞煎服陰腫三白散治膀胱蘊熱風濕相乘陰囊腫脹大小便不利白牽牛二兩桑白皮白朮木通去節陳皮去白各半兩上為末每服二錢薑湯調空心服桃仁丸治啼叫怒氣閉擊於下結聚不散水竇不行發為此疾桃仁浸去皮麩微炒三錢辣桂牽牛炒碾取仁白蒺藜炒香搗去刺牡丹皮北大黃各二錢上為末煉蜜丸如麻子大每服五丸或七丸青皮木通蔥白鹽少許煎湯灌下或煎大流氣飲研青木香丸灌下蟬蛻散治陰囊忽腫多坐地為風或蟲蟻吹著上用蟬蛻半兩水一碗煎湯洗腫處其痛立止腫亦消再溫再洗洗後仍與五苓散加燈心煎服又方用蔥丸內蚯蚓糞甘草汁調塗敷藥地龍膏治外腎腫硬或疝或風熱暴腫及陰瘡乾地龍不以多少為末先以蔥椒湯於避風處洗次用津唾調敷其上外腎熱者雞子清調敷或加牡蠣少許又方地龍糞研生薄荷汁調敷牡蠣散治外腎腫大莖物通明牡蠣粉研極細先以津唾塗腫處次用摻敷又方卵腫研桃仁唾調敷遇仙方治風熱外腎焮赤腫痛日夜啼叫不數日蛻皮如雞卵殼愈而復作用老杉木燒灰入膩粉清油調敷效卒暴捷方治卒然腹皮青黑而死灸臍上下左右去臍各半寸並鳩尾骨下一寸凡五處各灸三壯仍用酒和胡粉敷其腹又暴腹滿欲死半夏不以多少微火炮為末酒和為丸如粟米大三五料淡薑湯或蜜湯下又中惡暴死蔥白納下部及鼻中立活或用菖蒲末著舌底及吹入兩鼻兩耳中效又中蟲欲死甘草濃煎湯服立驗斷乳畫眉膏梔子三個燒存性雌黃硃砂各少許上為末入生清油輕粉少許調勻候兒睡著濃抹於兩眉醒來自不吃乳未效再用即驗
