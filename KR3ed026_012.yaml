body:
  text: 卷第十二小方科癉毒平血飲治風熱積毒聚成發於頭面手足熱者如胭脂色其熱如火輕輕著手痛不可忍加紫草煎與犀角消毒飲相間服赤癉火癉紫萍癉並治壯熱煩渴甚加黃芩麥門冬去心朴硝各半錢方見後瘡腫科諸瘡類內托散紅內硝當歸茄片甘草節羌活黃芩各半兩麝香半錢上為末每服一錢茄蒂煎湯調成或生地黃亦可敗毒散治癉毒初發如白梅樣遊走遍體躁悶腹脹焦啼每服二錢水一盞生薑二片紫草少許煎溫服方見大方科傷寒類通治平血飲與敗毒散合和生薑薄荷蟬蛻去足翼防風去蘆細切煎渴加天花粉少許又方角癉遊走不定焮然赤腫疼痛用藥角歸手足上為妙後取碎寒水石石膏黃連黃柏各一兩上為末水調刷又方青黛土朱為末井水調入蜜敷角亦可又方黃丹不拘多少磨刀水調刷又方癉毒腫痛如火用大黃朴硝為末調塗腫處立效水苔生地黃菘菜浮萍梔子皆可研爛水調敷洗方用防風酸車草赤豆灶心土煎水洗又方洗角後用小驚丸壓邪大驚丸鎮驚方見前蜞針法取碎用水蛭數條以青苔蓋覆或濕紙亦可去血即消未消再用癉毒滿身遍黑入腹入陰難治諸疳大安神丸治心疳面黃臉赤煩滿壯熱心躁口瘡虛驚見前益黃散治脾疳體黃肚大愛吃泥土脹滿氣粗痢下酸臭方見後生熟地黃湯治肝疳搖頭揉目白膜遮睛流汗合面而臥肉色青黃須立筋青腦熱羸瘦生乾地黃洗熟地黃洗淨蒸各半兩川芎半赤茯苓枳殼煨去穰杏仁去皮尖川黃連去須半夏曲天麻地骨皮甘草炙當歸各二錢半上銼散每服二錢生薑二片黑豆十五粒水煎臨臥溫服清肺湯治肺疳咳嗽氣逆多啼揉鼻咬甲寒熱桑白皮炒半兩紫蘇北前胡黃芩當歸去尾天門冬去心連翹防風赤茯苓北梗生乾地黃甘草炙各一分上銼散每服二錢水一盞煎溫服不拘時候地黃丸治腎疳極瘦身有瘡疥寒熱作時頭極熱腳冷如冰生乾地黃八錢乾山藥山茱萸各四錢澤瀉牡丹皮白茯苓去皮各三錢上為末煉蜜丸梧桐子大每用一二丸化開服胡黃連丸治熱疳潮熱如火大便澀胡黃連川黃連各半兩硃砂一錢半別研上二連為末和硃砂入豬膽內系定虛懸於銚中煮一炊久取出研蘆薈青黛干各二錢半去足蛤蟆灰二錢麝少許粳米飯丸麻子大每服十丸食後米飲下五福化毒丹治熱疳肌肉黃瘦雀目夜不見物陳粟米飲化下方見前至聖丸治冷疳時時泄瀉虛汗不止丁香丁皮各一錢木香紫厚朴制見前使君子肉焙橘紅肉豆蔻濕紙略煨各二錢上為末神麯糊丸麻子大每七丸食前米飲下銅青散治走馬疳口內生瘡牙齦潰爛齒黑欲脫或出血臭氣丈夫婦人同川白芷半兩生馬牙硝一錢銅青一分麝香一字上為末干敷口角及擦齒上妙仍服蟾酥丸效方見後下蟲丸治蛔疳因食肉太早或腸胃停蓄肥膩為蛔其證多啼嘔吐清沫腹痛脹滿唇口紫黑腸頭及齒癢新白苦楝根皮酒浸焙綠色貫眾木香桃仁浸去皮焙蕪荑焙各二錢雞心檳榔二錢鶴蝨炒一錢輕粉半錢干蛤蟆炙焦三錢使君子略煨取肉五十個上為末飛羅麵糊丸麻子大每二十丸天明清肉汁下內加當歸川黃連各二錢半治脊疳兼疳勞可擇用大蘆薈丸治脊疳蟲蝕脊膂身熱羸黃煩熱下痢脊骨如鋸齒十指皆瘡頻齧指甲蘆薈蕪荑木香青黛干檳榔川黃連淨各一分蟬蛻二十一枚麝少許胡黃連半兩上為末豬膽二個取汁浸糕丸麻子大每服二十丸米飲下龍膽丸治腦疳頭皮光急滿頭餅瘡腦熱髮結身汗腮腫腮高龍膽草川升麻苦楝根皮焙防風赤茯苓蘆薈油發灰青黛干黃連淨各三錢上為末豬膽汁浸糕糊丸麻子大每二十丸薄荷紫蘇泡湯下食後仍以蘆薈末入鼻保童丸治乾疳瘦悴少血舌乾目睛不轉乾啼身熱手足清冷皮燥大便乾結搭口癡眼乾渴黃連去須白鱔頭草龍膽去蘆青橘皮去穰五倍子蟾頭夜明砂炒苦楝根雄黃麝香青黛天漿子炒熊膽蘆薈胡黃連以上各一分上為末研令勻糯米糊和丸麻子大一歲兒每服一丸不計時候米飲下日進三服尤佳一方有干蝸牛微炒一分白朮散又名清寧散治疳渴煩躁引水乳食不進夜則渴甚加烏梅陳米疳瀉停積宿滯水穀不聚頻泄不效加肉豆蔻訶子方見前木香丸治疳痢冷熱不調五色雜下裡急外重黃連淨三錢木香紫厚朴去粗皮薑汁炒縮砂仁夜明砂隔紙炒各二錢訶子肉炒一錢上為末粳米飯丸麻子大每服十五丸干艾葉生薑煎湯食前溫下褐丸子治疳腫脹因虛中有積腹肚緊脹頭面虛浮蘿蔔子一兩炒陳皮青皮好檳榔黑牽牛取仁半生半炒北五靈脂赤茯苓蓬莪朮煨各半兩木香二錢半上為末飛羅麵糊丸綠豆大每服十五丸紫蘇桑白皮煎湯下黃耆湯治疳癆嗽喘不定虛汗骨蒸渴而復瀉乳食遲進黃耆蜜炒當歸川芎白芍藥生乾地黃蛤蟆去足炙焦鱉甲醋炙焦各三錢人參白茯苓橘皮半夏曲北柴胡使君子略煨甘草各二錢炙上銼散每服二錢水一盞姜二片棗一枚煎食前服鱉血丸治疳癆人參半兩川芎蕪荑北柴胡各一兩使君子二十一個胡黃連川黃連各二兩上用鱉血一盞吳茱萸一兩拌和二連淹一宿次早炒乾透出茱萸並血只用二連夾余藥杵末粟米粉糊丸麻子大每服二十丸食前熟水下蚵蚾丸治腦後項旁有核如瘰癧狀按之轉動軟而不疼名無辜疳毒兼治諸疳一服虛熱退二服渴止三服瀉痢住蟾蜍一枚夏月溝渠中取腹大不跳不鳴者其身癩磊石上取糞蟲一杓置桶中以尿浸之桶上要干不與蟲走卻將蟾蜍殺之頓在蟲中任與蟲食一日夜次以新布袋盡包系定置之急流中浸一宿取出瓦上焙為末入麝一字粳飯揉丸麻子大每服二三十丸米飲下一方白蕪荑黃連胡黃連青黛各半兩蚵蚾一個只用酒浸炙去骨為末麵糊丸粟米大每服三十丸食後臨臥米飲下日三服立效又方治無辜疳上以夜明砂炒為末入諸飲食中與之通治蟾酥丸治諸疳殺蟲止腹痛退虛熱大效或因病後通泄太過成疳蟾酥一個酥油炙去骨胡黃連宣連去須龍膽草陳皮川楝子去核木香使君子去殼蕪荑各一兩麝半錢或不入巴豆二七粒去油茴香一兩炒上為末豬膽汁丸或糊丸青黛為衣常服蘇湯下肥兒丸治諸疳多因閉乳吃食太早或因久患臟腑胃虛蟲動日漸羸瘦腹大不能行發豎發熱無精神黃連神麯各一兩大麥蘖半兩炒木香二錢檳榔二個不見火使君子肉肉豆蔻麵裹煨各半兩上為末麵糊丸蘿蔔子大每服三四十丸量兒歲數加減熟水吞下六神丸捉疳止瀉丁香木香肉豆蔻去殼各半兩三味用麵裹同入漫灰火煨令面熟為度訶子使君子蘆薈各一兩細研入上為末棗肉丸麻子大每服五丸至七丸溫米飲下乳食前服五珍丸治疳傷肚大青皮不去白炒焦黃乾薑燒微存性北五靈脂蓬莪朮各一兩上為末搜和稱藥末一兩用肥巴豆肉去油稱一錢研細拌和粳米飯丸麻子大每服三五丸米湯不飢飽時下小黃連阿膠丸治諸疳作熱頻瀉每服二十丸米飲下方見大方科咳嗽類疳啞不能發聲方上以肥兒丸每服十五丸用蘇合香丸一粒入硃砂五靈脂末各少許石菖蒲煎湯調開下方見前蘇合香丸大方科中氣類豬肚黃連丸治疳瘡自孩提至弱冠潮熱發瘡乃疳氣使然疳蟲食其肌膚空虛疳熱流注遍身熱瘡發歇無已蟾酥丸相間服尤妙雄豬肚一具淨洗鷹爪黃連去須淨七兩上銼作小截少水和納豬肚中用線縫密頓在五升粳米上蒸十分爛取放臼中入些蒸飯搗千餘杵黏實得所眾手捏丸如小綠豆大每服二十丸米飲下童子倍之冠者又倍之仍以川芎生地黃茯苓茯神與之調血清心熱多者間服生犀散方見前二十歲以上潮熱發瘡是為虛勞皆一種病也用藥同前凡兒童諸病不出於疳則出於熱熱者生痰常須識此矣洗方上用大腹皮苦參川白芷為銼散煎湯淋洗妙又方甘草黃柏馬鞭草帶須蔥荊芥煎水洗後卻用訶子連肉核燒灰入麝香輕粉少許和勻敷瘡上效敷藥治疳後虛熱小便腫上以韭菜地龍糞煅為末出火毒清油調敷針法治無辜疳腦後項旁有核如彈按之轉動軟而不疼其間有蟲如米粉不速破之則蟲隨熱流散淫蝕臟腑以致肢體作癰瘡便利膿血壯熱羸瘦頭露骨高皆因氣血虛憊所致用針刺破以膏藥貼則愈或因浣濯兒衣露於檐下為雌鳥落羽所汙兒著此衣蟲入皮毛亦致斯疾凡曬兒衣須微火烘之丁奚哺露十全丹治小兒手足極細項小骨高尻削體痿腹大臍突號哭胸陷或生谷症是名丁奚虛熱往來頭骨分開翻食吐蟲煩渴嘔噦是為哺露兩者皆因脾胃久虛不能消化水穀以榮血氣致肌肉銷鑠腎氣不足復為風冷所傷柴骨枯露亦有胎中受毒臟腑少血致之此皆無辜種類之疾並難治宜服青皮去穰陳皮去白蓬朮煨川芎北五靈脂白豆蔻仁雞心檳榔蘆薈各半兩木香使君子肉焙蛤蟆灰各三錢上為末豬膽汁浸糕糊丸麻子大每服三十丸米飲下有熱薄荷湯下魃病龍膽湯治孕婦被惡祟導其腹中令兒病也其證下利寒熱去來毫毛鬢髮不悅澤及治婦人有兒未能行時復有孕使兒飲此乳亦作此病龍膽草北柴胡去蘆及苗黃芩桔梗鉤藤皮芍藥甘草炙茯苓各二錢半蜣螂二枚大黃一兩濕紙裹煨上銼散以水一升煮取五合為一劑十歲以下小兒皆可服若兒生一日至七日分一合為三服八日至十五日分一合半為三服生十六日至二十日分二合為三服二十日至三十日四十日盡以五合為三服皆以得下即止此劑為出腹嬰兒所作若日月長大者以次依此為例必知客忤及有鬼氣可加人參當歸各二錢半一百日兒加一錢一字二百日兒加二錢半一歲兒加半兩余准此積滯蔥湯丸治積神效巴豆二十五粒用水浸一宿五更初去水後去皮殼心膜不去油另研輕粉半錢滑石五錢鷹糞五錢上為末研飯為丸如粟米大周歲以下每用三丸以上四丸未效再加丸數膈上有涎或吐亦無妨如有蟲用苦楝皮少許甘草二寸煎湯五更初先將化蟲藥服了後用此取下春季燈心湯下夏季蘇鹽湯下秋季蘇湯冬季蔥白湯下初生兒以一粒放口中乳汁下消積丸治乳積吐乳瀉乳其氣酸臭此由啼哭未已以乳與兒停滯不化得之丁香烏梅五個炒巴豆十四個去油殼縮砂仁各等分上為末麵糊丸每服七丸米飲下化鐵丹治食積肚硬帶熱渴瀉或嘔皆因飲食無度多餐過飽飽後即睡得之烏梅八個取肉巴豆十六粒去殼青皮五錢去穰陳皮五錢去白上為末米糊丸粟米大每服七丸米飲下化鐵亦消盧氏感應丸紅丸子治食積面目腫黃肚熱脹痛覆睡多困酷啼不食或大腸乾澀小便如泔或便利無禁糞白酸臭服之大效方見大方科諸積及痎瘧類蘇感丸治氣積腹痛啼叫利如蟹涎皆因觸忤其氣榮衛不和淹涎日久得之蘇合香丸感應丸各等分和丸如粟米大紫蘇湯下三十丸立效方見大方科中氣秘澀類異香散取積後調理石蓮肉一兩蓬莪朮益智仁京三稜甘草各六兩青皮去穰陳皮去白各三兩厚朴薑汁炒二兩上銼散每服二錢水一盞生薑二片棗一枚鹽少許煎通口服鹽湯點鹽酒調亦可不拘時服縮砂香附湯平胃散合和滋氣和胃消積每服一錢蘇鹽湯下多服尤妙方見大方科殺蟲使君餅治因吃食粗肉肥甘生熱肌瘦體虛口吐清涎唇間腫痛腹中絞痛口鼻中出黑色蟲不治史君子四十個去殼雷丸半兩定粉二分輕粉半錢青葙子鶴蝨各一分上為末用雞鴨卵和蒸為餅先將此藥隔日夜五更服將蔥湯丸取下方見前四君子湯每服二錢苦楝根少許煎湯調服近病亦效方見前化蟲丸鶴蝨去土胡粉檳榔白礬半生半枯苦楝根皮各半兩蕪荑黃連