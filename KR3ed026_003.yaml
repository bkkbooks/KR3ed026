body:
  text: 卷第三大方脈雜醫科諸氣縮砂香附湯調中快氣治心腹刺痛利三焦順臟腑香附子炒去毛十兩烏藥去心五兩粉草炒二兩縮砂去殼二兩上為末每服一錢紫蘇葉三皮鹽少許沸湯調下不拘時候大便氣祕橘皮湯下亦名寬氣湯沉香降氣湯治陰陽壅滯氣不升降胸膈痞塞心腹脹滿喘促短氣乾噦煩滿咳嗽痰涎口中無味嗜臥減食又治胃痹留飲噫醋聞酸脅下支結常覺努悶及中寒咳逆脾濕洞泄兩脅虛鳴臍下撮痛皆能治之患腳氣人毒氣上衝心腹堅滿肢體浮腫者尤宜服之常服開胃消痰散壅思食香附子炒去毛十兩沉香四錢六分不見火縮砂去殼十二兩粉草炒三兩上為末每服一錢入鹽少許沸湯點服凌旦霧露空心服食去邪惡氣使無瘴疫木香檳榔丸疏導三焦寬利胸膈破痰逐飲快氣消食木香不見火檳榔枳殼麩炒杏仁去皮尖麩炒青皮去白各一兩半夏曲皂角去白酥炙郁李仁去皮各二兩上為末別以皂角四兩用漿水一碗搓揉熬膏更入熟蜜少許和丸如梧桐子大每服五十丸食後生薑湯下歸氣湯治氣不升降胸膈痞滿心腹刺痛不進飲食沉香木香丁香並不見火白姜炮川楝子肉炒肉桂去皮不見火陳皮去白當歸甘草炙附子一個十二錢者炮去皮臍縮砂益智炒各去殼葫蘆巴炒白朮舶上茴香炒豆蔻麵裹煨各一兩上銼散每服三錢水一盞紫蘇三葉木瓜四片鹽少許煎服木香流氣飲調順榮衛通流血脈快利三焦安和五臟治諸氣痞滯不通胸膈膨脹口苦咽乾嘔吐少食肩背走注刺痛及喘急痰嗽面目虛浮四肢腫滿大便祕結水道赤澀又治憂思太過怔忪鬱積腳氣風濕聚結腫痛喘滿脹急不寧陳皮去白一斤青皮去白紫蘇去皮梗甘草爁厚朴去粗皮薑汁製香附炒去毛各半斤木通去節四兩大腹皮丁皮檳榔肉桂去粗皮不見火藿香葉蓬莪朮煨切草果仁木香不見火各三兩麥門冬去心人參去蘆白朮去蘆乾木瓜石菖蒲刮去毛赤茯苓去黑皮川白芷各二兩半夏一兩湯洗七次焙乾上銼散每服四錢水一盞半生薑三片紅棗二枚煎至七分去滓熱服如傷寒頭痛才覺得疾入連根蔥白三寸煎服升降陰陽汗出立愈如臟腑自利入粳米煎婦人血氣癥瘕入艾醋煎不拘時候祕傳降氣湯治男子婦人上熱下虛飲食過度致傷脾胃酒色無節耗損腎元水火交攻陰陽關隔遂使氣不升降上熱則頭目昏眩痰實嘔逆胸膈不快咽喉乾燥飲食無味下弱則腰腳無力大便祕澀裡急後重臍腹冷疼若治以涼則脾氣怯弱腸鳴下利治以溫則上焦壅熱口舌生瘡及腳氣上攻與久痢不瘥宜先服此藥卻以所主藥治之氣壅耳聾泛熱咽疼亦效五加皮半兩酒浸半日炒黃色枳殼一兩湯浸去穰麩炒柴胡去毛蘆洗一兩骨碎補燎去毛銼炒半兩地骨皮半兩炒黃桔梗半兩炒黃色桑白皮二兩銼炒陳皮一兩炒黃色訶子炮取肉半兩炒甘草一兩炒半夏半兩生為末生薑自然汁為餅再碎炒草果去皮膜半兩淨洗炒黃上銼散和勻以碗盛就飯甑上蒸一伏時傾出攤令冷收之每服二錢紫蘇三葉生薑三片水一盞同煎七分食後通口服痰咳加半夏曲心肺虛每料加人參茯苓一兩上膈熱加北黃芩五錢下部大段虛加少許炮附子煎如使附子多加生薑婦人血虛加當歸一兩煎蘇子降氣湯治中脘不快心腹脹滿陰陽壅滯氣不升降胸膈噎塞喘促短氣乾噫煩滿咳嗽痰涎口中無味嗜臥減食宿寒留飲停積不消脅下支結常覺妨悶專治腳氣上衝心腹堅滿肢體浮腫有妨飲食蘇子淨炒半夏洗七次各二兩半甘草炙前胡去蘆厚朴去粗皮薑汁製各一兩陳皮去白一兩川當歸去蘆一兩半肉桂去粗皮一兩不見火上銼散每服二錢至三錢水一大盞生薑三片煎至七分去滓溫服不拘時常服消痰飲散滯氣進飲食體虛痰喘加人參一錢北五味子七粒鹽梅一個杏仁七粒去皮尖紅棗二枚煎虛煩加知母人參每料各一兩分心氣飲治男子婦人一切氣不和或因憂愁思慮或因酒色過傷或臨食憂煩或事不遂意以此不足留滯不散停於胸膈不能流暢致使心胸痞悶脅肋脹滿噎塞不通噫氣吞酸嘔噦噁心頭目昏眩四肢倦怠面色微黃口苦舌乾飲食減少日漸羸瘦或大腸虛祕並皆療之常服升降陰陽調順三焦消化滯氣進美飲食此方獨清而疏快常服大效紫蘇莖葉俱用四兩羌活半夏湯洗七次肉桂去皮青皮去白陳皮去白大腹皮桑白皮炒木通去皮節芍藥甘草炙赤茯苓各一兩上銼散每服三錢水一盞生薑三片棗二枚燈心十莖取七分去滓溫服氣祕每服加枳殼去穰栗殼蘿蔔子皂角子各半錢咳嗽不利加人參一錢五味子七粒桔梗一錢氣滯腰疼加木瓜二片枳殼一錢半水氣面目浮腫加車前子麥門冬去心甜葶藶子木瓜澤瀉豬苓去皮每料各一兩又名小流氣飲推氣丸治三焦痞塞氣不升降胸腹滿悶大便澀小便赤黃檳榔枳實陳皮黃芩大黃黑牽牛炒各等分上為末生薑自然汁煮糊丸如梧子大每服三四十丸淡薑湯下神保丸治諸氣刺痛流入背膂及脅下諸藥不能治木香胡椒各一錢全蠍七枚巴豆十個去皮心研上為末湯釋蒸餅丸麻子大硃砂為衣每服五粒心膈痛柿蒂燈心湯下腹痛柿蒂煨薑湯下血痛炒薑醋湯下肺氣甚者白礬蛤粉各三分黃丹一分同研為末煎桑白皮糯米飲調三錢下小喘桑白皮糯米飲下腎氣脅下痛茴香酒下大便不通蜜湯調檳榔末一錢下氣噎木香湯下宿食不消茶酒漿飲隨意下諸氣為膀胱氣脅下痛最難治獨此藥能去之有人病項筋痛諸醫皆以為風治之數月不愈乃流入背膂久之又注右脅下攣痛甚苦乃合治之一服而愈後嘗再發又服病除又方用胡椒一兩蠍尾半兩去毒為末麵糊丸如粟米大每服五七丸至二十丸陳米飲下名塌氣丸又一方於塌氣丸中加木香一味和順臟氣消腹脅堅脹小便不利並治息積名胡椒丸導氣枳殼丸治氣結不散心胸痞痛逆氣上攻分氣逐風功不可述枳殼去穰麩炒木通銼炒青皮去白陳皮去白桑白皮炒蘿蔔子微炒白牽牛炒莪朮煨茴香炒荊三稜煨各等分上為末生薑汁打麵糊為丸如梧子大每服二十丸煎橘皮湯下不拘時候三稜煎丸順氣寬中消積滯化痰飲治中脘氣痞心腹堅脹脅下緊硬胸中痞塞喘滿短氣噫氣不通嘔吐痰逆飲食不下大便不調或泄或祕杏仁湯浸去皮尖麩炒黃一兩蘿蔔子微炒二兩神麯碎炒三分京三稜生細銼另搗羅為末以酒三升石器內熟熬成膏麥糵炒二兩硇砂一兩水飛煎如鹽研青皮去白乾漆炒各二兩上件為末以三稜膏勻搜和丸如梧桐子大每服十五丸至二十丸溫米飲食後服加阿魏五錢重名阿魏丸又名起祖三稜丸薑湯下三和散治五臟不調三焦不和心腹痞悶脅肋䐜脹風氣壅滯肢節煩疼頭面虛浮手足微腫腸胃燥澀大便祕難雖年高氣弱並可服之又治背痛脅痛有妨飲食及腳氣上攻胸腹滿悶大便不通羌活去蘆一兩紫蘇一兩宣木瓜切焙一兩沉香一兩白朮三分檳榔木香各三分芎藭三兩甘草炒三分陳皮去白三分大腹皮炙焦黃一兩上銼散每服二錢水一盞煎至六分去滓溫服不計時候四磨湯亦可兼服方見祕澀類五香連翹湯治壯盛人胸膈痞塞氣不升降百藥不效服之奏功必矣方見瘡腫雜證類神仙九氣湯治九氣膈氣風氣寒氣熱氣憂氣喜氣驚氣怒氣山嵐瘴氣積聚堅牢如杯心腹刺痛不能飲食時去時來發則欲死川薑黃甘草香附子上為末每服一大錢入鹽少許百沸湯點空心服立效賺氣散治心胸痞悶腹脅虛脹飲食減少氣不宣通及傷寒兩脅刺痛攻心荊三稜蓬莪朮煨熟各五兩白朮三兩木香半兩枳殼去白麩炒一兩上銼散每服二錢水一盞生薑三片煎至六分食前溫服用沙糖少許壓下參附正氣散治陰陽不和臟腑虛弱頭目昏眩腹脅刺痛嘔逆噁心飲食不進氣虛盜汗咳嗽上喘四肢厥冷腰背痠痛脾虛泄瀉脾腎俱損精血傷竭氣短脈沉耳乾焦黑面黃體瘦怠惰多困小便頻數小腸氣痛霍亂吐瀉及卒中風氣昏亂不常大病尪羸倦弱妊娠失調理産後虛損並宜服之大能補虛正氣調理氣血固腎消痰人參木香白豆蔻各二錢半川芎乾薑甘草藿香茯苓黃耆當歸去尾丁香桂心陳皮白芷縮砂仁青皮各半兩去白白朮附子炮半夏曲各七錢上銼散每服半錢生薑五片棗二個煎服此方屢有奇驗破塊丸治受瘴結成氣塊腹中不能消散服之立效蓽茇一兩大黃一兩各生用上為末入生麝香少許煉蜜為丸如梧子大每服三十丸空心冷酒下或溫冷湯下日三服灸法凡上氣冷發腹中雷嗚轉叫嘔逆不食灸太衝穴在足大指本節後二寸陷中不限壯數從痛至不痛不痛至痛止心腹諸病堅滿煩痛憂思結氣心痛吐下食不消灸太倉穴在心下四寸胃脘下一寸臍下攪痛流入陰中發作無時此冷氣灸關元百壯穴在臍下三寸及灸膏肓二穴短氣不語灸大椎隨年壯又灸肺俞百壯臍孔中二七壯乏氣灸第五椎下隨年壯中氣蘇合香丸治氣中雖不見方書所載然暴喜傷陽暴怒傷陰憂愁失意氣多厥逆往往多得此疾便覺涎壅牙關緊急若作中風用藥非唯不相當多能死人昔有一婦人因憂戚中忽然氣厥牙噤涎潮里醫作中風用藥以大通利藥下之大泄數行一夕而卒可不戒之如遇此證急化蘇合香丸四五粒灌之便醒然後隨其調理無不痊愈蘇合香油一兩入安息香膏內薰陸香一兩研青木香銼白朮去蘆丁香白檀香硃砂研水飛沉香香附子炒去毛烏犀鎊屑蓽茇安息香別為末用無灰酒一升熬膏麝香研訶黎勒煨龍腦研以上各一兩上為末入研藥勻用安息香膏並煉白蜜和劑每服旋丸如梧子大取井花水溫冷任意下四丸老人小兒可服一丸溫酒化服亦得並空心服之用蠟紙裹一丸如彈子大緋絹袋盛當心帶之一切邪神不敢近獨香湯治中氣閉目不語四肢不收昏沉等證南木香不以多少上為末冬瓜子煎湯調下痰盛加南星為散生薑煎朮附湯治中寒中氣之候四肢厥逆口噤牙關緊急痰涎壅盛如中風狀者白朮四兩去蘆綿附子炮去皮臍薄切片一兩半甘草炙二兩上銼散每服三錢水一盞姜十片煎取八分去滓後調蘇合香丸二粒並進二服或氣短頭暈手足厥逆未退者可進養正丹三十粒至百粒奇效不拘時候回陽湯治中氣脈弱大段虛怯等證川烏生去皮臍附子生去皮臍各半兩乾薑炮二錢青皮去穰一兩益智仁去殼一兩上銼散每服三錢姜七片紅棗一枚煎服或入少木香不拘時候八味順氣散中風亦當間服此藥中氣者尤得其宜白朮炒白茯苓去皮青皮去白白芷陳皮去白天台烏藥人參去蘆各一兩甘草炙半兩上銼散每服三錢水一大盞煎至七分溫服不拘時候諸疝風寒證烏頭桂枝湯治風寒疝腹中痛逆冷手足不仁身體疼痛灸刺諸藥不能療及賊風入腹攻刺五臟拘急不得轉側發作叫呼陰縮悉主之大烏頭一枚實者去皮尖蜜一大盞煎減半出湯切洗肉桂去粗皮芍藥各三錢三字甘草炙二錢半上銼散每服四錢水一盞半生薑五片大棗三個入前煎烏頭蜜半合同煎至七分盞去滓食前服一法用附子一個不使烏頭為蜜附湯寒證倉卒散治寒疝入腹心腹卒痛及小腸膀胱氣㽲刺脾腎氣攻攣急極痛不可忍屈伸不能腹中冷重如石白汗出山梔子四十九個燒半過附子一枚炮上銼散每服二錢水一盞酒半盞煎至七分入鹽一捻溫服即愈暑證香薷散加瞿麥木通每服四錢食鹽少許煎服生料木香勻氣散治寒疝作痛和氣丁香檀香木香各一兩甘草爁四兩縮砂去殼二兩白豆蔻仁沉香各一兩藿香去土四兩上銼散每服二錢水一盞半生薑三片紫蘇葉五