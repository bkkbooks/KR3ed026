通用方見傷暑類茵陳湯治濕熱瘀黃小便祕澀頭汗而渴茵陳蒿一兩半大黃半兩小紅梔子十枚上銼散每服三錢水煎服五苓散亦治發黃二藥夾煎濕證礬石滑石散治濕疸得之一身盡痛發熱面色黑黃七八日後壯熱在裡有血下如豚肝狀小腹滿者急下之身目盡黃小便不利其脈沉細礬石煅滑石各等分上為末每服二大錢麥粥飲調下日三服食前便利如血者效或汗愈時行梔子丸治時行病急黃及瘴瘧疫癘茵陳梔子芒硝杏仁去皮尖炒各三分大黃蒸一兩一分豆豉二分半湯浸軟別研恆山鱉甲醋炙各半兩巴豆去皮壓去油一分上為末餳飴為丸如梧子大每服三丸飲下吐利為效未知加一丸覺體氣有異急服之黃汗苦酒湯治身體洪腫發熱自汗如柏汁其脈沉黃耆五兩芍藥桂心三兩上銼散每服四錢苦酒三合水一盞半煎至七分去滓不以時服初服當心煩以苦酒阻故也至六七日稍愈桂枝加黃耆湯治黃汗身腫汗出出已輒輕久久必身瞤胸中痛腰以下無汗腰髖弛痛如有物在皮中劇者不能食煩躁小便不利桂枝去皮芍藥各三兩甘草二兩炙黃耆五兩上銼散每服四錢水一盞半姜五片棗三枚煎至七分去滓溫服仍飲熱粥以助藥力覆取微汗未汗再服黃疸茵陳散治黃疸食已即飢身體面目爪甲牙齒及小便悉黃寒熱或身體多赤多青皆由酒食過度為風濕所搏熱氣鬱蒸而成茵陳木通梔子仁各一兩大黃炒栝蔞一個石膏二兩甘草炙半兩上銼散每服水一盞半生薑五片蔥白一莖煎至八分去滓溫服不拘時候大小便閉加枳實赤茯苓葶藶子小半夏湯治黃疸小便色不異欲自利腹滿而喘者不可除熱熱去必噦半夏上銼散每服三錢水一盞姜十片煎至七分不以時服單方治黃疸身眼黃如金色不可使婦人雞犬見修制東引桃根切細如箸若叉股者以下一握上以水一大升煎取一小升適溫空腹頓服後三日其黃離離如薄雲散聚後瘥百日方平復身黃後可時時飲一盞清酒則眼中易散不飲則散遲忌食麵豬魚肉谷疸苦參丸治冒暑瘀熱氣濁食谷不消大小便不利脹滿不下食趺陽脈緊而數亦治因勞發熱熱鬱發黃苦參三兩龍膽草一兩梔子去皮炒半兩人參三分上為末以豬膽汁入熱蜜少許搜和丸如梧子大以大麥煮飲下五十丸日三服不知稍加之脾疸龍腦丸治胸中鬱熱肺熱喘嗽口臭喉腥或口甜丈夫吐血婦人熱血崩並皆治龍腦薄荷五兩淨葉真蒲黃一兩麥門冬去心二兩阿膠一兩甘草一兩人參一兩川當歸黃耆一兩半木通一兩生乾地黃三兩柴胡好者半兩上為末煉蜜丸如梧子大每服二十丸上焦食後用熟水吞下微嚼破更好病下焦空心服小兒加減與之此藥大有奇效不可盡述紅丸子治谷疸腹滿眩暈怫鬱怔忡酒疸通用二陳湯加縮砂煎湯下方見痎瘧類酒疸葛根湯治酒疸因下後久久為黑疸目青面黑心中如啖韭齏狀大便正黑小便亦或黑其脈微而數大抵五疸惟酒疸變證最多蓋酒之為物隨人性量不同有盈石而不醉者有濡唇而輒亂者以醞釀而成有大熱毒滲入百脈為病則不待發黃溢於皮膚為黑為腫流於清氣道中則眼黃鼻腫種種不同故方中論酒疸外有肉疸黑疸癖疸勞役疸葛根一兩枳實去穰麩炒梔子仁豉各一兩甘草炙半兩上銼散每服四錢水盞半煎至八分去滓溫服不拘時候酒蒸黃連丸治酒疸黃連去須淨四兩銼碎以酒灑淹一宿曬乾為末粟米糊為丸如梧桐子大每服三四十丸以二陳湯加葛根茵陳薑棗煎湯送下六物飲治酒疸肚脹蓽茇荊芥穗不蛀川楝子連皮核用生薑母軟烏梅甘草上件等分於石臼中搗細用瓷器盛以自己滿腹小便去其首尾取中間小便浸藥兩重紗蓋露星一宿拂明飲其汁續用車前子山茵陳竹園荽煎湯乘熱調五苓散服自覺黃水從小便出而肚不脹妙人參散治飲酒房勞酒入百脈令人恍惚失常人參白芍藥栝蔞根枳殼麩炒去穰茯神酸棗仁甘草炙各一兩熟地黃二兩上銼散每服四大錢水一盞煎至七分食後臨臥溫服辰砂妙香散治飲酒行房酒熱瘀於心經致成黃疸再加辰砂末少許每服二錢茵陳二根煎湯日三服方見心恙類土瓜方治酒疸熱疸土瓜搗汁取服任意如神散治酒毒不散發黃久久浸清流入清氣道中宜引藥納鼻滴出黃水愈苦瓠子去殼苦葫蘆子各三七個黃黍米三百粒安息香二皂角子大上為末以一字搐入鼻中滴盡黃水三升或過多則以黍穰燒灰麝香末各少許搐入鼻中立止女勞疸石膏散治女勞疸身黃額黑日晡發熱惡寒小腹急足下熱其脈浮緊腹或滿者難治滑石石膏煅各等分上為末大麥粥飲調下二錢匕日三四服小便利則瘥熱疸一清飲治疸發熱諸熱通用柴胡三兩赤茯苓二兩桑白皮制川芎一兩甘草炙半兩上銼散每服三錢生薑棗子煎服虛勞疸秦艽飲治五疸口淡耳鳴腳弱發寒熱小便白濁秦艽去蘆當歸去蘆酒浸芍藥白朮官桂去皮不見火赤茯苓去皮熟地黃酒蒸橘紅小草川芎各一兩半夏湯洗甘草炙各半兩上銼散每服四錢水一盞半姜五片煎至七分去滓溫服不拘時候養榮湯治證同上方見虛損類久黃苦參散治人無故忽然振寒皮膚麴塵出小便赤澀大便時祕氣無異飲食不妨諸藥湯不除因為久黃苦參黃連瓜蒂黃柏去皮大黃蒸各一分葶藶炒半兩上為末每服一大錢米飲調服當吐下隨時消息加減積黃無忌紫金丸理脾胃退黃針砂醋煮通紅紫金皮酒浸香附子炒三稜醋浸一宿煮蒼朮米泔浸陳皮青皮去白厚朴薑製縮砂各一兩上醋糊丸每服三十丸酒熟水下川椒湯服亦可立效五噎五噎散治五種噎食飲不下胸背痛嘔噦不徹攻刺疼痛淚與涎俱出人參茯苓厚朴去粗皮薑汁製甘草炙枳殼麩炒去穰訶子炮去核桂心白朮橘皮白姜三稜炮神麯炒麥芽炒各二兩木香檳榔蓬莪朮炮各半兩上銼散每服二錢水一盞生薑三片棗子一枚煎至七分空心服為末鹽湯下亦得沉香散治五噎五膈胸中久寒諸氣結聚嘔逆噎塞食飲不化結氣不消常服寬氣通噎寬中進食白朮茯苓各半兩木通當歸橘皮青皮大腹子檳榔芍藥各一兩甘草炙一兩半白芷三兩紫蘇葉四兩枳殼麩炒去穰三兩上銼散每服三錢水一盞姜三片棗二枚煎至六分空腹溫服嘉禾散治同上方見脾胃類大七氣湯治喜怒不節憂思兼併多生悲恐或時振驚致臟氣不平增寒發熱心腹脹滿旁沖兩脅上塞咽喉有如炙臠吐咽不下皆七氣所生半夏湯泡七次五兩白茯苓四兩厚朴薑製炒三兩紫蘇二兩上銼散每服四錢水一盞姜三片棗一枚煎空腹溫服五膈寬中散治因憂恚寒熱動氣成五類膈氣不進飲食白豆蔻去皮二兩縮砂四兩香附子炒去毛十六兩丁香四兩木香三兩青皮去白四兩甘草炙五兩厚朴去皮薑汁炙令熟一斤陳皮去白四兩上為末每服二錢入生薑二片鹽少許沸湯點服不以時候諸冷氣用之亦效五膈散治五膈胸膈痞悶諸氣結聚脅肋脹滿痰逆噁心不進飲食枳殼去穰麩炒木香不見火青皮去白大腹子白朮半夏曲銼炒丁香不見火天南星湯泡去皮乾薑炮麥芽炒草果仁各一兩甘草炙半兩上為末每服二錢水一中盞生薑五片煎至六分溫服不拘時候五膈丸治憂恚思慮膈寒不通及食冷物即發其病苦心痛不得氣息引痛痛如刺心下堅大如粉絮緊痛如吐吐即瘥食飲不下甚者手足冷短氣或上氣喘急嘔逆者麥門冬去心甘草炙各五兩人參四兩川椒炒出汗遠志去心炒細辛去苗桂心各三兩乾薑炮二兩附子一兩炮上為末蜜丸彈子大含化日三服夜二服胸中當熱七日愈亦可丸如梧子大米湯下二三十丸夏加麥門冬甘草人參各一兩一方以吳茱萸代桂治遇寒冷則心痛咽中有物吐不出咽不入飲食減少並可服不拘時寬膈丸治氣不升降胸膈結痞木香京三稜青皮各半兩半夏三兩湯洗七次大腹子一分上為末薑汁糊為丸如梧子大食後米湯下二三十丸栝蔞實丸治胸中痛徹背喘急妨悶栝蔞實別研枳殼去穰麩炒半夏湯泡七次桔梗去蘆麩炒各一兩上為末薑汁打糊丸如梧子大每服五十丸食後淡薑湯送下
