body:
  text: 卷第七大方脈雜醫科消渴肺消澄源丹治氣實血虛熱在上焦心煩燥渴引飲無度小便數晝夜一二十行有麩片甜者此疾多得之飲啖炙爆日就羸瘦咽喉唇口焦燥吸吸少氣不能多語兩腳痠食倍於常不為氣力牡蠣粉苦參密陀僧知母水銀以白蠟半錢結栝蔞根一兩黃丹一兩與水銀砂同研上為末男子用雌豬肚一個女人用雄豬肚一個入藥在內以線縫定用繩縛在新磚上別用生栝蔞根半斤切碎同煮早晨至午時取藥出不用栝蔞根只爛研豬肚和藥為丸如梧桐子大每服三十粒食前米湯下日三服十日可去病根真珠丸治心虛煩悶或外傷暑熱內積愁煩酣飲過多皆致煩渴口乾舌燥引飲無度小便或利或不利知母一兩一分川連一兩去毛苦參玄參各一兩鐵胤粉一兩一分研牡蠣煅一兩一分硃砂另研二兩麥門冬去心天花粉各半兩金箔銀箔各二百片白扁豆煮去皮一兩上為末煉蜜入生栝蔞根汁少許丸如梧子大用金銀箔為衣每服二十丸至三十丸先用栝蔞根汁下一服次用麥門冬熟水下病退日二服忌炙爆酒色次投蓯蓉丸補蓯蓉丸蓯蓉酒浸磁石煅碎熟地黃洗山茱萸去核黃耆去蘆鹽湯浸澤瀉鹿茸去毛切醋炙遠志去心薑汁炒石斛覆盆子五味子去梗萆薢破故紙炒巴戟酒浸菟絲子酒浸龍骨杜仲去皮銼薑汁拌炒斷絲各半兩附子炮去皮臍一個重八錢上為末煉蜜丸梧桐子大每服五十丸空腹米飲下生地黃膏治渴證通用生地黃束如常碗大一把冬蜜一碗人參半兩白茯苓去皮一兩上將地黃洗切研細以新水一碗調開同蜜煎至半次入參苓末拌和瓷器密收匙挑服脾消飲食入腹如湯澆雪隨小便而出落於溷僻溝渠中皆旋結如白脂肌膚日益消瘦用熱藥則熱愈甚用涼藥則愈見虛羸不能起止精神恍惚口舌焦乾或陽強與盛不交而泄其斃不久無治法姑録一二方聊為備用姜粉散治消中多因外傷疸熱內積憂思喜啖鹹食及面致脾胃乾燥飲食倍常不為肌膚大便反堅小便無度生薑研汁輕粉上搜勻每服二錢匕長流水調下齒浮是效次投附子豬肚丸補附子豬肚丸附子炮去皮臍檳榔焙各一兩鱉甲醋煮七錢半當歸知母木香川楝去核銼秦艽去苗土大黃酒蒸龍膽草白芍藥破故紙酒浸炒枳殼麩炒去穰各半兩上為末分作三分將二分入豬肚內縫定用蜜酒三升童子小便五升同入砂鉢內熬干爛研細入一分末同搜搗為丸梧桐子大每服五十丸溫酒米湯任下白朮散治消中消殼善飢人參去蘆白朮去蘆白茯苓甘草炙藿香藥去土各一兩白乾葛二兩木香半兩加北五味去梗柴胡去毛枳殼去穰各半兩上銼散每服三錢新水煎去滓不拘時候茯神丸治消中煩熱消穀小便數人參去蘆茯神去木生乾地黃去土黃連淨麥門冬去心枳殼去穰牡蠣粉各一兩蓮肉去心黃耆去蘆炙知母去毛各半兩瓜根七錢半上為末煉蜜和搗三百杵丸如梧桐子大每服五十丸清粥飲下腎消加減八味丸治腎水枯竭不能上潤心火上炎不能既濟煎熬而生心煩燥渴小便頻數白濁陰痿弱飲食不多肌膚漸漸如削或腿腫腳先瘦小宜降心火生腎水其煩渴頓止熟地黃大者洗焙乾切酒灑蒸七次焙乾稱二兩真山藥微炒山茱萸去核取肉焙乾稱一兩肉桂去粗皮不見火取末半兩澤瀉水洗切酒潤蒸一次牡丹皮去骨白茯苓去皮為末飛取沉者各八錢真北五味略炒別為末兩半上為末煉蜜丸梧桐子大五更初未言語時溫酒鹽湯下三五十丸午前及晚間空腹再服此方用真北五味子最為得力服此不惟止渴亦免生癰疽久服永除渴疾氣血加壯天王補心丹寧心保神益血固精壯力強志令人不忘清三焦化痰涎祛煩熱除驚悸療咽乾口燥育養心氣熟地黃洗人參去蘆白茯苓去皮遠志去心石菖蒲去毛黑參柏子仁桔梗去蘆天門冬去心丹參洗酸棗仁去骨炒甘草炙麥門冬去心百部洗杜仲薑汁炒斷絲茯神去木當歸去尾五味子去枝梗各等分上為末煉蜜丸每一兩作十丸金箔為衣每服一丸燈心棗湯化下食後臨臥服作梧子大丸吞服亦可鹿茸丸治失志傷腎腎虛消渴小便無度鹿茸去毛切酒浸炙七錢麥門冬去心二兩熟地黃洗淨黃耆去蘆雞膍胵麩炒蓯蓉酒浸山茱萸去核取肉破故紙炒川牛膝去蘆酒浸五味子各三分白茯苓去皮地骨皮去骨各半兩人參去蘆三分上為末蜜丸如梧子大每服三十丸至五十丸米湯下雙補丸治腎虛水涸燥渴勞倦鹿角膠二兩沉香半兩不見火澤瀉載塊再蒸半兩覆盆子白茯苓去皮人參去蘆宣木瓜薏苡仁炒黃耆炙熟地黃洗再蒸蓯蓉酒浸焙菟絲子酒浸蒸焙五味子石斛炒當歸去尾酒浸焙各一兩生麝一錢別研上為末煉蜜丸梧桐子大硃砂為衣每服五十丸空心棗湯送下丹石毒栝蔞散治盛壯之時不自謹惜恣情縱欲年長腎氣虛弱惟不能房多服丹石真氣既盡石氣孤立唇口乾焦精液自泄小便赤黃大便乾實小便晝夜百十行須當除熱補虛白茯苓去皮天花粉宣連白扁豆人參去蘆石膏甘草節寒水石白朮去蘆豬苓各等分上為末每服二錢熱湯調服立效石膏薺苨湯治強中多因耽嗜色欲及快意飲食或服丹石真氣既脫藥氣陰發致煩渴引水飲食倍常陰氣常興不交精出故中焦虛熱注於下焦三消之中最為難治薺苨石膏各三兩人參去蘆茯神去木栝蔞根磁石煅碎知母去毛乾葛黃芩去心甘草各二兩上銼散每服用水三盞腰子一個去脂膜黑豆一合煮至一盞半去腰子黑豆入藥四錢煎至七分去滓食後服下焦熱則夜間服渴止勿服次投補藥黃連豬肚丸治強中消渴服栝蔞散薺苨湯後便可服此亦能補養豬肚一枚治如食法黃連去須小麥炒各五兩天花粉茯神去木各四兩麥門冬去心二兩上五味為末內豬肚中縫塞安甑中蒸之極爛木臼小杵可丸如梧桐子大每服七十丸米飲送下隨意服之如不能丸入少煉蜜罌粟湯治腎渴解五石毒罌粟子上煮稀粥入蜜飲之加減三黃丸治丹石毒及熱渴以意測度須大實者方用春黃芩四兩大黃三兩黃連四兩夏黃芩六兩大黃一兩黃連七兩秋黃芩六兩大黃二兩黃連三兩冬黃芩三兩大黃四兩黃連二兩上為末煉蜜丸梧桐子大每服十丸服一月病愈酣飲烏梅木瓜湯治飲酒多發積為酷熱熏蒸五臟津液枯燥血泣小便並多肌肉消鑠專嗜冷物寒漿木瓜干為梅打破不去仁麥蘖炒甘草草果去皮各半兩上銼散每服四錢水盞半生薑五片煎七分不拘時候枳椇子丸治同上枳椇子二兩麝香一錢上為末麵糊丸梧桐子大每服三十丸空心鹽湯吞下三神湯治同上烏梅肉遠志去心甘草水煮過卻以薑汁拌炒各一兩枳實去穰一兩夏加黃連五錢春秋冬不用上銼散每服四錢水兩盞糯米根一握煎七分去滓不拘時服若無糯米根白茅根亦可如無白茅根禾稈繩代之亦可龍鳳丸治同上鹿茸火燎去毛一兩酒浸炙山藥菟絲子酒浸炒各二兩上為末煉蜜丸梧桐子大每服三十丸食前米飲下濃煎人參湯亦可蔞連丸治消渴小便滑如油頻數者黃連去須栝蔞連穰各等分上為末生地黃自然汁丸如梧子大每服五十丸食後牛乳汁下酪湯下一日二服忌冷水豬肉或研麥門冬自然汁為丸熱水吞下硃砂黃連丸治心虛蘊熱或因飲酒過多發為消渴硃砂一兩別研宣連三兩生地黃二兩上為末煉蜜丸如梧子大每服五十丸燈心棗湯吞下酒蒸黃連丸治隔熱解酒毒止渴厚腸胃方見下痢類通治玄兔丹治三消渴利神藥常服禁精止白濁延年菟絲子酒浸通軟乘濕研焙乾取末十兩白茯苓去皮干連肉各三兩五味子去梗酒浸稱七兩上為末別研山藥末六兩將反浸酒余者添酒煮糊為丸如梧子大每服五十丸天花粉北五味子煎湯下溫酒鹽湯亦可腳膝無力木瓜湯下清心蓮子飲治心中蓄熱時常煩躁因而思慮勞心憂愁抑鬱是致小便白濁或有沙膜夜夢走泄遺瀝澀痛便赤如血或因酒色過度上盛下虛心火炎上肺金受克口舌乾燥漸成消渴睡臥不安四肢倦怠男子五淋婦人帶下赤白及病後氣不收斂陽浮於外五心煩熱藥性溫平不冷不熱常服清心養神祕精補虛滋潤腸胃調順血氣黃芩去心半兩黃耆去蘆蜜炙石蓮肉去心白茯苓去皮人參去蘆各七錢麥門冬去心甘草地骨皮去骨車前子去沙土半兩上銼散每服三錢麥門冬十粒去心水一盞半煎取八分去滓水中沉冷空腹服發熱加柴胡薄荷煎六神湯治三消渴疾蓮房乾葛枇杷葉去毛甘草炙栝蔞根綿黃耆去蘆蜜炙各等分上銼散每服四錢水一盞煎七分去滓溫服小便不利加赤茯苓子童桑白皮湯治三消渴病或飲多利少或不飲自利肌膚瘦削四肢倦怠常服補虛止渴利童根桑白皮即未多時栽者去粗皮曬乾不焙白茯苓去皮人參去蘆麥門冬去心乾葛乾山藥桂心去粗皮各一兩甘草半兩生用上銼散水一盞半煎至七分去滓溫服梅花湯治三消渴利神效糯谷旋炒作爆桑根白皮厚者切細等分上每用稱一兩許水一大碗煮取半碗渴則飲不拘時文蛤散治渴欲飲水不止文蛤即五倍子最能回津上為末以水飲任調方寸匕不拘時服羊乳丸治嶺南山瘴風熱毒氣入腎中變寒熱腳弱虛滿而渴者宣連去須不拘多少為末生栝蔞根汁生地黃取汁羊乳無羊乳牛乳人乳亦得上以三汁搜和為丸如梧子大每服三五十丸米飲下一法濃煮小麥飲下益元散白虎湯去桂五苓散合和大治消渴方見中暑傷寒傷暑類生地黃飲子治消渴咽乾面赤煩躁人參去蘆生乾地黃洗熟乾地黃洗黃耆蜜炙天門冬去心麥門冬去心枳殼去穰麩炒石斛去根炒枇杷葉去毛炒澤瀉甘草炙各等分上銼散每服三錢水一盞煎至六分去滓食後臨臥溫服此方乃全用二黃丸甘露飲料生精補血潤燥止渴佐以澤瀉枳殼疏導二腑使心火下行則小腑清利肺經潤澤則大腑流暢宿熱既消其渴自止造化精深妙無逾此栝蔞粉治大渴上深掘大栝蔞根削去粗皮寸切以水浸一日夜一易浸五日取出爛研細綃絞汁如作粉法干之水服方寸匕日三四服入牛乳一合服尤好降心湯治心火上炎腎水下濟煩渴引飲氣血日消人參去蘆遠志去骨以甘草水煮過去甘草薑汁拌炒乾當歸去尾熟地黃洗去土蒸白茯苓去皮黃耆去蘆蜜炙北五味子去梗甘草微炙各半兩天花粉一兩上銼散每服三錢水一盞半棗一枚煎食前服蠟苓丸補虛治濁止渴潤腸婦人血海冷白帶白淫白濁黃蠟雪白茯苓去皮各四兩上茯苓為末溶蠟和丸彈子大每服一丸不飢飽細嚼下棗湯亦可辰砂妙香散治渴證小便澀數而瀝兼有油濁用燈心茯苓煎湯下方見心恙類神效散治渴疾飲水不止白浮石蛤粉蟬殼上為末用鯽魚膽七個調七錢服不拘時候神效三消丸治消渴骨蒸宣連去須為末不以多少銼冬瓜肉研挒自然汁和成餅子陰乾再為末再用汁浸和如是七次即用冬瓜汁為丸如梧桐子大每服三四十丸以冬瓜汁煎大麥仁湯送下尋常渴止一服浮萍丸治消渴虛熱者大佳干浮萍栝蔞根等分上為末以人乳汁和丸每服二十丸空腹米飲下日三服三年病者三日可又白芷末水調服止又方鉛丹二兩附子一兩乾葛栝蔞根各三兩上為末煉蜜丸每服十丸米飲下日三服渴則服之治日飲水至一石者春夏去附子白朮散治胃虛發渴白朮一兩人參去蘆白茯苓甘草各半兩上為末每服七錢水一盞半煎至七分服凡渴之後多有腫疾仍預服復元丹數服參耆湯治消渴人參去蘆桔梗去蘆天花粉甘草各一兩綿黃耆鹽湯浸炙白芍藥各二兩白茯苓去皮北五味各一兩半上銼散每服四大錢水盞半煎八分日進四服合滓煎雞蘇丸治病後虛羸發渴上雞蘇丸以北五味煎湯吞下仍服安腎丸方見失血虛損類麵餅丸治消渴密陀僧二兩別研極細川黃連一兩為細末上用蒸餅丸如梧子大每服五丸煎繭空茄根湯下臨臥服次日加至十丸以後每日加五丸至三十丸止服藥後以見水噁心為度即住服不過五六服必效若覺噁心但每日食乾物壓之旬日後自定奇甚奇甚繭空是出蠶蛾了空繭殼忍冬丸治渴疾愈須預防發癰疽忍冬草不以多少根莖花朵皆可用一名老翁須一名蜜啜花一名金銀花以洗淨用之上以米麴酒於瓶內浸以糠火煨一宿取出曬乾入甘草少許為末即以所浸酒為糊丸如梧子大每服五十丸至百丸酒飲任下不拘時候此藥不特治癰亦能止渴並五痔諸漏牡蠣散治不渴而小便大利以牡蠣末取患人小便煎服單方治渴糯稻稈灰取中一尺燒淋汁飲或不燒便煎服亦妙生牛乳細呷或生蘿蔔搗取汁時飲少許繭絲湯治渴神效煮繭繅絲湯任意飲之頓效如非時以絲或綿煎湯服煞蟲方治消渴有蟲苦楝根取新白皮一握切焙入麝少許水二碗煎至一碗空心飲之雖困頓不妨自後下蟲三四條狀如蛔蟲其色真紅而渴頓止乃知消渴一證有蟲耗其津液凡消渴大忌飲酒房事食油麵煎炙糟藏咸物及一切熱物百日以上不可針灸則瘡中生膿水或成癰疽膿水不止則死漩濁心濁瑞蓮丸治思慮傷心便下赤濁白茯苓去皮石蓮肉炒去心龍骨生用天門冬洗去心遠志洗去心甘草煮柏子仁炒別研紫石英火煅七次研令極細當歸去蘆酒浸酸棗仁炒去殼龍齒以上各一兩乳香半兩別研上為末煉蜜丸梧桐子大硃砂為衣每服七十丸空心溫酒棗湯任下加味清心飲治心中客熱煩躁赤濁肥脂石蓮肉白茯苓各一兩益智仁麥門冬遠志水浸取肉薑製炒人參各半兩石菖蒲車前子白朮澤瀉甘草微炙各二分上銼散每服三錢燈心二十莖煎服有熱加薄荷少許寧志膏治心臟虧虛神志不守恐怖赤濁常多恍惚易於健忘睡臥不寧夢涉危險一切心疾並皆治之人參去蘆酸棗仁微炒去皮各一兩辰砂研細水飛半兩乳香一分以乳鉢坐水盆中研上為末煉蜜丸如彈子大每服一丸溫酒化下棗湯亦可空心臨臥服十四友丸補諸虛不足益血收斂心氣治怔忪不寧精神昏倦睡臥不安赤白濁甚柏子仁別研遠志去心酸棗仁去殼炒香紫石英明亮者熟乾地黃洗川當歸洗淨去尾蘆白茯苓去皮茯神去皮人參去蘆黃耆蜜炙去蘆阿膠蚌粉炒肉桂不見火以上各一兩龍齒一兩半辰砂半兩別研上為末煉蜜丸如梧子大每服三四十丸棗湯食後臨臥吞服香苓散治男子婦人小便赤濁諸藥不效者五苓散辰砂妙香散上和勻用天門冬麥門冬去心煎湯空心調服一大錢一日三服當頓愈桑螵蛸散治小便日數十次如稠米泔色心神恍惚憔悴食減以女勞得之服此不終劑而愈乃主安神魂定心志桑螵蛸鹽水炙遠志去心菖蒲鹽炒龍骨人參去蘆茯神去木當歸去尾鱉甲醋炙上等分為末每服二錢夜臥人參湯調服蠟苓丸治同上方見消渴類遠志丸治小便赤濁如神遠志去心用甘草煮半斤茯神去木益智仁各二兩上為末酒糊丸每服五十丸臨臥棗湯下心腎丸治水火不既濟心下怔忪夜多盜汗便赤夢遺牛膝去苗酒浸熟地黃洗蒸蓯蓉酒浸各二兩鹿茸火去毛酒潤炙附子炮去皮臍五味子去枝人參去蘆黃耆蜜炙去蘆遠志去心甘草水煮薑汁炒白茯神去木山藥炒當歸去蘆尾酒浸龍骨煅各一兩菟絲子酒浸研成餅三兩上為末浸藥酒煮糊丸如梧子大每服七十丸棗湯下腎濁祕精丸治元氣不固遺精夢泄大附子炮去皮臍龍骨煅通赤肉蓯蓉酒浸一夕牛膝酒浸一宿焙巴戟去心各一兩上末煉蜜丸如梧子大每服三十丸鹽湯空心下震靈丹治腎經虛憊漏濁不止用二陳湯加白茯苓煎湯送下方見泄瀉類鎖精丸治小便白濁破故紙炒青鹽各四兩白茯苓五倍子各二兩上為末酒糊丸空心三十丸鹽湯酒任意下芡實丸治勞傷心腎水火不交漩面如油光彩不定漩腳澄下凝如膏糊頻數無度又治遺泄不禁之疾方見虛損類固精丸治下虛胞寒小便白濁或如米泔或若凝脂腰重少力牡蠣煅菟絲子酒蒸焙乾韭子炒龍骨五味子白茯苓去皮桑螵蛸酒浸炙白石脂各等分上為末酒糊丸如梧子大每服七十丸空心鹽湯送下地黃丸治心腎水火不濟或因酒色遂至以甚謂之土淫蓋脾有虛熱而腎不足故土邪乾水先賢常言夏則土燥而水濁冬則土堅而水清此其理也醫者往往峻補其疾反甚此方中和補瀉兼之水火既濟而土自堅其流清矣熟地黃九蒸十兩菟絲子洗酒浸蒸鹿角霜各五兩茯苓柏子仁各三兩附子一兩上為末鹿角膠煮糊丸如梧子大每服百十丸鹽酒下四精丸治濁渴鹿茸肉蓯蓉山藥茯苓各等分上為末米糊丸如梧子大每服三十丸棗湯下或加沉香木香蒜丸治濁杜仲川烏破故紙人參巴戟各等分上為末蒜膏丸如梧子大每服三十丸鹽湯溫酒任下入藥靈砂丸治諸虛白濁耳鳴大效當歸酒洗鹿茸去毛鹽酒炙黃耆鹽水炙沉香鎊北五味炒遠志肉酸棗仁炒吳茱萸去枝茴香炒破故紙炒牡蠣煅熟地黃蒸人參去蘆龍骨煅附子炮巴戟各一兩淨靈砂二兩研上各煅制如法為末酒糊丸每服五十粒至七十粒空心溫酒鹽湯任下小菟絲子丸治腎氣虛損五勞七傷小腹拘急四肢痠疼面色黧黑唇口乾燥目暗耳鳴心忪短氣夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿腳膝痿緩小便滑數房室不舉股內濕癢水道澀痛小便出血時有遺瀝並宜服之久服填骨髓續絶傷補五臟去萬病明視聽益顏色輕身延年聰耳明目石蓮肉二兩菟絲子酒浸焙研為末五兩白茯苓焙一兩山藥二兩七錢半打糊上為末