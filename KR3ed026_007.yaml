黑散治大便鮮血臍腹疼痛裡急後重脫肛酒痢荊芥二兩燒亂髮燒槐花燒槐角燒各一兩枳殼二兩燒一兩炒甘草炙蝟皮燒各一兩半上將各燒藥同入瓷瓶內黃泥固濟燒存三分性出火氣同甘草枳殼一兩搗為末每服二錢白水煎空心服溫酒調亦可黑玉丹治丈夫婦人久新腸風痔瘻著床頭痛不可忍者服此不過三四次見效初得此疾發癢或疼殼道周回多生硬核此是痔如破為瘻只下血為風皆因酒色氣風食五事過度即成此疾人多以外醫塗治病在腸自有蟲若不去根本其病不除此藥的效刺蝟皮四兩銼研豬懸蹄二十五個牛角䚡三兩銼碎雷丸一兩槐角一兩半敗棕二兩銼亂髮皂角水洗淨焙二兩芝麻一兩苦楝根皮一兩二錢半上銼碎入瓷罐內燒存性碾為末入麝香二錢乳香五錢研令和勻用酒打麵糊為丸如梧子大每服八粒先細嚼胡桃一枚空心晚食前溫酒吞日二服病甚日三服切忌別藥不過三兩日可除根本加味雙和湯加側柏葉每服三皮炒過生薑三片棗二枚為梅一個煎空心服方見虛損類治同上卷柏散治臟毒下血神效卷柏生土石旁上高四五寸根黃如絲莖細上有黃點子只以柏枝曝乾用黃耆上等分為末每服二錢米飲調下聖金丸治腸風下血溺血百藥煎三兩一兩生一兩炒焦一兩燒存性上為末煉蜜丸如梧子大每服五十丸空心米飲下神丹治腸風痔漏刺蝟皮一個鐵器中炒焦黑為度皂角刺燒存性硫黃研豬牙皂角去黑皮蜜塗炙白礬枳殼炒黃耆蜜炙附子去皮各半兩白雞冠子花一兩上為末酒糊丸如梧桐子大每服七丸至十丸空心食前溫酒下不飲米飲下久年漏痔服至三四十丸肉滿平安諸痔服之即自消外痔用藥十丸同硃砂細研蜜調塗常服永除根本若服藥覺熱加白雞冠子花一兩半或二兩更加三五丸服之臟腑自調小烏沉湯香附子杵去皮毛焙二兩天台烏藥去心一兩甘草炒一分上為末每服一錢空心鹽湯點服治同上震靈丹玉華白丹治臟腑虛損大腸不收久作腸風下血二藥夾用每服五十丸煎不換金正氣散加川芎空心咽下方並見痼冷類理中湯治同上加木香妙方見霍亂類香梅丸治腸風臟毒下血烏梅同核燒灰存性香白芷不見火百藥煎燒存性各等分上為末米糊丸梧桐子大每服七十丸空心米飲下斷紅丸治臟腑虛寒下血不止面色痿黃日漸羸瘦側柏葉炒黃川續斷酒浸鹿茸火去毛醋煮附子炮去皮臍黃耆阿膠蛤粉炒當歸酒浸各一兩白礬半兩枯上為末醋煮米糊丸梧子大每服七十丸空心米飲下大便下血冷熱不調黃連香薷散香薷扁豆厚朴薑製黃連去須上銼散用水煎服香連丸治冷熱不調下血方見泄瀉類芎歸湯加茯苓槐花冷加白茯苓丁香方見婦人科保産類即佛手散真人養臟湯治大人小兒冷熱不調便下膿血魚腦裡急後重方見泄瀉類消風散米飲調熱者吞酒蒸黃連丸冷者吞烏荊丸方見風科熱症通治及下痢類大便下血通治單方治腸風下血百藥不效山裡棗俗名鼻涕丸取乾者為末米飲調立效又方柏子十四枚捻破紋囊貯以好酒三盞煎至八分服之初服反覺加多再服立止非飲酒而致斯疾以艾葉煎湯服之神效勝於它藥又方生豬臟一條切控干以槐花炒乾為末填入臟內兩頭線縛了以好米醋於瓷石器內慢火煮爛切片沙鉢內研爛為丸梧桐子大每服二十丸煎當歸酒下又方荊芥穗縮砂仁各等分為末糯米飲下灸法第二十椎隨年壯又法平立一杖子比臍平卻向後脊骨當中灸七壯或年深於脊骨兩旁各一寸灸七壯余謂寸半則是腎俞自佳小便出血酒蒸黃連丸白茅根濃煎湯放溫吞下方見下痢類五苓散加辰砂一字燈心一握煎湯調下方見傷暑類茯苓調血湯治酒面過度房勞後小便出血半赤茯苓一兩赤芍藥川芎半夏曲各半兩前胡柴胡青皮枳殼北梗桑白皮白茅根燈心甘草各二錢半上銼散每服三錢半姜五片蜜二匙新水煎服姜蜜湯治小便出血不止生薑七片蜜半盞白茅根一握上用水同煎服神效鹿角膠丸治房室勞傷小便尿血鹿角膠半兩沒藥別研油頭髮灰各三錢上為末用白茅根汁打糊丸如梧桐子大每服五十丸鹽湯送下發灰散上用自己頭髮一握洗淨燒灰溫酒調下一服立效鏡面散治小便出血鏡面草取清汁入蜜少許同水調服效單方療小遺出血條淡豆豉一撮煎湯服效又方治小便出血竹茹一大塊水煎服妙又方川牛膝一兩去蘆水一碗煎至半碗頓服又方生地黃取自然汁半升生薑自然汁半合相和服未止再服又方當歸川白芷為末每服二錢溫米飲下脫肛文蛤散治大腸寒肛門脫出不收用力過多及小兒叫呼久痢後皆使脫肛五倍子上為末水煎汁浸洗更入白礬蛇床子尤佳洗後用赤石脂為末以少許摻在芭蕉上頻用托入或長尺余者以兩床相接中空一尺以瓷瓶盛藥水滿架起與床平令病者仰臥以其所脫浸在瓶中換藥逐日如此浸縮盡為度木賊散上用木賊一味為末摻肛上槐花散治脫肛槐花槐角上等分炒香黃為末用羊血蘸藥炙熱食之以酒送下或以豬膏去皮蘸藥炙服釣腸丸治同上方見諸痔類蝟皮散治肛門或因洞泄或因用力太過脫出不收蝟皮一個燒存性磁石煅碎桂心各半兩上為末每服二錢米飲空心調下治女人陰脫加鱉頭一枚燒灰研入香荊散治肛門脫出大人小兒悉皆治之香附子一兩半炒去毛荊芥穗二兩上為末每服三匙水一大碗煎熱淋洗灸法病寒冷脫肛出灸臍中隨年壯脫肛歷年不愈灸橫骨百壯又灸脊窮骨上七壯諸痔冷證釣腸丸治久新諸痔肛邊腫痛或生瘡癢時有膿血栝蔞二個燒存性蝟皮兩個銼碎罐內燒存性白礬煅緑礬枯胡桃仁十五個不油者罐內燒存性白附子生用半夏天南星雞冠花五兩銼炒枳殼炒附子去皮臍訶子去核各二兩上為末醋麵糊丸如梧子大每服二十丸空心臨臥溫酒下遠年不瘥者服十日見效久服除根黑玉丹治同上方見失血類橘皮湯治氣痔橘皮枳殼炒川芎槐花炒各半兩檳榔木香桃仁浸去皮炒紫蘇莖葉香附子甘草各二錢半上銼散每服三錢水一盞半生薑三片紅棗二枚煎服立效丸百藥煎研為末每服三錢煮稀白粥攪勻服之立愈糊丸米飲下亦可黑丸子專治久年痔漏下血用之纍驗乾薑百草霜各一兩木饅頭二兩烏梅敗棕柏葉亂髮各五分上各燒灰存性再入桂心三錢白芷五錢同為末醋糊丸梧桐子大空心三十丸米飲下熱證逐瘀湯通利大小便取下黑物川芎白芷生乾地黃赤芍藥五靈脂枳殼制阿膠炒蓬莪朮煨茯苓茯神大木通生甘草各一分實大黃桃仁湯去皮焙各一分半上銼散每服三錢井水一碗生薑三片蜜三匙煎服以利為度瘀血作痛通用白玉丹治久年腸痔下血服藥不效者寒水石不以多少上煅紅研細水飛再入銀窩中煅紅用糯米糊丸梧桐子大每服五六十丸陳米飲下只一服愈黃連阿膠丸解熱調血枳殼散送下方見泄瀉及婦人護胎類槐角丸治所風痔瘡內生蟲裡急下膿血止癢痛消腫聚祛濕毒服之除根方見前乾葛湯專治酒痢白乾葛枳殼炒半夏茯苓生乾地黃杏仁各半兩黃芩甘草炙各一兩上銼散每服三錢黑豆百粒姜五片白梅一個煎服寬腸丸五灰膏塗痔瘡之後或臟腑祕結不通者用此藥寬腸五灰膏方見後黃連枳殼各等分上為末麵糊丸如梧子大每服五十丸空心米飲下通治祕方治諸痔捷效上用白礬信石各少許於新瓦上煅過為末再入硃砂少許以新汲井水調成膏用舊金紙上藥隨瘡大小貼之先用鬱金國丹末以鵝翎刷於瘡四畔圍護恐傷好肉凡上藥貴宦人肉理嬌脆薄少用之愚俗人肉理粗厚稍多少許用之大抵上藥後多疼不可太過為妙仍用大青根晚蠶砂煎水洗後再上藥兼服槐角丸皂角丸臟腑結熱祕甚八正散加燈心枳殼薄荷葉煎再用大黃茶莽草荊芥穗防風煎水洗效八正散方見積熱類又方用川白芷煮白苧作線快手緊繫痔上微疼不妨其痔自然干痿而落七日後安五灰膏治臟腑一切蘊毒發為痔瘡不問遠年近日形似雞冠蓮花核桃牛乳或內或外並皆治之蕎麥灰七升荊柴薊柴山白竹老杉枝上以四件柴竹截作一尺許長以斧劈成片名取一束曬乾於火上燒過置壇內為炭防為風所化俟燒盡卻以水於鍋內煮出炭汁又用酒漏以布帛實其竅而置蕎麥灰於酒漏內以所煮炭汁淋之然後取汁於鍋內慢火熬汁約取一小碗候冷入石灰國丹調和成膏以瓦瓶貯之上用石灰敷面不令走氣臨用卻去石灰以冷水調開令病者以水洗淨痔瘡仰臥搭起一足先以濕紙於瘡四圍貼護卻用收效必矣熏方蝟皮方三指大雄黃棗大研熟艾如雞子大為末用瓶一個以灰實一半如燒香法安高桶內坐其上莫令煙透煙從口中出方好三度熏永瘥勿犯冷風洗方用槐花荊芥枳殼艾葉以水煎入白礬熏洗又方黃連黃芩京芥蛇床子各一兩側柏葉四兩槐條鏡面草蚵蚾草各一握上用新汲水熟煎傾盆內熏後通手卻洗蓮子散蓮子十四個草芽茶十四個乳香隨上二藥多少入上三味同搗以紙里煨透先以黃連湯洗患處然後以藥生貼之木鱉散木鱉子百藥煎上等分為粗末每服一掬布裹煎湯以桶盛之蓋上穴一竅先以氣熏蒸後通手洗之敷法熊膽膏敷痔極效熊膽研細腦子研細上各少許用井花水調以雞羽拂痔上枯礬散治五痔痛癢枯礬半錢腦子一字上並研為末先用魚腥草濃煎汁放溫洗次用少許敷痔上效硝石散上用寒水石朴硝為末以津潤手指點藥敷瘡上立效蔥青散上以蔥青刮去涎對停入蜜調勻先以木鱉子煎湯熏洗然後敷藥其冷如冰又方耳環草一名碧蟬兒花手挪軟納患處即愈又方穿山甲自尾根盡處數除三鱗不用取第四第五第六鱗橫三行燒存性為末用麝香少許臘茶一匙同調空心服以澄下濃者敷瘡上其冷如冰永不痛無不效蝸牛散治痔瘡腫脹作熱如火上用蝸牛螺一個以冰片腦子麝香各少許同入瓦器內盛頓逼半日自化成水以少許點瘡上立愈灸法平立量脊骨與臍平椎上灸七壯或年深更於椎骨兩旁各一寸灸如上數無不除根又法治痔疾大如胡瓜貫於腸頭熱如煻灰火發則僵仆以柳枝濃煎湯洗後以艾炷灸其上三五壯若覺一道熱氣入腸中大瀉鮮紅血穢惡一時至痛楚瀉後其疾如失久冷五痔便血灸脊中百壯五痔便血失屎灸回氣百壯穴在脊窮骨上
