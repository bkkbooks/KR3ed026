子大每服一粒豆淋酒空心食前化下豆淋酒法用黑豆半升揀洗令淨炒令煙出以無灰酒三升浸一晝夜去豆取酒用之亦可常服枳皮酒治中風身體強直不得屈伸反覆上取枳樹皮細切一升以酒二升浸一宿每日溫酒服半升酒盡再作萊菔膏治大人小兒禁口風皂角不蛀者炙去皮子蘿蔔如無以子代之上以皂角為末以蘿蔔同釅醋研雞翎蘸藥塗牙齦即蘇一得散治中風口噤不知人事產後中風同上用白朮四兩水三升煎一升頓服又方治中風通身冷口噤不知人者上用川獨活四兩好酒一升煎至半升分溫服獨行散治失音槐花一味炒香熟三更後床上仰臥隨意服亦治咯血又方治中風心煩恍惚或腹中痛滿或時絕而復甦灶心土五升搗為末以冷水八升和之取汁服口噤者以竹筒灌下即愈趁風膏治中風手足偏廢不舉穿山甲左癱用左足右癱用右足紅海蛤如棋子者大川烏頭生用各二兩上為末每用半兩搗蔥白汁和成厚餅約徑一寸半貼在所患一邊腳中心用舊絹緊縛定於無風密室中椅子上坐用湯一盆將貼藥腳於盆內浸仍用人扶病人恐汗出不能支持候汗出即急去了藥汗欲出身麻木得汗周遍為妙切宜避風自然手足可舉如病未盡除半月二十日以後再依此法用一次自除其根仍服治風補理藥遠欲以自養乳靈丸治痛風數年不能舉動日夜呻吟不數丸大效川烏去皮臍生用半兩生乾地黃酒浸一宿一兩草烏頭小者去皮臍炒半兩去鹽木香不見火二錢半五靈脂揀去沙石微炒麻黃去根節微炒去汗自然銅火煅七次米醋淬七次另研虎脛骨死虎尤好各一兩酥塗火炙存性乾木瓜酸明者二兩滴乳香好者和燈心研二錢半為末去燈心敗龜乃江浙間卜筮鑽過下截龜殼者是米醋浸三日炙黃色再用醋淬七錢半上研細如粉煉蜜去上白沫為丸如龍眼大每一兩重作十二丸以帶皮生薑自然汁化開一丸熱酒服更以酒半盞送下病在下空心食前服病在上食後停少時服一日二服口有少麻勿疑追風獨活散治氣虛感風或驚恐相乘肝膽受邪使上氣不守正位致頭招搖手足顫掉漸成目昏獨活正地骨皮北細辛大川芎菊花防風去叉甘草各等分上銼散每服三錢水一盞半煎取六分清汁入少竹瀝再煎食後服仙桃丸治丈夫婦人手足麻痹時發疼痛腰膝氣閉作痛不止或冷地冰身血氣不運打撲閃肭不可忍及癱瘓等疾生川烏三兩五靈脂四兩威靈仙五兩上各燒焙同研為末醋糊丸梧桐子大每服七粒加至九粒鹽湯吞下婦人當歸醋湯下空心服病甚者加至十五粒忌茶立效如神奇方治中風牙已緊無門下藥天南星末半錢白龍腦一字頻擦令熱牙自開又治暗風倒地北細辛為末每挑一字搐鼻中神應方治諸風癇久服其涎自大便中出生白礬一兩研好臘茶半兩煉蜜為丸梧子大三十丸再用臘茶湯下烏蠍丸治手足拳攣痛不可忍者乳香沒藥另研地龍去土全蠍去足草烏各五錢烏藥炒麝香一兩蜈蚣一條去足炒川烏二隻生用去皮尖上為末麵糊丸梧桐子大每服七丸至十丸十五丸用麝香少許好小酒送下空心服服至七日略利至半月或滿身發風丹經月方沒多服其病安全後常用生川烏沒藥浸酒日二服通氣驅風湯加乳香沒藥生川烏麝香少許酒調服不飲木瓜湯下服此忌熱食一時四神丸治手足頑麻痰涎壅盛頭目昏眩肩背拘急大天麻大南星各湯洗淨防風去蘆各一兩薄荷葉半兩上為末酒煮薄麵糊丸綠豆大每服二十丸荊芥生薑煎湯送下腎瀝湯腎虛為厲風所傷語言蹇吃不轉偏枯胻腳跛蹇緩弱不能動口喎言音混濁便利耳聾塞腰背相引羊腎一具黃耆芎藭桂心當歸人參防風甘草五味子各一兩玄參芍藥茯苓各一兩二錢半磁石一兩七錢地骨皮五錢生薑二兩上銼散以水一斗煮羊腎取五升下諸藥取二升分三服服乳香尋痛丸治中風癱瘓不遂手足嚲曳口眼喎斜或旋連僵臥涎潮搐搦卒中急風不省人事每服二十丸黑豆淋酒下風虛眩冒項筋拘急太陽穴疼痛亦用生地黃汁調酒下腰腳疼重行步艱辛筋脈攣促俯仰不利賊風所中痛如錐刺皮膚頑厚麻痹不仁或血脈不行肌拘乾瘦生蔥酒下或生蔥茶亦可風濕腳氣腿膝無力或腫或疼不能舉步兩腳生瘡膿血浸漬癢痛無時愈而又發溫鹽酒下打撲閃肭筋骨內損已經多年每遇天寒時發疼痛沒藥酒下乳香川烏沒藥五靈脂白膠香地龍白姜半夏五加皮赤小豆各等分上為末糊丸隨證湯引如前並空心服牛黃清心丸治諸風緩縱不隨語言蹇澀痰涎壅盛心怔健忘或發顛狂並皆治之白芍藥一兩半柴胡去苗桔梗各一兩二錢半甘草銼炒五兩乾山藥麥門冬去心黃芩各一兩半杏仁去皮尖取仁麩炒黃一兩二錢半別研大棗一百枚蒸熟去皮核研成膏神麯研蒲黃炒各二兩半大豆黃卷炒肉桂去皮各一兩七錢半白蘞七錢半當歸去苗防風去苗白朮各一兩半羚羊角末麝香龍腦研各一兩人參去蘆二兩半白茯苓去皮芎藭各一兩二錢半乾薑炮七錢半阿膠炒一兩七錢半牛黃一兩二錢研犀角末二兩雄黃研飛八錢金箔一千二百箔內四百為衣上除棗杏仁金箔二角末及牛黃麝香雄黃龍腦四味別為末入余藥和勻煉蜜棗膏為丸每兩作十丸以金箔為衣每服一丸食後溫水化下烏荊丸治諸風緩縱手足不隨口眼喎斜言語蹇澀眉目瞤動頭昏腦悶筋脈拘急不得屈伸遍身麻痹百節疼痛皮膚瘙癢抓成瘡瘍又治婦人血風渾身癢痛頭疼眼暈及腸風臟毒下血血下不止服之尤效久服令人顏色和悅力強輕健鬚髮不白川烏去皮臍炮一兩荊芥穗二兩上為末醋麵糊丸梧桐子大每服二十丸酒或熟水任下有痰食空時日三四服無痰早一服青州白丸子治男子婦人手足癱瘓風痰壅盛嘔吐涎沫及小兒驚風並皆治之半夏白好者水浸洗過七兩生用川烏頭去皮臍半兩生用白附子二兩生用天南星三兩生用上為末以生絹袋盛於井花水內擺出未出者更以手揉令出以滓更研再入絹袋擺盡為度放瓷盆中日曬夜露每日一換新水攪而復澄春五日夏三日秋七日冬十日去水曬乾如玉片碎研以糯米粉煎粥清為丸如綠豆大常服二十丸生薑湯下不拘時如癱瘓風溫酒下小兒驚風薄荷湯下三五丸蘇青丸和氣宇散風痰亦可常服上以蘇合香丸方見大方科中氣類與青州白丸子方見前打和薑蘇湯化下蛇黃散治暗風忽然仆地不知人事良久方醒蛇黃不以多少米醋燒淬七次上為末每服二錢溫酒下數服便愈年深者亦效琥珀丸治暗風百日內者天南星二兩大者掘地坑深尺余火煅令紅去火安南星在內即以醋沃之瓦盆蓋一伏時取出洗去灰土焙乾為末硃砂半兩別研琥珀二錢通明者別研真金箔十片上挫勻以豶豬心血為丸梧桐子大每服十五丸人參或麥門冬湯下臨臥服辰砂丸治暗風年深日近發搐不省人事好辰砂半兩好雄黃三錢各研極細再同一處研上用烏雞心內血和丸梧桐子大每服十丸以煮豶豬心湯吞下如不省人事則灌下仍灸百會穴九壯妙應丸治諸風攣急遍體疼痛遊走無定百藥所不效者穿山甲十五片石灰炒去灰全蠍去毒三七個蜈蚣七條生用麝香一字別研草烏生去皮一兩地龍去土一兩沒藥別研乳香別研各二錢松脂半兩斑蝥七個糯米炒去頭足白殭蠶薑汁炒半兩五靈脂三錢去沙石上為末酒糊丸綠豆大青黛為衣每服二十丸不拘時溫酒下忌食熱物大九寶飲治挾氣中風已微微去其痰或非重熱氣實者亦可服天雄氣弱者以大附子代南星炮薄荷葉地龍捶去土木香全蠍防風沉香各等分麝香別入上銼散每服四錢水一盞半生薑五片煎熟入麝香啜服不拘時候烏附丸去風疏氣川烏二十枚或用草烏一斤第功效稍劣油炸存心一點白香附子半斤薑汁淹一宿炒上焙乾為末酒糊丸量數服之若只用草烏當防其麻木人也然肌體肥壯之人及有風疾人宜常服威靈仙丸治腎臟風壅積滯腰膝沉重威靈仙酒洗酒浸七日上為末煉蜜丸梧桐子大更初服用溫酒下八十丸平明微利惡物如青膿即是風毒積滯也如未動其夜再服百丸後吃少粥補之豶肝丸主四肢攣縮不伸等症曾有人自幼年酒多長而風痰為酒使痰注骨節四肢不能運動服此有效茯神心木白茯苓去皮薑黃白朮炒黃耆羌活五加皮川烏炮去皮臍薏苡仁木瓜去皮穰半夏曲神麯炒天雄炮去皮白芍藥乳香別研沒藥研防風獨活當歸延胡索桑寄生海桐皮去粗皮木香陳皮去白枳殼炮去穰南星炮地龍捶去土荊芥穗各五錢麝香一錢上用豶肝一具洗淨煮存性研爛同酒面為糊丸如梧桐子大每服三十丸溫酒吞下不飲木瓜湯下皂角六一丸疏風活血起癱瘓除腳疾烏鬚髮注紅顏肌肉不緊實人生風證切宜此藥川烏草烏各一兩天台烏藥何首烏各二兩豬牙皂角五條湯泡去皮弦烏梅鱉裙者去核五十個烏豆一升上銼如指面大以冬月無灰酒好醋各二升浸一宿瓦銚內慢火煎乾取出曬焦揀何首烏一味別為末煮膏六味焙乾為末以前煮藥余酒醋及何首烏膏和丸每服三十丸酒吞下金汞靈丹治卒暴中風奄忽手足嚲曳口面喎斜舌強痰盛搐搦戰掉或角弓反張目睛正視口噤閉絕每日三服中風數年不能步履服至十丸復舊新中風三服可無事常服半丸滋養五臟補益真元通流關節祛逐風邪強筋健骨金箔二錢半以火煅過用法酒淬五十次為度細剪如絲水銀一兩辰砂半兩好硫黃一兩自然銅四兩搗細末用甘鍋子一個盛之不封於地櫨內以炭一斤煅之火盡候冷取出研細水飛候乾卻同四味同入乳缽研細如面不見水銀星子為度生犀角半兩鎊羚羊角三分鎊乾蠍炒去毒白殭蠶炒去絲南星炮去皮藿香葉各半兩官桂一兩烏蛇三兩法酒浸軟剝去皮骨白花蛇同上制白朮炒白芷川芎破故紙炒蓽澄茄去蒂羌活去蘆當歸法酒浸各一兩防風去蘆牛膝酒浸一宿焙乾鹿茸火燎去毛酥炙各三錢附子炮去皮臍川烏炮去皮臍各一兩三錢沉香半兩鎊天麻一兩五錢木香三錢三分安息香半兩別研白附子炒上先將二十六味為末卻連前五味拌和入安息香膏搜和再入臼中杵五百下每一兩作十丸每服一丸空心細嚼溫酒吞下香附湯治十手足指疼痛麻木附子木香上等分銼散生薑煎服木香隨氣虛實加減如治足弱去附子用烏頭甚妙正舌散治中風舌本強難轉語不正神妙蠍梢去毒一分茯苓一兩炒龍腦薄荷二兩上為末每服二錢溫酒下或擦牙頰亦可仙茅散治背膊手足頭目筋脈虛掣一切風症疼痛不可忍立有效仙茅無則好蒼朮代之一兩陳皮枳殼炮厚朴制官桂秦艽各一錢當歸白茯苓白芍藥白芷川芎半夏餅各一錢半麻黃不去節二錢半沒藥甘草川烏炮各半兩白姜乳香川獨活各二錢全蠍七個麝香半錢上除桂芷麝沒乳余並炒轉色卻入不炒藥同為末每服三大錢炒大黑豆同木瓜蔭酒旋溫調服不拘時候活絡丹治丈夫元臟氣虛婦人脾血久冷諸般風邪濕毒之氣留滯經絡流注腳手筋脈攣拳或發赤腫行步艱辛腰腿沉重腳心吊痛及上衝腹脅膨脹胸膈痞悶不思飲食衝心悶亂及一切痛風走注渾身疼痛川烏炮去皮臍六兩草烏炮去皮臍六兩地龍去土天南星炮各六兩乳香沒藥研各二兩二錢上為末入藥研和勻酒麵糊為丸梧桐子大每服止十丸空心日午冷酒送下荊芥茶亦可黑龍丸治諸風疾夫風之為病半身不遂口眼喎斜手足拘攣或生嚲曳語言蹇澀心多驚悸其狀多端各隨所中由氣血俱虛腠理疏弱風邪外中真氣失守邪正相干而生焉自然銅一斤好者用生鐵銚子內以炭火一稱漸漸二三焰起聞腥氣或似硫黃氣其藥乃成放冷取出如藥有五色者甚妙然後安向淨黃濕土上著紙先視其藥用盆子合之不得通風一宿出火毒乳缽內研細以水淨淘黑汁濃者收取次更洗淘叉取濃者三五度淘澄定去清水用新瓦盆內將紙視著令自干如黑粉一同稱六兩用之候炮製後藥了當卻入川烏四兩略炮麻黃三兩去節黑附子炮裂烏蛇酒浸一夕去皮骨炙厚朴去粗皮薑汁炒防風蒼朮麩炒川芎陳皮白芷白朮炒黃各二兩芍藥吳茱萸各兩半南星半兩上為末與自然銅粉相和勻搗細煉蜜丸梧桐子大臘月合甚妙男女中風癱瘓半身不遂起止不能者空心服臨臥豆淋酒下一粒六十日內必瘥男女患筋骨腰膝疼痛走注不定坐則刺腰臥則刺背行即入腳跟亦用豆淋酒下須臾以蔥粥一盞投之衣被蓋覆出汗然後更吃一粒必瘥或患五七日間未得汗亦如前法服才入口汗即出便安依法服二十日定愈治破傷風頑麻風暗風偏風並用豆淋酒下一粒至二粒即見功效丈夫元臟氣虛臍下撮痛不可忍者以檳榔一個酒磨一半入生薑自然汁少許同煎五七沸研二粒服之須臾以小麥麩醋拌炒熨臍下便止治痃癖氣發時有搐得兩頭相就者用檳榔一個中分破半生用半炙黃一處為末酒一盞蔥白一握同一處煎蔥熟傾盞內候酒得所時先呷兩口檳榔酒蔥白和藥一粒爛嚼以煎酒咽之但依法服立效須臾間下泄三二度隨即便愈凡些小風疾即一服瘥忌動風有毒物休食左經丸治左癱右瘓手足顫掉言語蹇澀渾身疼痛筋骨拘攣不得屈伸項背強直下疰腳膝行履艱難骨節煩疼不能轉側跌撲閃肭外傷內損並皆治之草烏炮四兩川烏炮去皮臍二兩乳香研沒藥各一兩生黑豆一升以斑蝥二十一個去頭足同煮候豆脹為度去斑蝥取豆焙乾入上為末醋糊丸梧桐子大每服三十丸溫酒下不拘時常服通經絡活血脈疏風順氣壯骨輕身川芎散治雞爪風手口搖動不能舉物五加皮海桐皮川烏牡丹皮川芎赤芍藥各五錢乾薑肉桂各一錢上為末每服三錢水一盞將古銅錢一個入清油內浸每煎藥入錢同煎不拘時服枳實酒治遍身白疹瘙癢不止切不可全用風藥治之蓋寒邪伏於肌膚相搏凝滯而成瘡或天色冷則重或因患風中若遇天晴日暖則輕宜用烏藥順氣散為妙更用此酒服累用神效順氣散方見前枳實不拘多少麵炒黃切片上銼散每服二大錢用酒浸少時去枳實但飲酒最妙用枳實煎水洗患處佳貼藥芫花散治臂腿間忽一兩點痛著骨不可忍芫花根研為末米醋調隨大小敷之天仙膏治卒中風口眼喎斜南星大者一個白芨一錢草烏大者一個殭蠶七個上為末用生鱔魚血調成膏敷喎處覺正便洗去洗方治風損風腫及瘡痔石南葉馬鞭草貼壁草煎湯洗燒竹瀝法新竹截尺許長用兩磚對立相去八寸置竹在上每截破二片仰安磚上急著火磚外兩頭各置碗以盛瀝瀝盡以絹濾澄清夏秋須沉冷水中防瀝酸大熱有風人亦可單服冷暖隨人勿過度荊瀝亦然灸法治口喎斜即效耳垂下麥粒大艾炷三壯左灸右右灸左又法治痰涎壅塞聲如牽鋸服藥不下宜於關元丹田二穴多灸之良治卒中風口噤不開灸頰車二穴在耳下八分小近前灸五壯隨愈中風失喑不能言語緩縱不隨先灸天倉二穴五十壯其穴在頸大筋前曲頰下扶突穴後動應手陷中息火仍移灸百會穴五十壯其穴在頂正中心灸畢還灸天倉五十壯始發先灸百會則風氣不得泄內攻五臟喜閉伏仍失音也所以先灸天倉次百會佳一灸五十壯悉泄火勢復灸之視病輕重重者一處三百壯大效凡中風服藥劇者但是風穴悉皆灸之三壯無不愈也勿疑惑不至心者勿浪盡灸癘風得效第一方治癘風即大風惡疾癩是也雖名曰風未必皆因風大率多是嗜欲勞動氣血熱發汗泄不避邪風使淫氣與衛氣相干則肌肉不仁勞氣泣濁則胕熱不利故色敗皮膚瘍潰鼻梁塌壞或自作不仁極猥之業所致久則或遍身白皮脫落如蛇蛻狀上用桑枝灰一斗熱湯淋取汁洗頭面次用大豆及綠豆漿添熟水三日一浴一日一洗面卻用側柏葉蒸曝乾白膠香各等分為末蜜丸溫水下三七粒日三服仙方治大風惡疾雙眼昏咫尺不辨人物發眉自落鼻梁崩倒肌膚瘡如苔蘚勢若不可救此方特效上用皂角刺三斤炭火蒸久曬乾為末濃煎大黃湯下一匕服旬日間眉發再生肌膚悅潤眼目愈明解毒雄黃丸治多痰炙爆成此癘風茶清下三四服效方見大方科積熱類浴法麻黃根地骨皮草烏頭各二兩上銼散研朴硝二兩勻和每用藥一兩水一桶椒一合蔥三十莖艾葉一兩同煎十沸用米醋一中盞又打勻去滓坐溫室中自用手巾搭四肢候湯可浴即浴令汗透面上如珠流更坐室中或睡片時尤佳汗解方著衣避風而出五日再浴如此兩上浴便服換骨丹換骨丹九肋鱉甲海蜈蚣細銼各二兩上以鹽泥固濟候乾火煅存二分性為末巴豆半兩去皮膜順手研青州棗七枚去核入巴豆膏在棗中火燒令焦存巴豆五分性將棗巴豆研爛如泥入前二味末研勻以醋煮糊丸如綠豆大每服七丸虛中四五加丸用溫齏汁下候利惡物如膿血爛魚腸即住三兩服未利更加三丸次服遇仙丹遇仙丹人參紫參各一兩苦參二兩白殭蠶去嘴二兩上為末麵糊丸梧桐子大每服三十丸溫鹽湯吞下食前日二服次服疏風散疏風散山梔子仁半兩大黃白滑石熟地黃懸豆酥炙焦黃各二兩上為末入朴硝半兩令勻每服一錢食後淡茶清調下次以佛手膏佛手膏去黑紫瘡核斑蝥七個去翅足巴豆七粒去皮杏仁二七粒去皮砒霜一錢另研紅娘子二七個去翅足盆硝一兩黃蠟韶粉各半兩瀝青研一兩硫黃黃丹各三錢膩粉炒一兩綠豆一合槐角三條清油四兩亂髮一兩上用油煎令發化次下紅娘子次下巴豆槐角等逐味下焦者漉出方下硫黃盆硝及丹粉等以箄子不住手攪令勻滴水成珠為度用時先將針刺瘡核用藥一粟米大放針處次日擠瘡有黑臭膿血出三兩日血漸少次服去毒丹去毒丹赤芍藥甘草白滑石各半兩朴硝大黃各一分巴豆去皮炒別研後入黑牽牛一兩半生半炒上為末麵糊丸綠豆大臨臥服十五丸金銀薄荷湯下加至三十丸次服甘草散甘草散甘草白滑石各半兩山豆根一兩大黃一分上為末每服一錢蜜湯調下日二服次服解毒丸解毒丸栝蔞根三兩甘草半兩炒大黃一分生朴硝一分別研上為末麵糊丸如綠豆大每服二十丸至三十丸白湯下次服福神丹福神丹訶子四個炒巴戟炒黑牽牛生各半兩甘遂三錢赤小豆四十九粒生上為末麵糊丸綠豆大每服十丸至十五丸薄荷湯下次用水膏藥水膏藥敷貼破處及面腳上瘡令生肉陳皮去灰土半斤炒紫色陳米半斤炒藿香馬蹄香各一兩麝香一錢別研上為末入麝香用冷水調掃敷瘡上有膿處如損破即煎槐枝湯洗再上藥此十方乃秘傳有驗大要病人猶能如法將息理會敬而信之通天再造散治大風惡疾鬱金一兩半大黃一兩炮白牽牛六錢半生半炒皂角刺一兩炮經年者上為末每服五錢日未出面東以無灰酒下儘量為度晚則利黑頭小蟲病稍輕者止利如魚腸臭穢物忌毒半年但食稠軟飯漸生頭毛皮膚如常甚者不過三兩次須將理不可妄有勞動及終身不得食牛馬驢騾等肉犯者死不救三濟丸治如前當歸熟地黃川芎荊芥穗各二兩防風北細辛各一兩去葉桂心一分上銼散先以醋一升浸一宿漉出焙乾再以生地黃一斤搗汁浸一宿焙乾酒一升浸一宿焙乾旋入乳香半兩以余酒醋地黃汁釋蒸餅為丸梧桐子大用好川烏頭一個炮製銼荊芥穗半兩浸酒三升旋溫下藥五十丸八葉湯淋漓大風瘡桑葉荷葉地黃葉皂角葉蒻葉蒼耳葉菖蒲葉何首烏葉上等分曬乾燒存性為末如面藥用洗手面身體大風惡疾瘡痍茶毒膿汁淋漓眉鬢墜落手足指脫頑痹痛癢顏色枯瘁鼻塌齒豁唇揭病證之惡無越於斯負此病者百無一生猶且愛戀妻孥復著名利不仁之行死而無悔深可悲傷凡遇此疾切須戒鹽及一切口味公私世務悉宜屏置瘓風排風湯治五臟風瘓風亦治風毒腳氣腫痛每服三錢水一盞半生薑四片煎溫服方見前加減續命湯治中風諸風迷僕涎潮舌強語謇或昏潰痿陁或厥冷拘攣不論表裡淺深服之效方見前蘇合香丸理氣氣和則風散方見大方科中氣類不換金正氣散服之則氣順血行瘓風自解方見大方科傷寒類一粒金丹疏風健筋骨方見前大鐵彈丸治諸風癱瘓川烏炮去皮臍一兩半川五靈脂四兩乳香沒藥各一兩生麝一錢上乳香以干竹葉包裹用熨斗火熨過即研成末余藥末和勻再碾滴水丸彈子大每服一丸薄荷酒磨下大四斤丸治風寒濕毒與血氣搏筋骨緩弱四肢痠疼癢痛天麻川牛膝去苗宣州木瓜肉蓯蓉洗切焙四味各一斤用好酒五升浸三日熟附子虎骨酥炙各二兩大當歸三分乳香沒藥五靈脂各半兩生麝香一錢上為末浸藥酒煮麵糊丸梧桐子大每服三四十丸食前溫酒或豆淋酒下未效木瓜湯下亦治腳氣歷節風羌活湯治白虎歷節風短氣自汗頭眩欲吐手指攣曲身體魁瘰其腫如脫其痛如制因體虛飲酒當風汗出入水受風寒濕毒之氣凝滯筋脈蘊於骨節或在四肢肉色不變晝靜夜劇痛徹骨如虎齧不可忍久不治令人骨節蹉跌一名癘風須大作湯丸救治不可以淺近之劑則無驗羌活去蘆二兩附子炮去皮臍秦艽去蘆桂心不見火木香不見火川芎當歸去蘆川牛膝去蘆酒浸桃仁去皮尖麩炒骨碎補防風去蘆各一兩甘草炙半兩上銼散每服四錢水一盞半生薑五片煎不拘時溫服趁痛丸治走注歷節諸風軟痛卒中倒地跌撲傷損草烏頭三兩去皮臍熟地黃或生者南星半夏曲白姜蠶烏藥各半兩並日干上為末酒糊丸梧桐子大每服五七粒空心日午夜臥溫酒下如跌撲傷損痛甚薑汁和酒研十粒塗傷處卒中倒薑汁茶清研五七粒灌下立醒附子八物湯治歷節風四肢疼痛如捶鍛不可忍附子炮去皮臍乾薑芍藥茯苓甘草炙桂心各三兩白朮各三兩白朮四兩人參三兩上銼散每服四大錢水二盞煎食前服一方去桂心用乾地黃二兩烏頭湯治病歷節痛不可屈伸烏頭五枚銼以蜜二升煎取一升去烏頭甘草麻黃去節芍藥黃耆上銼散每服四錢水盞半煎去滓投蜜再煎空心服或加老薑桂心大棗不用麻黃黃耆治寒疝腹中絞痛賊風入腹攻五臟拘急不得轉側叫呼發作有時使人手足厥冷虎骨散治白虎風肢節疼痛發則不可忍或癢痛不得屈伸虎骨炙酥二兩花蛇酒浸取肉天麻防風去蘆川牛膝酒浸去蘆白殭蠶炒去除嘴川當歸去蘆酒浸乳香別研桂心不見火各一兩甘草炙全蠍去毒各半兩麝香一錢別研上為末每服一錢溫酒調不拘時服豆淋酒亦可麝香丸治白虎歷節諸風疼痛遊走無定狀如蟲噬晝靜夜劇一切手足不測疼痛及腳痛川烏大八角者三個全蠍二十一個黑豆二十一個地龍半兩並生用上為末入麝香半字糯糊丸綠豆大每服七丸甚者十丸夜臥令肚空溫酒下微出冷汗一身便瘥一方加去足蜈蚣一條以草烏代川烏尤妙獨活寄生湯治歷節風溫解風寒暑濕之毒亦治腳氣方見大方科腰痛類麻黃散治歷節無汗宜發汗羌活一兩華陰細辛黃耆各半兩麻黃一兩一分上銼散每服五錢水二盞煎接續三四服有汗慎外風神授丸治白虎歷節痛甚肉理枯虛生蟲遊走癢痛兼治痹疾半身麻木殺傳屍瘵蟲效正川椒色紅大者去子併合口以黃稈紙二重託於爐上炒出汗取頓地上用沙盆蓋以灰圍盆弦約時許上為末老酒浸白糕為糊丸梧桐子大每服三四十丸食前鹽湯下治痹辣桂煎湯下腰痛茴香酒下腎冷鹽湯下歷節癘風方治手足攣曲骨節間痛甚蓖麻子去皮二兩黃連去須銼如豆子一兩上用新水二升於瓷瓶內浸藥密封七日後取出逐日侵晨面東以浸藥水吞蓖麻仁一粒七日後添兩粒微利無妨以療大風亦效白虎風走注癢痛方上用三年釅醋五升熱煎三五沸切蔥白三升煮一沸漉出布帛熱裹當病處熨之又方雞子揩患處咒三遍願送糞堆頭蓋白虎糞神愛吃雞子患者下飯用黃腳雞為妙亦可用抱雞來壓之其癢自止又方用芥菜子為末雞子白敷之攝風酒治白虎歷節風及諸般風濕流注四肢大風鶴膝一切風疾四肢拘攣不能坐立凡是骨節去處皆盡浮腫夜痛號哭諸藥不效重者服至兩料愈矣尋風藤一兩五加皮一兩半虎脛骨烏藥石南葉蒼朮各五錢三角尖一兩石上生者佳骨碎補七錢半青木香威靈仙川續斷當歸乳香川羌活北細辛各二錢半青藤根一兩川牛膝四錢防風五錢南木香二錢半石薜荔一兩石上生者佳蘇木甘草節五錢生薑一兩半大川烏一雙分作四分只生用一分上二十四味銼碎用無灰酒一罈將藥盛於布袋內放酒罈中油紙封縛仍以鍋盛水將壇於鍋內用慢火自辰時煮至午時連壇取出每時不拘時候隨意溫服藥酒如夏月恐停久作酸只半料用小壇酒依上煮服癜風何首烏散治肌肉頑麻紫癜白癜風荊芥穗蔓荊子去皮蚵蚾草去土威靈仙洗何首烏防風去蘆甘草炙各等分上為末每服二錢食後溫酒調下如聖膏治癜風詩曰紫癜白癜兩般風附子硫黃最有功薑汁調勻茄蒂蘸擦來兩度更無蹤先以布擦其瘡令損卻以茄蒂蘸藥擦一說白癜風用白茄蒂紫癜風用紫茄蒂又方硫黃一兩米醋煮一日海螵蛸二個併為末浴後以生薑蘸藥熱擦避風少時數度絕根又方雞子一枚用釅醋浸一宿以針刺小穿滴青烊為汁入砒霜並綠豆末少許和勻用石扎擦破青布蘸擦又方雄黃硫黃黃丹密陀僧大南星各等分上為末先用薑汁擦患處次用姜蘸藥末擦後漸黑次日再擦黑散則無恙矣灸法治白癜風灸左右手中指節宛中三壯未瘥報之凡有贅疵諸痣但將艾炷於上灸之三壯即除
