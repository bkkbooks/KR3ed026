body:
  text: 卷第十三風科論雜風狀中風大法有四一曰偏枯二曰風痱三曰風懿四曰風痹夫諸急卒病多是風初得輕微人所不悟宜速治之偏枯者半身不遂肌肉偏不用而痛言不變智不亂病在分肉之間溫臥取汗益其不足損其有餘乃可復也風痱者身無痛四肢不收智亂不甚言微可知則可治甚即不能言不可治風懿者奄忽不知人咽中塞窒窒然舌強不能言病在臟腑先入陰後入陽治之先補於陰後瀉於陽發其汗身轉軟者生汗不出身直者七日死風痹濕痹周痹筋痹脈痹肌痹皮痹骨痹胞痹各有證候形如風狀得脈別也脈微澀其症身體不仁中風惡證口開者心氣閉絕也遺尿者腎氣閉絕也手散者脾氣閉絕眼合者肝氣閉絕也鼻鼾者肺氣閉絕備此五症尤不可治五症中才見一症獨當審餘症以救療蓋以初中則眼合者多痰上則鼻鼾者亦多惟遺尿口開俱見為惡心為五臟主君腎為一身根本誠不可閉絕也中風要說凡中風脈無不大者非熱也是風脈也中風有冷熱陽病則熱陰病則冷冷則用溫風藥熱則用涼風藥不可一概用也凡中風皆不可吐出涎人骨節中皆有涎所以轉動滑利中風則涎上潮咽喉中滾響以藥壓下涎再歸骨節可也不可吐出涎時間快意非久枯了手足不可不戒小兒驚風亦不可吐出涎其患與大人同方其發搐搦之時不可捉住手足捉住則涎不歸手足當不隨但寬抱之可也中風須大作湯劑方有成效若風歸手足名曰小中不宜用正風藥深治但用平和湯劑雖不能為全人亦可留連歲月戒之戒之虛證通氣驅風湯治男子婦人血氣虛弱虛風攻注肌體顫掉肩背刺痛手足拳攣口眼喎斜半身不遂頭目旋暈痰涎壅盛語言謇澀行步艱難心忪氣短客風所湊四肢拘急鼻塞聲重頭疼脾胃不和心腹刺痛胸膈不快少力多困精神不爽不思飲食嘔吐噁心霍亂吐瀉胎前產後但是氣虛百病皆可服之天台烏藥五兩桔梗去蘆川白芷川芎甘草炙陳皮去白白朮各三兩半麻黃去根枳殼麩炒去穰各兩半人參去蘆半兩上為末每服三錢紫蘇木瓜煎湯調下去白朮加乾薑殭蠶名烏藥順氣散卒中風氣不順手足偏枯流注經絡四肢骨節疼痛或身如板片舉動不得筋脈拘攣先宜多服得手足間微汗為妙又腳氣步履艱難腳膝軟弱婦人血風老人冷氣上攻胸臆兩脅刺痛咳嗽心腹膨脹為散每服四錢生薑三片紅棗二枚煎服或閃挫身體能屈伸溫酒調服遍身癢抓成瘡薄荷煎服常服疏風通滯氣調榮衛進飲食大有神效一方每料加天麻一兩沉香五錢亦效並不拘時候加減續命湯治中風不省人事漸覺半身不遂口眼喎斜手足顫掉語言謇澀肢體痿痹神情昏亂頭目眩重筋脈拘攣不能伸屈骨節煩疼不得轉側亦治腳氣緩弱久服之瘥有病風人常服不可缺以防喑啞麻黃去根人參黃芩白芍藥川芎甘草杏仁去皮麩炒防己桂各二兩防風一兩半附子炮去皮臍有熱者用白附子以上系正方上銼散每服四錢水一盞半生薑三片棗二枚煎不拘時候溫服取汗隨人虛實與所中輕重也筋急拘攣語遲脈弦加薏苡仁治筋急加人參黃芩芍藥以避中寒服後稍輕再加當歸全愈腳氣痹弱不能轉側心神恍惚加茯神遠志骨節煩疼有熱者去附子倍加芍藥煩躁大便澀去附子倍芍藥加竹瀝臟寒大便自利去黃芩加白朮附子骨肉冷痛者加肉桂附子煩躁多驚者加犀角嘔逆腹脹人參半夏自汗去麻黃語言謇澀手足顫掉石菖蒲竹瀝大便秘胸中不快枳殼大黃氣塞不通沉香有痰南星數片發渴麥門冬乾葛瓜根身疼秦艽上氣浮腫喘急防風桑白皮以上所加各一兩小兒慢驚煎取藥汁一盞入生薑汁再煎一二沸日三服夜二服夏間又有熱者減桂一半春加麻黃一兩夏加黃芩一兩秋加當歸四兩冬加附子半兩風虛加川芎一兩一方加木香縮砂獨活各一兩川烏炮三分亦效牙關緊用南星末半錢龍腦一字頻擦牙上令熱即自開大省風湯治諸虛風涎潮痰厥神昏頭暈語澀手足搐搦半身不遂及歷節風痛筋攣急川芎半夏防風各一兩甘草炙半兩全蠍去毒三個附子生去皮臍川烏去皮臍木香南星各半兩上銼散每服四錢水一盞半生薑十片煎溫服不拘時候氣虛加沉香氣逆紫蘇胸膈不利有痰倍加半夏人參頭暈頭疼加天麻半兩全蠍二錢煎熟入麝香熱風左癱右瘓口眼喎斜口噤不能言手足頑麻於本方中去附子川烏順元散治卒中昏不知人口眼喎斜半身不遂咽喉作聲痰氣上壅六脈沉伏或浮盛兼治痰厥飲厥及氣虛眩暈川烏二兩天南星附子各一兩並炮木香半兩上銼散每服三大錢水一盞半生薑七片煎稍熱服感風濕卒中五積散合和服不省人事細辛皂角少許為末或只用半夏為末以蘆管吹入鼻中俟噴嚏少蘇然後進藥痰涎壅盛每服加全蠍五枚仍服養正丹每服三七粒鎮墜之以其用硫黃黑錫皆有利益則痰涎隨去矣因氣中者以沸湯化蘇合香丸一粒乘熱灌下仍用前藥汁濃磨沉香汁少許同煎一沸服之四體冷厥用靈砂丹歲丹二七粒兼服方並見傷寒痼冷中氣類二香三建湯治男子婦人中風虛極六脈沉伏舌強不能言語痰涎並多精神如癡手足偏廢不能舉動此等症狀不可攻風只宜扶虛天雄附子川烏並生去皮各一兩木香不見火半兩沉香濃磨水臨熱旋入上銼散每服四錢水二盞生薑十片煎七分空心溫服一粒金丹治一切風疾氣血俱虛陰陽偏廢卒暴中風僵臥昏塞涎潮搐搦不省人事失音舌強手足嚲曳口眼喎斜或癱瘓偏枯半身不遂語言謇澀舉止錯亂四肢麻痹及治顛癇倒臥目瞑不開涎盛作聲或角弓反張目睛直視口禁悶絕牙關緊急並治風搏於陽經目眩頭暈牙齒疼痛耳作蟬鳴皮膚瞤搐頻久喜睡項強拘急不能回顧及腎臟風虛腳膝疼痛步履艱難偏風流注一邊屈伸不得無問新久並能治之川烏頭炮去皮臍大附子炮去臍白附子炮各一兩白殭蠶炒去絲淨白蒺藜炒去刺五靈脂去石白礬枯沒藥研各半兩硃砂研細墨磨汁麝香研各二錢半上為末用墨汁和藥每兩作六丸窨干金箔為衣每服一丸生薑半兩和皮擦取自然汁化盡為度用無灰酒半盞溫熱調前藥溫服量病人酒性多少更飲酒一二升投之以助藥力次用衣被蓋覆使臥汗出為效勢輕每服半丸不以時候如有風疾常服尤佳補益五臟固密真元通流關節祛逐風邪壯筋續骨神效萬金湯治風補虛順榮衛通血脈並腰腳膝沉重緩弱無力及治手足風累驗續斷杜仲去粗皮炙香切防風牛膝酒浸焙華陰細辛白茯苓人參辣桂去粗皮當歸切焙甘草炙各一兩川芎獨活秦艽去土熟地黃各半兩切酒拌微火炒上銼散每服五錢水二盞煎過空腹熱服若正臂不遂得痊愈後而手指不便無力試諸藥不效者不半劑可愈血虛體弱加鹿茸肉蓯蓉各半兩八寶回春湯治一切諸虛不足風疾血氣交攻凝滯脈絡拘急攣拳氣不升降膻中疼痛痰涎壅盛脾胃不和飲食不進此藥去風和氣活血大有神效凡治風不可專用風藥攻之愈急則愈甚服此輕者一月重者二三月自然愈矣且無再作夫血氣和平榮衛調順則風症不攻而自去附子炮人參麻黃去節黃芩防己香附子去毛杏仁去皮川芎當歸各一兩茯神兩半陳皮防風各一兩白芍藥五兩沉香川烏炮各半兩半夏兩半桂一兩白朮二兩天台烏藥半兩乾薑一兩黃耆三兩甘草熟地黃各一兩生乾地黃一兩上二十四味八味去風八味和氣八味活血同銼散每三錢水一盞半姜三片棗一枚煎空心通口服常服效真珠丸治肝虛為風邪所幹臥則魂散而不守狀若驚悸真珠母三分研細當歸熟地黃各一兩半人參酸棗仁柏子仁各一兩犀角茯神沉香龍齒各半錢上為末煉蜜丸梧桐子大硃砂為衣每服四五十丸金銀器薄荷煎湯食後吞下御風膏治口眼喎斜上用蓖麻子去殼碾碎塗在手心以一盂子置在手心蓖麻子上用熱水置盂中口正則急取盂子左癱塗右手心右癱塗左手心口眼才正急洗去藥只隨病處左右貼亦可又治產難者爛研塗兩腳心才生下便洗去又方用桂心酒煮取汁故紙蘸貼患處左喎貼右右喎貼左即正又方栝蔞擂爛絞取汁和大麥面搜作餅炙令熱熨如正便止不令太過又方大鱔魚一條以針刺頭上血左斜塗右右斜塗左以平正即洗去鱔放之虎骨酒治諸般風痹手足疼痛步履艱難腿膝緩弱久服身輕體健行動快捷大和氣血通行榮衛補虛排邪有益真氣虎脛骨酥炙三兩半川當歸酒洗焙川附子炮去皮臍大川烏炮去皮尖各一兩半川羌活川芎獨活赤芍藥白朮杜仲去粗皮姜炒去絲萆薢防風去蘆肉桂去粗皮肉蓯蓉酒洗焙川牛膝酒洗焙黃耆去蘆金毛狗脊燒去毛白茯苓去皮白蒺藜炒去刺人參去蘆天麻以上各一兩川續斷一兩上銼散以生絹袋盛了用無灰酒一斗浸之密封瓶口春浸三日夏二日秋七日冬十日每服一杯溫過空心服神效留滓日乾或焙乾為末酒糊丸溫酒下熱症金沸草散治卒中風痰上壅頭項強急肢體煩疼筋脈拘急遍體發熱先以解之方見大方科傷寒陽證類人參羌活散治風壅痰實頭目昏暈遍體拘攣頭項強急肢節煩疼壯熱煩渴前胡羌活人參防風天麻赤茯苓去皮薄荷葉蔓荊子川芎粉草黃芩枳殼去穰桔梗川獨活各一兩上銼散每服四錢姜三片桑白皮七寸煎不拘時服星香飲治中風痰盛服熱藥不得者南星八錢木香一錢上銼散每服四錢生薑十片水一大盞煎溫服防風通聖散治一切風熱頭目昏痛肢體煩疼咳嗽喘滿涕唾稠黏口苦咽乾腸胃結燥防風二錢半川芎半兩石膏一兩滑石三兩當歸一兩赤芍藥大黃各半兩甘草炒荊芥穗各二錢半薄荷葉一兩麻黃去根節白朮連翹黃芩桔梗牛膝酒浸去蘆人參半夏薑汁製各半兩山梔子三錢上銼散每服四錢水一盞生薑三片煎溫服不以時候三黃湯治中風手足拘攣百節疼痛煩熱心亂惡寒不欲飲食兼治賊風偏風猥退風半身不遂失喑不言麻黃去根節黃耆半兩黃芩三分獨活一兩上銼散每服四錢水一盞半煎不以時候服取汗為效心熱加大黃半兩氣滿枳實一分氣逆人參三分心悸牡蠣三分渴加栝蔞根寒加附子一枚炮煎熟入小省風湯治左癱右瘓口眼喎斜口噤全不能言半身不遂手足頑麻防風去蘆天南星浸炮各三兩甘草炙一兩上銼散每服四錢生薑十片水一大盞煎熱服洗心散治因食熱物過度作成中風其狀手足如火煩躁眼赤肌肉瞤動筋脈拘攣痰涎壅塞大小便閉澀依症用之大效方見大方科積熱類四順清涼飲治血熱蘊結壅滯遂成風症煩渴喘悶譫妄驚狂舌強口噤方見大方科腹痛類小通聖散治風熱上攻目赤頭痛咽疼齒牙兩頰腫滿口乾煩躁筋脈攣急並解酒毒當歸薄荷羌活防風梔子粉草大黃川芎防己桔梗各一兩上銼散每服四錢水一盞半燈心二十莖青竹葉七皮煎食後服小兒急驚可服二錢清神散消風壅化痰涎治頭昏目眩心忪面熱腦痛耳鳴鼻塞聲重口眼瞤動精神昏憒肢體疼倦頸項緊急心膈煩悶咽嗌不下檀香人參去蘆羌活去苗防風去蘆各一兩薄荷去土甘草爁爛各二兩石膏研細辛去苗洗焙各五錢上為末每服二錢沸湯點服或入末茶少許食後服茶調散治同上或加石膏亦可亦見大方科頭痛類川芎石膏湯治風熱上攻頭目眩痛咽乾煩渴痰壅喘嗽又治中風偏枯調理勞復諸病川芎芍藥當歸山梔子黃芩大黃菊花荊芥穗人參白朮各半兩滑石四兩寒水石桔梗各二兩甘草三兩縮砂仁三錢石膏防風連翹薄荷葉各一兩上銼散每服三錢水一盞食後煎服熱甚者為末冷水下消風散治諸風上攻頭目昏痛項