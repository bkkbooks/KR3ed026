body:
  text: 卷第十六眼科總論人有雙眸如天之有兩曜乃一身之至寶聚五臟之精華其五輪者應五行八廓者象八卦凡所患者或因生食五辛多啖炙爆熱餐麵食飲酒不已房室無節極目遠視數看日月頻視星火夜讀細書月下觀書抄寫多年雕鏤細作博奕不休久處煙火泣淚過多刺頭出血多若此者俱喪明之本復有馳騁田獵沖冒塵沙日夜不息者亦傷目之媒又於少壯之時不自保惜逮至四十以漸昏蒙故善衛養者才至中年無事常須暝目勿使他視非有要事勿宜輒開則雖老而視不衰大抵營衛順則斯疾無由而生營衛衰則致病多矣且傷風冷則淚出虛則昏蒙勞力則眥赤白腫則脾家受毒生瘡則風熱侵肺黃乃酒傷於脾血灌瞳仁及赤色俱是心家有熱羞明見紅花為肝冷黑花則腎虛青花膽有寒五色花為腎虛兼熱不可一概為治若虛不補而實不瀉亦難收效然上虛乃肝虛下虛乃腎虛肝虛則頭暈耳聾目眩腎虛則虛壅生花耳作蟬鳴尤宜補肝益腎其有熱淚交流兩瞼赤痛乃肝之極熱迎風有淚為腎虛客熱涼肝瀉腎必得其宜至於五臟各以類推虛則生寒實則生熱補瀉之用須在參詳毫釐之差千里之謬余則無非有所觸動或大病之後所患不一至如暴赤一證多因浮熱衝上或眠食失時飽食近火得之加以勞役失於調攝過食毒物變成惡證醫者不原本始但知暴赤屬陽或以散血之劑或以涼心之藥縱使退散遂致脾經受寒飲食不進頭目虛浮五臟既虛因成內障亦有見其不進飲食俾更服熱藥遂致三焦暴燥熱氣上攻昏澀眵淚或犯盛怒辛苦重勞遂生胬肉心氣不寧風熱交併變為攀睛症狀不一是為外障又若讀書博奕等過度而致疾者名曰肝勞不可但投以治肝之劑及作他證治之卒於莫效惟須閉目珍護不極遠視庶乎可瘳若夫患風疹者必多眼暗先攻其風則暗自去婦人胎前産後用藥亦須避忌小兒所患切且善治惟略加淋洗披鐮針灸端不可施猶須戒其用手頻揉或因茲睛破至於莫救以上諸證專是科者宜留意焉五輪八廓白屬肺氣之精氣輪黑屬肝筋之精風輪上下瞼屬脾胃肉之精肉輪大小眥屬心血之精血輪瞳仁屬腎骨之精水輪風輪病因喜怒不常作勞用心晝凝視遠物夜勤讀細書眼力既勞風輪內損其候眥頭尤澀睛內偏疼視物不明胞眩緊急宜去風藥血輪病因憂愁思慮悲喜煩勞內動於心外攻於目其候赤筋纏眥白障侵睛胞瞳難開昏暮多澀日久不治失明愈深宜洗心涼血藥肉輪病因多餐熱物好吃五辛遠道奔馳駐睛驟騎食飽耽眠積風痰壅其候胞眩赤腫暴赤昏蒙眼淚常盈倒睫澀痛瘀血侵睛宜疏醒脾藥氣輪病因凌寒冒暑受飲寒漿肌體虛疏寒邪入內或痛或昏傳在白睛筋多腫赤視日如隔霧觀物似生煙日久不治變成白膜黑暗難開水輪病因勞役不止嗜欲無厭大驚傷神大怒傷志加之多食酒面好啖鹹辛因動腎經通於黑水冷淚鎮流於瞼上飛蠅相趁於睛前積聚風虛或澀或癢結成翳障多暗多昏宜補腎藥天廓傳道肺大腸地廓水穀脾胃火廓抱陽心命門水廓會陰腎風廓養化肝雷廓關泉小腸山廓清淨膽澤廓津液膀胱天廓病因雲中射雁月下看書多食腥膻侵冒寒暑致天廓有病內動視物生煙眥疼難開不能辨認地廓病因濕漬頭上冷灌睛眸致令有病眼眩緊急瘀血生瘡火廓病因心神恐怖赤脈侵眥血灌瞳仁熱淚如傾其症瞼頭紅腫睛內偏疼熱淚難開水廓病因大勞努力爭鬥擊棒開弓驟騎強力致令生病常多暗昏睛眩淚多風廓病因枕邊窗穴有風不能遮閉坐臥當之腦中邪風攻於風廓以致黑睛多癢兩瞼常爛或昏多淚雷廓病因失枕睡臥酒後行房血脈溢滿精宣閉滯風虛內聚上攻故令眥頭赤腫瞼內生瘡倒睫拳毛遮睛胬肉山廓病因撞刺磕損致令肉生兩瞼翳閉雙睛若不早治永沉昏暗瘀血侵睛澤廓病因春不宣解冬聚陽毒多吃脂肥過餐熱物致令腦脂凝聚血淚攻潮有如霧籠復見飛蜂繚繞黑花常滿難於瞻視七十二症方內障丸翳第一丸翳者黑珠上一點丸日中見之差小陰處見之則大白或明或暗視物不明醫者不曉以冷藥治之轉見黑花此因肝腎俱虛而得也宜服後藥補肝散熟地黃白茯苓去皮家菊細辛各半兩芍藥三分柏子仁一分甘草半錢炙防風一分北柴胡一兩去蘆上銼散每服三錢水一盞半煎食後服補腎丸巴戟去心山藥破故紙炒茴香牡丹皮各半兩肉蓯蓉一兩洗枸杞子一兩青鹽一分後入上為末煉蜜丸梧桐子大每服三十丸空心鹽湯下冰翳第二冰翳者如冰凍堅實旁觀自透於瞳仁內陰處及日中看之其形一同疼而淚出此因膽氣盛遂使攻於肝而得之宜服後藥通肝散山梔子蒺藜炒去尖枳殼去白荊芥各半兩車前子牛蒡子各一分炒甘草五錢炙上為末每服二錢苦竹葉湯調食後服滑翳第三滑翳有如水銀珠子但微含黃色不疼不痛無淚遮繞瞳仁澀翳第四澀翳微如赤色或聚或開兩旁微光瞳仁上如凝脂色時復澀痛而無淚出散翳第五散翳如鱗點或瞼下起粟子而爛日夜痛楚瞳仁最疼常下熱淚前件三證並是肝肺相傳停留風熱宜服八味還睛散白蒺藜炒去尖防風粉草炙木賊山梔炒去殼各半兩草決明一兩炒青葙子一分微炒蟬蛻一分上為末麥門冬去心煎湯食後調下橫開翳第六此證上橫如劍脊下面微微甚薄不赤不痛病此希少浮翳第七此疾上如冰光白色環繞瞳仁初生自小眥頭至黑珠上不痛不癢無血色相潮沉翳第八此病白藏在黑水下向日細視方見其白或兩眼相傳疼痛則早輕夜重間或出淚偃月翳第九此疾膜如凝脂一邊厚一邊薄如缺月其色光白無瑕疵前件諸證並不可治皆是宿生注受當有此病縱強用藥終無安日棗花翳第十此候周回如鋸齒四五枚相合赤色刺痛如針視物如煙晨輕而晝則痛楚迎風多淚昏暗不見白翳黃心十一此候四邊皆白但中心一點黃大小眥頭微赤時下澀淚團團在黑珠上前件亦是肝肺相傳停留風熱宜服前還睛散後墜翳丸黑花翳十二此候其狀青色大小眥頭澀痛頻頻下淚口苦不喜飲食蓋膽受風寒宜服涼膽丸黃連洗不見火荊芥黃芩草龍膽各半兩蘆薈防風各一兩黃柏去皮地膚子一分上為末蜜丸梧桐子大每服三十丸薄荷湯下胎患十三此候初生二三歲觀物則近看轉睛不快至四五歲瞳仁潔白昏蒙不見延至年高無藥可治蓋胎中受熱致損其目莫能治之五風變十四五風變為內障其候顏色相間頭疼甚卻無淚出兼毒風腦熱所致日中如坐暗室常自憂嘆雷頭風十五此候熱毒之氣衝入眼睛中年牽引瞳仁或微或大或小黑暗全不見驚振十六此候因病目再被撞打變成內障日夜疼痛淹淹障子赤膜繞目不能視三光亦如久病內障前件四證設有病者俱不可治所謂針刀難下手藥力並無功若強治之不過服還睛散然終難愈緑風十七此病初患則頭旋兩額角相牽瞳仁連鼻隔皆痛或時紅白花起或先左而後右或先右而後左或兩眼同發或吐逆乃肝肺之病肝受熱則先左肺受熱則先右肝肺同病則齊發先服羚羊角散後服還睛散方見前羚羊角散家菊防風川芎羌活車前子川烏炮去皮尖各半兩半夏泡羚羊角薄荷葉各一分細辛一兩上銼散生薑煎或為末食後荊芥茶清調下烏風十八此眼雖癢痛而頭不旋但漸漸昏暗如物遮定全無翳障或時生花此肝有實熱宜服瀉肝散郁李仁荊芥各一分甘草炙大黃各半兩上銼散每服三錢水一盞半煎食後溫服黑風十九此眼與緑風候相似但時時黑花起乃腎受風邪熱攻於眼宜涼腎青風二十此眼不痛不癢瞳仁儼然如不患者但微有頭旋及見生花或勞則轉加昏蒙前二件證宜服還睛散肝虛雀目二十一雀目者肝臟虛勞時時花起或時頭疼年深則雙目盲小兒患者因疳得之高風雀目二十二雀目二證病狀雖同中有異處蓋高風才至黃昏便不見經年瞳子如金色所謂黃風者即此也前件二證均不可治肝虛目暗二十三此病遠視不明眼前花子頻起眥目皆赤痛有時看一成二此乃肝虛宜服補肝散稍稍加涼劑與之方見前外障肝臟積熱二十四眼先患赤痛腫疼怕日淚澀難開忽生翳膜腫或初患一目不見以致兩目齊患此因作勞用力肝膈熱勞宜服大決明散石決明一兩炒草決明炒羌活山梔子各半兩木賊五錢大黃煨荊芥各一分青葙子炒芍藥各五錢上為末每服二錢麥門冬去心煎湯調食後服傷寒熱病後目昏二十五傷寒病安後眼目疼痛紅腫或食毒物過多壅熱上衝熱淚交流澀痛難開兼生翳膜宜服前決明散後春雪膏點之混睛二十六此候白睛先赤而後癢痛迎風有淚閉澀難開或時無事不久又發年深則睛變成碧色滿目如凝脂赤絡橫赤如絲此毒風積熱宜服地黃散生地黃一兩芍藥半兩土當歸半錢甘草半兩上銼散每服三錢水一盞半煎食後溫服胬肉攀睛二十七此證或先赤爛多年肝經為風熱所沖而成或用力作勞有傷肝氣而得或癢或痛自兩眥頭胬出心氣不寧憂慮不已遂乃攀睛或起筋膜宜服二黃散黃芩大黃防風薄荷各半兩上銼散每服三錢水一盞半蜜少許煎食後臨睡溫服定心丸石菖薄甘菊枸杞子各半兩辰砂二錢遠志一分去心麥門冬一兩去心上為末蜜丸梧桐子大每三十丸食後熟水下兩瞼黏睛二十八此乃爛眩風是也雙目赤爛黏滯經年不安或癢或痛宜服消風散桑白皮煎湯調下方見風科熱證類仍用驅風散洗膜入水輪二十九此因黑珠上生瘡稍安其痕疤不沒侵入水輪雖光未絶終亦難治釘翳根深三十此因心肝滯留偏熱致使眼疼痛生翳膜經久其色如銀釘釘入黑睛此證不可治黑翳如珠三十一此起在黑水上如小黑豆疼痛而淚出不可用點藥此乃腎虛受風熱而得之宜先服羚羊角散後服補腎丸方見前花翳白陷三十二此白翳旋繞瞳仁點點如花白鱗砌者乃因肝肺伏藏積熱又吃熱物遂而得之宜膏藥點後服前羚羊角散水瑕深翳三十三此乃黑水內橫深瑕盤青色沉沉深入痛楚無時蓋五臟俱受風熱宜服清涼散蔓荊子荊芥苦竹葉甘草各半兩山梔子一分去皮上銼散每服三錢水一盞半薄荷七葉煎溫服玉翳浮滿三十四此證黑珠上乳玉色不疼不痛翳根不紅不宜針割但服前還睛散磨翳膏點之即愈方見後因他病後生翳三十五眼內他病得時漸漸不見初則微生翳膜後則遍睛俱白有此者無可治矣順逆生翳三十六翳自上而生下者為逆自下生上者為順逆則難治順則易安宜用點藥磨翳膏空青二錢片腦三錢蕤仁一兩口含去皮殼上於乳鉢內研合盛旋點之雞冠蜆肉三十七翳生在瞼內如雞冠蜆肉或青或黑須翻出看之阻礙痛楚怕日羞明蓋脾經先受熱後有所傳宜服決明散方見前瞼生風粟三十八兩瞼上下初生如粟米大漸漸大如米粒或赤或白不甚疼痛堅硬者蓋肝壅瘀血所成宜服消毒飲大黃半兩煨牛蒡子一分炒甘草一分荊芥半兩上銼散每服三錢水一盞半食後溫服胞肉膠凝三十九眼胞皮肉有似膠凝腫高如桃李者時時出熱淚乃風毒所注宜消風散及花草膏點之方見風科熱證類及見後漏睛膿出四十眥頭結聚生瘡流出膿汁或如涎水黏睛上下不痛仍無翳膜此因心氣不寧並風熱停留在瞼中宜服白薇丸白薇半兩防風白蔟藜去角炒石榴皮羌活各三錢上為末米粉糊丸如梧桐子大每服二十丸白湯下蟹睛疼痛四十一此證如大豆出黑珠上疼痛不可忍又名損翳亦不可用點藥宜服前決明散突起睛高四十二風毒流注五臟不能消散忽然突起癢痛熱極所致宜服前瀉肝散風起喎偏四十三偏風牽引雙目喎斜淚出頻頻卻無翳膜不癢不痛宜服消風散用荊芥湯下方見風科熱證類倒睫拳毛四十四此疾淚出涓涓翳膜漸生乍愈乍發多年不安眼皮漸急睫倒難開如刺刺樣痛瞳仁不安此乃脾受風熱先服瀉肝散後服五退散蟬蛻洗蛇蛻醋煮荊芥豬蹄退一分微炒穿山甲燒存性川烏炮去皮粉草各半兩蠶蛻二錢半上為末鹽湯調下二錢風牽瞼出四十五上下瞼俱赤而或翻出一瞼在外此亦脾受風毒宜服前五退散若患年深瞼內俱赤則不可治之神祟疼痛四十六舊無根因忽然疼痛或如針刺或如火炙及太陽穴掣痛早輕晚重先宜求福卻服決明散方見前旋螺尖起四十七目疼痛生翳膜尖起而赤似旋螺宜服前通肝散次服前決明散鶻眼凝睛四十八輪硬而不能轉側此為鶻眼凝睛此不可治轆轤轉關四十九此乃睛藏上下瞼不能歸中所以言之為轆轤也其證亦難治然當且服後藥天門冬飲子天門冬茺蔚子知母各二兩五味子防風各一兩人參茯苓羌活各兩半上銼散每服三錢水一盞半食後服瀉肝散麥門冬去心二兩大黃黃芩細辛芒硝各一兩黑參桔梗各兩半上銼散每服三錢水一盞煎食後服被物撞打五十目被撞打疼痛無時瞳仁被驚昏暗濛濛眼眶停留瘀血用地黃膏貼去血次服前決明散地黃膏生地黃一合黃連一兩黃柏寒水石各半兩上地黃研自然汁和藥成餅子要用時以紙貼目上非但是撞打可用凡風熱赤目熱淚出等眼皆可用以其性涼通逐去熱毒耳撞刺生翳五十一因撞刺生翳疼痛無時經久不安者覆被物撞之兼為風熱所攻轉加痛楚昏暗不見宜服經效散大黃當歸芍藥各半兩北柴胡一兩去蘆粉草連翹各一分犀角一錢後入上銼散每服三錢水一盞煎食後服仍用前磨翳膏點之血灌瞳仁五十二瞳仁為血灌注其痛如錐刺皆無翳膜睹物不明者或因有損或由肝氣閉血無所歸而得宜引血歸肝通血丸生地黃焙赤芍藥各半兩川芎一兩甘草五錢防風荊芥當歸尾各一兩上為末煉蜜丸如彈子大食後荊芥薄荷茶嚼下血即散而歸肝又恐眼目生花須再用前還睛散服之昧目飛塵五十三塵埃飛揚入目黏睛不脫或被飛絲所侵或被沙石所苦疼痛引澀揩碎不開宜用後瞿麥散敷天行赤目五十四目忽然赤腫晨昏痛澀此天行時疾或長幼傳染不安雖因熱氣相傳方有輕重宜服前瀉肝散即安虛人則用後五行湯洗暴赤眼後忽生翳五十五此證輕則無妨重則疼痛而白睛紅花乃生翳膜者是五臟積熱宜先用前地黃膏次服前瀉肝散胎風赤爛五十六小兒初生下便有此證至三四歲雙目紅而眩邊赤爛時復癢痛經年不安先服消風散桑白皮煎湯調下仍以後湯泡散洗風赤瘡疾五十七眼兩瞼似硃砂塗而生瘡黑珠端然無所染此因風熱生於脾臟若經久不治則生翳膜宜服前五退散次湯泡散洗衝風淚出五十八風證至冬月極甚發作不休此因肺虛受風遇風冷發宜服白殭蠶散白殭蠶直者去絲嘴炒粉草細辛各半兩旋覆花蒸熟焙半兩荊芥一分木賊半兩黃桑葉一兩嫩者上銼散每服三錢水一盞半煎食後溫服暴風客熱五十九眼為暴風熱所攻白睛起障覆黑珠瞼腫癢痛宜服前藥瞼硬睛疼六十瞼中紅赤而堅硬眼睛疼痛而淚出無時怕日羞明宜服前通肝散若有障膜用後春雪膏點之痛如針刺六十一睛忽然疼痛如針刺雙目根緊急坐臥不安此因熱毒在心服洗心散次服前還睛散方見大方科積熱類癢極難任六十二眼癢極甚瞳子連眥間皆癢不能收瞼此因清淨腑先受風熱得之宜服驅風一字散川芎半兩炮去皮尖羌活防風各一分川芎荊芥上為末每服二錢食後薄荷湯調下起坐生花六十三凡起坐生花或覺頭旋而悶耳內蟬鳴此乃腎虛兼受客熱不節房事宜多服補腎丸瞳仁幹缺六十四此證其睛乾澀全無淚液或白或黑始則疼痛後來稍定而黑不見此證不可治療黃膜上衝六十五黑睛從下生其黃膜上衝疼痛至甚閉澀難開此乃脾經受風食毒傷胃而得之宜服犀角飲犀角二角黃芩半兩白附子一分炮去皮尖麥門冬一分去心車前子羌活各半兩上銼散每服三錢水一盞半煎食後溫服赤膜下垂六十六眼中有膜自上垂下遮黑睛或名垂簾膜望風淚出怕日羞明此乃客熱上衝用後明上膏點之次服前通肝散小眥赤脈六十七小眥中生赤脈漸漸沖眼急宜早治此蓋三焦積熱得之宜服前犀角飲兼戒忌辛酸熱毒等物及房事方安小兒通睛六十八小兒雙眼睛通者欲觀東邊則見西畔若振掉頭腦則睛方轉此肝受驚風宜服牛黃膏牛黃一錢犀角二錢金銀箔各五片甘草一分上為末蜜丸緑豆子大每服七丸用薄荷湯吞下小兒斑瘡入眼六十九眼胞患斑瘡熱氣衝透睛中疼痛淚出翳如銀片腫澀難開宜服柴胡散柴胡黃芩芍藥各半兩甘草一分上銼散每服三錢水一盞煎大人小兒加減服兼以藥墜洗之余方見後小兒瞼中生贅七十眼瞼中生贅子初生如麻子大日漸如豆懸垂瞼內用脾經風熱所攻宜加減服前五退散小兒疳眼七十一小兒疳眼初生則澀癢久而生瘡翳腫難開怕見光明時時出淚此因肝風所攻或因瀉痢後虛熱上衝不可點宜服前還睛散余方見小方科諸疳類小兒青盲七十二胎中受風五臟不和嘔吐黃汁兩眼一同視物不明無藥可治上七十二證方藥條陳於前毋謂其略蓋眼科中用藥不可太繁或有好奇鳩撮衆藥合為一方不問虛實冷熱悉與服之群隊爭功豈知補瀉溫涼之性各異其為害也不少可不戒之虛證加味磁朱丸丹砂之畏磁石猶火之畏水今合用之砂法火入心磁法水入腎心腎各得其養則目自然明蓋目疾多因脾胃有痰飲漬侵於肝久則昏眩神麯倍於二味用以健脾胃消痰飲極有方效神麯四兩辰砂一兩磁石二兩煅醋淬七次上為末煉蜜丸梧桐子大每服五十丸食前米飲日進三服常服益眼力一方加夜明沙大補腎丸治腎氣不足眼目昏暗瞳仁開縮漸成內障磁石煅醋淬七次菟絲子酒蒸研各二兩五味子熟地黃枸杞子楮實覆盆子蓯蓉車前子酒浸石斛去根各一兩沉香青鹽研各半兩上為末煉蜜丸梧桐子大每七十丸空心食後鹽湯下養肝丸治肝血不足眼目昏花或生眵淚久視無力當歸酒浸車前子酒浸防風白芍藥蕤仁熟地黃川芎楮實各等分是為末煉蜜丸梧桐子大每服七十丸不以時溫水下錦鳩丸治肝經不足風邪內乘上攻眼暗淚出怕日羞明時時癢痛譫視茫茫多見黑花或生翳膜並治之草決明子二兩牡蠣煅取粉黃連去須杜蒺藜炒去尖防風去蘆甘菊花揀淨肉桂去皮各五兩蕤仁羌活去蘆瞿麥各三兩蔓荊子二升淘洗絹袋盛飯上蒸一伏時取出曬乾白茯苓去皮四兩細辛去苗五兩羯羊肝一具此炙令焦斑鳩一雙去皮毛腸嘴爪文武火連骨炙乾上為末煉蜜和杵五百下丸如梧桐子大每服十五至二十丸空心溫酒或溫水下早午臨臥日三服如久患外障眼服諸藥未效者漸加服五十丸必效暴赤眼疼痛食後用荊芥湯下二十丸駐京丸治肝腎俱虛眼常黑暗多見黑花或生障翳視物不明菟絲子酒浸炒取末五兩熟地黃洗蒸三兩車前子三兩上為末煉蜜丸梧桐子大每服五十丸空心溫酒下青鹽丸巴戟丸治並同上各見大方科虛損類錦雞駐景青鹽巴戟四件合和鹽湯吞下二三十丸久服除昏花增目力大效花草膏治患眼腫痛澀癢昏淚羞明羯羊膽一枚飯上蒸熟上以冬蜜研和入硃砂末少許頻研成膏食後臨臥匙抄少許含咽亦可點目椒目丸治久年眼生黑花不可者椒目炒一兩蒼朮二兩炒上為末醋糊丸梧桐子大每服二十丸醋茶下十日可效黑神散治血壅赤腫臨臥酒調服方見産科産後類加味參附正氣散治男子婦人眼昏暗不生眵糞此便是元氣憊腎經虛夜間小便二三次耗傷陽氣致生內障腦中有風致鼻流清涕或腦脂流下或瞳仁開闊此皆腎憊黑水散也加炮附子枸杞子去梗炒揀菊花蕊生薑紅棗煎食前空心服仍以綿鳩青鹽山藥八味等丸對和食前溫酒服及四柱散十全大補湯去熟地黃加附子枸杞子菊花蕊藿香正氣散並用薑棗煎服婦人服冷藥過多或崩或白帶致令眼昏不見赤可服此急救方見大方科諸氣類余方並見虛損傷寒類熱證八珍散治心熱沖眼赤腫澀痛熱淚羞明每服三錢水一盞半燈心二十莖苦竹葉七皮生地黃二根桑白皮七寸煎食後臨睡服方見大方科積熱類即八正散聖效散治諸般風熱風癢熱毒大人小兒生翳生膜生血筋但是外障熱眼並可服若內障是虛則不宜服黃芩北細辛甘草熟地黃大黃山梔子赤芍藥當歸尾極細者牛蒡子桑白皮各二兩有翳膜加一兩用菊花五兩去梗上銼散每服四錢水一盞半煎溫冷服合滓煎早食午食晚食臨臥各一服忌雞魚酒面糯米咸酸熱油諸般毒物眼乃一身之言如不能忌已藥亦無功自陷此身也每日丸白煮精豬肉咽飯或山藥蘿蔔菜果核棗子柿子銀杏土瓜棐子生葛可吃地黃丸素問云久視傷血血主肝故勤書則傷肝而目昏肝傷則自生風而熱氣上湊目昏益盛不宜專服補藥當益血鎮肝而目自明熟地黃兩半黃連去須決明子各一兩防風甘菊花羌活桂心硃砂研沒藥研各半兩上為末煉蜜丸梧桐子大食後熟水下三十丸日三服決明散治風熱毒氣上攻眼目腫痛或卒生翳膜或赤脈胬肉或澀癢羞明多淚或始則昏花漸成內障但是一切暴風客熱並宜服之黃芩甘菊花去枝梗木賊草決明子石膏赤芍藥川芎川羌活甘草蔓荊子石決明上銼散每服三錢水一盞半生薑五片煎食後服敗毒散治熱眼澀癢昏蒙每服三錢加薄荷桑白皮煎方見大方科傷寒類羊肝丸治肝經有熱目赤睛疼視物昏澀羯羊肝一具生用黃連去須別研為末上先將羊子肝去筋膜於砂盆內擂爛入黃連末杵和為丸梧桐子大每服五十丸不拘時候熟水下五行湯治眼暴赤時行赤腫作痛黃柏用刀略去粗皮取內皮不以多少上以濕紙裹黃泥包煨候泥干取出每用一彈子大紗帛包水一盞浸飯上蒸熟乘熱熏洗極效此方有金木水火土故以名一丸可有二三次地黃膏治赤眼上用生地黃肥者洗淨研細絹帛包之仰臥以藥搭在眼上初似礙而痛少頃清涼小兒赤眼黃連為末水調貼腳心其赤自退又方治血灌瞳仁生障膜上用生地黃研細和大黃末成膏以帛鋪二寸掩在眼上可再易之黃連湯治火眼鷹爪黃連七莖去毛節杏仁七粒去皮尖北棗七枚大者上用新瓦盆存貯入水八分以紙覆蓋慢火熬存二三分放在地上去火毒候冷存在湯瓶上蒸溫不要熱病者仰臥令人滴藥汁在眼尖角近鼻者候口中有苦味即是藥透如未知苦則一面滴數次即安其效如神蔓荊散又名小洗肝散治赤腫澀痛多淚瓜根蔓荊子荊芥梔子甘草上銼散每服三錢水一盞煎先熏後服食後用之春雪膏治眼目赤腫翳障羞明硼砂三錢腦子一錢通明朴硝五錢上為末入乳鉢研再用細絹羅過每用一小錢光弦者點津液沾藥末入目中閉霎時令藥自入開眼淚出效穿針散治同前木賊五錢去黑不用陳者香附子去毛細辛淨洗日乾菊花去梗蒂羌活各五錢上為末每服二錢用好茶少許同點食後服又方治眼有血紅或有紅線及生糞此是熱眼服前經效散又方治眼開不得羞明怕日此是風熱牽閉所致芎芷香蘇散加前胡連根蔥白三莖煎服若臟腑閉加大黃小兒翳障及瘡疹不得開加生桑白皮七寸同煎根新能瀉肺膜不生翳便退方見大方科傷寒類石決明散治眼生外障不問男女小兒皆治先服經效散不退卻進此藥石決明一兩火煅蒺藜炒去刺稱二兩荊芥穗二兩薄荷葉一兩人參蜜炙五錢上各於地上出火毒研末每服二錢沙糖冷水調食後食治方治眼赤腫及治每睡起時赤須臾又白名血熱非肝病也上以生地黃自然汁以粳米半斤三次浸三次暴乾用瓷瓶煎湯一升令沸下地黃及米煮成薄粥半飽飢飲一兩盞即睡三次立效貼藥治眼腫痛十分大者上以生薑自然汁調飛過白礬貼眼胞上痛即止又方治風熱上衝胬肉攀睛上用青萍少許研爛入片腦子少許貼眼上頓效風證消風散治昏澀風癢加荊芥煎湯服方見風科熱證類菊花散治肝受風毒眼目昏蒙漸生翳膜蟬蛻去足木賊去節童便浸一宿曬白蒺藜炒搗去刺羌活各三兩甘菊去萼四兩荊芥穗甘草各二兩上為末每服二錢食後茶清調下白蒺藜散治腎經風毒攻眼昏淚澀癢白蒺藜炒搗去刺防風甘草各一兩甘菊去萼一兩半生直殭蠶炒去絲嘴一兩白南星兩半用黑豆二合青鹽半兩水煮透焙去鹽豆上為末每服二錢沸湯少鹽點服蟬花無比散治風眼氣眼昏淚癢翳膜或頭風牽引眼小胞爛並治之石決明用東流水入鹽煮一伏時細研如粉當歸防風羌活各一兩半蟬殼洗曬甘草炙各一兩荊芥細辛蛇皮皂角水洗浸新瓦焙各半兩茯苓二兩蒺藜炒去刺四兩芍藥蒼朮童尿浸二宿去皮切曬各五兩上為末每服二錢米泔或茶清食後調下流氣飲治風熱攻眼赤腫荊芥穗梔子仁牛蒡子蔓荊子甘菊花細辛甘草炙防風白蒺藜炒去刺玄參川芎大黃黃芩木賊去節童尿浸曬草決明各半兩蒼朮米泔浸一宿焙一兩上為末每服二錢紫蘇或蜜湯調食後臨臥服菩薩散治風毒攻眼昏淚颼癢蒼朮二兩日換童便浸二宿銼曬防風二兩白蒺藜炒搗去刺二兩荊芥穗一兩半甘草鹽水炙七錢半上為末每服二錢入鹽少許沸湯點服或用消風散夾和尤佳方見風科熱證類驅風散治爛眩風赤浮翳胬肉攀睛澀癢眵淚防風去蘆龍膽草各五錢銅青三錢五倍子二錢淡竹葉一握去根上為末每服半錢熱湯一合泡停冷澄清洗捷效聖草散治爛眩風此眼有蟲細如絲色赤而長滋生不已覆盆子葉不以多少上洗淨研自然汁以皂紗帛蒙在眼上以筆蘸藥汁於上下眼眶當有細蟲出於紗上或研細著藥於紗上便睡亦可此方治眼暗不見物冷淚浸淫不止乃青盲者其法搗取自然汁澄陰乾入飲男子乳化開點入目中即仰臥更入少許腦子尤好三四日間視物如年少偶得方治爛眩風眼癢痛淚漬兩瞼皆成瘡百藥不效用此點之須臾淚下從瘡中流出其間有小蟲立愈黃連淡竹葉各一兩柏樹皮乾用半兩濕用二兩上銼散以二升水煎至五合稍冷用滴目內兩眥及洗爛處日三四次洗方治爛眩風赤眼五倍子捶碎去蛀末蔓荊子揀淨上用水煎澄清溫熱洗或用桑枝灰淋水洗亦效又方青礬火煅研出火毒每用半匕熱湯一盞泡溫洗爛筋及拳毛倒睫效又方治眼癢多因布巾拭破了眼眩致成爛眩風不得幹好白礬一兩煅過銅青三錢上同研細和勻如色白再加銅青每用半錢熱湯一合泡澄清以手蘸開眼如法洗必澀不可拭乾但閉目坐待澀止自然眼開如藥冷將紙蓋盞面於湯瓶上坐溫又洗一日洗四五次即效氣證木香流氣飲治因怒氣或食熱物或飲酒而致目赤眼胞紫內生赤脈加大黃煎服復加川芎治氣眼浮軟上壅朦朧分心氣飲治同上挾熱者服之特效方並見大方科諸氣類石膏羌活散治久患雙目不睹光明遠年近日內外氣障風翳昏暗拳毛倒睫一切眼疾羌活治腦熱頭風密蒙花治羞明見日木賊退翳障川白芷清利頭目北細辛去熱除風蘿蔔菜子起倒睫麻子起拳毛川芎治頭風黃芩洗心退熱石膏清頭目墜痰藁本治頭風頭疼甘草解諸藥毒各等分上為末每服二錢食後臨臥蜜水一盞調下或茶清或淘米第二遍泔水調日進三服至十日漸明二十日大效翳障退翳散治目內翳障兼治瘡疹後餘毒不散目生翳膜真蛤粉別研一兩穀精草一兩為末上和勻每服二錢用生豬肝一片三手指大批開摻藥在上卷定再用麻線外扎濃米泔一碗煮肝熟為度取出稍冷食後臨臥細嚼卻用元煮肝米泔送下忌一切炙爆毒物搐藥治目赤後暴生翳上以鵝不食草塞鼻中立瘥觀音夢授方治內障及因病赤眼食鹹物而得者夜明砂洗淨當歸去尾蟬蛻去足翼木賊去節各三兩上為末用白羯羊肝四兩湯煮爛搗如泥入藥末丸如梧桐子大食後溫熟水下五十丸百日眼如故矣羊肝丸治醫障青盲服之眼可復明方見前點藥治外障眼亦名豬膽方上以豬膽一枚用銀石銚煎成膏入冰片腦子少許點入眼中微覺翳輕又將豬膽白膜皮陰乾合作小繩如叉大小止用一頭燒作灰待冷點翳數日後翳退如舊呂仙翁方治內障有效生熟地黃切焙川椒去目及閉口者微炒上等分為末煉蜜丸梧子大空心鹽湯米飲下五十丸單方治瘡疹入眼及昏暗翳尤妙上用兔子糞焙為末每服用好茶清調下即安須待疹瘡安後服此重明散治風熱內外障氣眼疾川獨活去蘆川羌活去蘆川芎射干仙靈脾防風去蘆甘草井泉石蒼朮各五錢草決明丹參白朮石決明各三分上銼散每服三錢水一盞半煎溫服食後臨臥日三服小五退散治內障眼蟬蛻蛇蛻蠶紙烏雞卵殼男子發上夾燒存性研為末每用一錢和羊肝湯吃不以時常服麥門冬丸治內障眼熟地黃麥門冬車前子上等分旋焙旋研煉蜜丸用酒送下二三十丸屢效還睛丸治眼目昏翳蟬蛻洗曬蒼朮童尿換浸二宿焙熟地黃洗焙川芎白蒺藜炒杵去刺各一兩茺蔚子羌活木賊去節童尿浸一宿曬乾甘菊荊芥石決明煅存半生杏仁去皮尖焙菟絲子研酒浸焙蛇皮酒浸洗淨焙防風各五錢上為末煉蜜丸如彈子大每一丸食後細嚼薄茶下龍膽膏治遠年近日翳膜遮障攀睛胬肉連眶赤爛視物昏暗不睹光明隱澀多淚迎風難開治之神效爐甘石不以多少揀粉紅梅花色者為妙用坩堝子盛火煅七次入黃連淬七次用黃連不以多少捶碎水浸一宿去滓將焰紅爐甘石淬足七次了同黃連水細研飛過候澄下去上面水曝乾再用乳鉢研極細羅過方可用三錢桑柴灰羅過二錢龍膽草不以多少洗淨日乾不見火細研為末一錢好黃丹羅過半錢上件同白蜜四兩一處入在一紫黑瓷器內文武火慢熬以竹篦子攪如漆色不黏手為度切勿犯生水仍不用鐵器熬藥藥成依舊以瓷器盛頓每服用如皂角子大新冷水半盞化開洗三日不用每日洗數次無妨藥盞須用紙蓋不可犯灰塵截赤目極有功效神仙照水膏治障翳黃蠟黃丹水飛各一兩蛇蛻一分獨燒水銀一錢初生烏雞殼一個上以柳木棰三細滴蠟為餅臨臥用之候天明將水照眼藥墮水中膜盡去照水丹神驗點翳硃砂半錢海螵蛸一錢上入乳鉢內同研細水飛過澄取又用少許黃蠟熔旋入藥待要用時就火旋丸如蘿蔔子大臨臥用一丸點入眼角緊閣眼睡著次日用溫湯洗下未全退者更用一服極妙通治點眼膏子治眼目諸疾上用羊膽一枚入蜜一錢在內線扎定坩堝內滿入水煮熟冷水內浸取出候乾傾入角罐內竹著點眼四角效洗方湯泡散治肝虛風熱攻眼赤腫羞明漸生翳障當歸尾赤芍藥黃連去須杏仁各五錢銅青二錢薄荷葉三錢防風五錢上銼散每用二錢極沸湯泡乘熱先熏後洗冷則再暖用日兩三次又方沸湯白鹽入少許閉目沃洗鹽亦散血水淋法治眼睛腫脹突出新汲水沃眼中數換水睛自入仍以麥門冬桑白皮山梔仁煎湯通口服之明上膏治遠年日近不睹光明內外障眼攀睛胬肉眩眶赤爛隱澀難開怕日羞明推眵有淚視物茫茫時見黑花或瞼生風粟或翳膜侵睛時發癢痛並皆治之此藥神妙兼治口瘡塗之立愈白沙蜜一斤黃丹四兩硇砂乳香青鹽輕粉硼砂腦子各二錢並別研麝香半錢別研金星石銀星石井泉石雲母石各一兩黃連去須烏賊魚骨各半兩上件藥於淨室中不得令雞犬婦人見用銀石器慢火先炒黃丹令紫色次下蜜候熬得沫散其色皆紫次入臘月雪水三升再熬二十餘沸將余藥研成末一處同熬用箸滴於指甲上成珠不散為度以厚紙三張鋪在筲箕上傾在紙上濾過再用瓶子盛放在新水內浸三晝夜去火毒其水日一易之看病眼輕重臨晚用箸蘸藥點大眥頭以眼澀為度若治內障用面水和成條捏作圈子臨臥置眼上傾藥在內如此用之一月見效治赤眼後生翳膜方上以蘭香子淨洗曬乾每用一粒以箸點大眥頭閉目即覺藥在目內團丸旋轉藥力過即不轉須臾自隨眵淚出若翳膜在上如魚眼然再易一粒以病退為度洗眼方韶粉防風馬牙硝餅子銅青上為末每用一字溫湯調不拘時洗立效小決明散治斑瘡入眼草決明青葙子乾葛槐花敗荷葉水上者一皮上為末食後米泔水調下二錢如四五十日病只此藥若半年日久則眼老睛懸宜合後藥香白芷香附子連翹甘草蟬蛻上銼散每服兩錢水一盞煎去滓調前藥服仍忌熱味浮萍散治斑瘡入眼大人小兒皆可用之浮萍陰乾為末上每服二錢以生羊子肝半個入盞內以杖子刺碎沒水半合絞取肝汁調下食後不甚者一服瘥已傷目者十服見效黃連膏治眼胬肉攀睛風癢淚落不止朴硝一升以水半盞淘去土陰乾用白丁香半升以水半盞淘去土攪細用黃連二兩為末上取水入消香釜內熬至七分淘出令經宿水面浮牙者取出控干以紙作袋盛風中懸至風化將黃連末熬清汁曬乾消用豬膽羊膽和加蜜妙點之效滌昏膏治風眼疼痛不可忍者洗之妙好崖蜜半斤黃連五錢沒藥二錢半黃丹四錢炒紫色上入蜜同熬黑煎黃連成稠汁入二味藥內煎熬稠更入沒藥末同熬數沸濾去滓洗仍用後通天散搐鼻通天散治偏正頭疼一切壅滯明目赤芍藥川芍黃連黃芩玄胡索草烏頭當歸乳香別研各等分上為末每服少許紙捻子蘸藥搐鼻神效飛絲入眼腫痛方上用清茶汁點如神刮指甲上細屑箸點津液點爪屑入眼中其絲自聚拔去又方飛絲害左目以石菖蒲椎破塞右鼻中右目即塞左鼻中百發百中運黑法治飛絲入眼令人眼脹突出痛不可忍新筆兩三管濡好墨更換頻運眼上飛絲纏筆而出即安灸法目中痛不能視上星穴主之其穴直鼻上入髮際一寸陷者中灸七壯仍先灸噫噫穴其穴在肩膊內廉第六椎兩旁三寸其穴抱肘取之灸二七壯次灸風池其穴在顳顬髮際陷中與風府正相當即是側相去各二寸青盲無所見遠視䀮䀮目中淫膚白膜覆瞳子巨髎主其穴在鼻孔下俠水溝旁眼暗灸大椎下數節第十當脊中安灸二百壯惟多愈佳至驗風翳患右目灸右手中指本節頭骨上五壯炷如小麥大左手亦如之目卒生翳灸大指節橫紋三壯在左灸右在右灸左良針法目不明淚出目眩瞢瞳子癢遠視䀮䀮昏夜無見目瞤動與項口參相喎僻口不能言刺承泣穴在目下七分直瞳子拾遺十六方開明丸治年深日近翳障昏蒙寂無所見一切目疾熟地黃兩半酒洗菟絲子酒洗車前子麥門冬去心蕤仁去皮決明子地膚子茺蔚子枸杞子黃芩五味子防風去蘆澤瀉細辛去葉不見火杏仁炒去皮尖北葶藶炒青葙子各一兩桂皮半兩羊肝須用白羊者只用肝薄切瓦上焙乾了作末或只以肝煮研爛為丸庶可久留少則以蜜湊之上為末丸如梧桐子大每服三十丸熟水下日三服乃戒忌生薑糟酒炙爆等熱物當歸丸治頭疼腦虛眼目昏蒙生犀人參白朮當歸芍藥木香茯苓丁香牛膝酒炒蓯蓉天麻各半兩腦麝少許上為末好酒三升生羊膽一枚熬成膏丸如梧桐子大每服三十丸麝香酒下明眼地黃丸治肝腎虛熱風毒黑花眵淚補肝益腎大效石斛去苗防風去蘆叉各二兩枳殼去穰麩炒二兩生乾地黃熟乾地黃洗焙各半斤川牛膝去蘆酒浸一兩半杏仁去皮尖炒另研一兩上為末煉蜜丸梧桐子大每服三十丸食前溫酒或米飲鹽湯亦可忌一切動風毒等物菊花散治目赤腫麻豆傷寒後服熱藥並毒食腫痛如桃李大不得開者黃芩大黃菊花甘草防風各一兩土當歸半兩上銼散十歲以下每服二錢水一盞煎空心服貼藥治小兒赤熱腫目川大黃白礬朴硝上為末冷水調作掩子貼目上搐鼻藥治風熱腫赤難開雄黃水透過辰砂各二錢細辛半兩腦麝少許上為末口含水少許搐鼻中決明丸治諸般眼患因熱病後毒氣攻目生翳膜遮障服此漸漸消退免使針刀青葙子炒防風枳殼各一兩茺蔚子細辛各半兩枸杞子澤瀉生乾地黃石決明燒各半兩土當歸酒浸二兩宣連半兩去須車前子炒麥門冬去心各二兩上為末煉蜜丸如梧桐子大每服三十丸食後麥門冬煎湯送下洗藥治目生翳膜內外障海螵蛸生龍膽草少許上為末極細用熱湯浸起以銅箸點洗五七次點藥暑月行路眼昏澀者生龍膽草汁一合黃連三寸切爛上用生絹挒出汁點入目中密蒙花散治十六般內障多年昏暗或近日不明淚出眩爛一切目疾並皆治之羚羊角一兩水煮銼炒乾人參一兩密蒙花二兩覆盆子蠐螬醋浸各一兩茺蔚子決明子各半兩地膚子甘草枸杞子各一兩菊花槐花各半兩上為末食後用飯飲調下二錢點眼藥上用大田螺一個淨養去泥然後入瓦合中以腦麝少許入田螺內掩中封起候十日余開即便成水點之洗眼碧霞散銅青三錢滑石一錢土膏半兩輕粉麝香各少許上為末每用少許湯泡洗敷藥瞿麥散上以瞿麥炒令黃色為末用鵝涎調逐時塗眥頭即開墜翳丸青羊膽青魚膽鯉魚膽各七枚熊膽一分牛膽半兩麝香少許石決明一兩上為末麵糊丸梧桐子大空心茶下十丸磨翳散龍腦曾青水晶各半兩真珠末琥珀各一分上為末夜後以少許點立效空青丸治沉翳細看方見其病最深空青二錢五味子車前子細辛各一兩防風生乾地黃知母各二兩石決明一兩上為末煉蜜丸如梧桐子大每服十丸空心茶送下
