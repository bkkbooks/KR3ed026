body:
  text: 卷第九大方脈雜醫科健忘小定志丸治心氣不定五臟不足甚者憂憂愁愁不樂忽忽喜忘朝瘥暮劇暮瘥朝發及因事有所大驚夢寐不祥登高履險致神魂不安驚悸恐怯菖蒲炒遠志去心薑汁淹各二兩茯苓茯神人參各三兩辰砂一兩為衣上為末煉蜜丸如梧桐子大每服五十丸米湯下一方去茯神名開心散每服二錢匕不以時服菖蒲益智丸治喜忘恍惚破積聚止痛安神定志聰耳明目菖蒲炒遠志去心薑汁淹炒川牛膝酒浸桔梗炒人參各三兩三分桂心三分茯苓一兩三分附子一兩炮去皮臍上為末煉蜜丸梧子大每服三十丸食前溫酒米湯下加味茯苓湯治痰迷心胞健忘失事言語如癡人參去蘆半夏湯洗陳皮去白一兩半白茯苓去皮一兩粉草五錢益智去殼香附子炒去毛各一兩上銼散每服四錢水一盞半生薑三片烏梅半個同煎不拘時溫服朱雀丸治心神恍惚舉事多忘方見心恙類虛煩淡竹茹湯治心虛煩悶頭疼氣短內熱不解心中悶亂及婦人產後心虛驚悸煩悶欲絕麥門冬去心小麥各二兩半甘草炙一兩人參白茯苓各一兩半半夏湯洗七次二兩上銼散每服四錢水二盞生薑七片棗子三枚淡竹茹一塊如指大同煎食煎服虛勞煩悶尤宜服之溫膽湯治大病後虛煩不得眠此膽寒故也此藥主之又治驚悸自汗觸事易驚半夏竹茹枳實麩炒去穰各二兩陳皮三兩甘草炙一兩茯苓一兩半人參一兩上銼散每服三錢水一盞半生薑五片棗一枚煎食前服末效加遠志去心薑汁炒北五味子各一兩酸棗仁一兩蚌粉炒入酸棗仁湯治霍亂吐下增劇虛勞煩擾奔氣在胸中不得眠或發寒熱頭疼暈悶酸棗仁炒一兩三分人參桂心各一分知母茯苓各三錢三字石膏煅半兩甘草炙二錢上銼散煎同上小草湯治虛勞憂思過度遺精白濁虛煩不安小草黃耆去蘆當歸去蘆酒浸麥門冬去心石斛去根各一兩酸棗仁人參甘草炙各半兩上銼散每服三錢水一盞半生薑五片煎不以時服地仙散治傷寒後伏暑後煩熱不安及煩熱虛勞地骨去木二兩防風去蘆一兩甘草炙半兩上銼散煎同上清心蓮子飲治心中蘊積虛熱煩躁方見消渴類自汗風證桂枝湯治傷風脈浮自汗惡風桂枝不見火白芍藥各一兩甘草炙半兩上銼散每服四錢生薑五片大棗二個煎不拘時服發汗汗不止者謂之漏風宜加炮熟附子一兩暑證五苓散消暑丸卻暑散治傷暑自汗方並見傷暑類濕證朮附湯治傷濕自汗方見傷濕類防己黃耆湯治同上方見四氣相感類體虛牡蠣散治諸虛不足及新病暴虛津液不固體常自汗夜臥即甚久而不止羸瘠枯瘦心忪驚惕短氣煩倦牡蠣米泔浸煅取粉麻黃根黃耆知母各一兩上為末每服用小麥百餘粒煎湯濃調服一方為散每三錢水三盞薤白三寸煎一盞半分三服黃耆湯治喜怒驚恐房室虛勞致陰陽偏虛或發厥自汗或盜汗不止悉宜服之黃耆去蘆蜜水炙一兩半白茯苓去皮熟地黃酒蒸肉桂不見火天門冬去心麻黃根龍骨各二兩五味子小麥防風去蘆當歸去蘆酒浸甘草炙各半兩上銼散每服四錢生薑五片煎不拘時候發厥自汗加熟附子發熱自汗加石斛未效或多吃麵食則安撫芎湯治自汗頭眩痰逆噁心撫芎白朮去油略炒橘紅各二兩甘草炙半兩上銼散每服四錢生薑七片煎溫服建中湯治表虛自汗官桂三分芍藥一兩半甘草炙半兩上銼散每服四錢姜五片棗二枚食前服本方加黃耆一兩名黃耆建中湯治虛勞自汗加當歸一兩名當歸建中湯治婦人血虛自汗其自汗漏不止者加桂半兩熟附子半個名桂枝附子湯每服四錢生薑七片棗子二枚空心煎服防風散治盜汗川芎一分人參半分防風二分上為末每服一錢臨臥米飲調下白朮散治盜汗極驗白朮不拘多少銼成小塊或稍大上用浮麥一升水一斗煮乾如白朮尚硬又加水一二升煮取出切作片焙乾去麥不用研為末別用浮麥湯每服二三錢不以時候茯苓湯治虛汗盜汗上用白茯苓為末煎烏梅陳艾湯調下二錢服之神妙大建中湯治虛熱盜汗百節痠疼腰痛肢體倦怠日漸羸弱口苦舌澀心怔短氣綿黃耆炙遠志燈心煮去心當歸洗澤瀉各三兩白芍藥龍骨人參各二兩甘草炙一兩上銼散每服四錢水二大盞生薑五片煎熱服氣弱加炮附子二兩腰痛筋急加去粗皮官桂一兩止汗溫粉上用川芎白芷藁本各一分為末入米三分綿裹撲於身上止汗紅粉麻黃根牡蠣火煅各一兩赤石脂龍骨各半兩上為末以絹袋盛如撲粉用之虛脫正元散治下虛手冷自汗方見虛損類三建湯治真氣不足上盛下虛面赤自汗小便頻數方見痼冷類耆附湯桂附湯治氣虛陽弱虛汗不止四體倦怠方見痼冷類虛勞麥煎散治榮衛不調夜多盜汗四肢煩疼飲食進退肌瘦面黃秦艽柴胡去苗各二兩大鱉甲二兩醋煮三五十沸去裙襴別用醋炙黃乾漆炒青煙盡人參茯苓乾葛川烏炮去皮尖各一兩玄參三兩上為末每服二錢小麥三七粒煎湯一盞去麥入藥煎食後服如久患後亦宜服此以退其勞倦調理經絡青蒿散治虛勞盜汗骨蒸咳嗽胸滿皮毛乾枯四肢懈惰骨節疼痛心腹驚悸咽燥唇焦頰赤煩躁涕唾腥臭困倦少力肌體潮熱飲食減少日漸瘦弱天仙藤鱉甲醋炙香附子炒去毛枯梗去蘆柴胡去苗秦艽青蒿以上各一兩重烏藥半兩甘草炙一兩半川芎二兩半上銼散每服姜三片煎不拘時候溫服小兒骨蒸勞熱肌瘦減食者每一錢水盞半小麥三十粒煎服陰汗大蒜丸治陰汗濕癢上用在蒜不以多少煨剝去皮爛研同淡豆豉末搜丸如梧子大硃砂為衣每服三十丸棗子燈心煎湯送下青蛾丸治同上每服五十丸酒服大效方見虛損類治陰汗濕癢方爐甘石一分真蚌粉半分為粉撲敷治陰汗不止方小安腎丸用干舊醬煎湯入鹽少許吞下方見虛損類洗方蛇床子酒浸炒白礬陳醬煎水淋洗宿食香蘇散治宿食留飲聚積中脘噫臭腐氣心腹疼痛或臟腑飧泄每服四錢生薑蔥白烏梅煎方見傷寒和解類盧氏感應丸建脾進食消化宿滯酒食飽後宜服方見諸積類縮砂香附湯治心䐜膨滿噫宿腐氣或時冷疼方見諸氣類穀神丸消食健脾益氣進美飲食人參縮砂香附子炒去毛三稜煨莪朮煨青皮陳皮神麯炒麥芽炒枳殼炒去穰各等分上為末粳米糊丸梧子大每服三十丸空腹米飲吞下鹽湯亦可紅丸子磨化宿食止腹痛方見痎瘧類三稜煎丸治膨滿消食積氣塊及傷食夾臍痛甚方見諸氣類癆瘵總說夫骨蒸殗殜復連屍疰癆疰蟲疰毒疰熱疰冷疰食疰鬼疰皆曰傳屍者以疰者注也病自上注下與前人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺泄白濁發乾而聳或腹中有塊或腦後兩邊有小結核連複數個或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癰狀或復下痢羸瘦困乏不自勝持積月累年以至於死死後乃疰易傍人乃至滅門是也凡疾始覺精神不爽氣候不調切須戒慎酒色調節飲食如或不然妄信邪師或言鬼祟以致不起慎之慎之又云男子傳屍之病心胸滿悶背膊疼痛兩目不明四肢無力雖欲寢臥臥不得寐脊膂急痛膝脛痠疼多臥少起狀如佯病每至平旦精神尚好日午向後四肢微熱面無顏色喜見人過常懷忿怒才不如意又便多嗔行立腳弱夜臥盜汗夢與鬼交或見先亡或多驚悸有時咳嗽雖思飲食不能多餐死在須臾精神尚好或時微利兩脅虛脹口燥鼻乾常多黏唾有時唇赤有時欲睡漸成沉羸猶若涸魚不覺死屍蟲遊食日辰及治法大抵六蟲一旬遍遊四穴轉流周而復始具後六代法中自立春一日後食起三日一食五日一醉歸於所歸穴大醉五日故五日蟲醉可以下藥及灸其三日蟲食切不可妄有醫治蟲在人身中一蟲可佔十二穴六蟲在人身中共遊七十二穴上旬十日從心至頭遊四穴中旬從心至臍遊四穴下旬從臍至足遊四穴上旬可先服藥後灸所遊穴其蟲頭向上若下火灸蟲如紫蠶苗蟲出在汗中更服藥取之以蟲盡為度便服補藥永得安耳中旬其蟲所遊穴中頭向內可服藥取之下旬蟲在所遊穴中頭向下亦服藥取之不灸也恐蟲覺悟永難取蓋此蟲性已通靈務在精審勿令有悟可也觀屍蟲色知病淺深法凡明醫者先須知毒氣與蟲並行攻人臟腑遇陽日長雄蟲陰日生雌蟲緣先食臟腑脂膏故其蟲色白次食血肉血肉盡故其蟲黃赤次食精髓故其蟲紫色精髓盡故其蟲黑色傳入腎中病人方死須求醫士曉達病源先取其蟲視其色理自知輕重其蟲如白色可三十日服藥補之其蟲如黃赤色可六十日服藥補之其蟲如紫黑色此疾已極可百二十日服藥補之十中可保一二雖不能為一身除害亦可為子孫除害矣服藥仍須一載之中刻意調攝方可疰平如此得命可謂再生於世又云蟲頭赤者食患人肉其病可治頭口白者食患人髓其病難治只得斷後不傳子孫矣六代傳病及諸蟲形狀凡治病之道要須藥病相應效同神聖仍在瀉實補虛調治臟腑方得痊愈故三尸九蟲種種靈異莫令知之或似蜣螂或似紅絲馬尾或似蛤蟆或似刺蝟或似鼠形或如爛面或有足無頭或有頭無足或化精血歸於元陽之內種種形類實難辨之淺學之流難施方劑誤醫甚多枉死不少或則取蟲不補或則淺學忘傳皆是徒費資財終無去病之理遂致夭折豈不悲哉第一代謂初勞病受其病而不測病源酒食加餐漸覺羸瘦治療蹉跎乃至病重醫人不詳其故誤用湯藥枉而致死此蟲在人身中如嬰兒狀背上毛長二寸此蟲變動形如鬼在臟腑中此蟲形如蛤蟆變動在人臟腑中上三蟲在人身中染著之後或大或小令人夢寐顛倒魂魄飛揚精神離散飲食不減形容漸羸四肢痠痛百節勞倦增寒壯熱背膊拘急腦與頭痛口苦舌乾面無顏色鼻流清涕虛汗常多行步艱難眼睛多痛其蟲遇丙丁日食起醉歸心俞穴中四穴輪轉周而得始大醉可醫矣取蟲出後補心當瘥第二代為覺勞病謂傳受此疾已覺得病覺病者患乃自知夜夢不祥與亡人為伴醒後全無情思似醉神識不安所嗜食味輒成患害或則發氣動風所加四體不和心胸滿悶日漸羸瘦骨節乾枯或嘔酸水或則醋心唇焦口乾鼻塞腦痛背膊痠疼虛汗常出腰膝刺痛如此疾狀早須醫治失時致傷命此蟲如亂髮可長三寸或似守宮此蟲形如蜈蚣在人臟腑中此蟲形如蝦在人臟腑中上三蟲在人身中令人氣喘唇口乾咳嗽增寒心煩壅滿毛髮焦落氣脹吞酸津液漸衰次多虛竭鼻多清水四肢將廢臉赤面黃皮臍枯瘦腰膝無力背脊痠疼吐血唾膿語聲不利鼻塞腦痛胸膈多痰重者心悶吐血強倒在地不能自知其蟲遇庚辛日食起歸肺俞中四穴輪轉周而復始大醉可醫矣取蟲後補肺當瘥第三代為傳屍癆病傳受病人自得知之日漸羸瘦頓改容顏日日憂惶夜夜恐懼不遇良醫就死不遠此蟲形如蚊蟻在人身中俱遊臟腑此蟲形如蜣螂在人身中俱遊臟腑此蟲形如刺蝟在人三焦上三蟲在人身中令人三焦多昏日常思睡嘔吐苦汁或吐清水黏涎腹脹虛鳴臥後多驚口鼻生瘡唇墨面青日漸消瘦精神恍惚魂夢飛揚飲食不消氣咽聲干汗出如油目昏多淚其蟲遇庚辛日食起醉歸厥陰穴中四穴輪轉周而復始大醉可醫矣取其蟲出後服補藥當瘥論第四代病並屍蟲形狀遊食日治法此蟲形如亂絲在人臟腑中此蟲形如豬肝在人臟腑中此蟲形如蛇在人腑腑中上三蟲在人身中令人臟腑虛鳴嘔逆腸中痃癖氣塊增寒壯熱肚大筋生腰背疼痛或虛或瘦瀉痢無時行履困重四肢憔悴時氣上喘口苦皮乾飲食過多要吃酸鹹之物其蟲遇戊己日食起醉歸脾俞穴中四穴輪轉周而復始大醉可醫矣取蟲出後服補脾藥當差論第五代病並屍蟲形狀遊食日治法此蟲形或有足無頭或有頭無足此蟲形如鼠在人身中俱遊臟腑此蟲形如精血變動在人臟腑或在陽宮上三蟲在人身中令人多怒氣逆筋骨拳攣四肢解散面黑麵青增寒壯熱腰背疼痛起坐無力頭如斧斫眼睛時痛醫膜多淚背膊刺痛力備身羸手足乾枯臥著床枕不能起立狀似中風四肢頑麻腹內多痛眼見黑花忽然倒地不省人事夢寐不祥覺後遍體虛汗其蟲遇甲乙日食起醉歸肝俞穴中四穴輪轉周而復始大醉可醫矣取蟲出後補肝當瘥論第六代病並屍蟲形狀遊食日治法此蟲形如尾有兩條一雌一雄此蟲形如鱉在人臟腑此蟲形如爛面或長或短上三蟲在人身中居於腎臟透連脊骨令人思食是物要餐身體尪羸腰膝無力髓寒骨熱四肢枯乾眼見火生或眼多黑暗耳內虛鳴陰汗燥癢冷汗如油夢與鬼交小便赤黃醒後昏沉臍下結硬或奔心胸看物如豔心腹悶亂骨節疼痛其蟲遇醜亥日食起醉歸腎俞穴四穴輪轉周而復始大醉可醫矣蟲出後補腎填精當瘥取蟲防護法先令病人家用好紙糊一密室不留些罅隙尋一老成人過遞以安息香水灑了過遞人之身又以雄黃雌黃塗其鼻孔耳眼唇上安排鐵鉗一個布巾一幅用香油二介以鍋盛頓微煎令沸仍用高桶一個以好石灰在桶內生布巾蓋桶口卻服取蟲藥五更初一服五更三點時一服服藥後腹中疼痛如刀斧劈不妨至巳牌必須下蟲或取下臭穢如膠漆或吐瀉膿血症塊皆於灰桶中其蟲或從汗出紫蠶苗狀或於耳鼻口中出或小便中出異般形狀不止一也或青或黑或黃紅大者急用鐵鉗取於油內煎當日將油紙裹蟲入瓦罌內石灰填實埋棄於深山遠僻處免致再染人患人衣服床蓆並皆棄去醫人分付藥後亦須遠避神效取蟲青桑枝飲青桑枝柳枝石榴枝桃枝梅枝各七莖並長四寸許鬼臼五錢青蒿一小握赤箭五錢上用童子小便一升半蔥白七莖去頭葉煎及一半去滓別入安息香阿魏各一分再煎至一盞去滓調辰砂末半錢檳榔末一分麝香一字分作二服調下五更初一服五更三點時一服至巳時必取下蟲紅者可救青黑不治見有所下即進軟粥飯溫暖將息不可用性及食生冷毒物合時須擇良日不得令貓犬孝服穢惡婦人等見一方不用鬼臼赤箭雄黃丸雄黃半兩兔糞二兩天靈蓋一兩酥炙黃鱉甲木香各半兩輕粉上為末法酒一升大黃半兩熬膏丸如彈子大硃砂為衣凡此疾先燒安息香菸吸不嗽非傳屍也不可用此藥若煙入口咳不止乃屍也宜有此藥五更初服勿令人知用童子小便同酒一盞化一丸服之如人行二十里正吐出蟲或如燈心或如爛瓜李或如蛤蟆未效再服以應為度蟲用紅火燒之又用油煎神授散治諸傳屍勞氣殺蟲川椒二斤擇去子併合口者炒出汗上為末每服二錢空心米湯調下須痹暈悶少頃如不能禁即以酒糊丸如梧子大空心服三五十丸昔人當與病勞婦人交婦人死遂得疾遇一異人云勞氣已入臟遂令急服二斤其病當去如其言服之幾盡大便出一蟲狀如蛇遂安續有人服之獲安濟者多矣虛證凝神飲子治勞瘵增寒發熱口乾咽燥自汗煩郁咳嗽聲重唾中血絲瘦劇倦乏人參去蘆當歸去尾白芍藥白茯神去木白茯苓黃耆去蘆白朮半夏曲五味子熟地黃洗酒蒸甘草蓮肉去心大麥門冬去心桔梗各等分上銼散每服四錢水一盞半烏梅紅棗各一個煎服如嗽加阿膠虛極胸滿者加木香濕紙裹煨沉香亦可不思食加扁豆劫勞散治心腎俱虛勞咳時復三四聲遇夜發熱熱過即有盜汗四肢倦怠體瘦恍惚異夢嗽中有血名曰肺痿白芍藥五兩黃耆甘草人參白茯苓熟地黃洗酒蒸當歸去尾五味子半夏曲阿膠蚌粉炒各二兩上銼散每服三錢水一盞半生薑三片紅棗二枚煎與凝神飲相類黃耆飲子治諸虛勞氣四肢倦怠骨節痠疼潮熱乏力自汗怔忪日漸黃瘦胸膈痞塞不思飲食咳嗽痰多甚則唾血黃耆蜜炙一兩半當歸去蘆酒浸紫菀洗去土石斛去根地骨皮人參桑白皮去赤附子炮去皮臍鹿茸酒蒸款冬花各一兩半夏湯泡七次甘草炙各半兩上銼散每服三錢生薑七片棗子一枚煎不拘時服此藥溫補榮衛枯燥者不宜進此唾血不止者加阿膠蒲黃各半兩十全大補湯治虛勞發熱加北柴胡地骨皮煎方見虛損類養榮湯黃耆益損湯治同上方見虛損類熱證生犀散方見虛損類枳殼半夏湯治嗽甚咽痛失音方見痰飲類溫金散治積勞咳嗽喘悶咯痰中有血甘草黃芩桑白皮防風去叉各一兩茯神半兩麥門冬一分去心杏仁去皮尖米泔浸一宿取出握干略炒一兩上銼散每服三錢水一盞入黃蠟一片如指頭大同煎食後熱服鱉甲地黃湯治熱勞手足煩心怔悸婦人血室有乾血身體羸瘠飲食不為肌肉柴胡去蘆當歸去蘆酒浸麥門冬去心鱉甲醋炙石斛去根白朮熟地黃酒浸焙茯苓去皮秦艽去蘆各一兩人參肉桂不見火甘草炙各半兩上銼散每服四錢水一盞半生薑五片烏梅少許煎不拘時服此藥專治熱勞其性差寒脾胃快者方可服鉺虛甚而多汗者不宜服阿膠丸治勞嗽並嗽血唾血阿膠蛤粉炒生地黃洗卷柏葉山藥銼炒大薊根五味子雞蘇各一兩柏子仁炒別研人參防風去蘆麥門冬去心各半兩上為末煉蜜丸如彈子大每服一丸細嚼濃煎小麥湯或麥門冬湯嚥下地仙散治骨蒸肌熱一切虛勞煩躁生津液地骨皮二兩防風去蘆一兩甘草半兩麥門冬一兩去心上銼散每服三錢水一盞生薑五片煎不拘時候黃連飲治骨節間熱積漸黃瘦黃連銼一兩上用童子小便一大升浸經宿微煮三四沸去滓食上分二服如人行五里再服四美丸凡骨蒸莫非是勞脊骨尤屬虛髓竭也以局方黃耆鱉甲散沉香鱉甲散秦艽鱉甲散青蒿鱉甲散四散和合為末以雄羊脊骨一具斫碎煉汁調和為丸溫酒吞下治脊痛骨熱漸成蒸疾一劑而效其功全在脊骨膏蓋醫者意也通治太上混元丹河車者天地之先陰陽之祖乾坤之橐龠鉛汞之匡廓胚腪將兆九九數足我則載而成之故謂之河車歷驗篇中名曰混沌皮蓋亦生天地陰陽之始為七十二丹之首高士垂慈始開端緒太上云若欲長生當修所生實資於此所以成功靈應非金石草木夜露曉霜之所比倫修真之士服之不輟誠足以返本還元補益之道真得其真紫河車一具用初生男子者良帶子全者以東流水洗斷血脈入麝香二錢在內以線縫定用生絹裹懸胎於砂瓶內入好酒五升慢火熬成膏子沉香硃砂各一兩人參蓯蓉酒浸乳香各二兩白茯苓去皮安息香去沙酒熬各二兩上為末入河車膏子和藥末杵千百下丸如梧子大每服七十丸空心溫酒送下沉香湯尤佳詳此丹以紫河車為主但佐使之藥太輕無病之人久服可以輕身延年補損扶虛乃若病重之人服之卻宜增添之法也一方有天靈蓋一片酥炙黃治男子真陰耗竭腰背疼痛自汗怔忡痰多咳喘夢遺白濁潮熱心煩腳膝無力宜於內加鹿茸火燎去毛酥炙川巴戟去心鍾乳粉陽起石酒蒸半日附子炮裂鹽水浸黃耆桑寄生生鹿角龍骨紫菀五味子各一兩上依法修制和前藥末用膏子為丸治婦人血海虛損榮衛不足多致潮熱心煩口乾喜冷腹脅刺痛腰腿疼痰多咳嗽驚惕怔忡經候不調或閉斷不通宜於內加當歸去尾石斛去根柏子仁紫石英煅醋淬七次鹿茸去毛酥炙鱉甲醋炙各一兩卷柏葉一兩去土川牛膝酒浸一兩半去苗上依法修制和前藥末膏子丸虛寒者加炮附子二兩咳嗽者加紫菀茸二兩治熱勞尤加河車依前法修制鱉甲醋炙半兩桔梗白芍藥大黃煨甘草苦參貝母知母秋石豉心草龍膽黃藥子莪朮煨犀角鎊硝石各半兩上為末以前膏子丸湯使如前蘇合香丸治傳屍骨蒸殗殜肺痿疰𤵍鬼氣心痛霍亂時氣瘴瘧等方見中氣類青蒿散治男子婦人骨蒸勞增寒壯熱青蒿春夏用葉秋冬用子用子不用葉用根不用莖四者相用而反以為痼疾必用童子小便浸過使有功無毒一握大鱉甲炙黃醋淬五七次去腥白朮濕紙裹煨熟地骨皮白茯苓粉草炙揀參去頭栝蔞根北柴胡去蘆桑白皮蜜炙各半兩上為散每服三錢水一盞半煎溫服不拘時候加減黃耆建中湯治男子婦人五勞骨蒸者世用神效白朮白茯苓桔梗各三錢人參三錢半秦艽北柴胡去蘆防風白芍藥甘草當歸去尾澤瀉生乾地黃熟地黃地骨皮肉豆蔻煨檳榔縮砂仁各五錢豬苓四錢黃耆一兩上為散每服三錢水一盞半煎溫服不拘時候老人更加黃耆一兩或為末蜜湯調服臨期斟酌清骨散治男子婦人童男童女初覺勞瘵五心煩熱去骨熱如神北柴胡生地黃各二兩熟地黃人參去蘆防風去蘆秦艽赤茯苓各一兩胡黃連半兩薄荷葉七錢半上銼散每服三錢水一盞半煎溫服先服荊蓬煎丸一服微泄臟腑後服此方見痰飲類團魚散治骨蒸潮咳嗽累效貝母前胡知母杏仁北柴胡各等分團魚三個上用藥同團魚者魚熟提起去頭取肉連汁食之卻將前藥焙乾為末就用團魚裙甲及骨更煮汁一盞和藥為丸如梧子大每服二十丸煎黃耆湯空心下病安仍服黃耆益損湯補理方見虛損類蛤蚧丸治積勞咳嗽日久不瘥自汗口中無味蛤蚧一對酥炙款冬花皂角不蛀者酥炙去皮子弦二片木香不見火熟地黃酒蒸焙杏仁去皮尖童子小便浸一晝夜控干蜜炙五味子各一兩上為末煉蜜丸梧桐子大每服十五二十丸生薑湯送下食後臨睡服灸法癸亥夜二更六神皆聚之時解去上體衣服於腰上兩傍微陷處謂之腰眼直身平立用筆點定然後上床合面而臥每灼小艾炷七壯蟲或吐出或瀉下即安又法四花穴灸見蘇沈良方及資生經效又法膏肓肺俞穴每穴各灸九壯仍依前蟲醉日各腧穴多灸為妙灸後百日忌煎爆生冷熱物毒食仍戒房事避風寒減喜怒安心靜處將息若一月尤覺未差瘥於初穴上再灸陰㿗茱萸內消丸治陰㿗偏大上攻臍腹㽲痛膚囊腫脹或生瘡瘍時出黃水腰腿沉重足脛腫滿行步艱辛服之內消不動臟腑川楝三兩銼炒大腹皮五味子海藻洗延胡索各二兩半茴香炒桂心川烏炮去皮臍吳茱萸食茱萸桃仁麩炒別研各一兩木香一兩半桔梗青皮山茱萸各二兩上為末酒糊丸梧子大每服三十丸溫酒送下木香流氣飲兼服效大戟丸治陰㿗腫脹或小腸氣痛大戟去皮銼炒黃半兩重葫蘆巴四兩炒木香附子炮去皮臍舶上茴香訶子煨去核檳榔各一兩川楝五兩後入麝香半錢別研上八味為末外留川楝以好酒二升蔥白七莖長三寸煮軟去皮核取肉和末藥丸如梧子大五七丸至十丸空心溫酒下薑湯亦可潮發疼痛炒薑熱酒下十五丸煉陰丹治陰器下墜腫脹卵核偏大堅如石痛不可忍延胡索微炒去殼海藻洗昆布洗青皮去穰茴香炒川楝去核馬藺花各一兩木香半兩大戟酒浸三宿切片焙乾一分上為末別將硇砂阿魏安息香各一分用酒醋各一升淘去沙石熬成膏入麝香一錢沒藥一分入前藥和丸如綠豆大用綿灰酒下十丸至十五丸空心服兼金丸治熱入膀胱臍腹上下兼脅肋疼痛便燥欲飲水按之痛者大黃濕紙裹煨八錢硝石桂心甘草炙各四兩桃仁四十個去皮尖上為末煉蜜丸如梧子大每服五七丸至十丸米飲下婦人血閉疼痛亦宜服之應痛丸治敗精惡物不去結在陰囊成疝疼痛不可忍久服去病阿魏二兩醋和用蕎麥麵作餅厚三指裹阿魏慢火煨熟檳榔大者二個刮作甕子滿盛滴乳香將刮下末用蕎麥麵拌作餅子慢火煨熟上同研為末入硇砂末一錢赤芍藥末一兩同為麵糊搜和丸梧子大每服十丸至二十丸食前溫酒鹽湯下三白散治膀胱蘊