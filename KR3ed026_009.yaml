為末煉蜜丸如雞子黃大每服一丸木瓜菟絲子酒浸下腳痹薏苡仁浸酒下中風溫酒米湯下乳香宣經丸治體虛為風濕寒暑襲四氣相搏半身不遂手足頑麻骨節煩疼足脛浮腫惡寒發熱漸成腳氣肝腎不足四肢攣急遍身攻注或閃肭打撲內傷筋骨及風邪內搏男子疝氣婦人經脈不調活血止痛補虛壯筋骨威靈仙去蘆洗烏藥去木茴香炒川楝子銼炒橘皮牽牛子萆薢防風各二兩五靈脂乳香各半兩草烏黑豆一合同煮竹刀切看透黑為度去皮焙半兩上為末酒糊丸如梧子大每服五十丸鹽酒或鹽湯下婦人食前醋湯送下通治紫蘇子湯治腳弱上氣陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律蘇子炒半夏洗前胡厚朴去皮薑汁製甘草炙當歸各二兩桂心不見火桔梗各三錢上銼散每服姜七片棗二枚煎食後服虛甚者加炮附子一兩黃耆二兩茱萸丸治腳氣入腹脹腹不仁喘悶欲死吳茱萸冼木瓜去穰切作乾片上等分為末酒糊丸如梧子大每服五十丸至百丸酒或米湯任下或以木瓜蒸爛研膏為丸尤妙蠍烏散治經年腰腳虛弱筋骨疼痛難於屈伸全蠍半兩天麻三錢蒼朮一兩去粗皮炒令黃色草烏二錢生用黑附子二錢炮去皮臍稱上為末每服一大錢匕用黑豆炒熱淋酒調熱服藥氣所致麻痹少時其病隨安如骨髓中痛用胡桃去皮研爛入酒調服凡中風亦可服此疾經年累取不效服之如神非尋常腳氣藥比應痛丸治寒暑風損手腳疼痛方見正骨科止痛類二仙散治腳下注者因久坐久立陰濕之地當風醉脫靴鞋皆成腳氣若暑月久立濕熱鬱蒸榮滯不和發熱冬月寒氣冷麻或發疼痛悶亂晴陰皆發富貴之家亦有此疾蓬朮一兩半煨延胡索一兩蛤粉三兩陳皮一兩上為末每服二錢炒黑豆五十粒以湯一盞生薑三片煎至五分去滓調服用之經驗卷柏散治遠年腳氣難治此方特效體虛人減半服卷柏隨用先以鹽水煮半日次用冷水煮半日焙乾東向者佳黑牽牛頭末甘遂檳榔上各為末不得相雜每服每件各一錢惟檳榔末二錢五更初濃煎蔥白湯下至辰巳時取下惡物如魚凍隨吃淡粥病安更宜服後藥大腹皮散治諸證腳氣腫病小便不利大腹皮三兩干宣木瓜去穰二兩半紫蘇子微炒檳榔荊芥穗烏藥橘紅蘇葉各一兩蘿蔔子炒半兩沉香不見火三錢桑白皮炙枳殼去穰麩炒各一兩半上銼散每服三錢姜五片煎不以時溫服秘方換腿丸治腎經虛弱下注腰膝或當風取涼冷氣所乘沉重少力移步遲緩筋脈攣痛不能屈伸腳心隱痛有妨履地大治乾溼腳氣赤腫痛楚發作無時呻吟難忍氣滿喘促舉動艱難面色黧黑傳送秘澀並皆治之薏苡仁石楠葉各一兩乾木瓜四兩肉桂天麻去苗當歸去蘆附子炮去皮臍羌活各一兩檳榔半兩防風去叉天南星湯洗薑汁炒石斛去根萆薢炙川牛膝酒浸焙黃耆續斷各一兩蒼朮米泔浸焙一兩半上為末麵糊丸梧桐子大每服三十丸至五十丸空心溫酒或木瓜湯吞下日二三服常服舒筋輕足永無腳氣之患昔人有此疾服之一月腳力頓愈委有換腿之功石楠丸治風毒腳弱少力腳重疼痹腳腫生瘡腳下隱痛不能踏地腳膝筋攣不能屈伸項背腰脊拘急不快風毒上攻頭面浮腫或生細瘡出黃赤汗或手臂少力或口舌生瘡牙斷宣爛齒搖發落耳中蟬聲頭眩氣促心腹脹悶小便時澀大便或難赤芍藥二兩五加皮三兩萆薢四兩當歸去蘆麻黃去根節陳皮赤小豆各二兩獨活去蘆四兩薏苡仁杏仁去皮尖及雙仁者麩炒赤牽牛子炒石楠葉各二兩木瓜四兩大腹皮川芎杜仲銼炒各二兩牛膝去苗三兩上為末以酒浸蒸餅丸梧桐子大每服十丸至十五二十丸木瓜湯下早起日中臨臥各一服偏風腫滿服之亦效檳榔湯治腳氣順氣防壅檳榔香附子去毛陳皮去白紫蘇葉木瓜五加皮粉草各一兩上銼散每服四錢生薑五片煎八分溫服婦人腳氣多由血虛加當歸半兩室女腳氣多因血實加赤芍藥一兩半大便秘結虛弱者加枳實盛者加大黃一方治腳氣衝心大便秘宜服三和散加土烏藥春夏常服妙木瓜茱萸湯治腳氣入腹困悶欲死腹脹喘急木瓜干大片者檳榔各二兩吳茱萸揀淨一兩湯洗七次炒上銼散每服四錢水一盞半煎服食用前用木瓜大者二枚吳茱萸五兩湯洗七次二味並用水四碗煎至一碗分作二服如人行十里久再進一服或汗或吐或瀉即不拘時服三將軍丸治腳氣入腹衝心大便不通吳茱萸去枝梗湯泡宣木瓜去穰川大黃各等分大黃或隨其病加減上為末米糊丸如綠豆大每服五十丸粳米枳殼湯下未應加丸數再服以通為度杉木節湯治腳氣入腹衝心或心血有塊毒勝痰逆痞滿喘急汗流搐搦昏悶上視咬齒甚至垂絕不知人宜此藥以救急杉木節一大升橘葉一升無葉用皮大腹子七個連皮銼碎上以童子小便三升煎取一升半分二服若一服得快利停後服木瓜牛膝丸治寒濕腳氣冷濕下注腳弱無力及腎經虛弱腰膝沉重腿腳腫急筋脈拘攣或時疼痛步履艱難二便不利日見倦乏木瓜肉蓯蓉酒浸炙石楠滕當歸去尾烏藥熟地黃杏仁去皮尖川牛膝去苗黑牽牛炒陳皮去白績斷去蘆赤芍藥各等分上為末酒糊丸梧桐子大每服三十丸空心用木瓜煎湯吞下鹽湯亦可未效用羌活木瓜浸酒或加川牛膝溫暖一盞許吞下木通散治腳氣服熱藥太過小便不通淋閉臍下脹當歸梔子仁炒赤芍藥赤茯苓甘草各一兩上銼散每服三錢水一盞煎溫服蒼朮散治一切風寒濕熱令足膝痛或赤腫腳骨間作熱痛雖一點能令步履艱苦及腰膝臀髀大骨疼痛令人痿躄一切腳氣百用百效蒼朮米泔浸一日夜鹽炒黃柏去粗皮酒浸一日夜炙焦各四兩上銼散每服四錢水一盞煎七分溫服日進三四服透骨丹專治腳氣木香兩半川烏煨羌活各一兩白茯苓二兩沉香檳榔木瓜川芎乳香別研各一兩上為末麵糊丸如梧子大每服六十丸薑湯下烏藥酒治腳氣發動鄉村無處問藥特效土烏藥用干粗布巾揩淨以瓦片刮下屑收入瓷器內以好酒一升浸一宿次日空心去藥屑止將瓷器內所浸藥酒熱湯上坐溫入生麝香少許尤妙一服即安無麝則多服服後溏泄病去三和散腳氣稍愈常服弱人更宜朮附湯壯盛人宜再服敗毒散方見諸氣中氣傷寒陽證類淋洗方治腳氣用此藥熏蒸淋洗矮樟葉石楠葉西江杉片霍香大蓼獨活白芷紫蘇紫荊皮藁本羌活各等分上銼碎加大椒五六十粒蔥一握用水二斗煎七分置盆內令病者以足加其上用厚衣覆熏蒸痛處候溫熱可下手時令他人淋洗腳氣蒸法先以夏元通氣散一方用黃耆丸倍加甘草酒糊丸用淡酒吞下如人行五里又進一服連進三服卻用甘遂細末半兩用好醋調仍以炭三四斤生火於地上烹至十分通紅卻去火以脫底桶子一枚或二件圍住患人足沃其醋在地上急用被絮裹蓋其足得腳上有汗為妙甚者經再取可去其病根一方以復元通氣散並甘草先以酒服之卻取豬腰子一隻分為兩邊用甘遂末二錢傾在腰子上用托兩腳心以片帛扎定仍濃煎甘草湯更服之又方主腳氣流注四肢結成腫核不散赤熱焮痛及療一切腫毒以甘遂細末醋調敷腫處濃煎甘草湯一味服之其腫即散一服未安再用二藥須兩人各賣亦不可同處安頓及不許並手修合耳聾亦可煎甘草湯服之以甘遂塊塞耳腳氣塗法豬牙皂角擇不蛀者大皂角不蛀者南木香上各等分為末黃子醋濃調先於腫之上不腫處用藥圍塗之闊三四寸若圈然截斷毒氣不使衝上次塗下面腫處只留腳尖不塗仍修事腳甲出毒氣時時用醋潤之一方用不蛀皂角為末入平胃散內釅醋調敷一方謂倉卒秖用皂角火上燒存性薑汁調敷雖皆可用乃不及上方為妙腳氣洗法每夜用鹽塗擦腿膝至足甲淹少時卻用熱湯泡洗昔有人得腳氣諸方不效後得此春月常用淹洗不再發近效方凡腳氣初作兩足伸屈之間或拘牽或痠疼或有赤腫用香蘇散香薷散加蒼朮木瓜大蓼橘葉川椒蔥白煎水傾在盆用衣被覆足熏一時取汗再淋洗不可頻用灸法風市穴可令病人起正身平立垂兩臂直下舒十指掩著兩髀便點當手中央指頭髀大筋上是三里穴在膝頭骨節下三寸人長短大小當以病人手尖度取灸之絕骨穴在腳外踝上一夫亦云四寸以上三穴多灸取效凡病一腳則灸一腳病兩腳則皆灸未效再灸犢鼻穴在膝頭下骭上俠解大筋中以手按之得窟解是或灸肩髃穴在肩骨骨端兩骨間陷者宛宛中舉臂取之曲池穴在肘外輔骨屈時曲骨之中以手拱胸取之足十趾端名曰氣端日灸三壯並有神效遇痛深處按極酸針之亦效腫滿虛證復元丹治水腫夫心腎真火能生脾胃真土今真火氣虧不能滋養真土故土不制水水液妄行三焦不瀉氣脈閉塞樞機不通喘息奔急水氣盈溢滲漏經絡肢膚溢滿足脛尤甚兩目下腫膇股間冷口苦舌乾心腹堅脹不得正偃偃則咳嗽小便不通夢中虛驚不能安臥附子炮二兩南木香煨茴香炒川椒炒去汗獨活厚朴去皮銼薑製炒白朮略炒陳橘皮吳茱萸炒桂心各一兩澤瀉一兩半肉豆蔻煨檳榔各半兩上為末糊丸梧桐子大每服五十丸不以時紫蘇湯下此藥世傳屢驗未當示人其間群臣佐使與造物同妙服者自知要當屏去諸藥一日三服先次漩利如傾次乃腫消喘止蓋藥能助真火以養真土運動樞機安平必矣法當禁欲並絕咸半年乃不再作禹餘糧丸治十種水氣凡腳膝腫上氣喘滿小便不利但是水氣悉皆治之蛇黃大者三兩以新錢銚盛入一稱炭火中燒蛇黃與銚子一般通紅用鉗取銚子出便傾蛇黃入釅醋二升中候冷取出研極細則止即含石禹餘糧三兩真針砂五兩先以水淘淨控干更以銚子炒乾入禹糧一處用米醋二升就銚內煮醋乾為度卻用銚研藥入一稱炭火中燒通赤傾藥淨磚地上候冷研無聲即止以三物為主其次量人虛實入下項藥治水多是取轉惟此方三物既非大戟甘遂芫花之比又有下項扶持故虛老人皆可服羌活木香茯苓川芎牛膝酒浸白豆蔻炮土茴香炒蓬朮炮桂心乾薑炮青皮去穰京三稜炮白蒺藜附子炮當歸酒浸一宿各半兩虛人老人用實壯減半上為末拌極勻以湯浸蒸餅挒去水和藥再搗極勻丸如梧子大食前溫酒白湯任下三十丸至五十丸唯忌鹽雖毫末許不得入口若無以為味即水病去後且以醋少許調和食不能忌鹽勿服果欲去病切須忌鹽但試服藥即於小便內旋去不動臟腑病去日日三服兼以溫和調補氣血藥助之真神方也又萬金丹實脾散治陰水先實脾土厚朴去皮薑製炒白朮木瓜去穰木香不見火草果仁大腹子附子炮去皮臍白茯苓去皮乾薑炮各一兩甘草炙半兩上銼散每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不以時服加味腎氣丸治腎虛腰重腳腫小便不利附子炮二兩白茯苓去皮澤瀉山茱萸取肉山藥炒車前子酒蒸牡丹皮去木各一兩官桂不見火川牛膝去蘆酒浸熟地黃各半兩上為末煉蜜丸梧桐子大每服七十丸空心米飲下木香流氣飲治面目虛浮四肢腫滿喘急水道澀赤方見諸氣類熱證神助散舊名葶藶散治十種水氣面目四肢遍身俱腫以手按之隨手而起咳嗽喘急不得安臥腹大腫脹口苦舌乾小便赤澀大便不利澤瀉二兩椒目一兩半黑牽牛微炒取末二兩半豬苓去黑皮二兩葶藶炒香研三兩上銼散每服以蔥白三莖漿水一盞煎至半盞入酒半盞調藥三錢絕早面向東服如人行十里久以漿水蔥白煮稀粥至蔥爛入酒五合熱啜量人啜多少須啜一升許不得吃鹽並面自早至午當利小便三四升或大便利喘定腫減七分隔日再服即平之後必須大將息及斷鹽房室等三年加味控涎丸治熱證消浮退腫下水大效方見喘急類疏鑿飲子治水氣通身洪腫喘呼氣急煩躁多渴大小便不利服熱藥不得者澤瀉赤小豆炒商陸羌活去蘆大腹皮椒目木通秦艽去蘆檳榔茯苓皮上等分銼散每服四錢水一盞半姜五片煎至七分去滓溫服不拘時候通苓散治腫滿口燥咽乾小便絕少方見傷暑類赤小豆湯治年少血氣俱熱遂生瘡疥變為腫滿或煩或渴小便不利商陸赤小豆炒當歸去蘆炒澤瀉連翹仁赤芍藥漢防己木豬苓去皮桑白皮炙澤漆以上各半兩上銼散每服四錢水一盞半姜五片煎至八分去滓溫服不計時候熱甚者加犀角二錢半三仁丸治水腫喘急大小便不利郁李仁杏仁炮去皮尖薏苡仁各一兩上為末米糊丸如梧子大每服四十丸不拘時米飲下分心氣飲行滯氣去浮滿利漩大效方見諸氣類三和散和暢三焦治痞脹浮腫加赤茯苓一兩可以和氣利水方見諸氣類塗臍膏治水腫小便絕少地龍豬苓去皮針砂各一兩上為末擂蔥涎調成膏敷臍中約一寸高闊絹帛束之以小便多為度日兩易五皮散治脾水四肢頭面悉腫按之沒指不惡風其腹如故不喘不渴脈不浮大腹皮炙桑白皮炙茯苓皮生薑皮陳橘皮各等分上銼散每服四錢水一盞半煎七分去滓熱服日二三服效一方用青木香丸每服三十五丸黑牽牛末少許新汲水調吞下二便得利效方見諸疝類麻黃甘草湯治水腫從腰以上俱腫以此湯發汗麻黃去根節四兩甘草二兩上銼散每服三錢水一盞半煮麻黃再沸內甘草煎至八分取汁慎風冷有人患氣促積久不瘥遂成水腫服之有效但此藥發表老人虛人不可輕用更宜審察秘傳八方芫花丸消水腫大巴豆二七粒去殼葶藶子大黃桂枝芫花杏仁各等分上為末米糊丸每服五十丸空心溫酒吞五更早吃下水大效牽牛湯催發巴豆甘遂各三錢檳榔大戟當歸各五錢青皮黑牽牛取頭末各一兩上為末用一大錢葶藶子煎湯調下五更初吃下水效蓯蓉散用補木香五錢肉豆蔻煨肉蓯蓉酒洗灸各一兩上為末每服一大錢米飲調下忌生冷油麵烏鯉魚湯治水腫消腫及四肢腫烏鯉魚一個赤豆桑白皮白朮陳皮各一兩蔥白五根上用水三碗同煮不可入鹽先吃魚後服藥郁李仁散治腫滿小便不利陳皮郁李仁檳榔茯苓白朮各一兩甘遂五錢上為末每服二錢薑棗湯下羌活散治水氣腫羌活蘿蔔子炒各一兩上為末用酒調下紅豆散丁香木香緊皮各三錢縮砂紅豆白姜桂枝陳皮青皮桔梗胡椒各五錢上為末每服二錢秋石湯調下紫金丸白姜香附子炒去毛紫金皮石菖蒲青木香針砂煅紅上各等分為末米糊丸用三十丸第一茶清下第二商陸根湯下第三赤小豆湯下常吃用好酒吞下秘傳方止此防風散治風腫皮粗麻木不仁或時疼痛麻黃去節牽牛炒取頭末甘草各分半炙杏仁去皮防風半夏泡芍藥辣桂白芷防己當歸川芎羌活獨活檳榔各一分上銼散每服三錢姜四片蘇葉三皮煎服茯苓散治諸氣腫等疾芫花醋炒澤瀉郁李仁甜葶藶漢防己藁本各二錢半陳皮白茯苓白檳榔瞿麥各半兩白滑石大戟各七錢半為末每服一錢桑白皮煎湯空心調下取下碧綠水如爛羊脂即瘥未盡隔日又服腫消如故不服忌鹽百日治腳腫方小績命湯加羌活一倍煎服之遂愈方見風科虛證背腫方以煉石塗之立瘥烏梅醋法治手指甲頭腫用烏梅捶碎去核肉只取仁研米醋調入指漬之自愈腮腫方以赤小豆為末敷之立效陰腫方治男子陰腫大如升核痛人所不能治者以馬鞭草搗爛塗之治婦人陰腫堅硬方枳實半斤碎炒令熱舊帛裹熨冷即易之灸法足第二指上一寸半隨年壯又灸兩大手指縫頭七壯治水氣通身腫滿效太衝腎俞各百壯治虛勞浮腫效
