body:
  text: 卷第四大方脈雜醫科諸積肉積三稜煎丸治脾虛為肉食所傷停久不散作為腹滿膨痛或泄瀉每服三十五丸淡薑湯食後服方見諸氣類阿魏丸治脾胃怯弱食肉食麵或食生果停滯中焦不能克化致脹滿腹疼嘔惡不食或利或祕阿魏酒浸化官桂不見火蓬朮炮麥蘖炒神麯炒青皮去白蘿蔔子炒白朮各半兩百草霜三錢巴豆去殼油三七個乾薑炮半兩上為末和勻用薄糊丸如緑豆大每服二十丸不拘時薑湯送下面傷用麵湯送下生果傷用麝香湯下血積抵當湯治瘀血凝滯腹內刺痛或膀胱痛身面微黃水蛭銼炒虻蟲去翅足炒三十個桃仁三十七個炒去皮臍大黃蒸三錢三字上銼散每服四錢水一盞半煎七分去滓溫服血未利更服氣積木香流氣飲熱者分心氣飲方並見諸氣類水積重者十棗湯治泛飲水漿多感冷濕胸腹脹滿瀝洛有聲喘急氣促面色痿黃芫花炒赤甘遂大戟黑牽牛炒取為末上各等分為末每服一錢先將紅棗十枚煎湯一盞調溫再單飲棗湯送下平旦服病不除明日更服加半錢利後糜粥自養但服加味控涎丸尤效方見喘急類輕者青木香丸方見諸疝通治類涎積炒粉丸治積聚涎塊結於心腹之間致令心腹刺痛日久不愈或乾嘔減食蚌粉一兩巴豆七粒去殼及膜上二味同炒令赤去巴豆不用只以醋丸其粉如梧桐子大丈夫臍腹痛炒茴香酒吞下二十丸婦人血氣炒姜酒下敗血衝心童子小便和當歸酒服常服姜酒下控涎丹空心茶清下三七粒方見臂痛類魚蟹積香蘇散多加生薑陳皮煎方見傷寒和解類果菜積平胃散加丁香麝香為末熱鹽湯調服麝香湯下阿魏丸三十粒立效方見脾胃類阿魏丸見前酒積冷者平胃散加丁香縮砂麥芽神麯或香蘇散亦可加入並用薑棗鹽煎空腹服丁香縮砂香附子甘草各少許為散細嚼名醉鄉寶屑效熱者麴櫱丸治酒癖不消心腹脹滿噫醋吞酸啘逆不食脅肋疼痛神麯銼炒麥蘖炒各一兩黃連去須半兩巴豆三粒去殼同炒令轉色去巴豆不用上為末沸湯搜丸如梧子大每服五十丸食後薑湯下茶積磨積丸治茶積飲食減少面黃腹痛陳倉米半升用巴豆七粒去殼同米炒令赤色去巴豆不用青皮去穰炒陳橘紅各二兩上為末好醋搜和為丸如豌豆大每服二十丸食後用淡薑湯下粉片索粉積紫蘇濃煎汁加杏泥服即散面積阿魏丸濃煎蘿蔔子湯下方見前糍糕傷積加味青木香丸治糍糕傷脾噫酸不食心腹作痛百藥不效宜用青木香丸三百粒白丁香十粒小酒麴二錢同為末入巴豆三粒更研和令勻蒸餅為丸如緑豆大每服二十丸漸加至三十丸生薑橘皮湯下宿滯即去其疾自安只用小酒麴木香二件為末鹽湯調服口有酒香是效方見諸疝類虛人沉積盧氏感應丸治虛弱人久積不可直取宜此藥多用蠟匱庶使久留腸胃又不傷氣能消磨至盡又有脾氣偏虛飲食遲化止宜助脾養胃不須用克化藥自然平復又名神木香丸黃蠟真者十兩巴豆百粒去皮尖研為粉用紙數重裹槌透再易紙至油盡成白霜為妙杏仁七十粒去皮尖研細依巴豆法去油丁香懷干一兩木香濕紙裹煨一兩乾薑炮肉豆蔻麵裹煨檳榔蓽澄茄各一兩乳香研三錢百草霜青皮湯洗去穰炒片子薑黃各一兩上除巴豆粉百草霜杏仁乳香外併為末卻同前四味拌和研勻先將上項黃蠟十兩於銀石器內熔化作汁用重綿濾去滓以無灰酒一升於銀石器內煮蠟熔滾取起候冷其蠟自浮於酒上去酒不用春夏修合用清油一兩秋冬用一兩半大銀器內熬令香熟次下酒煮糊同蠟化作汁乘熱拌和前項藥末十分均勻了候稍凝分作劑子用罐子盛之半月後方可服如服旋丸如蘿蔔子大任意服之二三十丸加至五十丸無礙此藥以蠟多雖難丸然丸子愈細其功愈博臨睡須常服之若欲治病不拘時候治豆積香蘇散三錢水一盞煎服加白芥子一撮炒研入用通治大抵治積以所惡者攻之以所喜者誘之則易愈太乙神明再造感應丸治虛中積冷氣弱有傷不能傳化心下堅滿兩脅膨脹心腹疼痛噫宿腐氣及霍乳吐瀉或復遲澀赤白膿血相雜米殼不消久病形羸面黃口淡不能飲食多服有效又能消化酒毒肉豆蔻川薑炮百草霜各二兩木香一兩半蓽澄茄京三稜炮各一兩巴豆一百粒去心另研酒蠟四兩杏仁一百粒去皮尖別研清油丁香各一兩上除巴豆杏仁外併為末次下巴豆杏仁等和勻先將油煎蠟令熔化傾在藥末內和成劑入臼內杵千餘下旋丸如緑豆大每服三五丸熟水吞下食後臨臥服小兒如粟米大二三丸乾薑湯下傷滯糞白有效紅丸子治冷積停滯腹痛淡薑湯下三十丸方見痎瘧類縮砂香附湯合和平胃散治食積食前蘇鹽湯調服方見諸氣脾胃類五積散香蘇散合和亦治冷積生薑煨蔥白烏梅煎空心服方見傷寒陰證及和解類握藥宣積巴豆乾薑韭子良薑硫黃甘遂白檳榔各等分上為末研飯為丸如中指頭大用時早朝用椒湯洗手了麻油塗手掌中握藥一丸移時便瀉欲得瀉止即以冷水洗手利藥蕩積巴豆一百粒去殼水洗四十次五靈脂白姜赤茯苓各一兩上為末醋糊丸如緑豆大每服七丸冷茶清五更初服或欲瀉止冷水洗手面腳三處立住萬金丸治諸般食積氣積血氣蠱脹之類石菖蒲去根節銼如米大半斤重斑蝥半斤重去足翅同菖蒲慢火炒不可燒了如菖蒲黃色揀去斑蝥用小布袋盛起菖蒲兩人牽制布袋去盡斑蝥屑止將菖蒲研為末用米醋煮糊為丸如梧桐子大每服二三十丸隨意加減溫酒熟水不拘時候治蠱脹加香附子末湯調吞下治腫亦快五積肝積肥氣丸治肝之積在左脅下如覆杯有頭足龜鱉狀久久不愈發咳嘔逆痎瘧連歲月不已其脈弦而細青皮炒二兩當歸鬚蒼朮各一兩半蓬朮三稜切鐵孕粉各三兩與三稜蓬朮同入醋煮一伏時蛇含石煅醋淬三分上為末醋煮米糊丸緑豆大每服四十丸當歸浸酒下心積伏梁丸治心之積起於臍上至心大如臂久久不已病煩心身體髀股皆腫環臍而痛其脈沉而芤茯苓厚朴薑汁炒人參枳殼麩炒去穰白朮半夏洗七次三稜慢火煨熱乘熱銼上等分為末煮糊丸梧子大米飲下二十丸食前日兩服作末酒調服絶勝脾積痞氣丸治脾之積在胃脘覆大如盤久久不愈病四肢不收黃疸飲食不為肌膚心痛徹背背痛徹心脈浮大而長大烏頭一分炮去皮尖附子半兩炮去皮臍赤石脂煅醋淬川椒炒出汗乾薑炮各二兩桂心半兩上為末蜜丸如梧子大硃砂為衣每服五七丸米飲下漸加丸數肺積息賁丸治肺之積在右脅下大如覆杯久久不愈病灑灑寒熱氣逆喘嗽發為肺癰其脈浮而毛半夏湯洗七次吳茱萸湯洗桂心各二兩半甘草桑白皮炙葶藶炒各二兩半上銼散每服四錢水一盞半姜三片紅棗二枚煎七分去滓食前服腎積奔豚湯治腎之積發於小腹上至心如豚奔走上下無時久久不已病喘逆骨痿少氣其脈沉而滑甘李根皮焙乾乾葛各一兩一分當歸川芎白芍藥甘草炙黃芩各二兩半夏湯洗十次四兩上銼散每服四錢水一盞半煎七分去滓服灸法卒厥逆上氣氣攻兩脅心下痛滿奄奄欲絶此為奔豚氣先急作湯以浸兩手足頻頻易之後灸氣海百壯穴在臍下一寸半又灸關元百壯穴在臍下三寸又灸期門百壯穴直兩乳下第二肋間端旁一寸五分奔豚腹腫灸章門百壯穴在大橫外直臍季肋端奔豚搶心不得息灸中極五十壯穴在臍下四寸六聚散聚湯治久氣積聚狀如癥瘕隨氣上下發作有時心腹㽲痛攻刺腰脅上氣窒塞喘咳滿悶小腹䐜脹大小便不利或復泄瀉淋瀝無度遺精白濁狀若虛勞半夏湯洗七次檳榔當歸各三分橘皮杏仁麩炒去皮尖桂心各二兩茯苓甘草炙附子炮去皮臍川芎枳殼去穰麩炒厚朴薑汁製炒吳茱萸湯洗各一兩上銼散每服四錢水一盞半煎七分去滓食前服大便不利加大黃煎服荊蓬煎丸方見痰飲類治同上息積磨積丸治腸胃因虛氣癖於肓膜之外流於季脅氣逆息難積日頻年醫所不治久則榮衛停凝一旦敗濁潰為癰膿多致不救胡椒五百五十粒木香一分全蠍十個去毒上為末粟米飲丸如緑豆大每服十五丸橘皮湯下化氣湯治息積癖於腹脅之下偏脹膨滿不妨飲食諸藥不能取轉及治心脾疼痛嘔吐酸水丈夫小腸氣婦人脾血氣縮砂仁桂心木香各一分甘草炙茴香炒丁香皮青皮炒陳皮生乾薑蓬朮炮各半兩胡椒沉香各一錢一字上為末每服二錢薑蘇鹽湯調下婦人醋湯調服導引法以兩手拇指壓無名指本節作拳按髀趺坐扣齒三十六屏氣二十一息咽氣三息再屏息再咽如是三作以氣通為效遇子午卯酉時則行然按摩導引之法甚多隨意用之皆可不必拘此法余見養生書癥瘕大硝石丸治七症八瘕聚結痞塊及婦人帶下絶産並欲服丹藥腹中有癥瘕者當先下此藥但去癥瘕不令人困硝石三兩大黃四兩人參甘草各一兩半重上為末以三年苦酒三升置銅石器中以竹作準每一升作一刻拄器中先納大黃常攪不息使微沸盡一刻乃內余藥又盡一刻極微火熬使可丸則丸如梧桐子大每服三十丸米湯下四日一服婦人服之或下如雞肝或如米泔正赤黑等三二升後忌風冷如産婦小三稜煎治食症酒癖血癖氣塊時發刺痛全不思食及積滯不消心腹堅脹痰逆嘔噦噫醋吞酸脅肋刺痛胸膈痞悶並脾氣橫泄京三稜蓬莪朮各四兩芫花一兩去梗葉上同入瓷器中用米醋五升浸滿封器口以灰火煨令乾取出稜術將芫花以余醋炒令微焦焙乾為末醋糊丸如緑豆大每服十五丸生薑湯下婦人血分男子脾氣橫泄腫滿如水桑白皮煎湯下三聖丸治積年癥瘕痞塊諸藥療理不瘥至效舶上硫黃一兩水銀半兩硇砂一分制如稀糊上三物乳鉢內滾研如粉卻以生鐵銚內用文武火熬溶成汁以火箸攪令勻停冷刀劃下以紙裹置地坑內埋一宿取出再研細次以赤芍藥當歸京三稜蓬莪朮紅花各一分同用並細銼以法酒一升煎及一半漉出砂盆內研生布裂汁再熬放冷入飛羅面為糊搜丸如緑豆大治因産後傷於飲食結伏在腹脅時發疼痛不可忍者當歸酒浸一升遂旋取酒暖下七丸至十丸每服磨痞塊空心溫酒下三丸至五丸所是藥滓裂了焙乾為末別入乾地黃半兩真蒲黃芫花各一兩微炒焦黃上為末以前一般糊丸如緑豆大治女人血臟冷氣攻心疼及一切血疾溫酒下十丸一握七丸治臟腑宿蘊風冷氣血不和停滯宿飲結為癥瘕痞塊及婦人血瘕腸胃中寒飲食不下咳逆脹滿及下痢赤白霍亂轉筋及踒躄拳攣腳膝疼痛行步不能常服健脾暖胃堅骨強陽神麯半斤炒黃大附子二隻炮去皮臍甘草二兩炙上為末煉蜜丸每左手一握分作七丸細嚼米飲下妙應丹治諸臟氣虛積聚煩悶及飲食中蠱毒或食水陸果蓏子卵入腹而成蟲蛇魚鱉或宿食留飲婦人産後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黑肢體瘦削嗜臥多魘食少腹痛大便糟粕變成冷痢附子四個六七錢重者生去皮臍剜作甕入硇砂共一兩七錢重面劑裹煨熟去面不用蓽茇木香煨青皮破故紙各三兩半上為末麵糊搜丸如梧子大每服三十丸生薑橘皮湯下泄痢米湯下加至五十丸灸法灸內踝後宛宛中隨年壯又灸氣海百壯其穴在臍下一寸五分久冷及婦人癥瘕腸鳴泄利繞臍絞痛灸天樞百壯其穴在臍旁二寸勿針積聚堅大如盤冷脹灸胃脘二百壯其穴在上脘下一寸心痛脾疼附風證重者蜜附湯治胃涉風邪入腹拘急切痛或吐或泄狀如霍亂附子去皮臍切作四片以蜜煎令附子變色以湯洗去蜜切半兩桂心芍藥各三分甘草四錢炙上銼散每服四大錢水一盞半姜五片棗一枚煎