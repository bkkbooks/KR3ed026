夏湯泡七次白茯苓去皮白朮去蘆炒各一兩人參甘草炙各半兩小麥半合上銼散每服四錢水一盞半生薑五片烏梅一個煎至八分去滓溫服不拘時候水浸丹治伏暑傷冷冷熱不調霍亂吐利口乾煩渴黃丹一兩二錢半炒巴豆二十五個去皮心上同研勻用黃蠟熔作汁和為丸如梧子大每服五丸水浸少頃別以新汲水吞下不拘時候又用姜附湯清煎沉冷服之大效熱因寒用之法也見中寒類乾霍亂鹽湯治忽然心腹脹滿㽲刺痛疼蟲毒煩冤欲吐不吐欲利不利狀若神靈所附頃刻之間便至悶絶亦涉三因或臟虛或腸胃素實故吐利不行極鹹鹽湯三升熱飲一升刺口令吐宿食使盡不吐更服吐訖復飲三吐乃止此法大勝諸治俗人以為田舍淺近鄙而不用守死而已凡有此病即先用之續以理中湯倍加橘紅與之或藿香正氣散加官桂茯苓煨枳殼就吞蘇合香丸妙通治藿香正氣散治霍亂吐瀉通用腹痛者加桂小便不利加車前子每料各一兩方見傷寒陰證類訶子散治老幼霍亂吐利一服取效方見心痛類加味姜附湯治吐瀉過多手足逆冷氣少不語六脈沉伏附子炮乾薑人參各一兩甘草五錢上銼散每服四錢水二盞煎至一盞空心服腹痛加官桂小便不利加茯苓每料各五錢養正丹治霍亂轉筋咳逆不定勞勢危篤每服三十丸鹽湯下方見痼冷類胡椒湯治霍亂吐瀉胡椒七粒生緑豆二十一粒上為末宣木瓜湯溫和調下奇方鹽一撮醋一盞同煎八分溫服二盞鹽梅鹹酸等物皆可煮服又方南星末三錢棗三枚姜五片煎極熱服治吐下四肢逆冷不省人事一服可效半夏為末薑汁點亦一服效白礬為末每服一大錢沸湯點服亦驗熏洗法治霍亂轉筋陳大蓼一把水三升煮取二升乘熱熏洗仍飲半盞凡用蓼須家園種者鹽尉方治霍亂吐瀉心腹作痛炒鹽二碗紙包紗護頓其胸前並腹肚上一截以尉斗火尉氣透則蘇續又以炒鹽尉其背則十分無事灸法治霍亂轉筋欲死氣絶惟腹中有暖氣者可用其法納鹽於臍中令實就鹽上灸二七壯名神闕穴立效並灸臍下一寸半名氣海穴二七壯妙痰飲懸飲十棗湯治飲水流在脅下咳唾引痛一歲不愈者芫花微炒甘遂大戟炒上等分銼散水一盞半棗十枚煎八分去棗調藥壯人一錢羸人半錢平旦溫服不下者次日更加半錢下後糜粥自養若以下不可服五苓散治流行水飲每服二錢沸湯調小便更不利加防己佐之方見傷暑類支飲防己桂枝湯治膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈漢防己三兩桂心二兩人參四兩石膏六兩上銼散每服四大錢水一盞半煎七分去滓溫服虛者即愈實者二日復發再服不愈宜去石膏加茯苓四兩芒硝一兩半微利則愈茯苓五味子湯治支飲手足冷多唾口燥氣從小腹上衝胸咽手足痹面熱翕然如醉因復下流陰股小便難時復眩冒嘔腫茯苓四兩桂心甘草炙各三兩五味子二兩半上銼散每服四錢水一盞半煎七分去滓空腹服服之沖氣即低反更咳滿者去桂加乾薑細辛各三兩咳滿止而復渴沖氣更發者以細辛乾薑為熱藥此法不當遂渴反止者為支飲也支飲法當冒冒者必嘔嘔者腹內半夏二兩半以去其飲飲去嘔則止其人形腫與痹加杏仁二兩半若面赤如醉以胃中熱上熏加大黃三兩須詳證加減溢飲大青龍湯治溢飲身體疼重汗不出拘急痛麻黃去節湯洗七錢半桂心甘草炙各二錢半石膏雞子大杏仁四十個炒去皮尖上銼散每服四大錢水一盞半姜五片棗二枚煎七分去滓空腹溫覆一服汗者勿再服復服汗出多亡陽虛逆惡風煩躁不得眠也小青龍湯治溢飲支飲倚息不得臥及喘滿者麻黃去節湯洗芍藥細辛桂心乾薑炮甘草炙各三錢三字五味子二錢半夏三錢湯洗七次上銼散每服四錢水一盞半煎七分去滓空腹服渴者去半夏加栝蔞根三錢三字微利去麻黃加芫花一雞子大炒入噎者去麻黃加附子一枚炮小便不利者去麻黃加茯苓半兩喘者去麻黃加杏仁三錢三字咳而上氣肺脹其脈浮心下有水氣者胸中痛引缺盆加石膏二錢半研痰飲參蘇飲治痰飲停積胸中中脘閉嘔吐痰涎眩暈嘈煩忪悸噦逆及痰氣中人停留關節手腳嚲曳口眼喎邪半身不遂食已即吐頭疼發熱狀如傷寒以姜七片棗子一枚煎空腹服噦者加乾葛腹痛加芍藥方見傷寒和解類五套丸治胃氣虛弱三焦痞塞不能宣行水穀為痰飲結聚胸臆之間令人頭目昏眩胸膈脹滿咳嗽氣急嘔逆腹痛伏於中脘亦令臂疼不舉腰腿沉重久而不散流入於脾脾惡濕得水則脹脹則不能消化水穀又令腹中虛滿而不食也或腸間漉漉有聲半夏一兩南星一兩每個切作數十塊以上兩味用水洗次用白礬三兩研碎調入水內再浸三日乾薑良薑炒白朮炒茯苓各一兩木香丁香不見火青皮去穰陳皮去白各半兩上為末用神麯一兩大麥蘖二兩同研取末打糊和藥為丸如梧子大每服三十丸至五十丸溫熱水下不拘時候常服溫脾胃去宿冷消積滯化飲食闢霧露風冷山嵐瘴癘不正非時之氣或因酒癖停飲痰水不去或心膈痰逆時發嘔逆昏暈心疼纍藥不效並皆治之氣痰四七湯治七情氣鬱結聚痰涎狀如破絮或如梅核在咽喉間咯不出咽不下並治中脘痞滿痰涎壅盛上氣喘急半夏五兩茯苓四兩紫蘇葉二兩厚朴三兩上銼散每服四錢水一盞姜七片棗一枚煎八分不拘時服若因思慮過度心氣不足小便白濁用此藥下青州白丸子最效一方又用半夏五兩人參官桂甘草各一兩生薑煎服名七氣湯大治七氣並心腹絞痛二陳湯每料加木香沉香各五錢南星二兩治氣不順上壅作痰每服三錢生薑五片煎服方見痎瘧類風痰加味壽星丸蠍麝白丸子星香飲治風壅痰盛方並見風科通治及熱證類熱痰芎辛散治壅塞痰盛清頭目及治逾月語音不出服他藥亦不能去乃是燥熱所致用此藥數服而愈川芎細辛防風桔梗白芷甘草羌活各一兩桑白皮半兩上銼散每服二錢水一盞半生薑二片薄荷三葉煎至七分不飢不飽時溫服枳殼半夏湯除熱痰下氣寬中利膈清上治痞滿枳殼半夏黃芩桔梗各二兩甘草五錢上銼散每服四錢生薑三片桑白皮七寸烏梅一個煎未效加甜葶藶馬兜鈴防己薄荷立效熱痰黃色是也虛證順元散治氣虛痰盛不得睡臥氣中痰厥尤宜服之方見傷寒陰證類黑錫丹治下虛上壅頭暈痰盛服之立愈方見痼冷類靈砂丹治上盛下虛痰涎壅盛此藥最能鎮墜升降陰陽安和五臟方見痼冷類八味丸治脾虛不得剋制腎水多吐痰唾而不咳者方見虛損類暖胃丸去虛痰利冷飲硫黃研白礬各一兩同炒半夏二兩薑汁炒丁香茴香炒木香各一兩為末薑汁煮麵糊丸梧子大每服二十丸空心米飲下靈白丸治元氣虛弱痰氣上攻風痰壅塞嘔吐不已靈砂青州白丸子各一兩各研上和勻生薑自然汁和米糊丸如梧桐子大每服三十丸空腹人參湯或棗湯下通治二賢湯治痰實食後胸滿遠年痰飲服之愈薄橘紅四兩甘草一兩上為末沸湯調服其功在茯苓半夏枳實南星之上茱苓丸治頭疼背寒嘔吐酸汁不思飲食小便不利氣壅昏眩白茯苓吳茱萸各二兩湯洗去末上為末煉蜜丸如梧子大每服三十丸不拘時候熟水吞下服後便漩中作茱萸氣是驗他痰藥不能及此一方只將茱萸酒浸三宿以茯苓末拌之候乾或湯或酒下百餘粒亦效快活丸常服消食化痰養生之家不可缺枳殼一兩半炒桂一兩桔梗二兩半夏湯洗七次二兩上為末薑汁糊丸梧子大每服二十丸食後薑湯下茯苓丸治臂痛不能舉手或左右時復轉移由伏痰在內中脘停滯脾氣不流行上與氣搏四肢屬脾滯而氣不升故上行攻臂其脈沉細者是也後人謂此臂痛乃痰證也用以治痰無不效者茯苓一兩枳殼麩炒去穰半兩半夏二兩風化朴硝一分上為末薑汁煮糊丸如梧子大每服三十丸生薑湯下纍有人為痰所苦夜間兩臂常若有人抽牽兩手戰灼至於茶盞亦不能舉只以此藥治之皆隨服隨愈世間所謂痰藥者多矣至於立效未有如此藥之妙也倍術散治酒癖五飲停水在心下或兩脅胃中膈上腸間動搖有聲皆由飲酒冒寒飲水過多白朮二兩附子炮去皮臍一兩上銼散分三服水一大盞姜十片煎空腹服臟腑微動即安一方除附子加乾薑肉桂各一兩為末蜜丸梧桐子大每服二十五丸米飲下食前大效桂辛湯下痰飲散風邪止痰嗽聰耳鼻宣關竅利咽膈清頭目解冒眩進飲食桂去粗皮細辛去苗土乾薑炮人參去蘆白茯苓去皮甘草炙各二兩五倍子陳皮去白白朮半夏湯洗七次各三分上銼散每服二錢水二盞煎至一盞去滓食前溫服丁香半夏丸治脾胃宿冷嘔吐痰水噫氣吞酸人參丁香木香肉豆蔻陳皮各一分藿香葉半兩半夏湯洗七次姜淹炒黃三兩上為末薑汁糊丸如小豆大每服四十丸薑湯下二陳湯煎送下青州白丸子治眉心並眉梁骨疼又治臂疼或麻木或戰掉皆痰飲所作宜服方見痎瘧類白丸子方見風科通治類控涎丹治同上方見臂痛類二生湯專治痰附子生去皮臍半夏生用上等分銼散每服四錢水二盞生薑十片七分去滓煎空腹溫服入少木香煎尤佳破痰消飲丸治一切停痰留飲青皮陳皮並洗京三稜炮捶碎用川薑炮草果麵裹煨蓬朮炮捶碎良薑濕紙裹煨各一兩上為末水麵糊丸如梧子大陰乾每服五十丸薑湯下破飲丸治五飲停蓄胸腹結為症癖支滿胸脅旁攻兩脅搶心疼痛飲食不下翻胃吐逆九種心痛積年宿食不消久瘧久痢遁尸疰忤癲癇厥暈心氣不足憂愁思慮婦人腹中諸病悉能治療久服尤妙且不傷臟氣蓽茇丁香不見火胡椒縮砂仁木香不見火蠍梢烏梅青皮巴豆去殼膜各等分上以青皮同巴豆漿水浸一宿次日漉出同炒青皮焦去巴豆水淹烏梅肉蒸一炊久細研為膏入藥末和勻丸如緑豆大每服五七丸臨臥薑湯吞下曾有婦人頭風服之亦效且斷根不復發豈頭風即痰飲耶導痰湯一切痰頭目旋暈或痰飲留積不散胸膈痞塞脅肋脹滿頭痛吐逆喘急痰嗽涕唾稠黏坐臥不安不思飲食半夏洗七次四兩天南星炮去皮橘紅枳實去穰麩炒赤茯苓去皮各一兩甘草炙半兩上銼散每服四錢水二盞生薑十片煎八分食後溫服二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或因食生冷飲酒過度脾胃不和並宜服之一方加丁香方見痎瘧類荊蓬煎丸破痰癖消症塊冷熱積聚胃膈痞悶通和三焦升降陰陽順氣消化宿食荊三稜酒浸三日夏一日蓬莪朮酒浸三日夏一日以上二味用去皮巴豆二十粒於銀石器內文武火炒令乾黃色去巴豆卻用湯浸去白木香枳殼去穰青皮去穰川茴香微炒檳榔銼各一兩上為末麵糊丸如緑豆大每服三十丸食後生薑湯下理中湯治停痰留飲加茯苓半夏導利之方見霍亂類咳逆冷證丁香柿蒂散治吐利及病後胃中虛寒咳逆至七八聲相連收氣不回者難治人參茯苓橘皮半夏良薑炒丁香柿蒂各一兩生薑一兩半甘草五錢上銼散每服三錢水一盞煎乘熱頓服或用此調蘇合香丸亦妙木香勻氣散治同上用萊蔔子湯泡研取汁調熱服見諸疝類沉香降氣湯縮砂烏沉湯治同前蘇葉三皮鹽少許煎湯點熱服方見諸氣類橘皮乾薑湯治胃中有寒咳逆橘皮通草乾薑桂心人參甘草上各等分銼散每服四錢水盞半煎至六分溫服日三服羌活附子湯治吐利後背寒咳逆羌活去蘆附子炮去皮臍茴香炒各半兩乾薑炮丁香各一兩上銼散每服二錢水一盞鹽少許煎至七分空心熱服蓽澄茄散療噫氣咳逆蓽澄茄良薑各二兩上銼散每服二錢水一盞煎六分沸投醋半盞取出時哈之甚妙熱證小柴胡湯治同上每服三錢水一盞半姜三片柿蒂三個煎熱服方見傷寒泄瀉類橘皮竹茹湯治胃虛膈熱者橘皮去白二兩人參甘草炙各半兩上銼散每服四錢水一盞半竹茹一小塊生薑五片棗二枚煎至七分去滓溫服不以時灸咳逆法乳下一指許正與乳相直骨間陷處婦人即屈乳頭度之乳頭齊處是穴艾灸炷如小豆大灸三壯男左女右只灸一處火到肌即瘥不瘥不可治也其穴只當取乳下骨間動脈處是
