body:
  text: 江西官醫提舉司牒太醫院書皇帝聖旨里江西等處官醫提舉司至元三年十月初二日據南豐州醫學教授司狀申准本學學正甘宗羅關該切見本州前官醫副提領危亦林儒學淵源醫書博覽家居豐郡世稱良醫自天曆元年充本州醫學學録轉充官醫副提領以昕夕之餘考之古方參以家傳集成一書名曰世醫得效方以太醫院官降一十三科名目編排有序方藥至明實為希有似此可見其活人之心甚至理宜言舉今其繡梓廣行庶傳永久以濟生民為此關請備申上司參訂可否施行准此施行間又准南豐州前官醫副提領危亦林關該幼讀儒書長習醫業由鼻祖自撫州遷於南豐高祖云仙遊學東京遇董奉二十五世孫京名威輩授以大方脈科還家醫道日行伯祖子美進傳臨江劉三點建昌路新城縣五路陳姓婦人科杭州田馬騎正骨金鏃科大父碧崖復傳黎川大磜周氏小方科伯熙再傳福建汀州路程光明眼科南城縣周後遊治瘵疾至亦林復進傳本州斤竹江東山瘡腫科臨川範叔清咽喉齒科及儲積古方並近代名醫諸方由高祖至亦林凡五世矣隨試隨效茲不敢負先代傳授之難亦不敢自祕所學遂於天曆元年為首以奉到太醫院所頒一十三科名目除祝由科不曾習學外依按古方參之家傳十年刻苦編次成書名曰世醫得效方始自大方脈雜醫科小方脈科風科産科兼婦人雜病科眼科口齒兼咽喉科正骨兼金鏃科瘡腫科針灸略附各科外附編孫真人養生書通一十二帙自愧山林鄙陋見聞不博舛謬惟多敢求校正間又蒙本州醫學甘學正關保舉行令繡梓以廣其傳為此今將編到世醫得效方分列各科諸方綱目治證詳細方藥明白裝成一十二帙完備見在煩為申解上司委官參考如可觀採乞賜行下與亦林刊行少盡活人濟世之心允符國朝一視同仁之美關請以上施行准此照得官醫副提領危亦林性行純謹醫儒兼通所編世醫得效方委依太醫院官降一編到世醫得效方一十二帙隨此申解前去保結申乞照詳施行得此照得南豐州醫學教授司申解本州前官醫副提領危亦林編到世醫得效方一十二帙未經校正關委本司官余提舉不妨司事以上校正明白保結關報以憑施行出後今准余提舉關該前事除將發到南豐州官醫副提領危亦林所編世醫得效方一十二帙各科治證方藥再三披閲詳復考校的見危亦林廣覽醫經深明脈理藥君臣佐使之辨方按今古南北之宜議論詳明證治精審委有活人之念宜為當世之需仍慮當職見或差謬未明至理如蒙申解太醫院重行委官參考訂正發付刊行庶傳永久上可俾於聖化下有濟於斯民然此今將校正過危亦林所編世醫得效方一十二帙隨此發回保結關請照驗施行准此卑司看詳南豐州官醫副提領危亦林學有淵源出自家庭之訓術精藥石見諸方冊之明志已願於活人書宜刊以濟世伏慮本司官余提舉參考未詳校對罔備或以己見恐多差殊宜依本官所言申解上司再行委官三復校正如可觀採鋟梓以傳上明國朝好生之德下優醫士編集之勞為此今將本司官余提舉已校正南豐州前官醫副提領危亦林世醫得效方一十二帙隨此申解前去合行保結申覆伏乞照詳乞賜明降伏下以憑遵奉施行須至申者右申太醫院至元三年十一月囗日抄白申行
