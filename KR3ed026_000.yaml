front:
  text: 危氏世醫得效方序語云醫不三世不服其藥醫何以貴世業也謂其更嘗多而險危劇易皆得之耳聞目見較之臆決嘗試者得失何啻倍蓰且藥進醫手而方傳古人古方之行於世者何算一證而百方具將為所適從哉夫病者懸命醫師方必對脈藥必療病譬之抽關啓鑰應手而決斯善之善有矣若中無定見姑徐徐焉取古方歷試之以庶幾一遇焉雖非有心殺人而人之死於其手者多矣醫所以貴專門方所以貴經驗也南豐危亦林先世遇古名醫董奉遠孫京受醫術其後世業之且遍參諸科至亦林五業而學益備技益工所全活者益衆乃取平昔所用古方驗而無失者並與其祖父以來得之師授者類萃成書仿聖濟總録以十三科編次名曰世醫得效方將鋟梓以廣其傳余觀世之人得一方輒靳靳焉莫肯示人往往以肘後千金為解今危氏以五世所得之祕一旦盡以公諸人其過人遠矣昔許叔微未達時人勸以樹陰德許念貧而樹德惟醫為可乃攻醫以活人其後訖致顯宦造物之報施如此然余以為以身種者有限以書種者無窮今危氏能公其術於人使家有其書即人無夭死其所種者不亦多乎陰德之報在其身在其子孫余知其必有過於許氏者矣後至元四年八月承事郎同知永新州事王充耘與耕書世醫得效方序工欲善其事必先利其器器利而後工乃精醫者舍方書何以為療病之本自難經湯液靈樞傷寒論等篇出而後之醫師著述者殆數百家蓋發縱指示俾對病而知證因證而得藥其用心亦仁矣哉僕幼而好學弱冠而業醫重念先世授受之難由鼻祖自撫而遷於南豐高祖云仙遊學東京遇董奉草五世孫京授以大方脈還家而醫道日行伯祖子美復傳婦人正骨金鏃等科大父碧崖得小方科於周氏伯熙再進學眼科及療瘵疾至僕再參究瘡腫咽喉口齒等科及諸積古方並近代名醫諸方由高祖至僕凡五世矣隨試隨效然而方書浩若滄海卒有所索目不能周乃於天曆初元以十三科名目依按古方參之家傳昕夕弗怠刻苦凡十稔編次甫成為十有九卷名曰世醫得效方首論脈病證治次由大方脈雜醫科以發端至於瘡腫科而終編分門析類一開卷間綱舉而目張由博以見約固非敢求異於昔人直不過欲便於觀覽云耳欽惟國朝念群黎之疾苦惠民有局設教有學於醫尤切然自愧山林鄙陋見聞不博妄意纂集舛謬惟多尤欲當道縉紳醫師進而教之訂其訛補其偏俾繡諸梓則庶幾廣聖皇好生之仁於無窮豈不韙歟仍至元三年丁丑七月既望嘉禾後學達齊危亦林拜手謹書建寧路官醫提領陳志序達齊危先生世醫得效方蓋以先世祕傳及至於今凡治療所經驗者仿聖濟總録十三科之目類而編之計十二帙進之本道官醫提舉司先生家世江西之南豐授本州醫學教授故用心亦勤矣歲在壬午先生過豫書林因得北面師之且以全帙見授嗟乎千方易得一效難求觀乎此方則知先生家得其傳世守其學用無不驗疾無不愈以得效名方逮猶影響之於形聲也活人陰德其有涯哉豫又安敢私有故命工繡梓以廣其傳庶乎先生惠濟之心得以見於當世嘉與民生同躋壽域不亦宜乎至正三年歲在癸未仲夏建寧路官醫提領陳志頓首謹書
