body:
  text: 卷第十大方脈雜醫科頭痛風證芎芷香蘇散治傷風鼻中清涕自汗頭疼或發熱方見傷寒和解類消風散治傷風及風虛嘔惡頭痛風疹浮滿方見風科熱證類寒證連須蔥白湯治傷寒已發汗未發汗頭疼如破生薑二兩連須蔥白小切半斤上用水二斤煮令減半去滓分三服服不瘥者服後湯葛根蔥白湯治頭痛不止葛根白芍藥知母各半兩川芎生薑各一兩蔥白一握上銼散水三升煎取一升半去滓每服一盞半熱服暑證茵陳散治感暑自汗面垢脈微頭痛香薷散加茵陳每服三根蔥白五寸生薑三片同煎熱服香薷散方見傷暑類濕證小芎辛湯治風寒在腦或感濕頭重頭痛眩暈欲倒嘔吐不定川芎一兩細辛去蘆白朮去蘆炒甘草炙各半錢上銼散每服四錢水一盞半薑五片茶芽少許煎至七分不拘時溫服一方以川芎一兩細辛半兩甘草二錢防風半夏川白芷各半兩煎同上尋常風濕頭疼立效熱證防風散治積熱上衝頭熱如火痛入頂中防風去蘆羌活去蘆薄荷去粗梗當歸去尾大黃梔子去須川芎各一兩蟬蛻二十個去足翼粉草五錢上為散每服四錢水一盞半燈心二十莖苦竹葉十皮煎食後服太陽丹治腦寒之病皆因邪攻於上焦令人頭疼晝夜引痛不能安寧腦子二錢別研川芎甘草白芷各一兩石膏二兩別研川烏一兩重者炮去皮臍上為末蜜同麵糊丸每兩作十八丸硃紅為衣食後以生蔥茶嚼下或用五丸以水磨爛塗患處洗心散治風熱上壅頭目痛甚方見積熱類茶調散治丈夫婦人諸風上攻頭目昏重偏正頭疼鼻塞聲重傷風壯熱肢體煩疼肌肉蠕動膈熱痰盛婦人血風攻疰太陽穴疼但是感風氣悉皆治之常服清爽頭目薄荷去梗不見火四兩羌活一兩川芎二兩甘草爁一兩細辛去蘆五錢防風去蘆五錢白芷一兩荊芥去梗二兩上為末每服二錢蔥白茶清調下用蔥涎調貼兩太陽穴除痛甚者特效又用朴硝末少許吹入鼻中立愈左痛吹右右痛吹左芎犀丸治偏頭疼一邊鼻塞不聞香臭常流清涕或作臭氣一陳加芎蠍等遍服無效服此不十數服或作嚏突出一鋌稠膿即愈石膏細研四兩生龍腦別研硃砂研飛四兩內一兩為衣生犀屑一兩人參去蘆二兩茯苓去皮二兩川芎四兩阿膠碎炒一兩半細辛去苗二兩麥門冬去心三兩甘草炙二兩山梔子去皮一兩上除別研藥後入併為末煉蜜丸每服一丸至二丸細嚼茶酒任下食後服神芎丸治一切頭痛昏眩利咽膈能令遍身結滯通暢除痰飲解諸熱大黃黃芩各二兩黑牽牛炒白滑石各四兩黃連大川芎薄荷葉各半兩上為末水丸小豆大溫水下十丸至十五丸日三服或煉蜜丸亦可萊蔔汁治偏頭疼用一蜆殼仰臥左痛注右右痛注左或兩鼻皆注亦可數十年患皆一二注而愈加減辛夷散治風熱上壅鼻流濁涕或腥臭頭昏眉稜角痛上以茶調散加辛夷仁藁本蒼耳子木通各一兩為末淡茶清調立效方見前虛證大芎辛湯治痰厥飲厥腎厥氣厥等證偏正頭疼不可忍者只以此藥並如聖餅子服之不拘病退但多服自能作效氣虛高年人仍服養正丹黑錫丹若發熱頭疼卻不可服生附子去皮尖生烏頭去皮尖天南星泡洗乾薑炮細辛去蘆川芎各一兩甘草三分上銼散每服四錢水二盞薑七片茶芽少許煎至六分食前服中脘素寒者不用茶芽如聖餅子治男子婦人氣厥上盛下虛痰飲風寒伏留陽經偏正頭疼痛連腦巔吐逆噁心目眩耳聾常服清頭目消風痰暖胃氣川烏炮製去皮臍天南星炮乾薑炮各一兩甘草川芎各二兩天麻防風去蘆及叉股者半夏湯泡七次各半兩一方加細辛上為末湯浸蒸餅和丸如雞頭子大捻作餅子曬乾每服二十餅薑湯或茶任意咽下須自合糊少及藥真易效若傷寒得汗尚餘頭痛者濃煎蔥白生薑湯下消風散治風證頭痛至亟用生柚葉蔥白研汁調貼頭上兩太陽穴立驗方見風科熱證類大附丸一名蔥涎丸治元氣虛壅上攻偏正頭疼不可忍大附子一隻炮去皮臍上為末蔥涎丸如梧子大每服十五丸至二十丸臨臥茶清送下一方以川烏頭泡去皮尖為末用韭葉自然汁和丸治風虛痰涎頭疼四川丸治頭痛如破大川烏一個生去皮臍川白芷川細辛去葉大川芎各一兩上為末韭葉自然汁丸黃丹為衣每服一丸細嚼蔥白淡茶清下又名鶴頂丹硫黃丸治頭痛如破每發則數日不食百藥不療硫黃二兩硝石一兩上用水為丸指頭大空心臘茶嚼下一丸或丸如梧子大每服十五丸暑暍懵冒者冷水服下咽即豁然清爽傷冷即以沸艾湯下葫蘆巴散治氣攻頭痛葫蘆巴微炒三稜銼醋浥一宿炒乾各一兩乾薑炮等分上為末每服二錢溫生薑湯或酒調下凡氣攻頭痛一服即瘥萬法不愈頭痛如破者服之即愈或瘴瘧瘥後頭痛呼號百方不效用此一服如失去小可頭痛更捷又方點頭散川芎二兩香附子炒去毛四兩為末淡茶清調常服除根附子湯治頭風至驗大附子一個生用去皮臍緑豆一合上同入銚子內煮豆熟為度去附子服豆即安每個可煮五服後為末服之蓽茇散治偏頭痛絶妙上一味為末令患者口中含左邊疼令左鼻吸一字右邊疼右鼻吸一字即效至靈散治偏正頭痛細辛雄黃各等分上為末以少許搐鼻左痛搐左右痛搐右一字輕金散治偏正頭風痛夾腦風眉稜骨痛牽引兩眼抽掣疼痛迸出或生翳膜視物不明藿香葉荊芥穗旋覆花香白芷石膏末細研水飛防風各半兩川烏兩頭尖者去皮尖生用二錢半天南星二錢半川芎半兩草烏頭一錢半上各修事挂日中曬乾同搗為末每服一字食後淡茶調下神效川烏散治腦瀉防風白附子北細辛白茯苓川烏菖蒲乾薑香白芷川芎甘草節各等分上為末每服三錢嚼生蔥白湯調下食後服天香散治遠年日近頭風才發則頑痹麻癢不勝爬搔或塊瘰停痰嘔吐飲食莫入兩服可斷根天南星湯泡七次半夏制同上川烏生去皮臍川香白芷上等分為末每服七錢或十錢水一碗半煎至一碗入生薑自然汁半碗再煎至八分熱服藥汁稍黑難服須要勉強吃二三服一説滿頭上有塊子者切宜麻油針逐個針之此已效之方白附子散治腦逆頭痛齒亦痛麻黃不去節天南星泡烏頭炮去皮各半兩白附子炮一兩硃砂研麝香研乾薑各一分全蠍去毒足五個炒上為末酒調半錢服訖去枕臥少時備急丸治積聚頭痛大黃乾薑巴豆去皮心出油上等分為末煉蜜丸如碗豆大米飲下一丸羸人服半丸緑豆大以大便利為度四柱散治大病後及諸虛頭痛上用水煎將熟時入臘茶一錢服之方見痼冷類二陳湯治眉心並眉梁骨疼者痰飲也宜用二陳湯煎飲吞下青州白丸子最驗方見痎瘧及風科通治類瓜蒂散治胸中有伏痰吐之即愈瓜蒂末赤小豆末各等分上研勻熱米飲調一錢匕羸弱服半錢得吐為度痛即止都梁丸大治諸風眩暈婦人産前産後乍傷風邪頭目昏重及血風頭痛服之令人目明凡沫浴後服一二並甚佳暴寒乍暖神思不清頭目昏暈並宜服之香白芷大塊者以沸湯泡洗上為末煉蜜和丸如彈子大每服一丸多用荊芥點臘茶細嚼下食後常服諸無所忌只乾咽嚼亦可灸法囟會穴在鼻心直上入髮際二寸再容豆許是穴灸七壯真頭痛者其痛上穿風府陷入於泥丸宮不可以藥愈夕發旦死旦發夕死蓋頭中人之根根氣先絶也面病柏連散治面上有熱毒惡瘡胡粉炒大柏炙黃連上等分為末面脂調敷豬脂亦可治面上肺風瘡上用無灰酒於沙碗鉢內濃磨鹿角尖敷之兼服治腎臟風黃耆丸即愈硫黃膏治面部生瘡或鼻臉赤風刺粉刺百藥不效者惟此藥可治妙不可言每臨臥時洗面令淨以少許如面油用之近眼處勿塗數日間瘡腫處自平赤亦消風刺粉刺一夕見效生硫黃香白芷栝蔞根膩粉各半錢芫青七個去翅足全蠍一個蟬蛻五個洗去泥上為末麻油黃蠟約度如合面油多少熬溶取下離火入諸藥在內如法塗之一方加雄黃蛇床子各少許指爪破面上用生薑自然汁調輕粉敷破處更無痕瑕治粉刺上以白礬末少許酒調塗之玉盤散洗面藥白芨白蘞白芷甘松白朮藁本芎藭細辛零陵香白檀香各半兩皂角一斤去皮稱干楮實半升黃明膠半斤用牛皮膠四兩亦得炙令通起搗篩余者炒作珠子又搗取盡糯米一升淨搗為粉曬令極干若微濕則損香上為末令勻相合成澡豆皂角末別入看看澡豆緊慢添減以洗面不熾為度藥末不可太細滑石散乾洗頭藥上用香白芷零陵者甘松滑石四味並不見火等分為末摻發上梳篦得法染須方上用針砂以井水淘淨濾干醋浸炒黑為末入百藥煎少許先一日將蕎麥粉針砂各一半調和打為糊塗在須上以蓮葉包裹更以絹巾兜定次早用肥皂洗淨後再用訶子五錢好雄沒石子一個醋炒為末百藥煎少許又以蕎麥粉醋調作稠糊依前封裹其黑如漆一方加真膽礬入或生麝香入又方針砂不以多少用水淘洗以水清為度用柳枝半寸長數根於銅銚內炒過卻用好米醋浸一宿次日再炒以柳枝成炭為度於地上攤冷另放八件打和為末當歸甘松石膏滑石各一錢橡斗子一兩酸榴皮三錢母丁香白檀香各一錢另收各包為末生麝少許沒石子二個訶子四個去核百藥煎三錢白芨一錢上用針砂一匙白芨二匙八件末半匙余者皆少許一處合和好米醋調成膏子塗於髭鬚之上以荷葉緊包定勿寬慢次日早洗去即黑卻用些核桃淨肉研爛成油捻放上則光軟五方中此方最勝又方漢防己緑礬各一兩桑椹子一百個須大紫黑者當歸去蘆尾二兩上以瓷罐盛用香油十二兩浸以紙數重緊扎定罐口於飯甑上蒸飯熟為度取出埋地下窨一百日用大妙又方酸石榴一個水銀半兩上先將石榴去頂作一竅入水銀在內仍用頂子蓋定再用黃蠟封固放留一月石榴內化作水為度然後以雞內金蘸藥染於須上隨手黑又方用黑桑椹一升蝌蚪子一升即蛤蟆子以瓶盛密封於東屋角百日盡化為黑泥染鬚髮如漆又用桑椹二七枚和胡桃研如泥拔去白者點孔中則生黑者洗面藥治面上黑皯風瘡黑牽牛半斤甘松香附炒去毛各四兩上為末作面藥逐日洗之耳病祕傳降氣湯加石菖蒲治氣壅耳聾大有神效方見諸氣類小清肺飲治上膈有熱耳聾方見咳嗽類排風湯治風虛耳聾方見風科通治類塞耳丹治氣道壅塞兩耳大聾聵石菖蒲一寸巴豆一粒全蠍一個去毒上為末蔥涎丸如棗核大每用一丸綿裹塞耳內治耳卒風腫毒起上用柳木蛀蟲糞水化取清汁調白礬末少許點入耳內效蠟彈丸治耳虛聾白茯苓二兩山藥炒三兩杏仁去皮尖炒半兩黃蠟二兩上為末熔蠟丸如彈子大鹽湯嚼下亦有以黃蠟細切嚼點好茶送下亦效乾蠍散治耳聾因腎虛所致十年內一服效乾蠍黃色小者並頭尾用四十九個生薑切如蠍大四十九片二味於銀石器內炒令至干為末上向晚勿食初夜以酒調作一服至二更以來徐徐儘量飲五更耳中聞百十攢笙響便自此聞聲解倉飲子治氣虛熱壅或失飢冒暑風熱上壅耳內聾閉徹痛膿血流出赤芍藥白芍藥各半兩當歸甘草炙大黃蒸木鱉子去殼各一兩上銼散每服四錢水煎食後臨臥服羊腎丸治腎虛耳聾或勞頓傷氣中風虛損腎氣升而不降或耳虛鳴山茱萸乾薑川巴戟芍藥澤瀉北細辛菟絲子酒浸遠志去心桂心黃耆石斛乾地黃附子當歸牡丹皮蛇床子甘草蓯蓉酒浸人參各二兩菖蒲一兩防風一兩半茯苓半兩上為末以羊腎一雙研細以酒煮麵糊丸梧桐子大食前鹽酒下三十丸至五十丸立效安腎丸治虛弱耳聾大安腎丸四兩磁石半兩醋煅石菖蒲羌活各半兩上三件為末混合為丸梧桐子大每服四五十丸鹽湯溫酒任下方見虛損類黃耆丸治腎虛耳鳴夜間睡著如打戰鼓耳內風吹更四肢抽制痛黃耆一兩白蒺藜炒羌活各半兩附子一枚羯羊腎一對焙乾上為末酒糊丸如梧子大每服四十丸日午空心煨蔥鹽湯下清神散治氣壅於上頭目不清耳常重聽干菊花白殭蠶炒去絲角各半兩荊芥穗羌活木通川芎防風各四兩木香一錢甘草石菖蒲各錢半上為末每服三錢食後臨臥茶清調下蓯蓉丸治腎虛耳聾或風邪入於經絡耳內虛鳴蓯蓉切片酒浸焙山茱萸去核石龍芮石菖蒲菟絲子淘淨酒浸蒸焙川羌活去蘆石斛去根鹿茸燎去毛切片酒浸蒸磁石火煅醋淬七次水飛澄附子炮去皮臍各半兩全蠍去毒七個麝香半字旋入上為末煉蜜為丸梧桐子大每服七十丸加至百丸空心鹽酒湯任下犀角飲子治風熱上壅耳內聾閉臖腫掣痛膿血流出犀角鎊菖蒲木通玄參赤芍藥赤小豆炒甘菊花去枝梗各半兩甘草炙二錢半上銼散每服四錢生薑五片不拘時溫服八味丸治耳聵及虛鳴上用好全蠍四十九枚炒微黃為末每服三錢以溫酒調仍下八味丸百粒空心只三兩服見效方見腳氣類小柴胡湯治發熱耳暴聾頰腫脅痛肚不可以運由少陽之氣厥而熱留其經也方見傷寒陽證類雄黃丸壯實人積熱上攻耳出膿水不瘥服雄黃丸瀉三五行即效方見積熱類地黃丸治勞損耳聾大熟地黃洗焙當歸川芎辣桂菟絲子酒浸三日炒乾搗末大川椒出汗故紙炒白蒺藜炒去刺葫蘆巴炒杜仲薑汁製炒去絲白芷石菖蒲各一分磁石火燒醋淬七次研細水飛一分半上為末煉蜜丸如梧子大每服五十丸蔥白溫酒空心吞下晚食前又服芷芎散治風入耳虛鳴白芷石菖蒲炒蒼朮陳皮細辛厚朴制半夏制辣桂木通紫蘇莖葉甘草炙各一分川芎二分上銼散每服三錢薑五片蔥白二根煎食後臨臥服芍藥散治熱壅生風耳內痛與頭相連膿血流出赤芍藥白芍藥川芎當歸甘草大黃木鱉子各半兩上銼散每服四錢煎食後臨臥服治耳久聵以九節菖蒲末萆麻子為膏綿包塞之耳鳴方草烏頭燒帶生生菖蒲上等分為末綿裹塞耳一日三度耳熱出汁方硝石爛石膏天花粉防風各半錢腦子少許上為末摻耳立止久聾方萆麻子二十一個去油用遠志去心乳香磁石煅如前各一錢皂角煨取肉半錠生地龍中者兩條全蠍一個焙上為末入蠟搗丸柱入耳又方甘遂半寸綿裹插放兩耳中卻將甘草口中嚼自然通聽極效耳痛方上用白鹽炒熱重帛包尉又方上以杏仁炒焦研細用帛裹塞耳驢膏治積年耳聾以驢生脂和生薑搗帛裹塞耳妙不可言有人耳癢一日一作可畏直挑剔出血稍愈此乃腎臟虛致浮毒上枚未易以常法治也宜服透冰丹勿飲酒啖濕面蔬菜雞豬之屬能盡一月為佳不戒無效方見風科熱證類立效散治聤耳底耳有膿不止真陳皮燈上燒黑一錢為末麝香少許別研上和勻每用少許以綿蘸耳內濃淨即上藥麝香散治聤耳底耳耳內膿出桑螵蛸一個慢火炙八分熟存性麝香一字別研上為末研令勻每用半字摻耳內如有膿先用綿捻紙以藥摻之一法用染坯枯礬等分為末以葦管吹入耳中即愈或入麝尤佳治耳內痛方以鱔魚血滴數點入耳內便愈百蟲入耳用麻油灌之即出耳中出血以龍骨末吹入即止蒼蠅入耳最害人速皂角子蟲研爛用生鱔魚血調灌入耳中通耳法治耳聾無所聞緊磁石一塊如豆大研細穿山甲一大片燒存性為末上用新綿裹了塞所患耳內口中銜一片生鐵以線繫住覺耳內如風雨聲即愈透耳筒治耳聾及由腎氣虛耳中如風水聲或如鐘鼓聲椒目巴豆菖蒲松脂上各半錢為末更以蠟攤令薄候冷卷作筒子塞耳內一日一易神效惡蟲入耳桃葉挼細塞耳自出或以藍青研汁滴入耳又蔥涕灌耳中蟲即出亦治耳聾又香油稻杆灰汁又以川椒為末法醋浸一宿滴耳桃葉為枕蟲自鼻出蟻入耳豬精肉一指許炙令香置耳孔邊即出蜈蚣入耳生薑取汁灌耳中自出或以韭汁灌耳中即自出治耳中有物不可出上以麻繩剪令頭散付好膠著耳內使其物黏之徐徐引出效用弓弦尤妙水入耳薄荷汁點經驗鼻病茶調散治傷風鼻塞聲重兼治肺熱涕濁方見頭痛類辛夷散治肺虛風寒濕熱之氣加之鼻內壅塞涕出不已或氣息不通或不聞香臭辛夷仁細辛洗去土葉蒿本去蘆升麻川芎木通去節防風去蘆羌活甘草炙白芷各等分蒼耳子一半上為末每服二錢食後茶清調服熱者茶調散合和服川椒散治流涕大紅開口椒微炒出汗訶子煨取肉川白薑生者辣桂川芎細辛淨白朮等分上為末每服二錢溫酒調下南星飲治風邪入腦宿冷不消鼻內結硬物窒塞腦氣不宣遂流髓涕上等大白南星切成片用沸湯蕩兩次焙乾每服二錢用棗七枚甘草少許煎食後服三四服後其硬物自出腦氣流轉髓涕自收仍以大蒜蓽茇末杵作餅用紗襯炙熱囟前尉斗火尉透或香附末蓽茇末入鼻中細辛膏治鼻塞腦冷清涕出不已細辛川椒乾薑川芎吳茱萸附子去皮臍各三分皂角屑半兩桂心一兩豬脂六兩上煎豬脂成油先一宿苦酒浸煎八味取入油煎附子黃色止以綿惹塞鼻孔治久患鼻膿極臭者上以百草霜末冷水調服芎藭散治鼻中涕清出腦冷所致通草辛夷仁各半兩北細辛去苗甘遂桂心芎藭附子各半兩上為末蜜丸綿裹納鼻中密封塞勿令氣泄丸如大麻子漸稍大微覺小痛搗薑為丸即愈此方治腦冷所致然此疾亦有腦熱者亦有肺寒者素問云膽熱移熱於腦則辛頞鼻淵又曰腦滲為涕肺之液為涕當審詳之人參順氣散治鼻痛方見風科虛證類又用通氣祛風湯白芷散治同上杏仁水浸去皮焙細辛白芷各一錢全蠍兩個焙上為末麻油調敷白龍丸治酒渣鼻面上肺風瘡每用白龍丸洗面如用澡豆法更須略罨少時方以湯洗去食後用龍虛丹一貼只作一服不半月盡退大風油治肺風面赤鼻赤草烏尖七個大風油五十文真麝香五十文上以草烏尖為末入麝研勻次用大風子油瓷合子盛於火上調勻先以生薑擦患處次用藥擦之日三二次效又方兼服之即除根本何首烏一兩半防風黑豆去皮荊芥穗地骨皮淨洗各一兩桑白皮天仙藤苦參赤土各半兩上為末煉蜜丸如梧子大每服三四十丸食後茶清下凌霄花散治酒渣鼻不三次可去根但藥差寒量虛實用凌霄花山梔子上等分為末每服二錢食後茶調下日進二服又方南番沒石子有竅者水研成膏手指蘸塗甚妙硫黃散治酒渣鼻及婦人鼻上生黑粉刺生硫黃一錢輕粉一錢匕杏仁二七個去皮上為末生餅藥調臨臥時塗早則洗去白丸散治肺風酒渣等疾生硫黃乳香生白礬上同研如粉每用手微爪動患處以藥擦之日月必愈梔子仁丸治肺熱病發赤齄即酒渣上以老山梔子仁為末熔黃蠟等分丸如彈子大空心茶清嚼下忌酒炙爆半月立效治酒渣白鹽常擦為妙齆鼻細辛散治鼻齆不聞香臭瓜蒂北細辛等分為末綿裹如豆大塞鼻中通草膏治鼻塞清涕腦冷所致通草辛夷細辛甘遂桂心川芎附子上等分為末煉蜜丸綿裹納鼻中密封閉勿令氣泄丸如麻子大稍加微覺搗薑汁為丸即愈雄黃散治鼻齆雄黃半錢瓜蒂二個緑礬一錢麝少許上為末搐些子入鼻亦治息肉鼻瘡甘露飲黃連阿膠丸方見積熱類及傷寒通治類又方敷藥上用杏仁研乳汁敷之或以烏牛耳垢敷或黃柏苦參檳榔為末以豬脂研敷或青黛槐花杏仁研敷瓜丁散治鼻齆有息肉不聞香臭此藥敷之即化黃水點滴至盡不三四日遂愈不復作瓜丁即瓜蒂也細辛上等分為末以綿裹如豆許塞鼻中須臾即通鼻中息肉俗謂之鼻痔無不效消鼻痔方瓜蒂甘遂各二錢白礬枯螺青草烏尖各二分半上為末麻油搜令硬不可爛旋丸如鼻孔大用藥入鼻內令達痔肉上其痔化為水肉皆爛下每日一次甚妙灸法囟會在鼻心直上入髮際二寸再容豆是穴灸七壯又灸通天在囟會上一寸兩傍各一寸灸七壯左臭灸左右鼻灸右俱臭俱灸曾用此法灸數人皆於鼻中去臭積一塊如朽骨臭不可言去此全愈凡鼻頭微白者亡血也赤者血熱也酒客多有之若時行衄血不宜斷之或出至一二升不已即以龍骨為末吹入凡九竅出血皆用此法甚良腋氣蜘蛛散治狐臭燻人不可響邇者大蜘蛛一個以黃泥入少赤石脂搗細入鹽少許杵煉為一窠蜘蛛在內以火近燒通紅冷剖開上一味為末臨臥入輕粉一字用釅醋調成膏敷腋下明早登廁必瀉下黑汁臭穢不可聞於遠僻處棄埋之免染人神良六物散治漏腋腋下手掌足心陰下股里常如汗濕汙衣干枸杞根干薔薇根甘草各二兩胡粉商陸根滑石各一兩上為末以苦酒少許和塗當微汗出易衣更塗之不過三著便愈或一歲復發又塗之中毒石刻方治蟲毒無論年代近遠但煮一鴨卵插銀叉於內並噙之約一食頃取視叉卵俱黑即中毒也五倍子二兩硫黃末一錢甘草三寸半生半炙丁香木香麝香輕粉各少許糯米二十粒上用水十分於瓶內煎取七分候藥面生皺皮為熟絹濾去滓通口服病人平正仰臥令頭高覺腹中有物衝心者三即不得動若出以盆桶盛之如鰇魚之類乃是惡物吐罷飲茶一盞瀉亦無妨旋煮白粥補忌生冷油膩鮓醬十日後服解毒丸三五丸經旬復解毒丸治誤食毒草並百物毒救人於必死板藍根四兩乾者淨洗日乾貫衆一兩銼去土青黛研甘草生各一兩上為末煉蜜丸如梧子大以青黛別為衣如稍覺精神恍惚噁心即是誤中諸毒急取藥十五丸爛嚼用新水送下即解或用水浸炊餅為丸尤妙如常服可三五丸大能解暑泉僧方治金蠶蟲毒才覺中毒先吮白礬味甘而不澀次嚼黑豆不腥者是也上以石榴根皮煎汁飲之即吐出活蟲無不愈者礬灰散治中諸物毒晉礬建茶各等分上為末每服三錢汲新水調下得吐即效未吐再服保靈丹治蟲毒諸毒一切藥毒神效硃砂淨細研一兩大山豆根半兩雄黃黃丹麝香黃藥子續隨子生杵末各二錢半川巴豆肥者取肉不去油二錢半斑蝥二錢半去頭翅足糯米半炒半生赤蜈蚣二條一生一炙上各修治入乳鉢研和於端午重陽臘日修合不令雞犬婦人見用糯米稀糊丸如龍眼核大陰乾瓷合收每一丸好茶清吞下不得嚼破須臾病人自覺心頭如拽斷皮條聲將次毒物下或自口出或大便出嫩則是血老者成鱉或蜣螂諸雜帶命之物藥丸凝血並下以水洗淨收可救三人如中毒口噤即挑開下藥或蛇蠍馬汗諸毒以好醋磨敷患處立解服藥已效如知毒害之家不必研究若訴之其毒再發不救瘥後更忌酒肉毒食一月惟軟飯可也或急用但擇吉日清潔修合萬病解毒丸治蟲毒挑生毒藥毒草毒畜獸毒文蛤即五倍子兩半山慈菰即金燈花根一兩洗焙全蠍五枚大山豆根續隨子取仁去油留性各半兩麝香一錢硃砂雄黃各二錢紅牙大戟洗焙七錢半上先以五味藥入木臼搗羅為末次研麝續隨子硃砂雄黃夾和糯米糊丸分作三十五丸端午七夕重陽臘日淨室修合每服一丸生薑蜜水磨下井水浸研敷所患處解毒收瘡救病神妙硃砂雄黃乃攻五毒第一用也青黛雄黃散凡始覺中毒及蛇蟲咬癰疽才作服此即令毒氣不聚上好青黛雄黃等分上為末新汲水調下二錢丹砂丸治蠱毒從酒食中著者端午日合辰砂另研雄黃別研水飛赤腳蜈蚣續隨子各一兩麝香一分上為末糯米飲丸如雞頭大若覺中毒即以酒下一丸蛇蠍所螫醋磨塗之單方蠶蛻紙不拘多少以麻油紙燃炒存性上為末新水調一錢頻服諸中毒面青脈絶昏迷如醉口噤吐血服之即蘇薺苨湯治蠱毒多因假毒藥以投之知時宜煮大豆甘草薺苨汁飲之通治諸藥毒國老飲治蠱毒白礬末甘草末上等分清水調下或吐黑涎一兩碗或瀉亦驗解諸毒殺腹內毒蟲上用藍青葉多研水調服又方解諸毒上以黃連甘草節濃煎服效獨勝散解藥毒蠱毒蟲蛇諸毒大甘草節以真麻油浸年歲愈多愈妙上取甘草嚼或以水煎服神效挑生毒升麻湯治肋下忽腫起如生癰癤狀頃刻間大如碗此即中挑生毒也俟五更以緑豆細嚼試若香甜則是川升麻為細末上取冷熟水調二大錢連服之若洞泄出如蔥數莖根鬚皆具腫即消縮宜煎平胃散調補兼進白粥又方治魚肉瓜果湯茶皆可挑生初中毒覺胸腹稍痛明日漸加攪刺滿十日則物生能動騰上胸痛沉下則腹痛積以瘦悴此候也其法在上膈則取之用熱茶一甌投膽礬半錢於中候礬化盡通口呷服良久以雞翎探喉即吐出毒物在下膈即瀉之以米飲下鬱金末二錢毒即瀉下乃擇人參白朮各半兩碾末同無灰酒半升納瓶內慢火熬半日許度酒熟取溫溫服之日一盞五日乃止任便飲食奇方治一切毒白扁豆曬為末新汲水下二三錢頓服得利則安解砒毒上用緑豆半升細擂去滓以新汲水調通口服或用真靛花二錢分作二服以井花水濃調服紫河車研水調服黑鉛井水磨下濃研青藍汁磨甘草節同服生麻油一盞飲之不能飲灌之立見起死此毒於肉飯中得之則易治飲酒中得之則酒氣散歸百脈難治若在胸膈作楚則用稀涎散吐之若在腹中作楚急服雄黃丸瀉之徐服參苓白朮散無恙矣仍忌雞肉數日又方用旱禾稈燒灰新汲水淋汁絹巾濾過冷服一碗毒從下利即安又方用旋刺下羊血雞鴨血熱報兼解鼠莽毒及丹藥毒又方藍飲子解砒毒及巴豆毒用藍根沙糖二味相和擂水服之或更入薄荷汁尤妙又方白扁豆青黛甘草各等分巴豆一邊去殼上為末以沙糖一大塊水化開調一盞飲之毒隨利去卻服五苓散之類解射罔毒以生藍汁大小豆汁服效解巴豆毒寒水石磨水服效黃連汁菖蒲屑汁亦效解天雄附子烏頭毒防風棗肉濃煎湯服解丹毒地漿服最妙解一切菌毒掘新地窟取真黃土以冷水於內攪之令濁澄少頃取飲之可解亦治楓木菌食之令人笑不止又方用芫花生為末每服一錢汲新水下以利為準菌之毒者蓋因蛇蟲毒氣熏蒸所致又解諸毒用玉簪花根擂水服中諸藥毒用甘草黑豆淡竹葉等分銼散水一碗濃煎服解鼠莽毒用金線蟲草根磨水服之即愈或用烏桕根擂水亦好又方用枯過明礬同極等好茶末少許新汲冷水調服纍有效驗又方用大黑豆煮汁服之如欲試其驗先刈鼠莽苗葉以豆汁澆其根從此敗爛不復生矣治猘犬傷或經久復發無藥可療者用之極驗雄黃色黃而明者五錢麝香五分上各研和勻用酒調二錢服如不肯服者則捻其鼻而灌之服藥後必使得睡切勿驚起任其自醒候利下惡物再進前藥即見效矣終身禁食犬肉蠶蛹此毒再發則不可救又方用斑蝥大者二十一隻去頭足翅以糯米一勺先將班蝥七隻入米內於微火上炒不令米赤去此斑蝥別入七隻再於前米內炒令斑蝥色變復去之又別入七隻如前法炒米出青煙為度去斑蝥不用以米研為粉用冷水入清油少許空心調服頃又再進一服以小便利下惡毒為度如不利再進一服利後或腹肚疼痛急用冷水調青靛服之以解其毒否則有傷或煎黃連水亦可不宜便食熱物蜈蚣毒用清油澄心點燈以傷處於煙上熏之其痛即止或用雞糞塗之嚼吳茱萸擦之立效又方蜘蛛一枚安置於傷處飲出毒氣用冷水一碗在傍如蜘蛛死即投水中救活痛未止再換蜘蛛痛止為度蜂蠆毒用野芋葉擦之如不便急以手就頭爬垢膩敷之或用鹽擦斑蝥毒澤蘭葉挼汁飲之乾者為末白湯調下鱔鱉蛤蟆毒生豉一大合新汲水半碗浸令豉水濃頓服之即瘥此三物令人小便祕臍下蔽痛有至死者河豚魚毒一時困怠急以清油多灌之使毒物盡吐出為愈白礬為末湯調服河豚能殺人服此毒自消蛇傷毒貝母為末酒調令患者儘量飲之頃久酒自傷處為水流出候水盡卻以藥滓敷瘡上若所傷至垂死但有少氣服之即活又方惡蛇咬傷顛仆不可療者香白芷為末麥門冬去心濃煎湯調下傾刻咬處出黃水盡腫消皮合仍用此藥滓塗傷處又方治毒蛇所傷北細辛川白芷各五錢雄黃二錢為末另研麝香少許每服二錢溫酒調下又方五靈脂一兩雄黃半兩為末酒調二錢服仍塗傷處又方冷水洗後用茱萸二合水一碗研取汁服以滓敷虛傷生葛汁服兼洗傷處白礬為末納瘡口中痛止立效蜘蛛咬細嚼薤白敷雄黃亦可遍身腫服藍汁狗咬杏仁研細先以蔥湯洗然後以此塗傷處又方萆麻子五十粒去殼井水研成膏先以鹽水洗咬處次以此膏敷貼或用虎膏及虎骨末敷狗咬涎入瘡令人昏悶浸椒水調莽草末塗之又方白礬為末摻瘡內裹之亦效馬咬鞭梢燒灰塗之獨顆栗子燒灰貼亦妙蚯蚓咬或於地上坐臥不覺咬腎陰腫鹽湯溫洗數次效貓咬薄荷汁塗之蠶咬苧汁塗之壁蝨蜈蚣萍曮干燒煙薰之則去青鹽水遍灑床席上即絶鼠咬貓毛燒灰麝香少許津唾調敷壁鏡咬毒人必死燒桑柴灰用水煎三四沸濾汁調白礬塗瘡口兼治蛇毒醋磨雄黃塗之蠍螫痛不可忍白礬半夏等分末釅醋調貼痛止毒出八腳蟲傷方其蟲隱於壁間以尿射人遍體生瘡如湯火傷用烏雞翎燒灰雞子白調塗效灸法凡猘犬所齧未盡其惡血毒者灸上一百壯以後灸每日一壯若不血出刺出其血百日灸乃止禁飲酒及豬犬肉蛇傷亦灸傷處諸蟲烏梅丸治蛔厥令病者靜而復煩臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人自吐蛔烏梅三十個當歸川椒去目汗細辛附子炮去皮臍桂心人參黃柏各六錢乾薑炮一兩黃連一兩三錢上為末以苦酒漬烏梅一宿去核蒸之五斗米下熟搗成泥和藥相得納臼中與蜜杵一二百下丸如梧子大食前飲服十丸稍加至二十丸集效丸治因臟腑虛弱或多食甘肥致蛔蟲動作心腹絞痛發則腫聚往來上下痛有休止腹中煩熱口吐涎沫是蛔咬宜服此藥若積年不瘥服之亦愈又治下部有蟲生痔癢痛木香鶴蝨炮檳榔訶子煨去核蕪荑炒研附子炮去皮臍乾薑炒各七錢半大黃銼炒一兩半上為末蜜丸梧桐子大每服三十丸食前橘皮湯下婦人醋湯下化蟲散雷丸二個雞心檳榔二個鶴蝨一錢使君子七個去殼上為末入輕粉少許分作兩服當晚用豬精肉一兩切成片以皂角漿浸一宿至五更微火炙熟又用些清油拭肉候溫取一服藥末摻於肉上略烘過空腹食之至巳刻蟲自下乃飲食貫衆酒取寸白諸蟲五更嚼肉一片莫吞俟蟲尋肉其頭向上卻吐出肉嚼使君子三個並輕粉一字少頃以當晚所煎貫衆酒吞解毒雄黃丸七粒即瀉下皆蟲也下寸白蟲東邊石榴根煎湯調檳榔末服之即下先將豬肉一塊含在口中咽津下勿食之須臾去肉卻服救急救自縊法凡自縊高懸者徐徐抱住解繩不得截斷上下安被臥又以一人腳踏其兩肩手挽其發常令弦急勿使緩縱一人以手據按胸上數摩動之一人摩捋臂脛屈伸之若已強直但漸屈之並按其腹如此一時頃雖得氣從口出呼吸眼開仍引按不住須臾以少桂湯及粥清灌令喉潤漸漸能咽乃止更令兩人以管吹其兩耳此法最好無不活者自旦至暮雖冷亦可救暮至旦陰氣盛為難又法緊用兩手掩其口勿令透氣兩時氣急即活救溺水急解去死人衣帶灸臍中即活令兩人以筆管吹其耳中又法凡人溺水者救上岸即將牛一頭卻令溺水之人將肚橫覆在牛背上兩邊用人扶策徐徐牽牛而行以出腹內之水如醒即以蘇合香丸之類或老薑擦牙又方凡溺死一宿尚可救搗皂角以綿裹納下部須臾出水即活又將醋半盞灌鼻中又法以屈死人兩腳著生人肩上以死人背貼生人背擔走吐水即活又熬熱沙或炒熱灰將溺者埋於其中從頭至足水出七孔即活又以酒罈一個以紙錢一把燒放壇中急以壇口覆溺水人面上或臍上冷則再燒紙錢於壇內覆面上去水即活數方皆效奈人不諳曉多以為氣絶而不與救療可憐從其便而用之救凍死四肢強直口噤只有微氣者用大釜炒灰令暖以囊盛尉心上冷即換之候目開以溫酒及清粥稍與之若不先溫其心便將火炙冷氣與火爭必死又法用氈或藁薦裹之以索系定放平穩處令兩人對面輕輕滾轉往來如擀氈法四肢溫和即活救魘死不得燈火照亦不得近前急喚多殺人但痛咬其足跟大母指甲邊並多唾其面即活如不醒者移動處些子徐喚之若元有燈即存如無燈切不可用燈照又用筆管吹兩耳或以皂角末吹兩鼻內或以鹽湯灌之或搗韭汁半盞灌鼻中冬月掘根研汁用灸法救魘寐一切卒死及諸暴絶證用藥或不效急於人中穴及兩腳大母指內離甲一薤葉許各灸三五壯即活臍中灸百壯亦效破棺散治魘寐卒死及為牆壁竹木所壓水溺金瘡卒致悶絶産婦惡血衝心諸暴絶證半夏湯洗七次去滑不拘多少上為末每一大豆許吹入鼻中即活但心頭溫者一日可活皂角末亦效又方用蔥黃心或韭黃男左女右鼻中刺入深四五寸令目中出血即活又方視上唇里有如黍米粒以針挑破單方治胸脅腹內絞急切痛如鬼擊之狀不可按摩或吐血口中衄血用熟艾如拳頭大水五盞煮三盞頻服又用鹽水一盞水二盞和服以冷水噀之吐即瘥又用蓬莪朮酒研服一盞備急散治卒中惡風氣忤迷絶不知人用乾薑大黃各一兩巴豆仁十五粒各研細以水三合灌服雄朱散或到客舍官驛及久無人居冷房睡中為鬼物所魘但聞其人吃吃作聲便令人叫喚如不醒不急救則死牛黃雄黃各一錢大硃砂半錢上為末每挑一錢床下燒一錢用酒調灌之又方桃柳枝取東邊者各三七寸煎湯二盞候溫並灌服又方灶心土捶碎為末每服二錢新汲井花水調灌更挑半指甲許吹入鼻中牛犀散治中惡中忤鬼氣其證暮夜或登廁或出郊野或遊空冷屋室或人所不至之地忽然眼見鬼物鼻口吸著惡氣驀然倒地四肢厥冷兩手握拳鼻口出清血性命逡巡須臾不救此證與尸厥同但腹不鳴心脅俱暖凡此切勿移動即令親眷衆人圍繞打鼓燒火或燒麝香安息香蘇木樟木之類且候記醒方可移歸犀角半兩鎊屑研末生麝香大硃砂各一分上為末每服二錢新汲井水調灌之又方雄黃為末每服一錢桃枝葉煎湯調灌下又方故汗衣須用內衣久遭汗者佳男用女衣女用男衣燒灰為末每服二錢百沸湯調下又方治客忤中惡多於道路在外得之令人心腹絞痛脹滿氣衝心胸不急治即殺人好京黑為末調二錢服或瓦器盛湯用衣襯貼熱湯於肚上轉移溫湯冷別換骨鯁骨鯁入喉以縮砂甘草等分為末以綿裹少許噙之旋旋咽津久之隨痰出又方以野苧根淨洗搗爛如泥每用龍眼大如被雞骨所傷以雞羹化下魚骨則以魚汁化下又方用金鳳花子嚼爛噙下無子用根亦可口中骨自下便用溫水灌漱免損齒雞骨尤效玉屑無憂散治誤吞骨鯁哽塞不下玄參貫衆滑石縮砂仁黃連甘草茯苓山豆根荊芥穗各半兩寒水石煅硼砂各三錢上為末每一錢先抄入口以新水咽下蜜綿法通治諸哽用薤白煮令半熟以線系定手捉線少嚼薤白咽之度薤至哽處引哽即出矣一法綿一小塊以蜜煮用如前法又方以朴硝研細對入雞蘇丸別丸如彈子大仰臥含化不過三四丸自然化之又方以南硼砂新汲水滌洗噙化其骨脫然而失又方以貫衆濃煎一盞半分三服連進片時一咯而骨出神效解毒丸收藏年深愈見神效青靛花六兩大黃山豆根各四兩朴硝一錢黃藥子二兩半白藥二兩半自然銅四兩貫衆山梔子宣連楮實子山慈菰各二兩半白滑石一斤十二兩鉛光石芭蕉自然汁上為末糯米糊和藥一千杵陰乾不可見日不然析去一料可作一千丸卻用鉛光石打光諸般骨鯁井水磨下一丸作勢一吞即下頰腮焮腫咽喉飛瘍清油調水磨化酒毒腸風下血薄荷湯赤眼腫痛井水金蠶蠱毒黃連水蛇犬蜂螫蜈蚣毒用水磨塗傷處誤吞竹木棘刺井水諸般惡毒用新汲井水魚骨鯁以橄欖食即下無則核搗為末用流水調又方獺爪於咽喉下外爬自下獸骨鯁象牙梳或牙笏等磨水咽下桑木上蟲屑米醋煎灌漱自下備急丸療心腹諸卒暴百病中惡客忤心腹脹滿卒痛如刀所刺氣急口禁乾薑一兩炮巴豆去皮油二兩大黃二兩上為末煉蜜丸梧桐子大每服三十丸不拘時溫水下誤吞蜈蚣以生豬血令病人吃須臾生清油灌口中惡心其蜈蚣裹在血中吐出繼與雄黃細研水服愈誤吞銅物不能化者濃煎縮砂湯服其銅自下又用生荸薺研爛服其銅自化細研堅炭為末米飲下於大便內瀉下如烏梅狀怪疾得效四十六方項上生瘡如櫻桃大有五色瘡破則項皮斷但逐日飲牛乳自消寒熱不止經日後四肢堅如石以物擊之一似鐘磬聲日漸瘦惡用茱萸木香等分煎湯飲即愈大腸頭出寸余痛苦直候乾自退落又出名為截腸病若腸盡乃不治但初覺截余可治用芝麻油器盛之以臀坐之飲大麻子汁數升愈口鼻中腥臭水流以碗盛之有鐵色蝦魚如粳米大走躍不住以手捉之即化為水此肉壞矣任意饌食雞肉愈腹上麻痹不仁多煮蔥白吃之自愈婦人小便中出大糞名交腸服五苓散效如未盡愈可用舊袱頭燒灰酒服之兩足心凸如腫上面生黑色豆瘡硬如釘子釘了履地不得脛骨生碎眼髓流出身發寒顫唯思飲酒此是肝腎氣冷熱相吞用炮川烏頭末敷之煎韭子湯服效凡腹脹經久忽瀉數升晝夜不止服藥不驗乃為氣脫用益智子煎濃湯服立愈四肢節脫但有皮連不能舉動名曰筋解用酒浸黃蘆三兩經一宿取出焙乾為末每服二錢酒調下服盡安玉莖硬不萎精流無歇時時如針狀捏之則脆乃為腎滿漏疾韭子破故紙各一兩為末每服三錢水一盞煎至六分每日三次飲之愈則住服咽喉間生肉層層相疊漸漸腫起不痛多日乃有竅子臭氣自出遂退飲食用臭橘葉煎湯連服愈腹中如鐵石臍中水出旋變作蟲行之狀繞身匝啄癢痛難忍撥掃不盡用濃煎蒼朮湯浴之以蒼朮末入麝香少許水調服痊眼前常見諸般禽蟲飛走以手捉之則無乃肝膽經為疾用酸棗仁羌活玄明粉青葙子花各一兩為末每服二錢水一大盞煎至七分和滓飲一日三服大腸蟲出不斷斷之復生行坐不得用鶴蝨末水調五錢服之自愈眼睛垂出至鼻如黑角色痛不可忍或時時大便血出其名曰肝脹用羌活煎汁服數盞自愈腹中有物作聲隨人語言用板藍汁一盞分五服服之又名應聲蟲當服雷丸自愈有飲油五升以來方始快意長得吃則安不爾則病此是發入胃被氣血裹了化為蟲也用雄黃半兩為末水調服蟲自出如蟲活者置於油中逡巡間連油潑之長江治臥於床四肢不能動只進得食好大言説吃物謂之失説物望病治如説食豬肉時便云你吃豬肉一頓病者聞之即喜遂置肉令病人見臨要卻不與吃此乃失他物望也當自唾中涎出便愈手十節斷壞唯有筋連無節肉蟲出如燈心長數尺余遍身緑毛卷名曰血餘以茯苓胡黃連煎湯飲之愈遍身忽皮底混混如波浪聲癢不可忍抓之血出不能解謂之氣奔以人參苦杖青鹽細辛各一兩作一服水二碗煎十數沸去滓飲盡便愈眼白人渾黑見物依舊毛髮直如鐵條雖能飲食不語如醉名曰血潰用五靈脂為末二錢酒調下因著艾灸訖火痂便退落瘡內鮮肉片子飛如蝶形狀騰空去了痛不可忍是血肉俱熱用大黃朴硝各半兩為末水調下微利即愈臨臥渾身蝨出約至五升隨至血肉俱壞每宿漸多癢痛不可言狀維吃水臥床晝夜號哭舌尖出血不止身齒俱黑唇動鼻開但飲鹽醋湯十數即安眼赤鼻張大喘渾身出斑毛髮如銅鐵乃目中熱毒氣結於下焦用白礬滑石各一兩為末作一服水三碗煎至半令不住飲候盡乃安有蟲如蟹走於皮下作聲如小兒啼為筋肉之化雷丸雄黃各一兩為末摻在豬肉片上炙熟吃盡自安手足甲忽然長倒生肉刺如錐痛不可忍吃葵菜自愈鼻中毛出晝夜可長一二尺漸漸粗圓如繩痛不可忍雖痛摘一莖即復更生此因豬羊血過多遂生用乳香硃砂各一兩為末以飯丸梧桐子大空心臨臥各一服水下十粒自然退落面上及遍身生瘡似貓兒眼有光彩無膿血但痛癢不常飲食減少冬則遍脛名曰寒瘡多吃魚雞韭蔥自愈脅破腸出臭穢急以香油摸腸用手送入煎人參枸杞淋之皮自合矣吃羊腎粥十日即愈口鼻中氣出盤旋不散凝如黑蓋色過十日漸漸至肩胸與肉相連堅勝金石鐵無由飲食此多因瘧後得之煎澤瀉湯日飲三盞連服五日愈遍身忽然肉出如錐既癢且痛不能飲食此名血臃若不速治潰而膿出以赤皮蔥燒灰淋洗吃豉湯數盞自安眉毛搖動目不能視交睫喚之不應但能飲食有經日不效者用蒜三兩取汁酒調下即愈毛竅節次血出若血不出皮脹膨如鼓須臾眼鼻口被氣脹合此名脈溢飲生薑水汁各一二盞即安忽然氣上喘不能語言口中汁流吐逆齒皆搖動氣出轉大則悶絶蘇復如是名曰傷寒並熱霍亂用大黃人參末各半兩水三盞煎至一盞去滓熱服可安口內生肉球臭惡自己惡見有根線長五寸余如叉股吐球出以飲食了卻吞其線以手輕捏痛徹於心困不可言用水調生麝香一錢服三日驗渾身生燎泡如甘棠梨每個破出水內有石一片如指甲大泡復生抽盡肌膚肉不可治急用京三稜蓬莪朮各五兩為末分三服酒調連進愈頭面發熱有光色他人手近之如火燒人用蒜汁半兩酒調下吐如蛇狀遂安人自覺自形作兩人並臥不別真假不語問亦無對乃是離魂用辰砂人參茯苓濃煎湯服之真者氣爽假者化也男子自幼喜飲酒至成丁後日飲一二斗不醉片時無酒叫呼不絶全不進食日就羸弱令其父用手巾縛住其手足不令動搖但扶少立卻取生辣酒一罈就於其子口邊打開其酒氣衝入口中病者必欲取飲堅不可與之須臾口中忽吐物一塊直下壇中即用紙封裹壇口用猛火燒滾約酒幹一半卻開視之其一塊如豬肝樣約三兩重周回有小孔如針眼不可數計棄之於江飲食復舊雖滴酒不能飲矣夜間飲水誤吞水蛭入腹經停月餘日必生下小蛭能食人肝血腹痛不可忍面目黃瘦全不進食若不早治能令人死用田中干泥一小塊小死魚三四個將豬脂溶攪勻用巴豆十粒去殼膜研爛入泥內為丸緑豆大用田中冷水吞下十丸小兒只用三丸至五丸須臾大小水蛭一時皆瀉出卻以正方四物湯加黃耆煎服生血補理方見婦人科通治類婦人産後忽兩乳伸長細小如腸垂下直過小肚痛不可忍危亡須臾名曰乳懸將川芎當歸各二斤半斤銼散於瓦石器內用水濃煎不拘時候多少溫服餘一斤半銼作大塊用香爐慢火逐旋燒煙安在病人面前桌子下要煙氣直上不絶令病人低頭伏桌子上將口鼻及病乳常吸煙氣直候用此一料藥盡看病證如何或未全安略縮減再用一料如前法煎服及燒煙燻吸必安如用此二料已盡雖兩乳略縮上而不復舊用冷水磨萆麻子一粒於頭頂心上塗片時即洗去則安全矣婦人臨産服催生藥驚動太早未嘗離經而用力太過以致肓膜有傷産後水道中垂出肉線一條約三四尺長牽引心腹痛不可忍以手微動之則痛苦欲絶先服失笑散數服仍用老薑三斤淨洗不去皮於石鉢臼內研爛用清油二斤拌勻入鍋內炒熟以油乾焦為度先用熟絹一段約五尺長摺作結方令穩重婦人輕輕盛起肉線使之屈曲作一團納在水道口卻用絹袋兜裹油薑稍溫敷在肉線上熏覺薑漸冷又用尉斗火尉熱使之常有薑氣如薑氣已過除去又用新者如此熏尉一日一夜其肉線已縮入半再用前法越兩日其肉線盡入腹中其病安全卻再服失笑散芎歸湯補理切不可使肉線斷作兩截則不可醫有人患勞瘵兩年諸藥不效一日無肉味其腹痛不可忍又恐傳染移在空房候其自終經停三日病者腹痛氣息將絶思憶肉味之急忽有人惠雞子三枚其病人俯仰取火低頭取瓦銚煎熟吹火屢燃屢滅鼻中如有所礙將熟間忽嚏噴一聲有紅線一條自鼻中出牽抽約二尺長趨下瓦銚中病人知是怪物急用碗覆前銚中盡力燒火不住其銚欲裂方住火開銚視之乃是小蟲一條頭目皆具已煅死如鐵線樣即以示其家人後棄之於江其病即安居民逃避石室中賊以煙火熏之欲死迷悶中摸索得一束蘿蔔嚼汁下咽而蘇又炭煙燻人往往致死含蘿蔔一片著口中煙氣不能毒人或預曝乾為末備用亦可或新水擂爛干蘿蔔飲之亦可自行被攧穿斷舌心血出不止以米醋用雞翎刷所斷處其血即止仍用真蒲黃杏仁去皮尖硼砂少許研為細末煉蜜調藥稀稠得所噙化而安身上及頭面肉上浮腫如蛇狀者用雨滴階磚上苔痕一錢水化開塗蛇頭立消
