錢白龍骨訶子肉各半兩赤石脂枯白礬各七錢半肉豆蔻半兩上為末麵糊丸如黍米大每服三十丸至五十丸煎異功散下或瀉水穀白色淡黃色木香散下方見前蘇合香丸治疹瘡為陰邪穢氣所傷亦令變壞可用醋炭熏後以蘇湯化服解之方見大方科中氣類捷效化毒散治豆瘡欲發未發便服之此藥以毒攻毒縱然瘡出亦少快無惡證上於冬月先取人貓豬犬糞各等分於高處黃土窖五日取出卻用沙鍋盛蓋鹽泥固濟日乾於臘月八日煅令通紅取出去火毒為末入麝香少許每用一字蜜調勻溫湯化下或挑少許於舌上用乳汁咽之此方多祕不須令病家知之二參飲治豆瘡後餘熱不退柴胡甘草炙黑參人參龍膽草各二錢半麥門冬去心三錢半上銼散每服三錢水一盞煎稍熱服不拘時量大小加減木筆花散治豆瘡出後有餘瘡生塞鼻中不能睡臥上用木筆研為細末加生麝香少許蔥白蘸藥入鼻中數次即通減瘢散治豆瘡愈後瘡痂雖落其瘢尤黯或凹或凸用此紹粉即水粉一兩輕粉一兩上同研勻豬脂油調塗又方白蜜不以多少塗於瘡上其痂易落且無疤痕亦不臭穢或用升麻同蜜煎摩痕上並數食之綿繭散治豆瘡後身體及肢節上生疳蝕瘡膿水不絶上以出蛾綿繭不拘多少用白礬捶碎塞入繭內令滿以炭火燒候白礬汁盡取出研細每用干貼豆瘡內若不早治則潰筋骨以致難治瘧疾解表香蘇香薷散治春傷風夏伏暑作瘧其證自汗惡風先熱後寒或但熱不寒每服三錢生薑三片蔥白二根水一大盞煎服方並見大方科傷寒傷暑類十神湯治夏傷濕秋傷風作瘧其證寒熱自汗嘔吐身疼每服三錢水一大盞生薑三片木瓜二片煎秋末感風冷冬又傷寒或感溫暖之氣先寒後熱亦服方見大方科時疫類五苓散分陰陽和榮衛用人參少許茵陳車前草各一根煎湯服弱者木瓜紫蘇湯或服通苓散亦可方並見大方科傷暑泄瀉類人參湯治熱多寒少每服二錢生薑二片麥門冬十粒去心正地骨皮少許煎多服取效即小柴胡湯方見大方科傷寒陽證類草果平胃散治寒多熱少方見大方科痎瘧類爭功散治熱瘧多效知母貝母柴胡去蘆常山甘草山梔子檳榔各五錢蟬蛻十個地骨皮去骨五錢上銼散每服三錢用桃柳枝各五寸煎未效用過路葛藤五寸煎服截瘧勝金丸方見大方科痎瘧類蕩脾丸化痰消積進食駐顏及治氣喘疳積杏仁一兩去皮尖用蚌粉炒令黃色半夏一兩生薑自然汁浸一宿次日焙巴豆五粒去殼並心膜以皮紙出油上為末用大好北棗七枚入燈心水蒸去皮核取肉為丸每服五丸常服燈心棗子煎湯下駐顏檳榔煎湯消宿食陳米湯空心臨睡服化痰烏梅湯治瘧蒜湯或薤白水下消痞癖此方大效通神餅截瘧有功甘草末三錢緑豆末敗荷葉各三錢砒霜半錢生硃砂一錢半定粉半錢腦子麝香各少許金銀箔十片上煉蜜丸梧桐子大作餅子周歲半丸或一丸大者二丸而止一日只一服不可過多服時用井花水或桃柳枝煎水磨化向北服了忌燒熱飲食亦可繫於候脈處參苓白朮散愈後調理脾胃方見大方科脾胃類癖氣紅丸子治血膜包水僻側於脅旁時時作痛發寒熱瘧家中脘多蓄黃水日久結癖亦效三稜煨莪朮煨芫花桃仁去皮別研杏仁去皮別研硃砂烏梅炒巴豆上為末醋糊丸小緑豆大硃砂為衣米湯空腹下又方三稜莪朮川楝去核陳皮去白青皮去白芫花上用芫花醋浸一夕炒漸干入三稜莪朮同炒又入川楝陳皮青皮同炒焦取為末等分如各半兩杏仁亦用半兩去皮尖別研巴豆二十粒去油膜和勻醋糊丸黍米大一歲二丸臨睡米飲下此二方稍相似不若於方中和桃仁與烏梅則尤妙又用蒜湯下蕩脾丸化痰涎一日一服或兩服日用如此服蟹水亦可木鱉膏貼痞癖木鱉多用去殼獨蒜半錢雄黃半錢上杵為膏入醋少許蠟紙貼患處灸法兩乳下一寸各三壯痞結枳實理中丸治虛氣痞塞胸膈留飲聚水腹脅或加脹滿手不可近四君子湯加枳實去穰麩炒乾薑炮為末煉蜜丸緑豆大熱湯化下渴加栝蔞根下利加牡蠣粉各等分已用經驗桔梗枳殼湯治熱氣痞滿胸膈兩脅按之則痛枳殼去穰桔梗去蘆各五錢半夏湯洗黃芩栝蔞仁黃連去須各三錢上銼散生薑麥門冬去心煎服利黃涎沫即安客忤蘇合香丸治神氣嫩弱外邪客氣獸畜異物暴觸忤口吐青黃白沫水穀鮮雜面色變易喘息腹痛反側瘛瘲狀似驚癇但眼不上竄視其口中懸壅左右若有小小腫核即以竹針刺潰之或以指瓜摘破急作醋炭降真香皂角熏之卻服此方見大方科中氣類上每服一丸薑湯調開頻頻與服次用豉三合水濕捏為丸如雞子大摩兒囟上及足心各五六遍次摩兒心及臍上下良久掰開自有毛即擲之大法宜辟邪正氣散驚定心延久難為力也雄麝散治客忤腹痛危急雄黃一錢明乳香半錢生麝香一字上為末每一字刺雞冠血調灌之犀角散治客忤驚啼壯熱天麻犀角麥門冬去心鉤藤硃砂各一錢鐵粉雄黃半錢生麝少許上為末每服半錢金銀煎湯調但服安神丸亦可方見前黃土散治小兒卒客忤灶中黃土蚯蚓糞各等分上研細水調塗兒頭上及五心良
