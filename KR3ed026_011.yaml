body:
  text: 卷第十一小方科活幼論當謂木有根荄水則有源根荄盛則枝葉暢茂源深則其流必長小兒稟父母元氣而生成元氣盛則肌膚充實驚疳積熱無由而生風寒暑濕略病即愈元氣虛則體質怯弱諸證易生所患輕則藥能調治所患重則可治者鮮故試晬之後或不能言或不能行或手拳不展發不生斯猶可治甚則初生之時臍風撮口吊腸等證鎖肚重舌無聲舌焦遍體青黑如此症狀非急療則百無一活若其餘諸病不一治之之道當觀形察色聽聲切脈觀形則先觀其眼若兩眼無精光黑睛無運轉目睫無鋒芒如魚眼貓眼者不治或神藏於內而外若昏因神氣不脫則豈無再活之理察色者若面目俱青眼睛鼠視此為驚邪入肝面紅眼赤惕惕夜啼則驚邪入心面青惡叫齧奶咬牙乃驚邪入腎面色淡白喘息氣乏則驚邪入肺面黃嘔吐不食虛汗多睡乃驚邪入脾皆隨其狀而治之若夫聽聲則睡中驚啼聲浮者易治聲沉不響者難痊或聲如鴉中彈者不治至於切脈虛則細而遲實則洪而數次當看紋候男左女右手辨之從虎口內至第一節是風關第二節是氣關第三節是命關第一節風關赤紋乃飛禽內外人驚赤紋微乃火驚黑則水驚兼打撲驚青色乃天雷四足驚內隱青紋微屈則是急風候紋彎乃停食候第二節氣關紫色紋是驚疳青色紋乃疳傳肝經白則疳傳肺經若黃色乃傳脾經黑色難安第三節命關青黑紋現三關通度斜歸指甲則不治至於驚疳積熱四證驚者虛惕怔忪氣怯神散痰涎來去其瀉必青積漸生風其證有冷熱虛實冷則燥之虛則溫之實則利之熱則涼之是為活法急驚之候通關截風定搐去痰其熱尚作則當下之一泄已後又急須和胃鎮心不可過用寒涼等劑其或口中出血兩足擺跳腹肚搐動摸體尋衣神昏氣促噴藥不下通關不嚏心中痛絶忽大叫者難愈慢驚之候宜於生胃氣藥和以截風定搐不可太燥其或四肢厥冷吐瀉加嗽面黯唇慘胃痛鴉聲口生白瘡髮直搖頭喘急涎鳴口眼手足一邊牽引者難愈慢脾十救一二只當生胃回陽如太衝脈在則取百會穴多灸之若身冷黏汗直臥如尸喘嗽頭軟大小便不禁虛痰上攻呼吸氣粗脈來浮數是謂陰盛強陽錯認陽氣已復直與峻藥下痰痰隨氣下人以醫殺咎之此則覆燈將絶之證雖不藥亦無生意矣又有喉中痰涎聲如曳鋸一兩日間閉目不開此為虛痰保養其氣凌遽下痰亦未可保蘇合香白丸子輩姑與之男子婦人有此證亦當守此二藥以上驚風本證各見後痓病發癇天釣亦風之種類舉身僵仆有汗不惡寒手足冷口噤為柔痓無汗惡寒身反張咬齒為剛痓得之未易施治諸癇八證馬癇張口搖頭馬鳴反折羊癇喜揚吐舌犬癇手屈兩足拳攣雞癇搖頭反折並屬陽豬癇口吐涎沫振目視人牛癇目視腹脹烏癇唇口撮聚手足俱搖蛇癇身軟頭舉吐舌視人並屬陰治法須辨其冷熱順氣平血豁痰除風其或目睛不轉口噤無聲唇面青黑肚脹不乳身熱下血厥逆吐利汗出壯熱不止體軟不睡眼生白障不治之候天釣者壯熱翻眼手足搐掣如魚之上釣皆由乳母過餐熱毒遄復乳兒兼挾風邪所致但當解利風熱則應手而愈驚風諸證有不可治者總而論之項筋無力魚口氣粗齧齒咬人瀉下如瘀血手足搐搦不停目似開不開身軟口噤不食木舌乾澀反張脊強滷陷不動啼不作聲冷汗如雨慢脾灸不醒視物不轉睛眼上赤脈雖盧扁復生亦無如之何若疳候兒童二十歲以下為疳二十歲以上為癆癆與疳皆氣血虛憊臟腑受傷故有肝心脾肺腎五疳外有蛔疳脊疳腦疳乾疳疳渴疳瀉疳痢腫脹疳勞無辜疳丁奚哺露治之各有方其病多因乳哺失常腸胃停滯或妄服吐下藥津液內竭而得之故其為候頭皮光急毛髮焦稀腮縮鼻乾口淡唇白兩眼昏爛揉鼻撏眉脊聳體黃鬥甲咬牙焦竭自汗漩白瀉酸肚脹腸鳴癖結潮熱或身多瘡疥酷嗜瓜果鹹酸炭米泥土多飲水者皆其證也惟腎疳害人最速者蓋腎虛受邪熱疳氣奔上焦故以走馬為喻初作口氣次第齒黑盛則齦爛熱血迸出甚則齒脫宜急治之縱得全活齒不復生其餘諸疳如或飲水不已滑泄不休舌上黯黑目睛青筋眼角黑氣小便如乳牙黑骨枯脫肛咳逆氣促身上粟生斑黑唇白腹高人中平滿抱著手足垂嚲無力襯著腳心全不知疼身體變冷為五絶豈有瘳乎積者面目浮黃肚緊脹痛覆睡多困酷啼不食或大腸祕澀小便如油或便利無禁糞白酸穢此皆其證也其或面黑瀉黑肚脹泄下不止氣粗手心有瘡瘦弱柔軟亦莫能療熱之為病有實有虛實者兩臉深紅唇口紅紫燥渴焦煩大小便難啼叫無時時發極熱虛者面色青白恍惚微潮口中清冷泄瀉虛汗或乍冷乍溫上壅下利水穀不分乃冷熱不調外有十證熱者潮熱如瘧風熱不減乳食積熱多吐傷寒腳手冷耳鼻腳梢手指尖冷乃麻疹之證唇汗口珠乃變蒸候也多瀉多渴疳之為熱面青脈大驚熱的矣脾痛啼聲不息疸毒嘹然目閉面如丹胎中全不受熱諸吐乳食不化面色黑隨食隨吐通身冷則為不治諸瀉日久不宜緊澀之藥卒止先須調氣和中若洞瀉不止乳食不進無有愈期汗多舌出唇紅眼閉搖頭氣粗兩肋動口生血瘡吐瀉得之名曰胃爛夭亡轉盼至於八痢則有魚口噤口五色脫肛臟毒脾毒冷積疳痢無非便下膿血裡急外重臍腹急痛日夜無度治之當何如須究其因先以去積寬腸通氣之劑續為之斷下鮮有不愈其或所下如魚腸血水壯熱煩渴不食自汗小便不利未知有瘳瘡疹一證乃表虛里實其根於臟腑所患重麻疹表實裡虛其根於皮膚所患輕不治亦自愈至若痘疹多因時令不正氣候傳染加之外感風寒內積邪熱而得大抵與傷寒相類發熱煩躁臉赤唇紅身痛頭疼耳鼻腳梢手中指俱冷噴嚏呵缺喘漱痰涎或乍寒乍熱疑似之間當視其耳後有紅脈赤縷及見心胸間細點如粟起為真首尾不可汗下宜溫涼之劑解毒和中安表大要如疱人作灶炊樣務得松耳其或熱極生風或發驚搐但當清心散風切不可投冷驚之藥及灼艾蓋灸則火助熱熾投冷驚藥則毒氣內伏反為大害仍忌諸般臭穢煎炒油煙父母行房梳頭等觸犯未發而觸則毒氣入心悶亂而死已發而觸則瘡痛如割以致黑爛切宜禁戒仍燒帶諸香及打醋炭噴胡荽酒於遍房以闢穢濁之氣卻不可以田舍兒不忌無恙為常法病此者多不服藥豈知未發已發則合解散正發則合活氣血若依此非惟出疏亦易干斂仍免後憊若不依此則邪盛瘡密收亦費力餘毒為患致生癰疽疥癆赤眼咽喉口瘡之疾至於善惡之證猶當細認如善證則乳食如常大便或一日一次或兩日一次通者只須用和不冷不熱之藥自保十平全如惡證則春夏屬陽為順秋冬為逆冬月寒腎水得時多歸於腎或先如瘧後發渴其瘡色如黯血此腎證也不治春膿疱為金剋木夏黑陷為水剋火秋斑子為火剋金冬疹子為土剋水並逆鼻有黑氣或舌黑瘡已出而譫語燥渴小便澀泄瀉不入食瘡成餅搭黯慘不發其聲焦啞兩眼閉而黑睛矇眛面腫鼻陷目閉頻齧齒頭面腫大瘡盡抓破或臭不可近或腳冷至膝瘡小黑而焦風攻頤頷唇項腫硬胸高而突以上症狀均不可治外此至於風寒暑濕之感與大人無異治之法特劑量差少耳雜症則隨方備治籲為醫之道大方脈為難活幼尤難以其臟腑脆嫩皮骨軟弱血氣未盛經絡如絲脈息如毫易虛易實易冷易熱兼之口不能言手不能指疾痛之莫知非觀形察色聽聲切脈究其病源詳其陰陽表裡虛實而能療之者蓋亦寡矣若妄投藥餌即生他證可不戒之初生拭穢法嬰兒在胎口中有惡物才生不候聲出疾用軟帛或綿裡手指蘸黃連甘草汁拭口惡汁稍定更以蜜少許調硃砂末一字抹入口中鎮心安神解惡物之毒一生免瘡豆之患妊娠臨月預辨之刺泡法小兒才生下即死用此法可救活急看兒口中懸壅前齶上有泡以手指摘破用帛捏拭血令淨若血入喉即不可治回氣法初生氣欲絶不能啼者必是難産或冒寒所致急以綿絮包裹抱懷中未可斷臍帶且將胞衣置炭火爐中燒之仍作大紙捻蘸清油點著於臍帶上往來遍帶燎之蓋臍帶連兒臍得火氣由臍入腹更以熱醋湯蕩洗臍帶須臾氣回啼泣如常方可浴洗了卻斷臍帶通便法初生大小便不通腹脹欲絶者急令婦人以溫水漱口了吸咂兒前後心並臍下手足心共七處每一處凡三五次漱口吸咂取紅赤為度須臾自通不爾無生意有此證遇此法可謂再生貼滷藥治出胎時被風吹鼻塞服藥不退上用南天星為末生薑自然汁調或膏貼滷上病去除之奇方治初生下遍體無皮但是紅肉宜速以白早米粉干撲候生皮方止又治生下遍身如魚泡又如水晶碎則成水流滲上用密陀僧研絹羅內羅過乾摻仍服蘇合香丸見中氣類又治七日腎縮乃初生受寒所致上用硫黃茱萸各半兩為末研大蒜調塗其腹仍以蛇床子微火燒熏之噤風辰砂膏治眼閉口噤啼聲漸小舌上聚肉如粟米狀吮乳不得口吐白沫大小便皆不通蓋由胎中感受熱氣流毒於心脾故形見於喉舌或為風邪擊搏致之辰砂三錢硼砂馬牙硝各一錢半玄明粉二錢全蠍珍珠末各一錢生麝一字上為末好油紙封裹自然成膏每服一豆粒許用乳汁調敷乳頭上吮下金銀薄荷湯下亦可有潮甘草湯服益脾散和胃進乳消痰白茯苓人參草果仁蘇子微炒木香濕紙裹熱火內煨甘草陳皮厚朴去粗皮薑汁炒上銼散每服一錢生薑一片紅棗一枚未乳前服合滓乳母服單方治初生七日口噤上用牛黃一錢細研用竹瀝調一字灌之更以豬乳點於口中臍風天麻丸治因斷臍後為水濕風冷所乘入於臍流於心脾遂令肚脹臍腫身體重著四肢柔直日夜多啼不能吮乳甚者發為風搐此藥利驚下痰凡釣腸鎖肚撮口皆可用南星炮二錢白附子炮牙硝天麻五靈脂全蠍焙各一錢輕粉半錢巴霜一字右為末稀糊丸麻子大每服一丸薄荷姜錢泡湯送下若臍邊青黑及爪甲黑者不治立聖散治同上蜈蚣一條酒洗去糞炙瞿麥半錢蠍梢五個去毒直殭蠶七個去絲上為末每一字吹入鼻啼則可醫仍服薄荷調一字服麝香散赤腳蜈蚣半條酒炙麝香少許川烏尖三個生上為末每服半字金銀器湯調下治臍腫先用荊芥水洗了蔥葉一皮火上炙過地上出火毒以手指甲刮薄內搭放腫處次日便消用通心軟小驚丸大驚丸方見後安臍散治臍中汁出或赤腫臖痛或因水與乳入臍所致上當歸為末敷蛤蟆燒灰白石脂末油發灰敷皆可撮口殭蠶方治面目黃赤氣息喘急啼聲不出蓋由胎氣挾熱流毒心脾故令舌強唇青聚口撮面飲乳有妨上用直殭蠶二枚去嘴略炒為末蜜調敷唇中效天麻丸治釣腸鎖肚等撮口內氣引痛腸胃鬱結不通則亟宜疏利此藥特效方見前若口出白沫四肢冰冷最為惡候一臘見之尤急又法極驗其兒齒齦上有小泡子如粟米狀以溫湯蘸帛裹手指輕擦破即開口便安臍風同用蠍梢散治胎風及百日撮口臍風上用蠍梢四十九個生薑汁炒乾去絲嘴同為末更以腦子生麝香少許研勻紫雄雞肝二片煎湯調下不乳奇方治初生不飲乳及不小便上用蔥白一寸四破之以乳汁銀石器煎灌之立效又治初生口噤不開不收乳上用赤足蜈蚣一條去足炙令焦細研如粉每用半錢以豬乳汁二合和勻分三四次灌之茯苓丸初生兒拭口不全惡穢入腹腹滿短氣不能飲乳赤茯苓去皮川黃連去須枳殼炒各等分上為末煉蜜丸梧桐子大每一丸乳汁調灌下川白姜散治産婦取冷太過胎中受寒令兒腹痛不飲乳木香陳皮檳榔各一分官桂川白姜甘草炙各半分上銼每取一捻水一合煎以綿蘸與之嘔加木瓜丁香變蒸惺惺散治變蒸變者上氣蒸者體熱輕則發熱微汗其狀似驚重則壯熱脈亂而數或吐或汗或煩啼燥渴輕者五日解重者七八日解其候與傷寒相似亦有續感寒邪者但變蒸則耳冷骫冷上唇頭白泡如魚目珠若寒邪搏之則寒熱交爭腹痛啼叫不已每服一錢麥湯調下熱甚麥門冬薄荷葉湯下方見後外感類紫霜丸治變蒸發熱不解並挾傷寒溫壯汗後熱不歇及腹中有痰癖哺乳不進乳則吐哯先寒後熱者代赭石醋淬七遍赤石脂各一兩巴豆三十粒壓去油杏仁五十粒去皮尖上以二石為末別研巴豆杏仁為膏相合更搗一二千杵當自相得若硬入少蜜同杵之丸如粟米大用密器收每服二丸與少乳汁令下食頃後與少乳勿令多至日中當小利熱除若未全除明日更與二粒百日兒服五粒以此準定增減此藥兼治驚積痰癖食癇溫壯諸疾無所不治雖下亦不虛人人參散治變蒸骨熱心煩啼叫人參甘草麥門冬去心北柴胡各二錢龍膽草防風各一錢上銼散每服三字水一盞煎服當歸散治變蒸有寒無熱當歸二錢木香官桂辣者甘草人參各一錢上銼散每一錢水一盞姜三片紅棗一枚煎食前服調氣散治變蒸吐瀉不乳多啼木香香附炒去毛厚朴去粗皮薑汁炒人參橘皮藿香去土甘草炙各一錢上銼散每服三字水一盞生薑二片紅棗一枚煎溫服以上症狀治之但當以平和之劑微表熱實者微利之或不治亦當自愈通治乳哺法凡初乳先須捏去宿乳後與之母欲寐即奪其乳恐睡困不知飽足兒啼未定氣息未調乳母勿遽以乳飲之故不得下停滯胸膈而成嘔吐乳後不與食哺後不與乳脾胃怯弱乳食相併難以克化幼則成嘔而結於腹中作疼大則成癖成積成疳皆自此始護養法小兒肌膚未實若厚衣過暖傷皮膚損血脈發瘡瘍汗出腠理不固風邪易入若天氣和暖抱之使見風日則血氣堅剛肌肉硬可耐風寒不致疾病今人懷抱小兒不著地氣致令筋骨緩弱疾病易生非愛護之法相兒命短長法凡兒三歲以上十歲以下視其性氣高下即可知其夭壽兒小時識悟通敏過人者多夭小兒骨法成就威儀回轉遲舒稍費人精神鵰琢者壽預知人意回旋敏速者亦夭初生叫聲連延相屬者壽聲絶而復揚急者不壽啼聲散啼聲深汗不流頭四破小便凝如脂膏常搖手足頭毛不周匝者並不成人臍中無血者好臍小者遍身軟弱如無骨者汗血者多厄並不壽鮮白長大卵縫通達黑者並壽目視不正數動者大非佳早坐早行早齒早語皆惡性非佳人發稀少者強不聽人額上有旋毛妨父母或早貴初生枕骨不成能言而死尻骨不成能踞而死掌骨不成能匍匐而死踵骨不成能行而死臏骨不成能立而死身不收者死股間無生肉者死頤下破者死陰不起者死陰囊下白者死赤者亦死四君子湯隨證加味量兒大小用人參白朮茯苓甘草各等分上為末每服二錢傷寒麻黃豆豉北柴胡吐瀉南木香藿香乾葛潮熱牛黃鬱金朴硝金蠍薄荷麻豆牛蒡子紫草蟬蛻荊芥腹膨枳殼木通蘇子姜錢冷瀉扁豆肉豆蔻姜錢棗子咳逆肉豆蔻木通大熱苦竹瀝積熱上攻茅根淡竹葉甘草乳食不下訶子木香時行咳嗽藿香枳殼姜錢暴風燥癢荊芥牛蒡子枳殼高良薑蟬蛻鼻流清涕羌活麻黃防風泄瀉肉豆蔻木香滑腸訶子榴皮臟毒形如白利或有血根如魚腦髓豆蔻地榆粟殼赤痢粟殼烏梅白痢粟殼白姜大便不利大黃朴硝小便不利木通車前子霍亂木瓜藿香夏月加香薷腹痛茴香附子或用澤瀉郁李仁薑棗或只用木瓜豆蔻腹緊積候三稜檳榔薑湯下有淋火麻子仁生熟皆可車前子海金沙葶藶子下溺血生地黃瞿麥渴枇杷葉炙去毛瓜根咳嗽杏仁炒去皮尖貝母知母姜錢蘇子夜睡驚啼茯苓酸棗仁驚邪薄荷硃砂犀角人參癲癇甘草硃砂茯苓牛黃乳香犀角人參鉛白霜喉痹犀角杏仁當歸豆豉百合大黃口瘡雞內金腦子黃芩朴硝苦竹葉唾血生地黃當歸藕節側柏人參蒲黃血衄蒲黃山梔子淡竹葉目赤秦皮菊花苦竹葉甘草肚蟲檳榔使君子枳殼苦楝皮頭昏石膏川芎癥瘕及腋下氣塊肚痛此氣疾也用天雄三稜朴硝大黃五心熱犀角腦子磨刀水下氣不升降沉香蘇子養氣肥兒檳榔木香紫蘇葉紅棗驚候附天釣治驚大安神丸又名大驚丸治心熱夜啼煩躁常用安神定志去驚人參去蘆茯苓各半兩甘草一兩炙殭蠶去絲二錢半白朮半兩煨桔梗尾二錢半辰砂半兩全蠍五個去毒金銀箔各六片麥門冬去心炒木香各半兩酸棗仁一兩湯去皮殼蚌粉炒大赭石半兩醋煮上為末水丸或蜜丸急驚潮熱竹青薄荷葉夜啼灶心土傷食荊芥湯疹豆蟬蛻去足翼搐搦防風常服金銀薄荷慢驚冬瓜子仁凡驚風已退神志未定加琥珀三錢別研遠志半兩去心薑汁炒焦為度加入星香散治急慢風搐搦竄視涎潮南星圓白者二錢半木香橘紅各一錢全蠍二枚上銼散水二盞生薑四片慢煎熟頻灌大便去涎即愈來復丹治驚風昏塞以二三丸薄荷泡湯研灌下得泄即愈凡驚風對證用藥已效若覺未甚蘇省可與服丸數酌量方見虛損類又方安神丸定驚麥門冬去心焙馬牙硝白茯苓乾山藥寒水石各半兩硃砂三錢別研甘草半兩龍腦二字研上為末煉蜜丸雞頭大每服半丸沙糖水化下不拘時奪命丹治急慢驚風蛇含石醋淬七次大赭石淬同上各一兩全蠍五個去毒鐵孕粉半兩上為末每服一錢薄荷煎湯入雄雞冠血少許潮熱入硃砂病安常用安神丸涼驚小驚丸鬱金皂角水浸煮二個黃連牙硝木香不見火藿香龍膽草各五錢全蠍去毒六個上為末糊丸用雄黃硃砂麝香金銀箔為衣風瘼是驚熱重麻仁蟬蛻防風白痢白薑罌粟殼赤痢甘草烏梅潮熱桃柳枝鎮驚薄荷燈心吐藿香瀉木瓜陳米夜啼燈心薄荷灶心土精神不爽冬瓜子仁大便不通枳殼