body:
  text: 卷第六大方脈雜醫科下痢風證神朮散治胃經傷風自汗小便難下痢方見咳嗽類露宿湯治風痢純下清血杏仁七個去皮尖苦木瘡一掌大烏梅二個草果一個酸石榴皮半個青皮二個甘草二寸上銼散作一劑水二碗生薑三片煎七分露星一宿次早空腹服胃風湯治法藥件並見泄瀉類寒證人參敗毒散治寒邪壯熱下痢及所下似痢非痢似血非血色如濁酒者加陳米百粒煎方見傷寒陽證類不換金正氣散治臟腑受寒下痢赤白加烏梅陳米煎方見時疫類暑證六和湯治冒者伏熱致成痢疾煩渴小便赤澀方見傷暑類五苓散治同上能分陰陽利水道方見傷暑類柏皮湯治暑痢方見泄瀉類酒蒸黃連丸治伏熱瀉痢不止用香薷散燈心二十莖車前草二根煎吞服立效方見後面及傷暑類濕證加味除濕湯治一身盡痛重著浮黃下痢如豆羹汁半夏曲厚朴去粗皮薑汁製蒼朮炒各一兩藿香葉陳皮炒茯苓各五錢粉草五錢官桂木香各三錢上銼散每服四錢水一盞半生薑三片紅棗二枚煎服空心仍以五苓散兼服利其小水艾姜丸治濕冷下痢膿血腹痛婦人下血干艾葉四兩炒焦存性川白姜一兩炮上為末醋煮麵糊丸如梧子大每服三十丸溫米飲下苦散治脾受濕氣泄痢不止米穀不化黃連去須銼如豆吳茱萸白芍藥銼如豆各二兩同炒令赤色上銼散每服二錢水一盞煎至七分去滓溫服熱證小承氣湯治下痢赤黃但煩飲冷小便不利得熱則極心煩躁喜渴先服一二服蕩之須審是實熱方可次用五苓散加車前子以利小便黃連阿膠丸佐治之即效方見傷暑及咳嗽類小柴胡湯治下痢赤白心中煩躁潮熱加赤芍藥地榆麥門冬淡竹葉煎效方見傷寒陽證類敗毒散治同上加陳米煎方見傷寒陽證類烏梅丸治下痢純血臍腹絞痛脈急大數由腸胃久虛或先經下血痢未止服熱藥蘊毒伏熱滲成血痢烏梅二兩焙黃連三兩茱萸當歸酸石榴皮各一兩上為末醋糊丸如梧子大每三十丸米飲湯下更以意加減服地榆散治熱留腸胃下痢鮮血亦名潑火散方見傷暑類柏皮湯治熱證發熱下痢方見泄瀉類芍藥柏皮丸治一切濕熱惡痢頻並窘痛無問膿血並宜服芍藥黃柏各一兩當歸黃連各半兩上為末水丸小豆大溫水下三四十丸無時候及夜五六服忌油膩脂肥發熱等物熱痢大效三黃熟艾湯治傷寒四五日大下熱痢諸藥不止宜服此除熱止痢亦作丸子熟水吞下四十丸治時行毒痢良驗黃芩黃連黃柏各二分熟艾半個雞子大上銼散每服三錢水一盞煎至七分去滓溫服不拘時酒蒸黃連丸治身熱下痢鮮血煩躁多渴或傷熱物過度黃連一斤去須好酒二升半上用酒浸瓦器盛置甑上蒸至爛取出曬乾研為末用麵糊為丸如梧子大每服三十丸熟水吞下又療傷酒過多臟毒下血大便泄瀉用溫米飲下食前一日兩服白頭翁湯治熱痢下血連月不瘥白頭翁二兩黃連黃柏皮秦皮各三兩上銼散每服四錢水一盞半煎至八分不拘時溫服冷證當歸丸治冷痢悽清腸鳴所下純白腹痛不止手足冷者宜服之當歸白芍藥附子炮白朮乾薑炮厚朴制炒阿膠粉炒各一兩烏梅二兩上為末醋糊丸如梧子大每服五十丸米飲吞下空心服腹痛甚加桂半兩小便不利加白茯苓一兩大凡痢疾雖體寒手足逆冷冷汗自出六脈沉伏不宜輕用附子多因伏暑而得此疾亦有冷汗自出四肢逆冷六脈虛弱但背汗面垢或面如塗油齒乾煩冤燥渴引飲此伏暑證也小柴胡湯五苓散酒蒸黃連丸必能奏效學者宜審思耳方見傷寒陽證傷暑類及見前水煮木香丸治純下白痢及淡紅黑痢罌粟殼二兩去蒂萼穰訶子肉六錢乾薑四兩木香青皮陳皮甘草各三錢當歸白芍藥各半兩上為末煉蜜丸如彈子大每服一丸熟水空心服豆蔻散治脾虛腸鳴久痢不止大肉豆蔻一枚剜小孔子入乳香三小塊在內以麵裹煨面熟為度去面上為末每服一錢米飲調下附子理中湯正理中湯加炮附子每料一兩朮附湯姜附湯治同上方見霍亂中濕中暑類玉華白丹治臟腑久虛下痢空心米飲下渴者人參湯下亦治腸風下血震靈丹橘皮煎丸治同上方並見痼冷及虛損類鍾乳建脾丸治男子婦人虛損羸瘦身體沉重脾胃冷弱飲食不消腹脹雷鳴泄瀉不止又治腸虛積冷下痢清穀或下純白腹中㽲痛及久痢赤白腸滑不禁少氣羸弱不思飲食並宜服之肉桂去粗皮人參去蘆黃連去須乾薑龍骨各一兩蜀椒去目及閉口者微炒出汗三兩半當歸去蘆大麥蘖炒石斛去根各一兩附子炮去皮臍五錢茯苓去皮細辛去苗土神麯碎炒赤石脂各一兩鍾乳粉一兩半上為末入鍾乳粉和勻煉蜜為丸如梧桐子大每服三十丸食前溫米飲下日三服未效用三建湯吞金粟黃芽丹數粒方見痼冷類木香散治脾胃虛弱內挾風冷泄瀉注下水穀不化臍下㽲痛腹中雷鳴及積寒久痢腸滑不禁藿香葉洗焙四兩赤石脂附子去皮臍醋煮切焙各一兩肉豆蔻仁木香甘草炙各二兩訶子皮一兩半上銼散每服二錢生薑三片棗子二枚煎空心服五積散治內傷生冷下痢加縮砂木香制粟殼炒阿膠大效方見傷寒陰證類椒艾丸治虛寒下痢不止方見泄瀉類四柱散治下痢又復泄瀉耳鳴手冷腹痛加木香生薑棗子粟米煎就調後藥方見泄瀉類赤石脂散治腸胃虛弱水穀不化泄瀉注下腹中雷鳴及冷熱不調下痢赤白腸滑腹痛遍數頻多脅肋虛滿胸膈痞悶肢體困倦飲食減少赤石脂甘草炙各一兩二錢半肉豆蔻麵裹煨令熟十兩縮砂仁五兩為末二錢粟米飲調冷熱不調下痢真人養臟湯香連丸治同上方並見泄瀉類駐車丸治同上方見後以上三方用皆立效氣痢牛乳湯治氣痢泄如蟹渤蓽茇二錢牛乳半升上同煎減半空腹服效木香流氣飲治同上方見諸氣類五膈寬中散治同上方見五膈類異香散治憂鬱氣滯不散腹中膨滿刺痛下痢不止蓬莪朮煨益智仁甘草炙京三稜煨各六兩青皮去白陳皮去白各三兩石蓮肉一兩厚朴薑汁浸炒二兩上銼散每服二錢水一盞姜三片棗一枚鹽一捻煎七分通口服不計時或鹽湯鹽酒亦可木香勻氣散治氣痢腹痛經驗方見諸疝類積痢治食積下痢腹內緊痛不進飲食鹽梅湯或米飲多服盧氏感應丸或用蘇合香圓和丸仍用平胃散五苓散二末藥鹽湯空心服調理立安方見諸積中氣脾胃傷暑類蠟匱丸又名靈砂丸治痢止水瀉硇砂一分研辰砂一分研巴豆三七粒去殼黃蠟半兩上以二砂為末外將巴豆黃蠟銀石器內重湯煮一伏時候巴豆紫色為度去十四粒將七粒與二炒末同研極勻再熔蠟匱藥每旋丸如緑豆大每服三粒至五粒水瀉生薑湯吞下白痢艾湯赤痢烏梅湯五更空心時服服畢一時不須吃食臨臥服尤佳禁口痢敗毒散治心煩手足熱頭痛此乃毒氣上衝心肺所以嘔而不食每服四錢水一盞半陳倉米一百粒姜三片棗一枚煎溫服方見傷寒陽證類真料參苓白朮散治禁口痢食飲不下棗湯調效方見脾胃類又方用石蓮肉留心為末陳米飲下又方治心腹虛膨手足厥冷或飲過苦澀涼劑晨朝未食先嘔或聞食即吐不思飲食此乃脾胃虛弱山藥一味銼如小豆大一半銀石器內炒熟一半生用為末米飲調下自獲其功煨鯽魚方治禁口痢鯽魚捻去膽與腸肚入白礬一大豆許同煨熟入鹽醋吃不過二枚與痢俱效休息痢加味養臟湯加炮附子青皮烏藥茯苓各五錢治傷酒肉炙煿後發為痢疾休作無時名曰休息生薑三片紅棗二枚煎方見泄瀉類神效散治休息痢氣痢膿血不止疼痛困弱當歸焙烏梅肉黃連上等分為末研大蒜成膏為丸如梧子大每服二三十丸厚朴湯下一方加阿膠炒五積散治同上生薑三片紅棗二枚鹽梅一個木香半錢煎方見傷寒陰證類駐車丸治冷熱不調下痢赤白日夜無度腹痛不可忍者及治休息痢疾大效痢方之魁黃連去須六兩阿膠蛤粉炒三兩當歸去蘆洗焙三兩乾薑炮二兩上為末醋煮米糊丸如梧子大每服五十丸加至七十丸空心米飲下祕方養臟湯治同上方見後大已寒丸虛冷者效方見泄瀉類薑茶丸止休息痢大效乾薑炮建茶各一兩上以烏梅取肉丸如梧子大每服三十丸食前米飲下毒痢茜根丸治毒痢及蠱注下血如豚肝心煩腹痛又脈或大或小浮焰而起下血如豚肝五內切痛此因服五石湯丸逼損陰氣甚則其血自百脈經絡而來注下成蠱毒此為難治茜根川升麻去蘆犀角地榆黃連當歸去蘆枳殼去穰白芍藥上等分為末醋糊丸如梧子大每五十丸米飲空心下魚鮓湯治痢下五色膿血或如爛魚腸並無大便腸中攪痛不可忍呻吟叫呼聲聞於外粉霜研輕粉硃砂研硇砂研去砂石白丁香各一錢乳香半錢巴豆二七個去殼不去油上為末蒸棗肉為丸嬰孩三丸如粟米大二三歲四五歲如麻粒大每用三四丸並旋丸煎鮓湯吞下仍間服調胃藥此證緣久積而成故小兒多有之蠱疰痢羚羊角丸治下血黑如雞肝色相似時發渴者羚羊角一兩半宣黃連二兩白茯苓一兩黃柏去黑皮一兩半上為末煉蜜丸如桐子大每服五六十丸臘茶送下病危者復生若血鮮滑泄不固欲作厥狀此藥不可服當灸臍下氣海關元二穴更服玉華白丹方見痼冷類參附湯人參綿附炮去皮臍肉豆蔻微火煨裂上銼散每服二錢水盞半生薑七片棗二枚煎食前服腹痛不止薑茶方治痢下腹痛肚皮熱手不可近上用生薑切碎如粟米大草茶相等煎服效又方煮茶白痢用蜜赤痢用姜未效用真人養臟湯再加楊芍藥當歸立止方見泄瀉類香連丸治冷熱下痢腹痛甚肛門所泄皆熱方見泄瀉類木香勻氣散治宿冷不消氣滯腹痛用紫蘇湯調下未效用乳香沒藥湯調服方見諸疝類瘧痢六和湯治夏月冒暑瘧痢俱作瘧則間日而寒戰掉煩躁難禁當發瘧之時痢或暫止痢則腹痛晝夜頻數又胸滿乾嘔食藥莫下以此藥治之用生薑三片烏梅一個紅棗二枚麥門冬二十粒去心煎仍間服香連丸米飲下未效用五苓散消暑丸仍多服加減清脾湯更用勝金丸斷之方見傷暑泄瀉中暑痎瘧類痢風加味敗毒散治痢手足拘攣疼痛加檳榔木瓜虛人五積散合和生薑紅棗煎方見傷寒陰證類大防風湯祛風順氣活血脈壯筋骨逐寒濕冷氣又治患痢後腳痛瘓弱不能行履名曰痢風或兩膝腫大痛脾脛枯臘但存皮骨拘攣蜷臥不能屈伸名曰鶴膝風服之氣血流暢肌肉漸生自然行履如故熟乾地黃焙白朮各二兩羌活去蘆人參去蘆各一兩川芎洗附子炮去皮臍三個一兩半防風去蘆二兩牛膝去蘆酒浸切微炒一兩川當歸洗去蘆酒浸焙炒二兩黃耆去蘆微炒杜仲去粗皮炒白芍藥各二兩甘草炙一兩上銼散每服五錢水一盞半生薑七片大棗一枚煎八分空腹溫服郁李丸治痢後風手足不能屈伸或麻豆證傳變手足筋脈急亦能治之郁李仁枳殼川獨活鱉甲醋炙黃上等分為末木瓜湯調下酒亦可又方治腳手皆腫不能行步川烏赤芍藥蒼朮酒浸土朱上為末糊丸如梧子大引子同上通治木香散住腹痛痢南木香五錢地榆一兩黃連七錢青皮去穰赤芍藥枳殼煨去穰乳香甘草各五錢上為末每服二錢熟湯調服黑豆散小黑豆炒川楝子烏梅甘草乾薑罌粟殼二個去蒂萼穰上銼散煎至七分將紗濾過挒自然汁空腹服當歸散住瀉痢地榆陳皮罌粟殼去蒂萼穰當歸去尾赤芍藥甘草肉豆蔻煨加黃連上等分為末每服二錢冷水調服獨神丸治痢神效罌粟殼十兩重分作三分去穰及蒂萼一分醋炒一分生用一分蜜炙上為末用蜜丸如小指頭大紅痢生地黃春茶煎湯嚼下白痢烏梅甘草節但為末二錢陳米鹽梅湯亦效神應散治痢緊嚴絶妙金罌草梗肉豆蔻訶子