潤腸丸治發汗利小便亡津液大腑祕老人虛人皆可服沉香另研一兩肉蓯蓉酒浸焙二兩上為末用麻子仁汁打糊為丸如梧子大每服七十丸空心米飲送下又方治大便祕澀連日不通麻子仁一盞半細研用水浸濾去皮取濃汁芝麻半盞微炒研用水浸取濃汁桃仁湯洗去皮麩炒黃研如泥荊芥穗搗末各一兩上用前藥入鹽少許同煎可以當茶飲之以利為度蔥白散治老人大便不通蔥白二莖阿膠一片上以水煎蔥候熟不用卻入阿膠溶開溫服胃氣丸治老人胃寒氣怯大便反祕每服五十丸米飲空腹下未效生薑自然汁著熱水少許吞下方見霍亂類黃耆湯治年高老人大便祕澀綿黃耆陳皮去白各半兩上為末每服三錢用大麻仁一合爛研以水投取漿水一盞濾去滓於銀石器內煎候有乳起即入白蜜一大匙再煎令沸調藥末空心食前服祕甚者不過兩服愈常服即無祕澀之患此藥不冷不燥其效如神熱祕神功丸治氣壅風盛大便祕澀後重疼痛煩悶此藥當量虛實加減大黃四兩煨蒸皆可人參二兩訶子皮四兩麻仁二兩另研上為末煉蜜丸如梧子大每服二十丸溫湯酒米飲任意下食後臨臥服檳榔丸治大腸實熱氣壅不通心腹脹滿大便祕結檳榔大黃蒸麻子仁炒去殼別研枳實麩炒羌活去蘆牽牛炒杏仁去皮尖炒白芷黃芩各一兩人參半兩上為末煉蜜丸如梧子大每服四十丸空心熟水下四順清涼飲治同上每服三錢水一盞半燈心十莖枳殼十片去穰煎立效方見積熱類小三黃丸治熱燈大便祕結每服三十丸溫水下方見積熱類小柴胡湯治傷寒陽結能食而大便不下方見傷寒陽證類濕祕檳榔散治腸胃有濕大便祕澀檳榔不拘多少上為末每服二錢用蜜湯點服不以時候香蘇散多加枳殼檳榔亦效方見傷寒和解類通治甘遂散治大小便不通上以甘遂二兩赤皮者為末煉蜜二合和勻每一兩重分作四服日進一服蜜水下未知日二服漸加之又方葵子末三合青竹葉一把分一升煮五沸頓服又方葵子末三合水一升煮去滓分作二服豬脂二兩空心又方治大小便關格不通經三五日者用不蛀皂角燒灰米湯調下即通又方豬脂二兩水一升煮三沸飲汁立通八正散治同上方見積熱類推車散治大小便祕經月欲死者推車客七個土狗七個如男子病推車客用頭土狗用身如女子病土狗用頭推車客用身上新瓦上焙乾為末用虎目樹皮向南者濃煎汁調只一服經驗如神又掩臍法治大小便不通用連根蔥一莖帶土不洗以生薑一塊淡豉二十一粒鹽二匙同研爛捏餅烘熱掩擠中以帛扎定良久氣透自通不然再換一劑通治大便不通大潤腸丸大便祕澀通用杏仁去皮尖微炒枳殼浸去穰炒麻仁陳皮各半兩阿膠炒防風各二錢半上為末煉蜜丸梧桐子大每服五十丸老者蘇子煎湯下壯者荊芥泡湯下獨棗湯治大便積日不通大好棗一枚擘開入輕粉半錢上以棗相合麻線扎縛慢火煮熟嚼細以棗汁送下敷藥治閉結至亟昏不知人生大螺一二枚以鹽一匕和殼生搗碎置病者臍下一寸三分用寬帛緊之即大通未效烏柏木根三寸研井水服亦效就多研爛敷臍下亦可蜜兌法蜜三合入豬膽汁兩枚在內煎如飴以井水出冷候凝捻如指大長三寸許納下部立通活人書單用蜜一法入皂角末在人斟酌用一法入薄荷末代皂角用尤好又或偶無蜜只嚼薄荷以津液調作挺用之亦妙煨蒜方獨頭蒜煨熟去皮以綿裹納後部即通熏方不蛀皂角用碗燒置於桶內熏其後部自通老人臟腑祕不可用大黃老人津液少所以臟腑祕澀更服大黃以瀉之津液皆去定須再祕甚於前只可服寬潤大腸之藥更用槐花煎湯淋洗亦效更有老人發熱而大腑祕澀或因多服丹藥脾胃虛弱蒸化不行遂為臟腑積熱須用神保丸得通瀉一行熱亦即退脹滿風寒暑濕脹大正氣散治脾胃怯風寒濕氣傷動沖和心腹脹滿有防飲食厚朴薑製炒藿香葉半夏湯泡七次橘紅白朮各一兩甘草炙檳榔桂枝不見火枳殼去穰麩炒乾薑炮各半兩上銼散每服四錢水一盞半生薑五片棗子二枚煎至七分去滓不以時溫服平肝飲子治喜怒不節肝氣不平邪乘脾胃心脹滿連兩脅妨悶頭暈嘔逆脈來浮弦防風去蘆桂枝不見火枳殼去穰炒赤芍藥桔梗去蘆炒各一兩木香不見火人參檳榔當歸去蘆酒浸川芎橘紅甘草炙各半兩上銼散每服四錢水一盞姜五片煎七分不拘時溫服五膈寬中散治七氣流滯飲食不下氣滿膨脹方見五膈類木香流氣飲調榮衛利三焦行痞滯消脹滿方見諸氣類附子粳米湯治憂怒相乘神志不守思慮兼併擾亂臟氣不主傳導使諸陽不舒反順為逆中寒氣脹腸鳴切痛胸脅逆滿嘔吐不食附子一個生去皮臍虛人略炮半夏湯洗七次粳米各三錢半字甘草炙一錢半乾薑一分去皮上銼每服二錢水二盞棗三個煎至七分去滓食前服溫胃湯治憂思聚結脾肺氣凝陽不能正大腸與胃氣不平脹滿沖咳食不得下脈虛而緊澀附子炮去皮臍當歸厚朴去粗皮生用人參橘皮白芍藥甘草炙各一兩乾薑一兩一分川椒炒出汗去合口者三分上銼散每服四大錢水二盞煎七分去滓食前服沉香降氣湯治中脘脹滿時復脅肚痛楚每噫則覺氣快氣不噫則悶漸覺面浮磨檳榔入紫蘇同煎下神保丸五七丸二方並見諸氣類谷脹大異香散治失飢傷飽痞悶停酸早食暮不能食名谷脹京三稜蓬朮青皮陳皮半夏曲藿香北梗益智仁枳殼制香附子炒各半兩甘草炙三分上銼散每服三錢水盞半姜五片棗二枚煎服蓽澄茄丸治痞滿脹痛谷脹氣脹通用蓽澄茄白豆蔻仁縮砂仁青皮蘿蔔子木香各二分肉豆蔻煨茴香炒辣桂丁香各一分半陳皮三分上為末面煮稀糊丸梧桐子大每服三十丸陳皮湯下水脹大半夏湯治脾土受濕不能制水水漬於腸胃溢於皮膚漉漉有聲怔忪嘣息名水脹半夏湯洗陳皮茯苓桔梗檳榔甘草各等分上銼散每服三錢水一盞半生薑三片煎溫服青木香丸治同上方見諸疝類血脹人參芎歸湯治煩躁嗽水迷忘驚狂痛悶喘息虛汗厥逆小便多大便黑名血脹當歸半夏制同上三分川芎一兩蓬朮煨木香縮砂仁烏藥甘草炙各半兩人參辣桂去粗皮五靈脂炒各一分上銼散每服三錢姜五片棗二枚紫蘇四葉煎食前服熱脹七物厚朴湯治腹滿發熱以陽並陰則陽實陰虛陽盛生外熱陰虛生內熱脈必浮數浮則為虛數則為熱陰虛不能宣導飲食如故致脹滿者為熱脹厚朴薑汁炒一兩甘草炙大黃蒸各三錢三字枳實麩炒去穰半兩桂心一分上銼散每服四錢水盞半生薑七片棗三枚煎至七分食前服嘔加半夏利者去大黃寒多則加生薑十片煎推氣丸治三焦痞塞氣不升降胸膈脹滿大便祕澀小便赤少並宜服之大黃陳皮檳榔枳殼小者去穰黃芩黑牽牛生用各等分上為末蜜丸如梧桐子大每服五七十丸臨臥以溫熟水下更量虛實加減寒脹朴附湯治老人虛人中寒下虛心腹膨脹不喜飲食脈來浮遲而弱此名寒脹附子炮去皮臍厚朴薑製炒上等分銼散每服四錢水二盞生薑七片紅棗二枚煎至八分去滓溫服不拘時候加少木香尤佳順氣木香散治氣不升降嘔逆噁心胸膈痞悶脅肋脹滿及酒食所傷噎氣吞酸心脾刺痛大便不調面色痿黃飢肉消瘦可思飲食兼婦人血氣刺痛及一切冷氣並治之丁皮不見火縮砂仁良薑去蘆肉桂去粗皮乾薑炮甘草炙陳皮去白厚朴去粗皮薑汁炙蒼朮米泔浸炒桔梗去蘆茴香炒各三兩上銼每服二錢水一盞生薑三片棗二枚煎至八分稍熱不拘時或入鹽少許沸湯點服寬中順氣和胃進食食脹強中湯治脾胃不和食啖生冷過飲寒漿多致腹脹心下痞滿有妨飲食甚則腹痛乾薑炮去土白朮各一兩青皮去白橘紅人參附子炮去皮臍厚朴薑製甘草炙各半兩草果仁丁香各三兩上銼散每服四錢水一盞半生薑五片大棗二枚煎至七分去滓溫服不拘時嘔者加半夏半兩或食麵致脹滿加蘿蔔子半兩溫中散治虛人老人喜啖生冷多致腹脹心下痞滿有妨飲食或刺痛泄利氣痞滯悶厚朴去皮細銼甘草細銼生薑洗切青州棗切各等分上以厚朴甘草搗令得所方入生薑再杵令勻取出同棗焙令浥浥微燥卻入鍋內慢火炒至紫色再焙乾為末每服一大錢擦生薑少許沸湯點空腹以和為度氣味甚美兼能愈疾又易修合桂香丸治大人小兒過食雜果腹氣急肉桂不見火一兩麝香另研一錢上為末飯丸如緑豆大大人十五丸小兒七丸不拘時候熟水送下未痊再服獨聖散治脾胃不足過食瓜果心復堅脹痛悶不安鹽五合上用水一升煎消頓服自吐下即定或因食麥令人腹脹暖酒和薑汁飲一兩杯即消感應丸治積食停滯脾胃作脹方見祕澀類北亭丸治稟受怯弱脾胃易傷因此積聚中脘脹滿心腹堅硬㽲痛攻衝牽引小腹如蠱之狀方見虛損類溫白丸治心腹積聚九症癖塊腹脹心下堅結大如杯碗旁攻兩脅心痛積年食不消化吳茱萸湯洗七次焙炒桔梗柴胡去蘆菖蒲紫菀去苗葉土黃連去須乾薑炮肉桂去粗皮茯苓去皮蜀椒去目及閉口者炒出汗人參去蘆厚朴去粗皮姜汗制巴豆去皮心膜出油炒研以上各半兩川烏炮去皮臍二兩半皂去皮子炙半兩上為末入巴豆令勻煉蜜丸如梧子大每服三十丸紫蘇湯下取下積滯如魚腦爛綿而安鼓脹嘉禾散四柱散治脾胃虛憊腹脹如繃鼓氣籲喘促食後愈甚方見脾胃類四柱散方見泄瀉類厚朴橘皮煎治傷冷溏下腹肚䐜脹其狀如覆栲栳喘息奔急鼻張口呿氣上下不得分泄厚朴去粗皮薑製三兩枳殼麩炒乾薑炮良薑切各一兩二錢青皮去白陳皮去白肉桂去粗皮合蠍去尾足毒斟酌分兩上為末醋糊丸如梧子大每服三十丸生薑橘皮湯吞下或紫蘇湯下三稜煎丸青木香丸治心腹堅脹喘滿短氣緊促噫氣不通飲食不消或嘔逆吐痰或腸中水聲大便或祕或泄二藥合和每服三十丸食後米飲下方見諸氣諸疝類四炒枳殼丸主腹脹鼓疾枳殼去穰四兩切作片子分四處炒上分作四分每分一兩一分用銼碎蒼朮一兩同炒一分用蘿蔔子一合同炒一分用乾漆一兩同炒一分用茴香一兩同炒各以枳殼黃為度只取枳殼一味為末卻將蒼朮等四味用水二碗煮至一碗半去滓取汁煮麵糊為丸如梧桐子大每服五十丸食後米飲下氣針丸專治氣膨全蠍去毒並足木香丁香不見火胡椒肉豆蔻煨各一兩片子薑黃青皮去白各二兩上為末用蘿蔔子炒淨退殼取仁四兩爛研和藥令勻紅酒生薑汁各少許煮糊丸如梧子大每服四五十丸紫蘇陳皮湯下不以時候丁沉透隔湯治氣滿不食腹中膨脹刺痛方見脾胃類導氣丸治諸痞塞關格不通腹脹如鼓大便結祕等證又腎氣小腸氣等功效尤速青皮水蛭等分同炒赤去水蛭莪朮虻蟲等分同炒去虻蟲胡椒茴香炒去茴香三稜乾漆炒去幹漆檳榔斑蝥炒去斑蝥茱萸牽牛炒去牽牛赤芍川椒炒去川椒石菖蒲桃仁炒去桃仁乾薑硇砂炒去硇砂附子青鹽炒去鹽上各銼碎與所注藥炒熟去水蛭等不用只以青皮等十味為末酒糊丸如梧子大每服五十丸加至七十丸空心紫蘇湯吞下尉法治腹脹緊如鼓澀如木皮樣杜烏藥荊芥蒼朮菵草山茵陳夏蠶沙松毛樟根葉北蒜螃蚍葉橘葉椒目烏豆赤豆藠各等分上銼細分作二次炒熱以布袋盛尉腫處冷又炒尉三四十度或後用煎水熏洗或服神保丸微溏泄去其氣敷藥治腹緊硬如石或陰囊腫大先用熱水嚼甘草後用大戟芫花甘遂海藻各等分上為末醋調塗或用白麵和藥調一片覆肚上通治沉香飲治腹脹氣喘坐臥不得沉香木香枳殼各半兩蘿蔔子一兩炒上銼散每服三錢水一盞半生薑三片煎七分溫服小檳榔丸治脾虛腹脹不進飲食快氣寬中蘿蔔子炒檳榔煨黑牽牛炒木香各半兩上末煮麵糊丸梧桐子大每服三十丸薑湯食前下灸法脹滿水腫灸脾俞隨年壯穴在第十一椎下兩傍各去一寸半胸滿心腹積聚痞痛灸肝俞百壯穴在第九椎下兩傍各去一寸半腹脹滿繞臍結痛堅不能食灸中守穴百壯在臍上一寸一名水分脹滿瘕聚滯下冷疼灸氣海十壯穴在臍下一寸五分腸中膨脹不消灸大腸俞四十九壯穴在第十六椎下兩傍各一寸半腸中雷鳴相逐痢下灸承滿五十壯穴在俠巨闕相去二寸巨闕在心下一寸灸之者俠巨闕兩邊各二寸半五臟六腑心腹滿腰背疼飲食吐逆寒熱往來小便不利羸瘦少氣灸三焦俞隨年壯穴在十三椎下兩傍各一寸半
