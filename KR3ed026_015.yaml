body:
  text: 卷第十五産科兼婦人雜病科通治四物湯隨證加味宜酌量入當歸川芎熟地黃洗焙酒炒白芍藥各等分上銼散每服四錢水一盞半煎到七分去滓食前熱服為末服亦可若平常血氣不調及常服只用本方春加當歸夏加芍藥秋加川芎冬加地黃各一兩半日二三服妊婦作惡生寒面青不思飲食憔悴陳皮枳殼白朮茯苓甘草産後敗血築心地骨皮芍藥潮熱黃芩地骨皮柴胡咳嗽桑白皮半夏生薑人參甘草北五味子地骨皮損孕下血不止頭痛寒熱耳鳴氣血勞傷所致黃芩荊芥生地黃生薑赤芍藥虛寒潮熱柴胡地骨皮白朮茯苓甘草秦艽知母黃芩麥芽貝母人參烏梅棗子心腹脹滿枳殼青皮虛汗麻黃根産後潮熱白朮北柴胡甘草牡丹皮地骨皮有熱黃芩汗加浮麥腸風下血槐角槐花枳殼荊芥黃芩大腹皮紅內消地榆石榴皮白雞冠花為散煎一半為末空心鹽湯舊酒調下鼻衄吐紅竹青蒲黃藕節半夏丁香訶子桂花紅棗飛羅面白茅根蚌粉奶癰連翹慈菰子紅內消白芷菰片荊芥牛膝山蜈蚣乳香沒藥漏蘆生地黃血風兩脅築疼或盤腸成塊大黃蓽茇乳香胎動漏下不止黃耆側柏阿膠甘草續斷平常經血淋瀝不斷或多或少或赤或白非時漏下可多服有效月水不通野苧根牛膝紅花蘇木舊酒水同煎臨産小腹緊痛紅花滑石甘草燈心葵子閉經枳殼大黃荊芥黃芩青皮滑石木通瞿麥海金沙山梔子車前子安胎及胎漏下血阿膠大艾甘草蒲黃炒過産後腹痛血塊攻腸大艾沒藥好酒産後病眼北細辛荊芥羌活甘草菊花木賊石決明草決明女人赤眼頭風疾薄荷清茶赤眼生風防風黃芩産後浮腫氣急腹大喉中水雞聲牡丹皮荊芥白朮桑白皮赤小豆大腹皮杏仁半夏馬兜鈴生薑蔥白薄荷月水不調血崩或多少或前後嘔逆心膨陳艾黃耆血弱生風四肢痹疼行步艱難乳香人參沒藥麝香甘草五靈脂羌活獨活防風荊芥地龍南星白附子澤蘭為末蜜丸木瓜鹽湯下血氣膨脹甘草木香枳殼馬兜鈴葶藶紫蘇藿香地黃空心服補血住崩百草霜敗棕灰月綿灰蒲黃炒過龍骨白薑血成片地黃藕節黑血片人參白朮白血片龍骨青黃木瓜五色生麝香好酒鮮紅溫酒鹽湯風瘡赤腫荊芥牛蒡子何首烏甘草防風羌活地黃鹽酒帶下肉桂蒲黃百草霜甘草黑豆白朮延胡索白薑龍骨空心鹽酒血寒甘草烏梅柴胡桃柳枝感風勞嗽款冬花知母阿膠半夏麻黃甘草馬兜鈴黃芩杏仁柴胡薑錢訶子烏梅月經久閉肉桂甘草黃耆薑錢棗子木通紅花大便下血四肢寒膨脹乃腸胃有風槐花枳殼漏蘆荊芥木香白雞冠花木通紅內消紫草石榴皮陳皮黃芩青皮甘草白茅根槐角虛瀉人參川芎白芷蒲黃炒阿膠白朮茱萸續斷乾薑黑附子肉桂黃耆赤石脂甘草蜜丸鹽梅湯下白帶用龍骨酒胎前産後痢後風乳香龍骨茱萸木香肉桂蒼朮牡丹皮白薇人參甘草澤蘭大椒茴香煉蜜為丸木瓜酒下亦治帶下赤白痢陳米飲心腹膨炒薑酒血氣艾醋湯渾身勞倦為末炒薑酒陳青藁鹽和調下虛證四肢黃甘草牡丹皮澤蘭白薇蒼朮桂心茴香蜜丸鹽湯溫酒下嘔逆飲食不入加白朮丁香甘草人參縮砂益智仁胡椒經行腹痛腰背痛蕓薹牛膝紅花吳茱萸庵䕡甘草銀器燈心熱服虛渴人參乾葛烏梅栝蔞根受胎小腸氣痛木香銀器胎前嗽枳殼甘草款冬花知母馬兜鈴半夏木通葶藶人參苦梗麥門冬腳腫大腹皮赤小豆茯苓皮生薑皮産後不語失音訶子人參沙蜜百藥煎陰陽交合經脈行赤石脂黃耆肉桂百草霜敗棕灰肉豆蔻當歸木香龍骨白朮茯苓地榆藕節胎氣衝肝腰腳痹行步艱難枳殼甘草木通連翹荊芥地黃羌活獨活山梔子燈心空心服氣築小腸痛延胡索煎效常服加茱萸陽臟少使陰臟多用莪朮散隨證加味宜酌量入當歸去尾川芎莪朮煨甘草楊芍藥熟地黃酒蒸洗茴香白芷上為末每服二錢鹽酒調下月經不調銀器燈心安胎黃耆生地黃補虛調氣生薑紅棗遍身虛腫當歸酒小便不通滑石末心虛發狂硃砂研調敗血衝心腹痛如刀刺燒稱錘紅淬酒不退五靈脂酒血閉身疼炒薑酒吐酸水丁香七粒煎湯血風上攻眼目浮腫荊芥小腹痛木瓜渾身浮腫薑湯或蔥湯胃惡藿香頭面腫赤豆荊芥湯下血不止木香湯冷嗽桑白皮乾柿頭痛川芎細辛血風熱潮生薑紅棗虛汗麻黃根吐不止陳青蒿血風腰疼蕓薹子槌碎女人血結不通手發攣急不知苦薺菜一握順流水挒汁手足痹樟柳根浸酒血海虛冷大艾腹脹不消芝麻一合炒薑酒月水不勻當歸浸酒女人血氣成塊築心銀子燈心血崩赤白帶真龍骨末好紅酒調血風中心狂言亂語渾身壯熱桃柳枝七寸血刺成塊不散庵䕡女人癖氣膈氣炒茴香酒婦人不問虛熱傷風血氣潮熱增寒一切百病先以參服隨證湯引投之服以他藥調理無不應驗冷嗽豬血心燥豬肝酒催生順流水滑石禹餘糧榆白皮坯子乳香葵子酸車草汁煎湯或黃柞葉垂下者胎衣不下再加莪朮地黃竹青行血庵䕡生地黃紅花蘇木陳艾減楊芍藥加赤芍藥梢加味五積散厚朴去粗皮薑汁炒半夏洗楊芍藥枳殼去穰炒木香肉桂各一兩陳皮白薑一兩三錢蒼朮六兩米泔浸炒桔梗香附子炒去毛茴香炒粉草人參去蘆茯苓去皮川芎當歸去尾川白芷各一兩上銼散生薑木瓜入鹽煎服陰證傷寒生薑附子血脈不勻紫蘇氣嗽烏梅薑錢勻經棗子薑錢補益血海蘇鹽産後生薑醋炒陳艾胃冷不納食陳皮縮砂赤白帶陳米冷氣疾木香茱萸心躁背筋急頭暈腰腳痠生乾地黃當歸脾虛蘇葉粉草月中被驚或因爭觸心頭結塊五膈五噎茴香棗子口苦舌乾吞酸噫氣此為胃冷生薑鹽腰痛桃仁木瓜杜仲川續斷身疼秦艽諸虛脾胃不和羸瘦冷氣蘇鹽冷瀉炒過生薑烏梅肉豆蔻陳米芎歸湯治産前産後腹痛體熱頭疼及諸疾才差了未進別藥即先服此能除諸疾逐敗血生新血川芎二兩川當歸三兩上銼散每服三錢水一盞酒二分煎溫服為末亦可將産先安排兩服煎産了速進之三日內日二服三日外日一服諸證失血傷胎去血産後去血崩中去血金瘡去血拔牙去血不止及一切去血過多心煩眩暈悶絶不省人事頭重目暗舉頭欲倒悉治若産後眩暈宜加楊芍藥産後腹疼不可忍者加桂心酒與童子小便合煎立效臨月服之則縮胎易産兼治産後諸疾虛損羸之腹中㽱痛往來寒熱吸吸少氣不能支持頭眩自汗腹內拘急每服用精羊肉一兩薑十片水二盞煎溫服婦人室女心腹㽱痛經脈不勻水煎妊婦胎氣不安産後諸疾酒煎婦人血氣上喘下腫等分為末二錢空心煎艾湯服産後及損娠敗血衝心腹脹氣絶者神效難生倒橫子死腹中先用黑豆一大合炒熟水一盞入童子小便一盞藥四錢煎到一盞以上分為二服未效再作産後惡血注心迷悶喘急腹痛依前用黑豆加生薑自然汁半合煎服兼治臟毒每服一錢半入炒槐花半錢水一盞煎不以時服三日取下血塊即愈産後頭痛荊芥吐血亦宜服通真丸隨證加減當歸去尾蒼朮切炒肉桂防風川芎人參白芍藥白薇去土熟地黃酒炒牡丹皮茴香白朮白茯苓桔梗附子炮澤蘭葉等分上為末蜜丸每服一丸血崩經脈不勻赤白帶下炒當歸酒下血風癮疹瘙癢薄荷蜜湯冷氣塊築心腹嘔逆反胃炒鹽湯下腸風瀉血赤白痢月信不止米飲下血風勞倦青蒿酒頭疼眼花荊芥茶下月信不行室女紅脈不通産後諸風中風不語迷悶五丸紅花蘇木湯胎漏下血氣刺心腹脹滿炒薑酒下白薇散隨證酌量用湯引白薇去土川芎熟地黃酒炒桂心牡丹皮去骨甘草炙當歸去尾澤蘭葉蒼朮切炒芍藥各等分上為末每服三錢氣刺心脅痛艾醋澤蘭湯頭痛心躁米泔米飲氣虛土芎湯頭痛荊芥湯胎前潮熱氣急心悶生地黃燈心産後腹膨吐逆藿香胡椒胎氣不安陳艾下血不止糯米地榆陳艾産後血刺脅痛艾醋泊小腹疼地黃薑汁好酒産後腰腿疼背膊痛木瓜白膠香沒藥好酒月經不勻百草霜溫酒若過多藕節酒煎又用陳艾阿膠月水不通杜牛膝野苧根蘇木紅花酒下赤白帶心躁腰痛沒藥白帶黃耆切和鹽炒酒浸吃十服治胎衣不下順流水酸車草産後血氣當歸鹽炒好酒産後勞嗽糯米桑白皮熱嗽生地黃芭蕉水産前産後潮熱桃柳枝臨産小腹緊痛桑白皮葛根立便催生産前産後臟腑結枳殼下血地榆心神亂銀器大小便祕麻仁蘇子血風腳膝腫痛寒熱生薑黃水柳根血崩竹青藕節霜梅熱吐紅山梔子竹青藕節奶癰蔓荊子酒煎調服大烏雞煎丸治胎前産後諸般疾患並皆治之烏雄雞烏藥五錢海桐皮一兩草果二錢半石床五錢肉桂去粗皮一兩熟乾地黃洗焙二錢半人參去蘆白朮各半兩附子去皮臍一兩木香二錢半黃耆牡丹皮各半兩白芍藥蓬莪朮川烏炮陳皮紅花各一兩延胡索肉豆蔻各二錢半蒼朮米泔浸切焙七錢半琥珀二錢半上銼散用烏雄雞一隻湯撏去毛及腸肚將藥安肚中置用新瓷瓶好酒一斗同煮令乾去雞骨以油單盛焙乾為末煉蜜丸梧桐子大每服三十丸胎前産後傷寒蜜糖酒服胎前氣悶壯熱炒薑酒赤白帶下生薑地黃煮酒産後敗血攻心童子小便炒薑酒産後血塊築痛延胡索酒胎前嘔逆薑湯催生炒蜀葵子研入酒安胎鹽酒室女紅脈當通不通四肢疼痛煎紅花研入酒血氣攻刺心腹疼痛煎當歸酒血暈棕櫚燒灰入酒血邪研硃砂麝香入酒血悶煎烏梅湯入硃砂末子宮久冷溫酒或棗湯空腹日一服血風勞人參酒小便㽱痛炒茴香食鹽入酒血散四肢遍身虛浮黃腫赤小豆研細入酒常服溫酒醋湯並空心吞服大效內補丸治産後虛羸及傷血過多虛竭少氣臍腹拘急痛引腰面面白脫色嗜臥不眠唇口乾燥心忪煩倦手足寒熱頭重目眩不思飲食或勞傷衝任內積風冷崩中漏下淋瀝不斷及月水將行腰腿重疼臍腹急痛及治男子婦人從高墜下內有瘀血吐血下血等病真蒲黃微炒三分半熟乾地黃三兩洗切酒炒阿膠搗碎蚌粉炒如珠當歸去蘆切微炒川續斷去蘆乾薑炮甘草微炙芎藭各四兩附子炮去皮臍白芷白朮各三兩肉桂去粗皮白芍藥各三兩吳茱萸湯洗七次焙乾微炒三兩上為末煉蜜丸如梧桐子大每服二十丸食前溫酒下漸加至五十丸一方加杜仲鹿茸肉蓯蓉北五味子小嘉禾散治榮衛不調血氣虛弱面色痿黃四肢無力手足倦怠盜汗並出皮肉枯瘁骨肉羸瘦飲食不進日漸臥床病後不能調理亦成崩漏用之神效木香丁香丁皮各三錢巴戟去心紫蘇葉白茯苓蒼朮浸炒肉豆蔻煨附子炮各五錢沉香三錢苦梗去蘆粉草茴香炒山藥白豆蔻仁扁豆各五錢炒上銼散每服三錢水一盞半生薑三片紅棗煎溫服止瀉加黑豆炒止痢加粟殼蜜炒勝金丹治月水過期不通久無嗣息血癖氣痛四肢浮腫嘔逆心疼虛煩鬱悶面色痿黃崩漏帶下寒熱蒸勞頭疼齒痛血下無度淋瀝諸疾産前安胎臨産催生産後胎結疼痛傷寒煩渴瀉痢血暈血勞筋攣痰盛頭疼敗血上衝血刺泄瀉咳嗽喘急咯血血塊起伏氣痞氣膈血滯腰痛小便不禁子死腹中傷寒汗不出血風腳手痹頑凡産後諸疾並皆治之牡丹皮去骨川藁本人參去蘆川當歸去尾白茯苓赤石脂香白芷交趾桂去粗皮白薇去土川芎延胡索白芍藥白朮米泔浸一宿各一兩甘草炙沉香不見火上件並用溫水洗淨藥干搗羅為末煉蜜丸如彈子大每服一丸空心溫酒下凡妊娠臨月服此五六丸即易産如久無子息服二十丸當月有子並治積年血風半身不遂種種血疾不問年深日久皆療神效大聖散治血海虛冷久無子息及産後敗血衝心中風口噤子死腹中掰開口灌藥須臾生下無恙並治墮胎腹中攻刺疼痛橫生逆産