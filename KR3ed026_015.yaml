謂女子七七數盡而經脈不依時者血有餘也不可止之但令得依時不腰痛為善白朮半兩黃芩山茱萸湯泡取肉當歸川芎楊芍藥六味一同銼碎各一兩病證若冷去黃芩加桂上為末每二錢酒調空心日三服養胎益血安和子臟通經丸治婦人室女月候不通疼痛或成血瘕桂心青皮去白大黃炮乾薑炮川椒炒出汗蓬朮炮乾漆炒去煙川烏炮當歸去蘆桃仁炒各等分上為末內四分用米醋熬成膏和餘六分末成劑臼中治之丸如梧桐子大略曬乾每服二十丸到三十丸淡醋湯溫酒空心下尋常血氣凝滯疼痛數服立效茱萸鹿茸丸補氣固血治本臟因虛生寒月經行多或來不及期腹痛怯風臟腑不和鹿茸五味子蓯蓉杜仲赤石脂各一兩吳茱萸附子炮乾薑黑龍骨肉豆蔻白茯苓各半兩乾地黃一兩半上為末酒煮麵糊為丸梧桐子大空心食前熱米飲下五七十丸一月血氣已安去龍骨加沉香半兩可以常服中年以後婦人最宜服此三稜丸治紅脈不通氣痛滯下兼治血瘕形如鐮鐵樣當歸去尾川芎牛膝去苗芫花三稜莪朮煨蒲黃延胡索牡丹皮乾薑庵䕡白芷地龍去泥土酒浸炒各一兩大黃二兩為末米醋一升文武火熬成膏上為末入大黃膏和研杵爛為丸每服二十丸氣痛淡醋湯下炒薑酒亦可未通紅花酒下治經脈不利方緣經滯即為水水流走四股悉皆腫滿名曰血分其候與水相類醫作水治之非也宜此人參當歸大黃濕紙裹三斗米下蒸米熟去紙切焙桂心瞿麥穗赤芍藥白茯苓各半兩葶藶炒別研一分上為末煉蜜丸梧桐子大每服十五丸到二三十丸空心米飲送下沒藥散治月信退出皆為禽獸之狀似來傷人先將綿塞陰戶只頓服上以沒藥一兩作丸散皆可服即愈撞氣阿魏丸大聖散兼服治經行腹痛不可忍者立效紅丸子亦效阿魏丸大方科心痛類大聖散方見前紅丸子大方科痎瘧類艾煎丸治婦人室女經候不調臍腹冷痛噁心腹常脹滿至晚則增食茱萸湯洗當歸各七錢半熟地黃白芍藥各一兩半石菖蒲炒川芎人參各一兩熟艾四兩糯米飲調作餅焙上為末煮酒糊丸梧桐子大調縮砂香附湯送下五十丸方見大方科諸氣類濟陰丹治經水不時或崩中漏下一切血疾方見前杜牛膝散治婦人室女血閉不通五心煩熱紅花二錢半大當歸杜牛膝各五錢桃仁去皮尖炒另研二錢半上為末每服二錢空心溫酒下大油煎散治經候不調臍腹脹腰腿無力煩渴潮熱身體拘倦日漸羸瘦海桐皮五加皮牡丹皮地骨皮桑白皮各等分上銼散每服四錢生薑三片紅棗一枚清油數點水一盞半同煎空心溫服血氣抽刀散治血風血氣等疾五靈脂炒一兩莪朮桂心蕓薹子炒各半兩上為末每服二大錢酒半盞煎八分疾作熱服二神丸治血氣不和作痛不止及下血無時月水不調真蒲黃炒蓽茇鹽炒上等分為末煉蜜丸梧桐子大每服三十丸空心溫酒送下不飲米飲下一二服即止沒藥散治一切血氣臍腹撮痛及産後惡露不行兒枕塊痛血竭沒藥大尉細研桂心當歸去尾蒲黃紅花木香延胡索乾漆炒赤芍藥各等分上為末每服二錢食前熱酒調下玄胡索湯治婦人室女七情傷感遂使血與氣並心腹作痛或連腰脅或引背膂上下攻刺甚作搐搦經候不勻但是一切血氣疼痛並可服之當歸去蘆酒浸銼炒延胡索炒去毛蒲黃炒赤芍藥官桂不見火各半兩片子薑黃洗乳香沒藥木香不見火各三錢甘草炙二錢半上銼散每服四錢水一盞半生薑七片煎食前溫服吐逆加半夏橘紅各半兩琥珀散治婦人室女月水凝滯脅肋脹刺臍腹㽱痛不可忍及惡露不下血上攻心迷悶不省應有血氣腹痛並治牡丹皮去木赤芍藥蓬莪朮炒荊三稜銼各用煨劉寄奴去梗熟地黃酒炒延胡索炒當歸酒浸烏藥官桂不見火各一兩上用前五味以烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為末每服二錢溫酒調空心食前服三神丸治室女血氣相搏腹中刺痛痛引心端經行澀少或經事不調以致疼痛橘紅二兩延胡索去皮醋煮當歸去蘆酒浸銼略炒各一兩上為末酒煮米糊為丸梧桐子大每服七十丸加至一百丸空心艾湯或米飲送下失笑散治血氣心腹刺痛欲死諸藥不效服此頓愈五靈脂蒲黃微炒各等分上為末先用二錢醋調熬成膏入水一盞煎七分食前熱服奇方治血氣痛遊走及腰痛上用莪朮切片乾漆打碎各二兩同炒令漆焦香取出漆不用只以莪朮為末溫酒調下三錢腰痛胡桃酒下遊走痛冷水調下手拈散治血氣刺痛不可忍者及諸般氣痛方見前大方科心痛類煮附丸治血氣絞刺痛方見前三稜煎丸治血氣痞滿刺痛大效方見大方科諸氣類血瘕桃仁煎丸治血瘕血積經候不通桃仁大黃各一兩虻蟲半兩炒黑川朴硝一兩上併為末以醇醋二升半銀石器中慢火煎取一升五合下大黃桃仁等不住手攪欲下手丸下朴硝更不住手攪良久出之丸如梧子大前一日不吃晚食五更初用溫酒吞下五丸取下如赤豆汁或如雞肝蛤蟆衣狀未下再作如鮮血來即止續以調血氣藥補之虛人斟酌用琥珀丸治血瘕腹中有塊攻刺小腹痛重或腰背相引為痛久而不治黃瘦羸乏琥珀別研白芍藥川烏炮去皮川牛膝去蘆酒浸鱉甲醋炙蓬莪朮炮當歸去蘆酒浸梓厚朴薑炒各一兩木香不見火澤蘭葉官桂不見火各半兩麝香另研半錢上為末酒糊丸梧桐子大每服七十丸空心溫酒米飲下通經丸治室女月經不行臍下堅結大如杯升發熱往來此名血瘕加紅花方見前黑神丸神麯茴香各四兩木香椒炒出汗丁香各半兩檳榔四枚漆六兩半生半重湯煮半日上除椒漆餘五味皆半生半炒為末用生熟漆和丸如彈子大茴香末十二兩鋪陰地蔭干候外干並茴香裝器中極干去茴香膀胱痃癖及疝墜五膈血崩産後諸血漏下赤白並一丸分