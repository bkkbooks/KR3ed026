急痛發熱下痢手足煩熱唇口乾燥吳茱萸三兩湯洗十次炒半夏二兩半洗七次當歸去蘆人參去蘆白芍藥牡丹皮桂心去粗皮阿膠搗破蚌粉炒川芎甘草炒各二兩麥門冬去心兩半上銼散每服四錢水一盞半薑五片煎空心熱服經事來多不斷以此吞服暖宮丸亦效暖宮丸治婦人無子暖子宮冷服之神效附子炮去皮臍一枚杜仲炒斷絲地榆桔梗白薇去土川牛膝去苗川白芷黃耆沙參厚朴去粗皮薑汁炒各四錢北細辛去葉乾薑蜀椒各二錢半上為末煉蜜丸梧桐子大每服二十丸鹽酒下服之一月自然有孕局方四物湯羊肉丸多服亦效抑氣散治氣盛於血所以無子尋常頭暈膈滿體痛怔忡皆可服之香附子乃婦人之仙藥不可謂其耗氣而勿服香附子炒杵淨四兩茯神去木一兩橘紅二兩甘草炙一兩上為末每服二錢食前沸湯調服仍兼進紫石英丸炙用小溫經湯治經血不調血臟冷痛此方甚平易用藥徑捷當歸去尾附子炮去皮臍各等分上銼散每服三錢水一盞半煎空心溫服秦桂丸治婦人無子經進有效秦艽桂心杜仲炒斷絲防風厚朴各三分附子生白茯苓各一兩胖白薇乾薑沙參牛膝半夏各半兩人參一兩細辛二兩一分上並生碾為末煉蜜丸如赤豆大每服三十丸空心食前醋湯或米飲下未效更加丸數次覺有孕便不可服陽起石丸治丈夫真精氣不濃不能施化是以無子陽起石火煅紅研極細鹿茸燎去毛酒煮焙菟絲子水洗淨酒浸蒸焙別研天雄炮去皮韭子炒肉蓯蓉酒浸以上各一兩覆盆子酒浸石斛去根桑寄生沉香別研原蠶蛾酒炙五味子各半兩上為末酒煮糯米糊丸梧桐子大每服七十丸空心鹽湯或鹽酒下濟陰丹治婦人血氣久冷無子及數經墮胎皆因衝任之脈虛損胞內宿挾疾病經水非時暴下不止月內再行或前或後或崩中漏下三十六疾積聚癥瘕臍下冷痛小便白濁以上諸疾皆令孕育不成以致絶嗣方見前灸法婦人絶子灸然谷五十壯在內踝前直下一寸又法絶嗣胞門閉塞灸關元三十壯報之婦人妊子不成數墮腹痛漏下灸胞門五十壯在關元左邊二寸是也右邊二寸名子戶雜方厚朴丸治婦人胃冷嘔吐不下食厚朴去粗皮切薑汁炒三兩附子去皮銼如豆三兩上以生薑汁一升水五合煮令汁盡焙乾為末以酒煮神麯為丸梧桐子大每服三十丸不拘時溫酒下芎歸湯治頭暈痛諸脈平和惟肝脈獨弱可預見有崩疾來及治血虛頭暈方見前即佛手散橄欖丸止渴潤咽乾川百藥煎烏梅甘草石膏各等分上為末煉蜜丸如彈子大每服一丸噙化橘歸丸治肌膚手足俱有血線路此怒氣傷肝血失常經以致如此服之神效橘皮二兩當歸一兩上為末煉蜜丸梧桐子大每服三十丸溫酒下八味丸治大小便祕澀此血弱不能營養臟腑津液枯澀數服即愈方見大方科消渴類鹿茸丸治虛弱服剛劑太過發搐此肝血不足為剛劑所燥故令搐搦服此而愈方見大方科消渴類芍藥湯治冷證脅痛諸藥不效香附子四兩黃子醋二升鹽一兩煮乾為度肉桂延胡索炒白芍藥上為末每服二錢沸湯調不拘時候服虎骨散治腰上實肉處痛不可忍上以麝香末半錢用酒調服補心湯治陰中生瘡名曰𧈟瘡或痛或癢如蟲行狀淋瀝膿汁陰蝕幾盡治之當補心養胃白茯苓人參前胡半夏湯洗七次去滑川芎各三分橘皮枳殼麩炒去穰紫蘇桔梗甘草炙乾薑各半兩當歸一兩三分白芍藥二兩熟地黃一兩半上銼散每服四錢水盞半薑五片棗一枚同煎食前服狼牙湯治陰中蝕瘡爛潰濃水淋漓臭穢狼牙銼煎濃汁以綿纏箸頭大如繭浸濃汁瀝陰中數次雄黃兌散治下部𧈟瘡雄黃研青葙子苦參黃連各二分桃仁去皮尖研一分上為末以生艾搗汁和如棗核大綿裹納下部未效更加扁竹汁無艾只要綿裹散子納下部亦可洗拓湯療陰蝕甘草乾漆各一兩黃芩乾地黃當歸芍藥各二兩龜甲五兩上銼散用水七升煮取一半去滓以綿帛納湯中以拓瘡處良久即易日二度每拓湯可行十里許即拭乾捻取甘濕散敷瘡上使遍可經半日以湯拓拓訖如前敷藥甘濕散用五月五日蛤蟆青木香石硫黃鐵精為末生麝香臨時加入藿香養胃湯治陽明經虛不榮肌肉陰中生瘡不愈藿香白朮白茯苓神麯炒烏藥去木縮砂仁薏苡仁半夏曲人參各半兩蓽澄茄甘草炙各三錢半上銼散每服四錢水盞半薑五片棗二枚同煎不以時奶癰瘡黃瓜蔞一二個連皮穰子銼碎上用無灰常酒一二升於沙瓶內煮存一升去滓時時溫服酒盡再煮滓服如覺初時便服此藥即時痛止更不成瘡如已成瘡服之其瘡自穿而痛自止又方尚未成瘡才覺腫硬作痛以蔥早尉之其法用中樣小海味瓶口寬者以炭火入瓶內上以熱灰填滿平瓶口用蔥葉及蔥白捶損令遍覆瓶口以手帕子裹定倒執將瓶口向腫處任意輕輕尉之有驗治茄子疾心躁連綿黃水易治白水難愈烏金二豆散薑棗子煎溫服方見前又方生枳殼為散煮熏洗卻用絹帛包枳殼滓納入陰中即日漸消洗方茄皮白礬烏桕頭根朴硝澤蘭煮水熏洗加入炒石灰少許尤妙敷藥朴硝為末黃荊柴燒瀝調敷或用濃鐵漿水敷下疽病心躁四肢酸臍輪冷痛或腹中絞刺小嘉禾散豬肝蒜片煎服方見前又方硫黃一兩大鯉魚一個去頭皮納入藥故紙裹黃泥固濟火煅煙盡為末米糊丸梧桐子大每二十丸溫酒下如下疽生蟲所下如柿汁臭穢心中㽱痛悶絶虛煩甚者不可治磁石丸治子宮不收名瘣疾有痛不可忍者磁石酒浸火煅上為末糯米糊丸梧子大每服二十丸空心滑石湯下鐵粉散治同前當歸磁石半兩酒浸鐵粉上為末米飲調下隔夜用角藥次日服此角藥用鐵屑螺青為末磨刀水調塗生門上熏洗方荊芥穗藿香葉臭椿樹皮煎湯熏洗即入托藥萆麻葉有丫角者好飛過白礬為末以紙片攤藥托入摻藥先以淡竹根煎湯洗仍用五倍子白礬為末乾摻立效治牛亦驗敷藥用溫鹽水洗軟卻用五靈脂燒煙燻次用萆麻子研爛塗上吸入如入即洗去治陰腫不收麻黃荊芥茄種皮蛇床子真杉木刺蝟皮為末敷或煮水熏洗小麥朴硝白礬五倍子蔥白煮水淋洗效膏發煎溫穀氣實胃氣下泄陰中出血發灰豬脂上調停綿裹如棗核大納陰中治腳亦腫荊芥石膏地龍炒薄荷上銼散薑三片蜜少許煎服治陰瘡與男子妒精略同上用黃丹枯白礬萹蓄藁本各一兩硫黃半兩白蛇皮一條燒灰荊芥蛇床子各半兩研為末別以荊芥蛇床子煎湯溫洗軟帛挹干清油調塗濕則乾摻又方青黛黃丹水粉五倍子肉鋪上拭肉巾燒灰為末用小絹巾入陰中挹干如干用荊芥薄荷柏葉煎水洗再挹干清油調藥塗上又方先用黃芩海桐皮白礬韭菜根煎湯洗後用敗鼓皮燒存性細研入輕粉在內刮下雞腸上膏調塗瘡上如蟲吃入陰內用雞子一個煮熟去殼塗藥末於上綿子兜入陰中用火炙患處得癢即蟲行若身微作寒服藿香正氣散二三服又方真平胃散加貫衆末每服二錢熟煮豬肝拌藥入陰戶內數日可安治疳瘡月後便行房致成湛濁伏流陰道疳瘡遂生瘙癢無時先用胡椒蔥白作湯一日兩三度淋洗卻服後藥赤石脂龍骨黑牽牛炒菟絲酒浸蒸黃耆鹽水炙沙苑蒺藜炒上為末蜜丸梧子大每服二十丸燕窠蒸酒澄上清者吞下治陰中生瘡如蟲咬痛可生搗桃葉綿裹納陰中日三四易黃芩散治陰門生瘡上用黃芩當歸川芎白礬黃連銼散煮水熏洗即安治陰門腫方上以甘菊苗研爛百沸湯淋洗熏後洗月經不行説二七天癸至七七天癸竭行早性機巧行遲魯鈍通行則陰陽和合始能生子行年十四歲當時二十歲不行命如風燭朝不保暮有病發則死間有不死百中無一亦令一生多病未嘗一日安裕然有四季行亦可又有一年一次者亦不甚佳或一生不循正道而行者晚年有僻疾則難治洗心散方見前積熱類治陰中生一物漸大牽引腰腹膨痛至甚不思飲食皆因多服熱藥及煎爆或犯非理房事兼意淫不遂名陰挺每服二錢生地黃湯調仍用金毛狗五倍子白礬水楊根魚腥草山黃連各一兩重為散分作四服以有嘴瓦罐煎熟預以銀錫作一長小筒下透罐嘴上貫挺上先熏後洗立效服白薇散凌霄花少許煎方見前又用三茱丸食茱萸吳茱萸湯洗微炒桔梗水浸一伏時漉出慢火炒白蒺藜青皮去白山茱萸去核取肉微炒舶上茴香蕩去砂土焙乾各一兩五味子淨撿海藻洗焙大腹皮酒洗過曬乾川楝子去核延胡索各一兩二錢半上為末酒糊丸如梧桐子大每服三十五丸木通湯下下虛加川烏炮去皮肉桂去粗皮各一兩腰腹疼甚加桃仁去皮尖麩炒別研青皮去白枳實去穰各一兩真南木香七錢半一捻金丸服前藥未效卻用延胡索舶上茴香吳茱萸炒川楝子去核青木香各二兩上為末粳米糊丸如梧桐子大每服三十五丸空心木通湯服又用梅花腦子半錢鐵孕粉一錢水調刷上如陰畔生疱以涼血飲每服三錢加凌霄花少許煎空心服見前四物湯治産育艱難或一歲一産可以此少間之每服三錢加蕓薹子一撮於經行後空心服又方用升麻葛根湯二兩加瞿麥干土牛膝栝蔞根豆豉炒各半兩為散分作八服空心一日二服合滓亦於每月經行後便服每服亦加蕓薹子一撮尤妙
