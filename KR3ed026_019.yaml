body:
  text: 卷第十九瘡腫科總説人之一身血氣周流則平若冷熱不調喜怒不常飲食不節稍有壅聚則隨所發現癰癤屬表易治疽癌瘭痼發屬臟腑發於腦背頤上最為難治徑一寸二寸為癤三寸五寸腫圓赤為癰八寸為疽癌痼瘭名各不同其色亦異有圖見之凡初覺臖聚結熱疼痛腫赤痕瘢闊硬或見或不見治之如拯溺救焚不可緩也若按而後痛者其膿深小按即痛者其膿淺按之軟而復者有膿按之強而不復者無膿焮赤腫高者為實軟慢冷腫者為虛初作宜宣熱拔毒外以洗滌角敷以斂其痕瘢是大要法也已潰則排膿止痛朝夕亦洗滌以舒其毒氣膿盡則生肌敷痂次第施治不可愴惶失序亦不可拘一酌量輕重形證逆順寒則溫之熱則清之虛則補之實則泄之導以針石灼以艾炷破毒攻堅以平為期其有五善證者飲食如常一善實熱而小便澀二善肌肉好惡分明三善用藥如所料四善外無雜證五善七惡證者渴而喘大小便滑一惡內未潰肉黑而陷二惡已潰青腐筋骨黑三惡發背透膜四惡未潰肉先潰面青五惡發痰六惡發吐七惡所謂五善見三必瘥七惡見四必危外證形候不治者亦五缺盆平滿背脊平滿掌心平滿腳心平滿臍頭凸出逆證者有五大渴痛不止一逆聲細色脫二逆服藥嘔吐三逆睛細白大四逆肩胛全身轉不得五逆難治者亦有六證兩臉紅似坯染心病深得之久全不腫起亦不覺痛乃臟腑受病深病處硬如牛領之皮又如石榴之狀用藥三五日不軟者病深病人無時喜笑乃神氣脫病深口小內闊常出青白膿汁不疼痛內壞病深病處貼膏藥後出鮮血黑血間雜血病深又云初發疽時一粒如麻豆大身體便發熱生疽處肉亦熱腫大而高多生疼痛破後肉色紅紫此為外發雖大若盆碗如用藥有理則全活必矣初發疽時不拘大小身體無熱自覺倦怠生疽處亦不熱數日之間漸漸開大不腫不高不疼不痛低陷而壞爛破後肉紫色黑此為內發未作之先臟腑已潰爛則不治矣復有心腎肺癰腸癰附骨疽證心癰者乃心經有熱或好飲酒或嗜熱物積聚成熱久而不散熏發於皮膚之外氣血不流凝滯而生雖曰原道頗險而實可治宜用托裡活血之劑攻出外來腫高不陷可保無虞若陷入里亦不可恃如不飲食急須扶脾能食瘡已破穿見肉膜亦未為害但要洗滌淨潔以生肉藥摻四畔自然而愈腎癰乃與內腎相對皆由腎氣衰敗而成突起皮赤者易安陷入皮黑者難瘥如精神清爽顏色紅潤飲食不減多起少臥此為善美也顏色黑黃飲食全減斯為可憂惟須詳審速療肺癰乃將理失宜勞傷氣血風寒之氣乘間而入內舍於肺及挾邪熱其氣結聚或作寒熱脈數而實是也腸癰乃榮衛相干氣為敗濁小腹如腫大小便或澀或復汗出或復寒熱是也若腹皮急按之濡身無熱乃陰冷所成小腹堅痞按之痛身有熱乃結熱所成脈數膿已成不可下脈遲緊膿未成或下瘀血而愈附骨疽痛深按之無益著骨而生膿水腐潰碎骨出盡方愈治之宣熱去毒又當溫腎未可專用涼劑更在針烙其病務詳淺深刺拔其根則易愈不爾則順脈流走遍體洪腫卒致不救惜哉至於所患之時猶或多於外證未潰已前發渴乃臟腑焦燥痢下乃引飲無度已潰而渴則膿血去多津液中干或復腸胃暴虛遂成下痢體虛受寒則嗽聲不息氣逆挾熱則痰盛於胸熱毒不泄為二便祕澀毒氣迫心為嘔噦驚悸陰陽交爭血氣不和寒熱並作臟腑傷敗便血迸出毒氣攻外煩躁異常惟須大方科藥同治可也至於諸瘡猶當舉其大略丁瘡含蓄毒氣瘡頭黑硬如釘四畔帶赤如火瘢痕突起痛癢異常隨變焦黑未幾腫大而光轉為濕爛深孔透肌如大穿針之狀外證心驚頭疼拘急惡寒四肢痛強或寒熱交作頰舌間赤黑點點如珠若毒入腹心則煩悶嘔逆恍惚癡眠其斃可立而待治之當清心行血破毒拔疔則或愈矣瘰癧生於項腋之間凡人少小以來動即蓄怒或憂思驚恐抑鬱不伸遂致結核日積月纍風熱毒氣聚焉於是腫濕開瘡起伏無已甚則牽連腋下延蔓心胸外證寒熱往來或痛或不痛治之須用斑蝥地膽使其根從小便中出或如粉片或如塊血或如爛肉皆其驗也治療不早則無及矣漏瘡之由多發於項腋僻肛門之間治之失時即生寒熱凡癰疽諸發隨所在處苟有宿膿敗肉朽骨停蓄其間皆為之漏治法溫散風冷收水生肌用窒寒之藥必得痊平惟須戒房事耳癮疹為病風熱在表天時炎暄而燥氣乘之則為赤疹天時寒涼冷氣折之則為白疹治之須疏風行氣氣行則消矣其有疥癬等瘡各自不同浸淫不已皆由脾肺風熱或心腎久虛所致熱則平血解毒冷則清心溫腎又何患其不瘳矣五發形圖腫赤高起或長或大此疾或在婦人乳房上為血宮積滯氣壅血澀而成也內有膿血其病易治內有白膿其病難治內闊大色不變此疾初發之時不寒不熱腫處疼痛紫黑色不破裡面壞爛二十以前者積熱所生四十以後者皆血氣衰也須早為治十可全一二也腫赤堅硬此疾初發之時毒氣在皮作熱堅硬百節疼痛虛渴不已昏沉不省人事破後疽出血如蠶多口出膿汁七日之後急用藥有鮮血難治四畔生牛唇黑硬此疾初發之時疼痛二十以後四十以前者皆積傷之毒入胃壅聚而成四十以後六十以前者乃血閉不能行壅熱積血得之如出清水汁難治此疾發時渾身壯熱手足不遂憎寒頭痛虛渴多汗嘔逆四肢沉重五臟煩悶是其候若出米泔滓者難治祕傳十方治一切癰疽不問發肩發背作臖疼痛並宜服此即便消散其效如神是名前鋒正將荊芥薄荷山蜈蚣老公須天花粉蕪荑菰片敗荷心川白芷豬牙皂角切炒赤芍藥以上各等分淮烏大者一個煨紅內消倍其數甘草每十五文入一文喜甜加用上為末每服二錢薄荷茶清調下欲快利用酒調效若服經日未見效恐是涼藥澀血可加當歸羌活如熱重雄黃酒調乳癰加萱草根研汁調其餘候只用酒下不飲麥門冬去心煎湯亦可但較緩耳凡用內消先用此藥退潮止渴解熱是名引兵先鋒以升麻葛根湯表散後服此木通瞿麥荊芥薄荷白芷天花粉甘草赤芍藥麥門冬去心生乾地黃山梔子車前子連翹各等分上銼散每服二錢燈心生地黃煎熱潮加淡竹葉煎溫服上膈食前下膈空心老人氣虛者宜加當歸羌活敷藥諸般疽發腫赤痛不可忍未成角散已成角破用至瘡口合而止是名四面楚歌荊芥和根銼碎赤芍藥大柏皮土當歸山大黃土白芷天南星赤小豆商陸干即中榕根銼片子焙白芨赤蘞白蘞草烏寒水石煨或炒各等分上為末生地黃自然汁調敷四畔或苦虀根汁腫用商陸根研汁未潰則滿體塗上或有尖起處則留出瘡口洗方諸發已破未破皆洗如成膿潰爛最要洗淨去故肉生新肉洗後淨干再用角貼摻藥一日一次名水師晶明大柏皮澤蘭莽草荊芥赤芍藥山大黃土白芷土當歸獨活各等分上銼粗散用水一斗入蔥白大椒橘葉同煎熏洗如已爛入豬蹄下膝爪骨肉煎可免干痛淨洗為度替針丁香丸草烏尖硇砂白丁香堅者上為末酸醋調點將破者令速潰但有急則無如刀為快蜞針一法亦妙見後內護治癰發已成未成服內消三五日不效或年四十以上氣血衰弱成者速潰未成者速散服至瘡口合而止內能固濟去舊生新是名固壘元帥又名加味十奇散當歸酒浸桂心不見火人參土芎香白芷防風去蘆桔梗厚朴去粗皮薑汁炒甘草五文乳香別研沒藥另研上前八味各等分同為末每服二錢酒調日三服病愈而止不飲者麥門冬去心煎湯或木香湯治諸發已潰去舊生新老人氣血虛弱宜補之此潰後服至愈而止是名護壁都尉防風去蘆厚朴制同上苦梗白芷黃耆炙各半兩川芎甘草柳桂當歸各三錢人參二錢上為末每服二錢空心溫鹽酒調服至瘡口合後更服為佳不飲酒木香湯兼服降氣湯尤妙方見前生肉神異膏治癰疽壞爛及諸瘡發毒雄黃五錢滑石倍用上為末洗後摻瘡上外用綿子覆蓋相護凡洗後破爛者用此貼之止痛拔毒膏治一切瘡發臭爛不可近未破則貼破已破則生肉杖瘡疔瘡皆用之斑蝥四十九個柳根四十九條木鱉子七個乳香沒藥麝香少許松脂三錢上用真清油十四兩煎黑柳條焦枯濾去滓入黃丹五兩滴入水中成珠為度卻入諸藥攪及勻入瓷器中收了後用神妙斂瘡口黃丹散黃丹煅白礬枯龍骨寒水石乳香木香不見火黃芩檳榔膩粉各三錢腦子少許上為末隨瘡乾溼用之干則用溫鹽湯洗濕淨干卻摻其上用不可太早須膿血去淨臨好方用不然則又臖作通治車螯散治癰疽初發腫痛或少年熱盛發背等急宜宣毒利下熱退為度大人小兒四季皆可服之紫背車螯一雙鹽泥固濟火煅通紅地上出火毒用輕粉甘草各二錢大黃五錢黃芩漏蘆去須瓜根各半兩上為末每服二錢薄荷湯下速利酒亦可單煮大黃湯治同上氣血衰者不可用大黃甘草上銼散每服三錢水一盞半煎空心服利下熱毒五香散升降諸氣宣利三焦疏導壅滯發散邪熱治陰陽之氣鬱結不消諸熱蘊毒腫痛結核或似癰癤而非使人頭痛惡心寒熱氣急木香丁香沉香乳香藿香各等分上銼散每服三錢水一盞半煎食後溫服五香連翹湯治一切惡核瘰癧癰疽惡腫等病青木香即舶上木香沉香薰木香即乳香丁香麝香升麻桑寄生獨活連翹射干木通各二兩大黃蒸三兩上銼散每服四大錢水二盞煎一盞空心熱服半日以上未利再服利下惡物為度未生肉前服不妨以折去熱毒之氣本方有竹瀝芒硝恐泥者不能斟酌故缺之知者自當量入平補散利後不止手足冷此藥補之溫脾正氣白朮甘草白薑陳皮各二錢茯苓木香各一錢肉豆蔻二個煨上為末服前藥後則可服鹽湯調二錢日三四服利止手足溫食進卻住服加味十全湯治老人虛極瘡疾臨愈宜服黃耆生乾地黃當歸並用酒浸川芎人參白茯芩粉草白芍藥桂心不見火烏藥白朮米泔浸麩炒陳皮北五味子微炒以上各五錢上銼散每用一兩水一碗薑五片北棗一枚同煎分作二服滓可曬乾再為末服真方不換金正氣散治疽瘡未安之間遍身寒熱或先寒後熱先熱後寒或連日作或間日作必先嘔痰而後寒熱大汗出然後止服此祛寒邪正脾氣痰飲自消寒熱不作蒼朮米泔浸半日炒令黃色大厚朴紫色者去粗皮切薑汁炒各二兩粉草炙一兩真橘紅水洗淨去白兩半以上四味併入鍋內炒去火毒半夏湯洗七次藿香葉人參去蘆木香去蘆白茯苓去皮各一兩上銼散每服三錢水一盞半生薑三片紅棗二枚煎八分入鹽少許溫服不拘時候阿膠飲子治一切癰疽發背挾𤷍𤻼𤷍奶癰癤毒並治之明阿膠銼蚌粉炒如珠子出火毒一兩真橘皮半兩粉草一兩上銼散分作三服水一碗煎候溫病在上食後服病在下空心服纍效忍冬酒治癰疽發背初發時便當服此不問疽發何處婦人乳癰若鄉村或貧乏無得藥材者虔心服之大有神效忍冬藤五兩捶不犯鐵大甘草節一兩上各生用水二碗慢火煎一碗入無灰酒一大碗再煎十數沸去滓分三次溫服如無生者用乾者終力淺更生取葉一把擂爛入餅子酒少許生餅酒尤佳調和稀稠得所敷瘡四面中心大留一口泄毒蠟礬丸治癰疽發背瘰癧漏瘡惡瘡衛護內膜驅解諸毒自然內消通明白礬生用二兩上為末以黃蠟一兩二錢熔汁就爐上入礬拌和衆手丸如梧桐子大每服十五丸熟水或冷酒下常服之漏瘡用油發灰和雞內金末外塞粉乳托裡散癰疽初發便服或毒氣入里衝心煩悶吃嘔喘嗽以至泄瀉急用頻服托裡返出毒氣自內發起丹外又能消已發未發皆可服之神效真緑豆粉心二兩明乳香半兩以蒻葉或蘆葉盛蓋火尉攤冷研上為末每服二錢新熟水調下或生甘草煎湯調食後少時細呷常要藥味在胸膈間則毒氣不能攻心或瘡已沉晦用當歸一錢辣桂二錢煎湯調下仍以加味不換金正氣散為佐小兒豆瘡陷入亦能救之瘰癧攻心嘔悶亦用五味子湯治腎水枯竭運用不上致令口中乾燥舌上堅硬或如雞內金北五味子綿黃耆去蘆條參去蘆麥門冬去心各兩半粉草半兩上銼散每服半兩水盞半煎不以時溫服日夜五七次神白膏貼五發未破南星大黃草烏白蘞各半兩蚌粉大柏皮各一兩小赤豆一合上為末取芭蕉頭研取油調角四畔加乳香沒藥尤妙乳香膏止痛木鱉子去殼細削當歸各一兩柳枝二八寸寸銼之同以清油四兩慢火煎令黑色次用後乳香沒藥各半兩白膠香明淨者四兩同研細入油煎化用棉子濾之上再事治之煉藥鐵銚令極淨再傾煎藥油蠟在內候溫入黃丹一兩半以兩柳枝攪極得所再上火煎不住手攪候油沸起住攪注在水中成珠不散為度秋冬欲軟春夏欲堅傾在水中出火毒搜成劑收之追毒丹治瘡疽黑陷者用針刀開瘡內追毒丹使之潰然後去敗肉排膿隨證治之癰疽疔瘡附骨疽並皆治之巴豆七粒去皮心不去油研似泥白丁香輕粉各一錢雄黃黃丹各二錢上件研和加白麵三錢滴水為丸如麥狀針破瘡內之覆以乳香膏追出膿血毒物漏瘡四壁死肌不去不可治亦以此追毒去死肌乃養肉令愈疾小者用一粒大者加粒數用之太乙膏治五發癰疽一切惡疾軟癤年深日還已成膿未成膿貼之即效蛇虎蠍犬刀斧所傷並可內服外貼發背先以溫蔥湯水洗瘡拭乾用帛子攤藥貼仍用水下血氣不通酒下赤白帶下當歸酒下咳嗽喉閉纏喉風並棉裹含化一切風赤眼貼太陽穴後用山梔子湯下打撲傷損貼藥仍以橘皮湯下腰膝痛貼之鹽湯下唾血桑白皮湯下諸漏先以鹽湯洗若諸瘡癤並量大小以紙攤藥貼之並每服一粒旋丸如櫻桃大以蛤粉為衣其藥可收十年不壞愈久愈烈神效玄參川白芷川當歸去蘆官桂去粗皮赤芍藥大黃生乾地黃各一兩上銼如大豆大用清油二斤浸春五夏三秋七冬十月濾去滓油熬得所次下黃丹一斤滴油入水中不散為度善應膏治諸般惡瘡腫毒發背腦疽癧子牙腫打撲接骨閃肭刀斧傷杖瘡蚊蟲毒狗馬咬湯火漆瘡疥癬貼之即愈又治婦人吹乳以藥丸如梧子大新汲水下二十丸肺癰腸癰亦可為丸吞服溫酒米飲或北梗甘草煎湯皆可不可犯葷辛及火焙上等黃丹八兩研極細白膠香明沒藥滴乳香並別研大當歸川白芷杏仁去皮尖大黃草烏川烏赤芍藥檳榔生乾地黃土芎滴青別研入亂髮淨洗以上各一兩上除乳香沒藥外將磁石銚盛香油一斤浸藥一宿慢火煎熬諸藥黑色再入蔥白亂髮煎少時用生絹帛濾去滓留下一兩藥油復將所濾油於慢火上熬卻將黃丹入油內用長柳條槐條不住手攪候有微煙起提起藥銚將柳條點滴在水面上凝結成珠不散方成膏如不成珠再熬直待成膏提起藥銚攪無煙出卻入乳香沒藥白膠末攪勻傾出瓷器內將元留下浸藥銚油一併收拾器內用新汲水一日一換將藥器坐放水內三日出火毒方可用之如膏藥硬約量加黃蠟清油入膏內攪勻得所熬膏極難於火候須耐煩看火緊慢火猛則藥中火發不特失藥性又燎傷製藥入面目玄武膏治癰疽發背疔腫內外肷瘡陰疰下諸惡瘡及頭項癰腫不問已潰未潰皆可用大能排膿散毒止疼生肌纍有神驗若丁腫先用銀篦或鹿角針於疔瘡中間及四畔針破令惡血出以追毒餅如小麥大擦入孔中卻以此膏貼之如瘡壞爛至甚難以藥貼則將皂角二三片煎油調勻此膏如稠糊薄敷之膿水或轉多不數次敷之干愈妙大巴豆去殼膜木鱉子去殼各二兩淨黃丹四兩研細真清油十兩槐柳嫩枝各七寸長七條銼細上依前法煎熬成膏貼用金絲膏治傷筋動骨損痛閃肭風毒惡瘡風濕筋寒諸病當歸尾川白芷杏仁去皮尖玄參豬牙皂角去皮弦草烏生銼用各三錢連須葉蔥肥者十根滴青明者半斤白膠香明者八兩乳香沒藥別研為末各半兩黃蠟明者一兩男子亂髮洗淨挼如雞子大上用清油半斤將八味依前法熬濾卻入膠香滴青攪勻下黃蠟又攪無煙方下乳香沒藥貼膏法如瘡有膿血不淨痂瘢閉礙須用藥水洗淨拭乾候水氣干卻用膏貼貼後有黃水膿血出流用紙揩從側畔出一日一換黃水膿血止兩日三日一換貼至愈蜞針正法治癰癤不問老少初發腫作覺見稍大便以紙一片冷水浸搭瘡上視其上一點先乾者即是正頂先以大筆管一個安於正頂上卻用大馬蜞一條本草名水蛭安其中頻以冷水灌之馬蜞當吮其正穴膿血出毒散是效如毒大蜞小須用三四條方見功效若吮著正穴蜞必死用水救活其瘡即愈纍試奇效乃去毒之一端也血不止以藕節上泥止之白茅花亦效追毒餅治諸般惡瘡因針開了口後又閉合生膿脹痛不可忍用此捻成小麥子大入放瘡中永不閉膿水自出瘡自幹好極好信石半錢雄黃雌黃大硃砂各一錢輕粉少許上研為細末糯米糊丸如麥子大若瘡口閉合生膿將藥入內仍以膏藥貼之內追毒丹清心解毒散潮大硃砂雄黃各五錢生麝香一錢犀牛角琥珀以上並別研細黑角沉香各五錢上為末煉蜜丸梧桐子大每服二十丸燈心薄荷湯下雜證乾葛飲治發背作渴黃芩朴硝各五錢乾葛一兩上銼散每服三錢用枇杷葉去背上白毛淨洗同煎不拘時服人參敗毒散參苓白朮散方見大方科傷寒陽證及脾胃類以上諸藥升降散毒理脾和氣凡諸發臨愈皆可投數服癰疽緣氣凝血滯氣聞香則行初發亦宜縮砂香附湯人參敗毒散參苓白朮散方見大方科傷寒陽證及脾胃類以上諸藥升降散毒理脾和氣凡諸發臨愈皆可投數服癰疽緣氣凝血滯氣聞香則行初發亦宜縮砂香附湯六一湯諸發愈後宜服黃耆六兩炙甘草一兩上銼散每服三錢水一盞半薑三片棗二枚煎空心服八味丸老人氣血衰弱發背作渴不止宜服方見大方科虛損類嘉禾散治疽後氣弱不食方見大方科脾胃類乳香丸治發背及一切疽瘡潰爛痛不可忍者當歸川芎交趾桂川香芷真緑豆粉各五錢羌活獨活五靈脂乳香別研沒藥別研各三錢白膠香五錢上為末煉蜜為丸如彈子大每服一丸用薄荷湯嚼下手足諸般損痛不能起者加大草烏一味用木瓜鹽湯細嚼下黑附丸治氣虛血弱老人疽發後四肢倦怠無力或燥渴好飲水不止者黑附子一個九錢煨鹽水浸白茯苓五錢去皮川楝子一兩去皮核茴香一兩炒破故紙一兩炒熟地黃淨洗切酒炒一兩交趾桂五錢去粗皮大當歸一兩去尾上為末煉蜜丸如梧桐子大每服三十丸空心鹽湯或鹽酒下如覺脾虛食減亦用參苓白朮散兼服禁腫法凡春初雷始發聲時急以兩手指雷聲聲止乃止後七日勿洗手此後有一切腫及蠍螫惡注腫瘡摩之隨手即消乳癰栝蔞散如不愈者並依前方治之栝蔞明乳香上為末每服二錢溫酒調下熱者加石膏末少許又方草烏七個小赤豆七粒拒霜葉一兩陰乾上為末井花水調塗角四畔留頂用前敷藥亦妙又方仙人掌草一握小酒糟一塊生薑一大塊擂爛入桂末少許炒酒服留滓罨腫處即止更不成瘡乳勞癰火鍁草皂角刺穿山甲黃蜂窠上各燒存性為末入輕粉生清油調勻敷瘡上又方赤小豆一升酒研爛去滓溫酒服留滓敷患處又方蔓荊子擂爛炒酒服滓貼患處又方乳勞癰爛見心者貓兒腹下毛坩堝內煅存性為末乾摻或清油調入輕粉少許吹乳結實疼痛陳皮一兩甘草一錢水二碗煎一碗分二次服次用荊芥羌活獨活煎湯熏之溫則洗之安又方消毒飲加連翹三錢黃瓜蔞仁三十粒捶損每服四錢水一盞半煎食後溫服方見小方科又方皂角刺燒灰蛤粉明乳香少許為末熱酒下揉散亦可奶頭裂取秋後冷露茄子花裂開者陰乾燒存性灰水調敷未秋時但裂開者亦可用灸法癰疽高腫堅硬不破名曰石癰當上灸百壯諸癰疽毒開闊不止疼楚殊甚以灸炷四枚圍著所作處同時下火各灸七壯多至十一壯佳大蒜頭橫切如錢貼其中心頓小艾炷灸之五壯而止若形狀稍大以黃稈紙蘸酒敷貼認先干處為筋腳於先干處灸之或兩處先干皆灸但五七壯而止又法屈指從四圍尋按遇痛處是根就此重按探入自覺輕快即此灸之凡癰疽展大如龜形且看頭向上下先灸其前兩腳次灸其尾或經筋走緊而長須盡處灸之須留頭並後兩腳勿灸若盡灸之不惟火氣壅聚彼毒無所走散又攻入里也或辨認不明以白芷三分漢椒桑白皮各一分蔥白十莖水一碗煎入酸醋半盞淋洗少頃其筋自現可以辨認心癰涼血飲即引兵先鋒方治心肺有熱或作寒熱口乾好飲水渾身疼腹內作熱頭面赤色次用內托散即前鋒正將方治同上兼用敷角洗貼已潰多服加味十奇散以上二方並見前腎癰八味丸治腎虛嗜欲過度外挾寒邪發為癰腫不可施以涼劑宜服方見大方科虛損類加味十奇散治同上兼用蔥白橘葉椒葉豬蹄湯淋洗仍貼金絲膏方並見前肺癰桔梗湯治男子婦人咳而胸膈穩痛兩腳腫滿咽乾口燥煩悶多渴時出濁唾腥臭名肺癰小便赤黃大便多澀實者先投參蘇飲四服虛者先投小青龍湯四服並用生薑棗子煎卻服此二方見大方科傷寒和解類及通治類桔梗去蘆貝母去心大當歸酒浸栝蔞仁枳殼去穰炒薏苡仁微炒桑白皮炒甘草節防己去粗皮各一兩百合蒸半兩黃耆一兩半正地骨皮去骨知母杏仁北五味子甜葶藶各半兩上銼散每服四錢水一盞半生薑五片煎不以時溫服咳不渴加百藥煎熱加黃芩大便不利加煨大黃少許小便澀甚加木通車前子煎煩躁加白茅根咳而疼甚加人參白芷葶藶散治肺癰咳嗽氣急臥睡不安心胸脹滿甜葶藶二兩半隔紙炒赤色百合炒白附子北五味子炒甘草節羅參款冬花百藥煎各一兩大硃砂五錢入研紫菀去木一兩上為末每服二錢燈心湯調下牡丹散治肺癰胸乳間皆痛口吐膿血氣作腥臭川升麻苦梗薏苡仁地榆黃芩赤芍藥牡丹皮生甘草各等分上銼散每一兩水一升半煎五合溫溫日三服補肺散治肺癰已吐出膿血以此潤護真鍾乳粉一兩白滑石二兩上為末每服三錢米飲調下理肺膏治肺癰正作咳唾不利胸膈迫塞訶子去核百藥煎五味子微炒條參去蘆款冬花蕊杏仁知母貝母甜葶藶子紫菀百合甘草節各五錢上為末用白茅根淨洗稱三斤研取自然汁入瓷石器中熬成膏更添入好蜜二兩再熬勻候冷調和前藥為丸如梧桐子大溫水吞下加味敗毒散治上膈壅熱而成肺癰兼感風寒重者加入黃芩栝蔞仁薄荷當歸川白芷半夏烏梅桑白皮每半料各五錢生薑生地黃燈心白茅根煎熱甚加大黃內護排膿散理肺癰葉膿後宜服排膿補肺嫩黃耆二兩川白芷北五味子炒人參各一兩上為末煉蜜丸如小指頭大偃仰入口噙化旋旋咽下食後服臨臥服葦葉湯薏苡仁瓜瓣仁桃仁去皮尖各一兩右銼散每服四大錢水二盞先以葦葉一握煎取一盞去滓入藥煎六分食後服或吐膿血勿怪五香白朮散寬中和氣滋益脾土生肺金進美飲食沉香木香明乳香丁香藿香葉各半兩白朮羅參白茯苓薏苡仁山藥扁豆桔梗縮砂白豆蔻粉草蓮肉各一兩上為末蘇鹽湯調空心服棗湯亦可有汗加浮麥煎雲母膏治一切內外癰瘡依和劑方修合煎北梗甘草湯吞服服畢便就枕有熱者善應膏亦可丸服湯引同上方見前加味十奇散治肺癰已散不咳不疼服此去舊生新內能固濟方見前肺癰證治萌易治膿成難治診其脈數而實已成微而澀漸愈面色白嘔膿而止者自愈有膿而嘔食面色赤吐膿如糯米粥者不治男子以氣為主得之十救二三婦女以血為主得之十全七八歷試屢驗灸法治肺癰正作吐膿血不已肺俞灸二七壯二椎下三椎上各去脊一寸半及灸譩嘻二穴二七壯其穴在肩膊內肷第六椎兩旁三寸抱肘取之腸癰敗醬散治脈數身無熱腹無積聚按之濡此為腸癰久積陰冷所成宜服薏苡仁二兩半附子炮半兩敗醬一兩一分上銼散每服四錢水一盞半煎空心服小便利為效牡丹湯治腸癰小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血洪數者膿已成不可下大黃蒸桃仁去皮尖各半兩牡丹皮一錢一字栝蔞子三分芒硝二錢上銼散作一服水三盞煎八分去滓入芒硝再煎沸頓服不拘時候未效用敗毒散方見大方科傷寒類薏苡湯治腸癰腹中㽱痛煩毒不安或膿滿不食小便澀婦人産後虛熱多有此病縱非癰但疑似間便可服就有差互亦無害薏苡仁五兩牡丹皮桃仁各三兩瓜瓣仁四兩上銼散每服四錢水一盞半煎不拘時服蠟礬丸治腸癰內托神妙方見前附骨疽蟾蜍膏治附骨疽久不瘥膿汁敗壞或骨從瘡孔出大蝦蟆一枚亂髮一握如雞子大豬脂油四兩上以豬脂油煎前項藥濾去滓凝如膏貼之凡貼先以桑白皮烏豆煎湯淋洗拭乾煅龍骨為粉摻瘡口四畔令易收斂卻用貼之黑鯽膏治附骨疽未破已破或膿出不盡者上用黑色鯽魚一個去腸入白鹽令腹滿用線縛定用水一盞銅石器中煮水盡乾焦為末用豬油調敷已破者乾摻少痛勿怪赤朮丸治附骨疽膿汁淋漓久而不瘥已破未破皆可用赤朮一斤泔浸去油用川椒蔥白煮令黑色焙乾舶上茴香破故紙炒川楝子銼炒茯芩土茴香川白芷桃仁去皮尖炒各一兩上為末老人加黑附子煉蜜丸梧桐子大每服五十丸溫酒或鹽湯吞下便毒雙解散治便毒內蘊熱氣外挾寒邪精血交滯腫絞疼痛辣桂川大黃白芍藥澤瀉牽牛炒取末桃仁去皮炒各一分甘草半分上銼散每服三錢水一盞半生薑五片煎食前日二服先小便快熱從小便出後大便利皆是稠毒五香連翹湯治便毒腫結因敗精搏血留聚而成立效方見前復元通氣散便毒初發用此穿山甲酒浸炙焦二兩天花粉酒浸一宿焙白芷當歸甘草舶上茴香炒白牽牛炒延胡索擦去皮南木香各一兩青木香半兩上為末每服二錢溫酒調食前服不飲南木香煎湯服五苓散疏利小便以泄敗精蔥二根煎湯調下方見大方科傷暑類蠟礬丸治便毒腫聚內消神妙方見前四順清涼飲治便毒熱證大便不通方見大方科積熱類木香流氣飲治便毒體虛氣閉大便不通加大黃少許煎食前服方見大方科諸氣類護壁都尉方治便毒已消內托可常服方見前敷藥治毒潰時用白芨沒藥乳香血竭為末摻效又方治便腫痛雄黃乳香各二分半黃柏一分上為末分作兩服以新水調敷自平又方治便毒初發以生薑一大塊米醋一合薑蘸醋磨取千步峰泥敷臖作處即效千步峰即人家行步地上有高塊者是灸便毒法用細草或軟篾隨所患左右手量中指自手掌盡處橫文量起通三節至指盡則住不量指爪拒斷卻將此草於手腕橫紋量起引草向臂當中草盡處即是穴艾炷如麥大灸二三壯腫散痛止即安偏癰祕方治偏癰俗名𤻼𤷍欲作未作之時服之即愈豬牙皂角七片灰火煨黃色去皮弦地上出火毒研如末用酒調服又方一服即散牛蒡子破故紙黑牽牛大黃切各微炒上等分為末酒調下癮疹清肌散治風寒暑濕外搏肌膚髮為癮疹遍身瘙癢或赤或白口苦咽乾或作寒熱敗毒散一兩半加天麻薄荷各三錢蟬蛻二七個去足翼分作六服每服水一盞半生薑三片煎溫服取效方見大方科傷寒陽證類加味羌活散治風寒暑濕外搏肌膚發為癮疹增寒壯熱遍體搔癢隨臟氣虛實或赤或白心神悶亂口苦咽乾羌活前胡各一兩人參桔梗甘草炙枳殼麩炒川芎天麻茯苓各半兩蟬蛻去頭足薄荷各三分上銼散每服二大錢水一盞半生薑三片煎不以時服加味烏荊丸治癮疹上攻頭面赤腫瘙癢搔之皮便脫落作瘡作癢而痛淫液走注有如蟲行川烏湯洗三五次去皮尖焙乾稱荊芥穗各半斤薄荷五兩杜當歸洗浸三日焙乾稱一斤上為末好醋煮米粉糊丸梧桐子大每五十丸溫酒下曲術散治因浴出腠風冷遍身癮疹搔之隨手腫突及眩暈嘔噦白朮一兩神麯二兩炒甘草一分上為末每服二錢米飲調下一方以土朱研炒冷酒調下二錢不飲以茶調下消風散治癮疹瘙癢神效方見風科熱證類茶調散治風熱癮疹方見大科頭痛類胡麻散治風氣挾熱癮疹瘙癢胡麻子五兩苦參荊芥穗何首烏各二兩威靈仙防風石菖蒲牛蒡子炒菊花蔓荊子蒺藜炒去刺甘草炙各兩半上為末每服二錢食後薄荷湯或好茶清下治遍身癮疹疼痛成瘡白殭蠶一兩炒黃色為末分四抄酒調服敷藥明礬朴硝為末井水調雞羽掃敷又方赤小豆荊芥穗曬為末雞子清調薄敷洗方蠶沙以新水煎密室溫洗諸瘡熱證平血飲治遍身生瘡膿血臖腫極痛且癢乾葛赤芍藥升麻各一兩粉草五錢加天麻蟬蛻上銼散與人參敗毒散合和生薑薄荷生地黃麥門冬去心煎不拘時候大效敗毒散見傷寒陽證類小牛黃丸治心肺積熱腎臟風毒攻於皮膚時生疥癩瘙癢難忍時出黃水及大風手足壞爛眉毛脫落一切風疾玄參荊芥穗各四兩苦參半斤大川烏宣連各一兩真牛黃二錢上為末水糊丸梧桐子大每服三十丸熟水或茶清下一方加麻黃防風皂角末為膏入煉熟蜜為丸妙牛黃清心丸方見風科通治類天麻煎治風毒入胃及心腎經絡攻注百節疼痛頭目虛腫痰涎不利下注腰腳弱緩生瘡婦人血風男子癩風及風濕腳氣攻注皮膚瘙癢癮疹偏正頭風川烏頭淨洗灰炒裂去皮臍草烏頭水浸三日洗去皮各二兩上為末醋糊丸如梧桐子大茶清下三十丸酒蒸黃連丸治同上方見大方科諸氣類米飲下三十丸荊黃湯治惡瘡生背脅頭腦四肢要害處連進一二服得利即效未利再服方見大方科積熱類當歸飲治心血凝滯內蘊風熱發於皮膚遍身瘡疥或腫或癢或膿水浸淫或發赤疹㾦㿔當歸去蘆白芍藥川芎生地黃洗白疾藜炒去尖防風去蘆荊芥穗各一兩何首烏黃耆去蘆甘草炙各半兩上銼散每服四錢水一盞半生薑五片煎不以時溫服連翹飲治諸惡瘡紅赤痛癢不定心煩口乾及婦人血風紅斑圓點開爛成瘡癢痛流黃水汁連翹赤芍藥當歸荊芥防風牛蒡子炒川芎梔子黃芩瞿麥木通生乾地黃瓜根麥門冬粉草各等分上銼散每服四錢水一盞半燈心二十莖煎不以時服赤小豆湯治少年氣血俱熱遂生瘡疥變為腫滿或煩或渴小便不利赤小豆炒當歸去蘆炒商陸連翹仁赤芍藥漢防己木豬苓去皮桑白皮炙澤瀉各半兩上銼散每服四錢水一盞半生薑五片煎不拘時候溫服熱甚者加犀角二錢半蟬蛻散治飲酒後遍身癢如風瘡抓至血出其癢止後痛蟬蛻去頭足翼土二十個薄荷葉一兩上為末每服二錢小酒調服不拘時候立效虛證四生散治上攻下注耳鳴目癢鼻赤齒浮或作口瘡下注陰濕四肢瘙癢遍體生瘡及婦人血風瘡黃耆丸治腎臟風虛下注腰腳生瘡行步艱難方見大方科虛損類增益四物湯治一切惡瘡川芎當歸地黃甘草芍藥各等分防風荊芥鳳尾草酌量加入上銼散每服三大錢水一盞半煎服經驗五香連翹湯治風氣風癧瘡除升麻大黃獨活木通乳香五味忌食冷物服後小水必通方見前五苓散加瞿麥大略治同上此方得之艱用之取效敷藥合掌散治遍身生瘡百藥不效檳榔五個為末硫黃五錢生者研細末膩粉半錢上和勻每付一錢安於手心內油調夜臥時塗外腎不得洗手但擦手令乾可也一二日瘡即愈通治多年惡瘡不瘥爛搗馬齒莧敷之亦治反花瘡其形如花開之狀燒灰以豬脂塗敷又方雞腸草研細取汁拂其瘡以滓蓋之或為末豬脂調敷極效赤小豆方治善惡瘡疥或赤腫無不愈者上用赤小豆七七粒為末敷之愈或以水調敷瘡及四旁赤腫處落則再敷又方銼散每服二錢水一盞煎服仍用新汲水調藥敷緑赤豆粉黏物既干難揭則用苧根為末和之便不黏此法尤佳殺蟲方雞心檳榔一兩黃連川山甲十個燒存性麝香半錢上為末用臘茶末調塗三五日後用蔥湯洗惡瘡方白膠用赤色者一錢明白礬三錢黃色黃丹三錢上為末先暖過酸漿水洗拭乾用清油調敷又方貝母為末入雄黃少許摻上菖蒲末治遍身熱毒瘡痛而不癢手足尤甚黏著衣被夜不得睡多取菖蒲為末布於席上使病者恣臥其間仍以衣被覆之五七日瘡愈疹瘡爛用艾氈亦可葵花散治一切瘡鬱金黃連黃柏梔子仁葵花各等分上為末冷水調成膏貼瘡痛處神效松脂散治一切惡瘡醫所不識者水銀甘草黃柏黃連松脂黃明者膩粉蜂窠以沼故著壁上者上取水銀放在掌心以唾擦為泥入瓷器中用清油和勻生絹濾如稀餳先以溫水洗瘡帛拭乾塗之一切無名瘡或痛或癢並有黃水者塗之愈治疥尤妙一掃散治一切瘡疥但相對而生者便是不問乾溼焮痛日近年深用之立效藜蘆皮二兩真輕粉十貼好蚌粉一兩通明雄黃並水粉一兩上為末用大鯽魚一個入香油煎候熟去魚攤冷調藥搽瘡未效可加信石末少許研杏仁十粒近陰處勿用殺疥藥水銀滓研細臘豬脂膏蘸遍身擦上立效真平胃散治腫滿後作瘡或發水疱成瘡是脾土崩壞及一切瘡用清油調敷濕則用摻立愈方見大方科脾胃類二黃膏治一切瘡痏清油三兩煎巴豆二十粒微黑去巴入黃蠟一兩化訖研雄黃硫黃各一錢溫入成膏淨洗抹敷二三次神效疹痘後瘡亦用神異膏治一切瘡疥全蠍七個去毒皂角一挺銼碎巴豆七粒去殼蛇床子三錢清油一兩黃蠟半兩輕粉半字雄黃另研三錢上先用皂角全蠍巴豆煎油變色去了三味入黃蠟化開取出冷處入雄黃蛇床末輕粉和勻成膏先用苦參湯溫洗後以藥擦瘡疥上神效淨肌散治一切惡瘡雄黃海螵蛸大柏皮宣連水粉輕粉蚌粉杏仁上為末用真清油調敷又方治大風離楓木子燒存性為末加真輕粉香油調敷烏梅膏治諸瘡胬肉如蛇出數寸用硫黃細研於肉上薄敷即便縮諸瘡中新胬出肉以烏梅肉蜜和捻作餅子如錢厚以貼瘡上苦楝膏治大人小兒瘡禿及惡瘡苦楝皮燒灰以豬脂調敷青黛散治中部生濕瘡熱癢而痛寒熱大小便澀食亦減身面微腫多食魚蝦發風熱物得之馬齒莧四兩研爛入青黛一兩再研勻塗上立有神效仍服八正散日三服方見大方科積熱類洗方苦參湯苦參蛇床子白礬荊芥穗上等分用水煎放溫洗驅風散紅椒開口者七粒連根蔥頭七個上同煮水淨洗用絹衣浥干即愈指縫瘙癢成瘡有竅出血不止多年糞桶箍篾乾燒灰敷之即安火氣入瘡黃柏皮為末摻之立愈薄荷煎塗亦可方見積熱類漆毒成瘡磨鐵槽中泥塗之即愈又方蟹黃塗之效㿐瘡神降散治走皮㿐用桑寄生一小把本𣗬桑根取皮一握白芷黃連煎湯溫和以帛蘸洗候露出盡拭乾敷之滿尺皂角去弦核燒存性麻竹大蘀燃存性厚黃柏鷹爪黃連爪樟葉干白芷上等分為末清油調敷神效慎勿吃醋凍瘡以茄子根濃煎湯洗並以雀兒腦髓塗之又方治足上凍爛生瘡黃丹為末用豬脂調敷人面瘡用貝母為末小葦筒灌其瘡口數日成痂而愈白癩瘡每旦瘡上退白皮一升許如蛇蛻宜服解毒雄黃丸三四服即安方見風科熱證類甲疽瘡緑礬散緑礬半兩炒熟蘆薈一錢半麝一字上研如粉以絹袋盛藥納指於袋中線扎定瘥為度月蝕瘡胡粉散胡粉炒微黃白礬煅黃丹煅黃連淨輕粉各二錢胭脂一錢麝香少許上為末先以溫漿水入鹽洗拭後摻藥干則用清油調癩頭瘡先用本人小便燒稱錘令紅投於小便中方與洗瘡皮皆去然後以帛拭乾用滴青五文細研用油魚三個以盞燒成油調滴青塗之三日效頭上風屑極癢用藜蘆根不拘多少為末先洗頭須避風候稍干時用藥摻定須安藥入發至皮方可緊縛兩日夜腎臟風癢瘡十方活血驅風散治肝腎虛為風毒所入濕癢生瘡當歸去尾川芎白芷華陰細辛白蒺藜炒去刺桃仁浸去皮尖焙白芍藥半夏洗五靈脂甘草各三錢蒼朮炒杜仲去粗皮薑汁炒斷絲辣桂天麻薏苡仁橘紅檳榔厚朴去粗皮薑汁炒枳殼去穰切炒各四錢上銼散每服三錢水一盞半生薑五片棗二枚煎去滓入乳香末少許以佐心氣使心腎相交挾熱去桂乳香加黑豆煎服青木香丸疏導腎經風水腎虛挾邪浮腫多用安腎丸少用青木香丸夾和鹽湯下屢效方見大方科諸疝及虛損類小牛黃丸治腎虛挾熱陰囊癢痛多瘡方見前烏荊丸治肝腎風癢方見風科通治類神授丸治外腎濕癢方見風科歷節風類不換金正氣散疏導脾腎濕氣方見大方科時疫類莖物腫爛淫汁方干大腹皮一升苦參荊芥各二兩煎湯溫洗拭乾以津液塗潤次用油發燒存性入白芨末少許敷逐日煎湯密室洗換或加乳香末仍服蠟礬丸以發灰末米飲調吞下方見前腎臟風發瘡疥雞心檳榔二個破開以黃丹三錢合在內用濕紙裹煨全蠍六個明硫黃四錢上為末入輕粉半錢麝香少許青黛末半錢於瓷器內收每用少許清油調抹兩掌掩外腎女以兩掌掩兩乳各睡至醒次日又用經驗又方大紅川椒去目水蘸濕半日夾生杏仁研膏擦手如上法亦效外腎疳瘡用抱雞卵殼鷹爪黃連輕粉各等分為末煎過清油調塗香附子白芷五倍子煎水洗陰莖瘡豆粉一分蚯蚓二分上用水研塗上干又敷之陰囊上瘡甘草煎湯溫洗卻用臘茶末就敷貼陰頭生瘡上用溪螺殼溪港中螺舊者為妙坩堝中煅過為末先以鹽水洗五七次後以捋藥敷之妒精瘡上用大田螺兩個和殼煅過存性為末入輕粉搽所患處即可安又方治年少陽道興起當泄不泄不泄強泄脹斷嫩皮初如針眼大畏疼不敢洗刮日久攻入皮肉連莖潰爛一二寸許用荊芥黃柏皮馬鞭草甘草生蔥煎湯洗去膿靨以訶子燒灰入麝香少許乾摻患處仍斷房事數月臨睡吃冷水兩三口勿令陽道與起脹斷瘡靨靨堅後即安矣津調散治妒精瘡膿汁淋漓臭爛黃連款冬花各等分上為末以地骨皮蛇床子煎湯用軟帛浥干津調藥塗之最忌不得用生湯洗諸瘡皆然痱子滑石粉緑豆粉二兩焙透軟滑石一兩研上為末和勻以綿撲子蘸撲仍以膩粉佐之蛇纏瘡用雄黃為末醋調塗仍用酒服凡為蛇傷及蜂蠆蜈蚣毒蟲顛犬所傷皆可用又方用鏡面草入鹽捶爛敷瘡頭上立效痱子癢痛方新汲井水挪青蒿汁調蛤粉敷之雪水尤妙洗方治諸般惡瘡黃柏茵陳荊芥蔥白藿香煎水溫溫淋洗癬瘡胡粉散治一切癬神效胡粉一分砒霜半分大草烏一個生用硫黃一分別研蠍梢七枚雄黃一分另研斑蝥一個麝香少許上為末先以羊蹄根蘸醋擦動次用藥少許擦患處烏頭丸治宿患風癬遍身黑色肌體麻木痹痛不常草烏頭一斤刮洗去皮令極淨攤干用清油四兩鹽四兩同藥入銚內炒令深黃色慎出剩油只留鹽並藥再炒令黑色煙出為度取一枚劈破心內如米一點白者恰好白多再炒趁熱羅為末醋糊丸如梧桐子大每服三十丸空心溫酒下然草烏性差熱難制五七日間以烏豆煮粥解毒遍身牛皮癬方川烏草烏去皮尖何首烏白芷蘇木各等分上截小片臘月豬脂油煮焦候冷入鹽少許瓷器收時常挑一匙空心酒調下又方雌黃末入輕粉豬脂調抹又方斑蝥燈上燒米醋內淬再燒再淬凡三兩次就燒為灰存性上用紅棗一枚湯泡剝去皮核與藥同研爛先以手抓破癬然後搽藥不可犯好肉恐有毒昨葉荷草散治一切癬無問風濕氣血與夫相染而生者昨葉荷草一兩瓦上曬乾枯礬一錢雄黃半錢上為末以羊蹄菜根先蘸醋揩癬上令癢破即以藥末乘濕塗敷不過三兩次而愈更服局方何首烏散虛者消風散合和服方見風科灸法八月八日日出時令病人正當東向戶長跪平舉兩手持戶兩邊取肩頭小垂際骨解宛宛中灸之兩火俱下各三壯若七壯十日愈臁瘡牛黃金虎丹治足面生瘡下連大指上延外踝臁骨每發兼旬昏暮癢甚爬搔出血如泉痛楚不可忍夜分漸已明日復然每服一丸新汲水下臟腑有所下即愈天雄炮去皮臍一兩白礬枯過天南星湯洗天竺黃研各二兩一錢膩粉研牛黃研二錢雄黃研飛十二兩半生龍腦四錢金箔六十五片為衣上為末煉蜜搜和每一兩半作十丸金箔為衣應效三聖散花蕊石散方見産科保産類復元通氣散方見前追風獨活散方見風科通治類上各一貼合和酒調空心服又方治生瘡於腳胻名下疰瘡俗謂之褲口瘡或因物打撲而成者其瘡口狹皮內極闊皮薄如竹膜極癢痛終日黃水流延蔓而生甚者數年不愈又易於染過他人患此者須忌房室則易愈內外臁瘡皆治之韭菜地上地龍糞干為末入輕粉清油調敷白犬血亦可又方治腳肚上生瘡初則如粟漸大爪搔不已成片包腳相摶黃水出癢不可忍久成痼疾最難愈百藥煎研細津唾調逐運塗敷自外而入先以貫衆煎湯淋洗後用藥又方石榴皮煎取濃汁稍冷拂瘡上冷如冰雪即成痂又方用鱔魚數條黃色者尤妙打死先用清油塗其腹上置瘡上般屈令遍帛子系定食頃覺瘡痛不可忍然後取鱔魚看腹下有針眼大竅子皆蟲也如未盡再以數條依上再縛蟲去盡卻用死人腳脛骨燒灰清油調敷或以骨灰一兩入好茶末二錢同調亦可又方亦可治打撲腳脛上成瘡此最難愈檳榔半兩龍骨一分輕粉半錢干豬屎半兩燒存性上為末先以甘草鹽湯淨洗瘡口軟綿拭乾清油調敷一日一換五日定瘥忌無鱗魚魚鮓熱面又方治冷臁瘡鹿角灰發灰乳香為末清油調敷又方治足上生瘡臭穢潰爛漏藍子一枚燒為末入膩粉少許井水調塗效檳榔散治同上全蠍七個斑蝥十四個巴豆十四粒檳榔一個先用清油兩半慢火煎先入全蠍次斑蝥次巴豆隨下檳榔見黑色方入黃蠟一兩候熔去藥滓不用只用蠟油入後藥黃柏皮炙蛇床子研各二錢雄黃研硫黃研生者黃丹火飛海螵蛸各一錢白膠香黃連杏仁輕粉清油膠香與油先熔上為末同入清油中調敷瘡上立效單方治臁瘡成舊纍月不幹上等好沙糖先用鹽湯淋洗後綿帛拭乾以津唾塗卻以此敷上三日愈神效粉麝散治外臁瘡臭爛數十年不愈者生龜一個烏者打死去肉取殼酸醋一碗炙醋盡為度仍煅令白煙盡存性用瓦蓋地上出火毒上為末輕粉麝香拌勻臨用先以蔥水洗干方用藥牡蠣散收斂瘡口令乾牡蠣一塊用破草生包縛入火內煅令通紅去火候冷取出研上隨用時旋入枯飛過白礬少許拌和敷瘡口上祕方治腳脛骨上作瘡久爛黑或發孔或臭穢不可近用蜒蚰十數條小竹籤穿定瓦上焙乾為末真清油調敷劃時取效祕方隔壁膏用多年老杉木節燒灰真清油調箬葉盛隔貼在瘡上以絹帛系定不數貼而愈洗藥用海桐皮石榴皮等分煎湯淋洗令淨然後用熏藥熏藥用牛蒡子半兩研為末入紙捻子內燒熏之然後塗藥手足裂腫白芨膏治斷跟皸用頭髮一大握桐油一碗於瓦器內熬候油沸頭髮溶爛入川白芷白芨松脂末出火攤冷以瓦器收貯不容灰入每用百沸湯泡洗皸裂令軟拭乾敷其上即安或加少水粉祕方五倍子為末用牛骨髓填縫內即愈又方手足皸裂春夏不愈者生薑汁紅糟鹽豬膏臘月者佳上同研爛炒熱擦入縫內一時雖痛少頃皮軟縫合仍再用之即安治久行腳心腫痛蚯蚓糞塗腫處高閣起腳一夕即愈又方行路腳跟腫痛草烏甘遂各等分為末新汲水調敷露出腳爪甲黃蠟膏治冬月手足拆裂清油半兩盞內慢火煎沸入黃蠟一塊同煎候熔入光粉五倍子末少許熬令稠紫色為度先以熱湯洗火上烘乾即用藥敷薄紙貼之敷藥治遠行腳腫用之可行千里輕便甚妙防風北細辛草烏各等分上為末摻鞋底內如著草鞋即以水微濕過然後摻藥漏瘡蠟礬丸治癰疽發背瘰癧漏瘡惡瘡衛內膜驅解諸毒自然內消神妙方見前溫解散溫散漏瘡風冷藿香葉厚朴去粗皮薑汁炒半夏曲橘皮蒼朮炒細辛川芎白芷各一分辣桂川白薑生甘草炙各半分上銼散每服三錢水一盞生薑棗子煎服豬腎酒通行漏瘡惡水自大腸出黑牽牛碾細去皮取末一分入豬腎中以線扎青箬葉包慢火煨熟細嚼溫鹽酒下食治方治漏瘡肛門周匝有孔十數諸藥不效用熟犬肉蘸濃藍汁空心食之不食犬肉驢肉代之七日自安桂附丸治氣漏冷漏諸瘡桂心附子炮裂米醋浸再炮淬三五次去皮尖厚朴去粗皮薑汁炒甘草炙白朮各一兩木香一分乳香二錢別研上為末煉蜜丸梧桐子大空腹米飲下三五十丸乳香雲母膏治漏瘡效穿山甲浸一宿去肉用一百片真蚌粉同炒候香熟起泡去粉以甲為末細研上入乳香末一錢麝香半錢夾和雲母膏十五貼為丸梧桐子大每服三十丸溫酒下仍以鹿角膠調鹽酒服神授散方見大方科癆瘵類安腎丸山藥丸二藥多服調養方並見大方科虛損類代赭石丸治痔變為瘻膿血不止代赭石煅醋淬研磁石煮米醋數沸蘸茶細研白礬煅牡蠣灰龍骨研蝟皮炙焦皂莢刺燒豬後蹄垂甲燒各存性赤石脂川椒焙木賊焙蜂房炒各等分上為末神麯糊丸如小豆大每服五十丸食前艾並生薑煎湯下漏血處以熟艾揉和血竭塞日三換雄黃膏治積年冷漏黃水不止雄黃硫黃研細各一分頭髮黃蠟各半兩上用清油二兩煎熬頭髮熔盡去滓次入雄黃硫黃碎片黃蠟慢火上用柳枝頻攪為膏攤生絹貼用藥先以赤甘草頭煎湯洗或露蜂房白芷煎湯常洗常貼黑靈散漏瘡通用露蜂房銼二分牡蠣粉黃丹硫黃各一分研細上同炒令煙盡為末入發灰一分麝少許拌和敷患處麝能引藥透達亦殺蟲又捷效方用信石新瓦上火煅過為末以津液潤紙捻子蘸少許推入瘡孔內如瘡孔多不可齊上藥免使害人血竭散治痔漏痛不可忍血竭牡蠣粉發灰各等分上為末入麝香少許自以津唾調敷如更痛研杏仁膏調藥敷之洗漏瘡方漏瘡孔中多有惡穢常須避風洗淨每用白芷及露蜂房煎湯洗或大腹皮若參湯洗洗畢水出拭乾用向東石榴皮曬為末乾摻久冷漏瘡用活鱔魚五六條擲地以竹針貫之覆瘡良久當有蟲出如線復之使盡用檳榔黃連末敷明日以干艾作湯投白礬三二錢洗不一月全愈瘰癧白花蛇散治九漏瘰癧發於項腋之間增寒發熱或痛或不痛白花蛇酒浸軟去皮骨焙乾稱二兩生犀角鎊半錢青皮半兩黑牽牛半兩半生半炒上為末每服一錢入膩粉半錢研勻五更糯米飲調下已時利下惡物乃瘡之根也更候十餘日再進一服忌發風壅熱物如已成瘡一月可效用之神靈四聖散治瘰癧用花蛇散取轉後用此補之永去根本海藻洗石決明煅羌活瞿麥穗各等分上為末每服二錢米湯調下日三服下清水盡為妙牽牛丸立效荊芥穗殭蠶各五錢斑蝥二十八個去頭翅足用糯米炒黑牽牛五錢上為末皂角末熬膏為丸緑豆大臨睡時先用米飲調滑石末一錢服半夜時再一服五更初卻用溫酒吞二十丸服訖如小便無惡物行次日早再進一服又不行第三日五更初先進白糯米稀粥湯卻再進前藥一服更以燈心湯調琥珀末一錢服之以小便內利去惡毒是其應也連翹丸治瘰癧結核或破未破者薄荷新者二斤裂取汁皂角二挺水浸去皮挒取汁以上二味於銀石器內熬成膏次入青皮陳皮各一兩連翹半兩黑牽牛半炒皂角子慢火炮去皮取仁搗羅為末各兩半上為末用前膏為丸梧桐子大煎連翹湯食前下三十丸三聖丸治瘰癧丁香五十個斑蝥十個麝香一分另研上為末用鹽豉五十粒湯浸爛如泥和藥令勻丸如緑豆大每服五七丸食前溫酒送下日三服至五七日外覺小便淋漓是效即加服或便下如青筋膜之狀是病之根忌濕面毒食必勝丸治瘰癧不以年深日近及腦後兩邊有小結核連復數個兼癆瘵腹內有塊鯽魚一個去腸肚並子入雄黃一粒雞子大硇砂一錢於腹內仰安魚於炭火上燒煙盡取出以全蜈蚣一條蓬朮半兩梔子五個皂角二挺並燒萆麻子五個去皮燈上燒黃明膠三文皂角二挺去皮炙酥上為末別用皂角二挺去皮捶碎以水三碗揉汁去滓煮精羊肉四錢爛軟入輕粉五匣男子乳汁半兩同研成膏和藥末丸如緑豆大硃砂為衣溫酒侵晨十丸日一服至晚下肉疙疸子若項有五個則以五服藥取之視其所生多少以為服數即可更進數服如熱毒瘡癤未有頭頂者亦用消散一方加巴豆三七粒燒存性入旱蓮子丸治少長臟氣不平憂怒驚恐諸氣抑鬱結聚瘰癧滯留項腋及外傷風寒燥濕飲食百毒結成諸漏發作寒熱遍於項腋無問久近悉驗旱蓮子連翹子威靈仙何首烏蔓荊子三稜醋濕紙裹熟煨赤芍藥以上各一兩南木香二兩不見火大皂角三挺刮去皮酥炙無則用羊脂上為末米糊丸梧桐子大茶清下三十丸至五十丸日三服小兒量與之食後服破毒雄黃丸治瘰癧久作不愈寒熱往來項筋攣急已破未破皆可服之立見逐下惡物自小便中來通明雄黃顆塊大硃砂各三錢水銀二錢斑蝥二十八個去足翼用糯米炒黃上先以斑蝥為末續以雄黃硃砂另研為末再入水銀細研合和用雞子清和糯米稠糊為丸緑豆大每服二七丸米飲或溫酒下如惡物未見半朝再一服已驗方治瘰癧已作者烏雞子七枚斑蝥四十九個去頭翅足上每雞子一個去頂用箸攪勻入斑蝥七粒以紙糊蓋於飯上蒸熟取開去斑蝥食雞子每食一個煎生料五積散咽下服不過四五已破者生肌未破者消散海菜丸治癧生於頭項上交接名蛇盤癧者宜早治之海藻菜蒿麥炒去殼白殭蠶炒斷絲上為末取白梅肉泡湯為丸梧桐子大每服六七十丸臨臥米飲送下其毒當自大便泄去忌豆心雞羊酒面日五六服經效方治瘰癧久年不愈者不蛀皂角子一百枚用米醋一升硇砂二錢同煮醋盡炒令酥看數癧子多少如生一個服一枚生十個服十枚細嚼米湯下酒浸煮服亦可立應散治瘰癧神效已破未破皆可服連翹赤芍藥川芎當歸甘草炙滑石研各半兩黃芩三錢白牽牛生取末土蜂房蜜水洗飯上蒸曬乾各二錢半地膽去頭翅足糯米炒黃為度稱三錢川烏尖七個上為末每服一大錢濃煎木通湯調下臨臥服毒氣從小便中出澀痛不妨如粉片塊血爛肉是也如未效後再服繼以薄荷湯解其風熱且地膽性帶毒濟以烏尖或衝上麻悶不能強制嚼蔥白一寸茶清下以解之如小便澀燈心煎湯調五苓散服瘡處用好膏藥貼若療癰疽用此宣導惡毒本方去黃芩不用皂角散不蛀皂角不以多少每三十條作一束以棕櫚裹之縛定於溷釭內浸一月取出卻於長流水內再浸一月死水不能浣洗不可用去棕櫚曬乾不得焙搗羅為末每一兩入麝香半錢全蠍七個研細拌勻每服一二錢溫酒或湯飲調下一兩服愈粉乳托裡散治瘰癧攻心嘔吐發出其毒方見前蠟礬丸治瘰癧神效方見前蝸牛散治瘰癧已潰未潰皆可貼蝸牛不拘多少以竹索串尾上曬乾燒存性上為末入輕粉少許和豬骨髓調用紙花量病大小貼之一法以帶殼蝸牛七個生取肉入丁香七粒於七殼內燒存性與肉同研成膏用紙花貼之燒灰散大田螺並殼肉燒存性灰破者干貼未破者清油調敷洗敷方白芷煎湯泡荊芥候溫軟帛蘸洗拭乾好膏藥貼膿汁惡肉出盡用後藥敷半夏南星血竭一錢輕粉少許上為末以津唾調敷一方用五倍子海螵蛸檳榔乳香五靈脂麝香為末乾用清油調搽濕則乾摻又敷方治瘰癧初作未破作寒熱木鱉子二個草烏半兩以米醋磨入擂爛蔥白連根蚯蚓糞少許調勻敷癧上以紙條貼令通氣孔尤妙斂瘡口血竭一字棗子燒灰半錢麝香少許上灰研津唾調敷灸法以手抑置肩上微舉肘取之肘骨尖上是穴隨患處左即灸左右即灸右艾炷如小箸頭大再灸如前不過三次永無恙如患四五年者如或用藥靨不退辰時著灸申時即落所感稍深若三作即三灸平安又法只以蒜片貼有癧上七壯一易蒜多灸取效瘤贅南星膏治皮膚頭面上瘡瘤大者如拳小者如粟或軟或硬不疼不痛宜服可以輒用上用大南星一枚細研稠黏用米醋五七滴為膏如無生者用乾者為末醋調如膏先將小針刺病處令氣透卻以藥膏攤紙上象瘤大小貼之治小瘤方先用甘草煎膏筆蘸妝瘤旁四圍干後復妝凡三次然後以藥大戟芫花甘遂上為末米醋調別筆妝敷其中不得近著甘草處次日縮小又以甘草膏妝小暈三次中間仍用大戟芫花甘遂如前法自然焦縮凡骨瘤肉瘤膿瘤血瘤石瘤皆不可決惟脂瘤決去其脂粉則愈蓋六種瘤瘡肉瘤尤不可治治則殺人蠟礬丸治同上方見前系瘤法兼去鼠奶痔奇藥也芫花根淨洗帶濕不得犯鐵器於木石器中搗取汁用線一條浸半日或一宿以線系瘤經宿即落如未落再換線不過兩次自落後以龍骨訶子末敷瘡口即合系鼠奶痔依上法纍用立效如無根只用花泡濃水浸線黃丹末治鼻渣贅子及面上雀兒斑黃丹硇砂巴豆去油餅藥各二錢上為末入生礦石灰末一匕雞子清調勻酒渣用鵝翎刷上雀兒斑竹針刺破挑藥點之才覺痛及微腫可洗去疔瘡祕方治疔瘡防風細辛甘草節白殭蠶青皮黃連羌活獨活蟬蛻赤芍藥各平兩分上銼微末服五錢先將一服入澤蘭葉少許薑一兩同擂爛熱酒和服後用酒水各半盞生薑三片煎服病勢退減後再入大黃少許煎服下一兩洗湯去餘毒更用白梅蒼耳子研爛貼瘡上拔去根腳此方以藥味觀之甚若不疾然有效驗速纍試之祕方治魚臍疔瘡絲瓜葉即虞刺葉連須蔥韭菜上同入石鉢內搗爛如泥以酒和服滓貼腋下如病在左手貼左腋下右手貼右腋在左足貼左胯右足貼右胯如在中間貼心臍並用布帛包住候肉下紅絲處皆白則可為安如有潮熱亦用此法卻令人抱住恐其顫倒倒則難救矣酒煎散治疔瘡赤烏桕根水柳根水楊梅根蔥頭根紅內消香白芷各等分上各為銼散酒煎旋入通明雄黃研爛同服如瀉時瘡勢略退時只吃此藥若不瀉再服通利藥通利藥黑牽牛炒一兩巴豆十五個去油大黃五錢生用上為末米糊丸如緑豆大初服七丸次五丸第三服三丸如瀉不止吃白米粥及冷水洗五心如一服即瀉住服量人虛實與服如人盛服前二藥通再服後藥人十分實者大通藥芫花巴豆大黃荊芥各等分生用上銼散白水煎一沸便濾過空心服可留藥滓再煎效若要瀉住再服一服便住連翹散瀉後用此連翹當歸尾羌活獨活防風赤芍藥小赤豆各五錢大黃二錢木香蕪荑慈菰薄荷紅內消杜白芷升麻甘草忍冬草各三錢若潮不退加黃芩梔子仁各三錢朴硝四錢上為末酒調服不拘時候薄荷湯亦可喘加人參大病三四服愈如煩嘔甘草半兩豆粉一兩為末酸虀水下如割瘡去了疔子止血用毛鐵甲為末敷角瘡口方霜梅十個大黃五錢上為塊子用石灰炒過石灰入黃丹三錢為末乾摻瘡口上蟬蛻散治疔瘡最有功效用蟬蛻殭蠶為末酸醋調塗四畔留瘡口俟根出稍長然後拔去再用藥塗瘡蟾蜍膏治疔瘡取蟾酥以白麵黃丹搜作劑丸如麥顆狀用指甲爬動瘡上插入重者針破患處以一粒內之仍以水沉膏貼之取蟾酥法用癩蚵蚾於眉稜上以手拔出酥於油紙上或桑葉上用新瓦盛下然後插在背陰處經宿則自乾白於鵝翎筒內盛之水沉膏白芨末半錢水盞內沉下澄去水卻於皮紙上攤開貼瘡上灸法掌後橫文後五指男左女右灸七壯即瘥屢效簽刺瘡單方治竹草簽刺瘡以象牙屑敷之立出又方嚼白梅敷之立出敷藥治竹草刺瘡發腫作疼緣傷時不曾出血盡被惡毒氣注痛不止夜臥不安初破時其瘡紫赤黑色較時起三五重皮是也緑礬半兩小便燒熱放礬於內候取出曬乾丹參二錢半麝香一字馬兜鈴根一錢半上為末漿水洗淨瘡口上敷貼立效湯火瘡敷方劉寄奴不以多少為末先以糯米漿雞羽掃傷處然後摻藥並不痛亦無痕大凡湯者急以醋調茶鹽末塗之護肉不壞然後用別藥敷之至妙又方黃連黃柏輕粉各等分朴硝少許上為末入清油用合子住飯上蒸調塗立愈湯潑火燒細研山梔子濃調雞子清鵝毛輕拂上立冷愈又方側柏葉燒灰存性為末雞子清調敷如干再上黃柏散治湯火傷雞子殼黃柏樹皮朴硝大黃寒水石上等分為末白水調塗極效至聖膏上用雞子黃於銀石器內熬自然油調好粉敷之近效方山枇杷柴取皮焙乾為末生蜜雞子清調敷四黃散治湯潑火燒熱瘡疼痛大黃黃連黃柏黃芩白芨各等分上為末水調成膏以雞翎時刷摻藥治向火多生火斑瘡有汁黃柏皮薄荷葉為末摻之即愈項癭破結散治五癭堅硬不可移名石癭皮色不變名肉癭筋絡露結名筋癭赤脈交絡名血癭隨憂愁消長名氣癭五癭皆不可妄決破破則膿血崩潰多致夭枉服此十日知二十日愈海藻洗龍膽草海蛤通草昆布洗礬石枯松蘿各三分麥曲四兩半夏海帶各二分上為末每服方寸匕酒調日三服忌雞魚豬肉五辛生菜及諸毒物灸法治諸癭灸大空穴三七壯又灸肩髃左右相當宛宛處男左十八壯右十七壯女右十八壯左十七壯穴在肩端兩骨間陷者宛宛中舉臂取之又灸兩耳後髮際共百壯
